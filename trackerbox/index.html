<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- FIXED: Made fully zoomable on ALL devices & modes (removed maximum-scale and user-scalable=no) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Trackerbox</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="./icon-192.png">
  <meta name="theme-color" content="#05070e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Trackerbox">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <script>
    window.__trackerboxLoaderStartedAt = performance.now();
    window.__trackerboxInitialDisplayName = '';
    window.__trackerboxShouldKeepWarm = true;
    window.__trackerboxIsLocalDevHost = /^(localhost|127\.0\.0\.1|\[::1\])$/i.test(window.location.hostname || '');
    window.__trackerboxStartupErrorShown = false;
    window.__trackerboxShowStartupError = (message, source = 'startup') => {
      if (window.__trackerboxStartupErrorShown) return;
      window.__trackerboxStartupErrorShown = true;
      try {
        const loader = document.getElementById('loading-screen');
        if (loader) loader.classList.add('hidden');
        const root = document.getElementById('root') || document.body;
        const safeMessage = String(message || 'Unknown startup error')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
        root.innerHTML = `
          <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#05070e;color:#e2e8f0;font-family:Segoe UI,system-ui,sans-serif;">
            <div style="width:min(720px,100%);border:1px solid rgba(248,113,113,.35);background:rgba(15,23,42,.92);border-radius:24px;padding:24px;box-shadow:0 18px 60px rgba(0,0,0,.45);">
              <div style="font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#fca5a5;font-weight:800;">Trackerbox Startup Error</div>
              <h1 style="margin:12px 0 8px;font-size:28px;line-height:1.1;color:#fff;">The app did not finish loading.</h1>
              <p style="margin:0 0 16px;color:#cbd5e1;">Source: ${source}</p>
              <pre style="white-space:pre-wrap;word-break:break-word;background:#020617;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;color:#f8fafc;font-size:13px;line-height:1.5;">${safeMessage}</pre>
              <p style="margin:16px 0 0;color:#94a3b8;font-size:13px;">Try a hard refresh. If this is on Live Server, also clear localhost site data and reload.</p>
            </div>
          </div>`;
      } catch (err) {}
    };
    window.addEventListener('error', (event) => {
      const message = event?.error?.stack || event?.message || 'Unknown script error';
      window.__trackerboxShowStartupError(message, 'window.error');
    });
    window.addEventListener('unhandledrejection', (event) => {
      const reason = event?.reason?.stack || event?.reason?.message || String(event?.reason || 'Unhandled promise rejection');
      window.__trackerboxShowStartupError(reason, 'unhandledrejection');
    });
    try {
      const raw = localStorage.getItem('trackerbox_settings_v1');
      const settings = raw ? JSON.parse(raw) : null;
      window.__trackerboxInitialDisplayName = settings?.userDisplayName?.trim() || '';
      window.__trackerboxShouldKeepWarm = settings?.keepAppWarm !== false;
    } catch (err) {}
    const scheduleStartupWarmTask = (task) => {
      const run = () => {
        if ('requestIdleCallback' in window) {
          window.requestIdleCallback(task, { timeout: 1500 });
        } else {
          window.setTimeout(task, 400);
        }
      };
      if (document.readyState === 'complete') run();
      else window.addEventListener('load', run, { once: true });
    };
    if ('serviceWorker' in navigator && window.__trackerboxIsLocalDevHost) {
      navigator.serviceWorker.getRegistrations()
        .then(registrations => Promise.all(registrations.map(reg => reg.unregister())))
        .catch(() => {});
    } else if ('serviceWorker' in navigator && window.__trackerboxShouldKeepWarm) {
      scheduleStartupWarmTask(() => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered successfully!', reg))
          .catch(err => console.error('Service Worker registration failed:', err));
      });
    }
  </script>
  <script defer src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script defer src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    /* Instant Loading Screen */
    #loading-screen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      z-index: 9999;
      isolation: isolate;
      background:
        radial-gradient(circle at 18% 18%, rgba(103, 232, 249, 0.16), transparent 20%),
        radial-gradient(circle at 82% 24%, rgba(244, 114, 182, 0.14), transparent 22%),
        radial-gradient(circle at 50% 78%, rgba(56, 189, 248, 0.12), transparent 28%),
        linear-gradient(145deg, #030712 0%, #07111f 48%, #081325 100%);
      transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1), visibility 0.6s ease;
    }
    #loading-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 25% 30%, rgba(125, 211, 252, 0.24), transparent 0 24%),
        radial-gradient(circle at 72% 38%, rgba(251, 191, 36, 0.14), transparent 0 18%),
        radial-gradient(circle at 58% 72%, rgba(196, 181, 253, 0.18), transparent 0 22%);
      pointer-events: none;
      mix-blend-mode: screen;
      animation: loaderNebulaShift 14s ease-in-out infinite alternate;
    }
    #loading-screen::after {
      content: '';
      position: absolute;
      inset: -20%;
      pointer-events: none;
      opacity: 0.45;
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.06) 1px, transparent 1px);
      background-size: 92px 92px;
      mask-image: radial-gradient(circle at center, black 36%, transparent 78%);
      animation: loaderMeshDrift 18s linear infinite;
    }
    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loader-frame {
      position: relative;
      z-index: 1;
      width: min(420px, calc(100vw - 2rem));
      padding: 1.45rem 1.35rem 1.3rem;
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.78) 0%, rgba(8, 15, 29, 0.58) 100%);
      box-shadow:
        0 20px 60px rgba(2, 6, 23, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 0 0 1px rgba(34, 211, 238, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: grid;
      justify-items: center;
      gap: 1rem;
      text-align: center;
      overflow: hidden;
      transform: translateZ(0);
    }
    .loader-frame::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(130deg, rgba(255,255,255,0.08), transparent 38%, transparent 62%, rgba(34,211,238,0.08));
      opacity: 0.85;
      pointer-events: none;
      animation: loaderFrameGlow 7s ease-in-out infinite;
      animation-delay: -2.4s;
    }
    .loader-scene {
      position: relative;
      width: min(250px, 62vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 0 40px rgba(34, 211, 238, 0.18));
    }
    .loader-orbit {
      position: absolute;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      box-shadow: inset 0 0 30px rgba(148, 163, 184, 0.05);
    }
    .loader-orbit-a {
      inset: 8%;
      border-top-color: rgba(103, 232, 249, 0.95);
      border-right-color: rgba(244, 114, 182, 0.5);
      animation: loaderSpin 12s linear infinite;
      animation-delay: -4.1s;
    }
    .loader-orbit-b {
      inset: 19%;
      border-left-color: rgba(196, 181, 253, 0.7);
      border-bottom-color: rgba(56, 189, 248, 0.85);
      animation: loaderSpinReverse 8s linear infinite;
      animation-delay: -1.8s;
    }
    .loader-orbit-c {
      inset: 2%;
      border-color: rgba(255, 255, 255, 0.06);
      animation: loaderBreath 6.5s ease-in-out infinite;
      animation-delay: -2.6s;
    }
    .loader-float {
      position: absolute;
      border-radius: 999px;
      filter: blur(10px);
      opacity: 0.85;
      mix-blend-mode: screen;
    }
    .loader-float-a {
      width: 88px;
      height: 88px;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.45) 0%, rgba(34, 211, 238, 0) 70%);
      left: 10%;
      top: 22%;
      animation: loaderFloat 9s ease-in-out infinite;
      animation-delay: -4.4s;
    }
    .loader-float-b {
      width: 72px;
      height: 72px;
      background: radial-gradient(circle, rgba(244, 114, 182, 0.35) 0%, rgba(244, 114, 182, 0) 72%);
      right: 16%;
      bottom: 18%;
      animation: loaderFloat 7.5s ease-in-out infinite reverse;
      animation-delay: -2s;
    }
    .loader-core {
      position: relative;
      width: 36%;
      aspect-ratio: 1;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 34% 32%, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.78) 12%, rgba(34,211,238,0.45) 30%, rgba(34,211,238,0.1) 62%, rgba(34,211,238,0) 100%),
        linear-gradient(145deg, rgba(34,211,238,0.42), rgba(244,114,182,0.2));
      box-shadow:
        0 0 40px rgba(34, 211, 238, 0.28),
        inset 0 0 28px rgba(255,255,255,0.18);
      animation: loaderCoreFloat 5.8s ease-in-out infinite;
      animation-delay: -1.6s;
    }
    .loader-core::before {
      content: '';
      position: absolute;
      inset: -24%;
      border-radius: inherit;
      border: 1px solid rgba(103, 232, 249, 0.18);
      opacity: 0.8;
      animation: loaderHalo 3.6s ease-out infinite;
      animation-delay: -1.3s;
    }
    .loader-core::after {
      content: '';
      width: 34%;
      height: 34%;
      border-radius: inherit;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 0 20px rgba(255,255,255,0.7);
      animation: loaderPulseCore 2.4s ease-in-out infinite;
      animation-delay: -1s;
    }
    .loader-spark {
      --orbit-radius: 102px;
      position: absolute;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 12px;
      margin: -6px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(103,232,249,0.88) 100%);
      box-shadow: 0 0 18px rgba(125, 211, 252, 0.8);
      animation: loaderSparkOrbit 6.2s linear infinite;
    }
    .loader-spark-1 {
      --orbit-radius: 108px;
      animation-delay: -2.8s;
    }
    .loader-spark-2 {
      --orbit-radius: 78px;
      width: 10px;
      height: 10px;
      margin: -5px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(244,114,182,0.86) 100%);
      box-shadow: 0 0 16px rgba(244, 114, 182, 0.65);
      animation-duration: 4.4s;
      animation-direction: reverse;
      animation-delay: -1.1s;
    }
    .loader-spark-3 {
      --orbit-radius: 122px;
      width: 8px;
      height: 8px;
      margin: -4px;
      background: linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(251,191,36,0.85) 100%);
      box-shadow: 0 0 14px rgba(251, 191, 36, 0.6);
      animation-duration: 8.4s;
      animation-delay: -5.2s;
    }
    .loader-copy {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 0.55rem;
      justify-items: center;
      width: 100%;
    }
    .loader-kicker {
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(224, 242, 254, 0.92);
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .loader-logo {
      font-size: clamp(2.15rem, 6vw, 3.25rem);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f8fbff;
      text-shadow:
        0 0 32px rgba(103, 232, 249, 0.18),
        0 8px 32px rgba(2, 6, 23, 0.48);
    }
    .loader-status {
      font-size: 0.92rem;
      color: rgba(224, 242, 254, 0.92);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.95;
    }
    .loader-note {
      width: 100%;
      max-width: none;
      font-size: clamp(0.62rem, 2.4vw, 0.84rem);
      line-height: 1.55;
      color: rgba(191, 219, 254, 0.7);
      white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .loader-meter {
      width: min(270px, 92%);
      height: 12px;
      position: relative;
      overflow: hidden;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
        rgba(5, 10, 24, 0.9);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow:
        inset 0 0 18px rgba(2, 6, 23, 0.62),
        0 0 16px rgba(34, 211, 238, 0.1);
    }
    .loader-meter::before {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background:
        linear-gradient(90deg, rgba(34,211,238,0.08), rgba(244,114,182,0.07), rgba(251,191,36,0.08), rgba(52,211,153,0.08));
      opacity: 0.9;
    }
    .loader-meter::after {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.2), rgba(255,255,255,0));
      opacity: 0.45;
      pointer-events: none;
    }
    .loader-meter-track {
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(6, 18, 34, 0.96), rgba(9, 28, 48, 0.92), rgba(6, 18, 34, 0.96));
      box-shadow:
        inset 0 0 12px rgba(2, 6, 23, 0.6),
        inset 0 0 16px rgba(56, 189, 248, 0.08);
    }
    .loader-meter-loop {
      position: absolute;
      inset: 0;
      width: 220%;
      left: -60%;
      border-radius: inherit;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(56,189,248,0) 0 18px,
          rgba(56,189,248,0.12) 18px 28px,
          rgba(56,189,248,0.94) 28px 42px,
          rgba(224,242,254,0.98) 42px 46px,
          rgba(56,189,248,0.88) 46px 60px,
          rgba(56,189,248,0.14) 60px 72px,
          rgba(56,189,248,0) 72px 94px
        );
      opacity: 0.98;
      filter: saturate(1.18);
      will-change: transform;
      animation: loaderMeterLoop 0.58s linear infinite;
      animation-delay: -0.37s;
    }
    .loader-meter-loop::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: inherit;
      opacity: 0.72;
      filter: blur(6px);
      transform: scaleY(1.9);
      transform-origin: center;
    }
    .loader-meter-loop::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0));
      mix-blend-mode: screen;
      opacity: 0.42;
    }
    .loader-beat {
      display: inline-flex;
      align-items: flex-end;
      gap: 0.38rem;
      height: 18px;
    }
    .loader-beat span {
      width: 5px;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(125,211,252,0.95), rgba(244,114,182,0.7));
      transform-origin: center bottom;
      animation: loaderBeat 1.1s ease-in-out infinite;
    }
    .loader-beat span:nth-child(1) { animation-delay: -0.75s; }
    .loader-beat span:nth-child(2) { animation-delay: -0.5s; }
    .loader-beat span:nth-child(3) { animation-delay: -0.2s; }
    .loader-beat span:nth-child(4) { animation-delay: -0.62s; }
    .loader-beat span:nth-child(5) { animation-delay: -0.34s; }
    @keyframes loaderMeterLoop {
      0% { transform: translateX(0); }
      100% { transform: translateX(94px); }
    }
    @keyframes loaderFrameGlow {
      0%, 100% { opacity: 0.68; }
      50% { opacity: 1; }
    }
    @keyframes loaderSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes loaderSpinReverse {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes loaderBreath {
      0%, 100% { transform: scale(0.98); opacity: 0.7; }
      50% { transform: scale(1.02); opacity: 1; }
    }
    @keyframes loaderPulseCore {
      0%, 100% { transform: scale(0.88); opacity: 0.85; }
      50% { transform: scale(1.12); opacity: 1; }
    }
    @keyframes loaderHalo {
      0% { transform: scale(0.78); opacity: 0.72; }
      70%, 100% { transform: scale(1.22); opacity: 0; }
    }
    @keyframes loaderCoreFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-7px) scale(1.03); }
    }
    @keyframes loaderFloat {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(10px, -12px, 0) scale(1.06); }
    }
    @keyframes loaderSparkOrbit {
      0% { transform: rotate(0deg) translateY(calc(var(--orbit-radius) * -1)) scale(0.75); opacity: 0.72; }
      50% { transform: rotate(180deg) translateY(calc(var(--orbit-radius) * -1)) scale(1); opacity: 1; }
      100% { transform: rotate(360deg) translateY(calc(var(--orbit-radius) * -1)) scale(0.75); opacity: 0.72; }
    }
    @keyframes loaderBeat {
      0%, 100% { transform: scaleY(0.45); opacity: 0.55; }
      50% { transform: scaleY(1); opacity: 1; }
    }
    @keyframes loaderNebulaShift {
      0% { transform: scale(1) rotate(0deg); opacity: 0.72; }
      100% { transform: scale(1.08) rotate(8deg); opacity: 1; }
    }
    @keyframes loaderMeshDrift {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(92px, 92px, 0); }
    }
    @media (max-width: 640px) {
      .loader-frame {
        border-radius: 28px;
        padding: 1.3rem 1.05rem 1.15rem;
        gap: 0.9rem;
      }
      .loader-scene {
        width: min(220px, 72vw);
      }
      .loader-logo {
        font-size: clamp(1.85rem, 10vw, 2.55rem);
      }
      .loader-note {
        font-size: clamp(0.58rem, 2.8vw, 0.74rem);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      #loading-screen::before,
      #loading-screen::after,
      .loader-frame::before,
      .loader-orbit,
      .loader-core,
      .loader-core::before,
      .loader-core::after,
      .loader-float,
      .loader-spark,
      .loader-meter-loop,
      .loader-beat span {
        animation: none !important;
      }
      .loader-meter-loop {
        opacity: 0.78;
      }
    }

    /* Futuristic Base & Variables */
    :root {
      --bg-color: #05070e;
      --panel-bg: rgba(15, 23, 42, 0.5);
      --sticky-bg: #0b1120;
      --border-color: rgba(255, 255, 255, 0.08);
      --mouse-x: 50vw;
      --mouse-y: 50vh;
    }
    html {
      scroll-behavior: smooth;
    }
    body {
      background-color: var(--bg-color);
      color: #e2e8f0;
      overflow-x: hidden;
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *,
      *::before,
      *::after {
        animation: none !important;
        transition-duration: 0.01ms !important;
      }
    }
    .tb-interactive {
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }
    /* Interactive Alive Background Glow */
    .mouse-glow {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: -1;
      background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(124, 58, 237, 0.15) 0%, rgba(6, 182, 212, 0.05) 30%, rgba(0,0,0,0) 60%);
      transition: background 0.1s ease-out;
    }
    /* Smooth Glass Panels */
    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.28s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.25s ease, background-color 0.25s ease;
    }
    .section-shell {
      position: relative;
      overflow: hidden;
      animation: sectionReveal 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .section-shell::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(115deg, transparent 0%, rgba(255,255,255,0.035) 22%, transparent 48%);
      transform: translateX(-120%);
      animation: sheenPass 1.1s ease-out 1;
    }
    .top-chip,
    .app-shortcut,
    .menu-nav-card {
      animation: sectionReveal 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      will-change: transform, opacity;
    }
    .menu-drawer {
      animation: drawerIn 0.34s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    button,
    a,
    input,
    select,
    textarea {
      transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1), background-color 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease, opacity 0.22s ease, color 0.22s ease;
    }
    button:hover,
    .app-shortcut:hover,
    .top-chip:hover {
      transform: translateY(-1px);
    }
    button:active,
    .app-shortcut:active,
    .top-chip:active {
      transform: translateY(0) scale(0.98);
    }
    @media (max-width: 767px) {
      header.sticky .tb-header-shell {
        padding: 0.7rem 0.8rem;
        gap: 0.75rem;
      }
      header.sticky .tb-header-brand {
        gap: 0.7rem;
      }
      header.sticky .tb-header-actions {
        gap: 0.5rem;
        margin-top: 0;
      }
      header.sticky .tb-header-iconbtn,
      header.sticky .app-shortcut {
        width: 40px !important;
        height: 40px !important;
        border-radius: 14px !important;
      }
      header.sticky .tb-header-logo {
        width: 40px;
        height: 40px;
      }
      header.sticky .tb-header-title {
        font-size: 1.6rem;
      }
      header.sticky .tb-header-credit {
        font-size: 9px;
        margin-top: 0.1rem;
      }
      header.sticky .top-chip {
        min-height: 40px;
        padding: 0.45rem 0.65rem !important;
        border-radius: 14px !important;
      }
      header.sticky .tb-header-icon-group {
        gap: 0.4rem;
      }
    }
    .neon-text { text-shadow: 0 0 15px currentColor; }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .alive-pulse { animation: heartbeat 3s ease-in-out infinite; }
    @keyframes modalEnter {
      0% { opacity: 0; transform: scale(0.95) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .animate-modal { animation: modalEnter 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes sectionReveal {
      0% { opacity: 0; transform: translateY(12px) scale(0.985); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes drawerIn {
      0% { opacity: 0; transform: translateX(-18px) scale(0.985); }
      100% { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes sheenPass {
      0% { transform: translateX(-120%); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateX(120%); opacity: 0; }
    }
    /* Rigid square cells */
    .square-cell-inner { width: 52px; height: 52px; }
    @media (min-width: 768px) { .square-cell-inner { width: 60px; height: 60px; } }
    /* Touch actions */
    .paintable-svg { touch-action: none; }
    .scrollable-container { touch-action: pan-x pan-y; }
    /* Cyberpunk Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    /* Clean Number Inputs for Timer */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }
    /* Light mode overrides */
    .light-mode {
      --bg-color: #f4f6fb;
      --panel-bg: rgba(248, 250, 252, 0.96);
      --sticky-bg: #e8edf5;
      --border-color: rgba(71, 85, 105, 0.16);
    }
    .light-mode body { color: #1f2937; }
    .light-mode .glass-panel { background: var(--panel-bg); }
    /* Force dark text in both light themes */
    .light-mode .text-white,
    .light-mode .text-slate-100,
    .light-mode .text-slate-200,
    .light-mode .text-slate-300 {
      color: #1f2937 !important;
    }
    .light-mode .text-slate-400 {
      color: #6b7280 !important;
    }
    .light-mode .neon-text {
      text-shadow: none !important;
    }
    /* Collapsed epoch thin row */
    .collapsed-row td { height: 34px; }
    /* Cryo-Sleep muted ice styling */
    .cryo-day {
      background: linear-gradient(135deg, #67e8f9 0%, #22d3ee 100%) !important;
      opacity: 0.25;
      box-shadow: 0 0 12px rgba(103, 232, 249, 0.3) !important;
    }
    /* Current Hour" Visual Anchor â€“ subtle pulsing neon glow */
    @keyframes pulseNeon {
      0%, 100% { box-shadow: 0 0 12px #22d3ee, 0 0 24px #22d3ee; }
      50% { box-shadow: 0 0 4px #22d3ee, 0 0 8px #22d3ee; }
    }
    .current-hour-glow {
      animation: pulseNeon 1.8s ease-in-out infinite;
      border: 2.5px solid #22d3ee !important;
      z-index: 10;
    }
    /* Toast animation */
    @keyframes toastPop {
      0% { opacity: 0; transform: translateY(20px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    /* Journal save pulse (psychological assurance) */
    @keyframes journalSavePulse {
      0% { box-shadow: 0 0 0 rgba(34,197,94,0); border-color: rgba(34,197,94,0.0); }
      40% { box-shadow: 0 0 18px rgba(34,197,94,0.35), 0 0 40px rgba(34,197,94,0.16); border-color: rgba(34,197,94,0.55); }
      100% { box-shadow: 0 0 0 rgba(34,197,94,0); border-color: rgba(34,197,94,0.0); }
    }
    .journal-save-pulse {
      animation: journalSavePulse 500ms ease-out 0s 4;
    }
    /* Markdown prose styles */
    .prose {
      font-size: 0.875rem;
      line-height: 1.5;
    }
    .prose strong { font-weight: 700; }
    .prose em { font-style: italic; }
    .prose ul { list-style: disc; padding-left: 1.5rem; margin: 0.75rem 0; }
    .prose li { margin: 0.25rem 0; }
    .prose a { color: #a855f7; text-decoration: underline; }
  </style>
</head>
