<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Smart Prompt Splitter</title>
    <meta name="theme-color" content="#020617">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Prompt Splitter">
    <meta name="description" content="Split long scripts into clean, copyable prompt sections with mobile-friendly controls.">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root {
            color-scheme: dark;
            --page-top: #01030a;
            --page-bottom: #020617;
            --panel-bg: rgba(4, 10, 22, 0.82);
            --panel-bg-strong: rgba(3, 8, 18, 0.94);
            --panel-border: rgba(103, 232, 249, 0.16);
            --panel-border-strong: rgba(103, 232, 249, 0.34);
            --text-main: #ecfeff;
            --text-soft: #c7f7ff;
            --text-muted: #7dd3fc;
            --text-dim: #52728a;
            --accent: #22d3ee;
            --accent-soft: #67e8f9;
            --accent-lime: #a3e635;
            --focus-ring: rgba(34, 211, 238, 0.32);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
        }

        html {
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            overflow-x: hidden;
            background: var(--page-bottom);
        }

        body {
            min-height: 100dvh;
            overflow-x: hidden;
            touch-action: manipulation;
            color: var(--text-main);
            font-family: "Segoe UI Variable", "Segoe UI", "Bahnschrift", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(34, 211, 238, 0.18), transparent 26rem),
                radial-gradient(circle at top right, rgba(163, 230, 53, 0.1), transparent 24rem),
                radial-gradient(circle at bottom center, rgba(34, 211, 238, 0.08), transparent 30rem),
                linear-gradient(180deg, var(--page-top) 0%, var(--page-bottom) 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(103, 232, 249, 0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(103, 232, 249, 0.045) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.5), transparent 88%);
            opacity: 0.42;
        }

        header,
        main,
        #toast,
        #settingsModal {
            padding-left: max(0px, var(--safe-left));
            padding-right: max(0px, var(--safe-right));
        }

        header {
            padding-top: max(0px, var(--safe-top));
        }

        main {
            padding-bottom: calc(2.5rem + var(--safe-bottom));
        }

        #toast {
            top: calc(1rem + var(--safe-top));
        }

        #settingsModal {
            padding-top: calc(0.75rem + var(--safe-top));
            padding-bottom: calc(0.75rem + var(--safe-bottom));
        }

        #settingsModal > div {
            max-height: calc(100dvh - var(--safe-top) - var(--safe-bottom) - 1.5rem);
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        img,
        svg,
        canvas,
        video {
            max-width: 100%;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
            overscroll-behavior-x: contain;
        }

        .glass-panel {
            background: linear-gradient(180deg, rgba(7, 15, 29, 0.9), rgba(4, 10, 22, 0.82));
            backdrop-filter: blur(20px);
            border-color: var(--panel-border) !important;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.04),
                0 20px 48px rgba(0, 0, 0, 0.42),
                0 0 30px rgba(34, 211, 238, 0.06);
        }

        .soft-ring:focus-visible {
            outline: none;
            box-shadow:
                0 0 0 2px rgba(2, 6, 23, 0.95),
                0 0 0 4px var(--focus-ring),
                0 0 22px rgba(34, 211, 238, 0.16);
        }

        .view-pill-active {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-lime) 100%);
            color: #041018 !important;
            box-shadow: 0 0 0 1px rgba(163, 230, 53, 0.22), 0 10px 26px rgba(34, 211, 238, 0.18);
        }

        .view-pill-idle {
            color: rgba(199, 247, 255, 0.72);
        }

        .copied-shell {
            border-color: rgba(163, 230, 53, 0.34) !important;
            background: linear-gradient(180deg, rgba(12, 22, 19, 0.94), rgba(7, 17, 15, 0.94));
            box-shadow: 0 16px 30px rgba(163, 230, 53, 0.08);
        }

        @keyframes bounce-in {
            0% { transform: scale(0.9); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-bounce-in {
            animation: bounce-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes rise-in {
            0% { transform: translateY(18px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .animate-rise-in {
            animation: rise-in 0.24s ease-out forwards;
        }

        body.modal-open {
            overflow: hidden;
        }

        .prompt-content {
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            word-break: break-word;
            color: var(--text-soft);
        }

        .chrome-btn {
            min-height: 2.85rem;
            border: 1px solid rgba(125, 211, 252, 0.16);
            background: rgba(7, 15, 29, 0.92);
            color: var(--text-soft);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .chrome-btn:hover {
            border-color: rgba(103, 232, 249, 0.34);
            background: rgba(10, 21, 38, 0.98);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                0 0 18px rgba(34, 211, 238, 0.12);
        }

        .chrome-btn.is-muted {
            color: rgba(199, 247, 255, 0.58);
            border-color: rgba(82, 114, 138, 0.28);
        }

        .neon-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-lime) 100%);
            border: 1px solid rgba(163, 230, 53, 0.3);
            color: #03131a;
            box-shadow:
                0 12px 24px rgba(34, 211, 238, 0.18),
                0 0 30px rgba(163, 230, 53, 0.1);
        }

        .neon-primary:hover {
            filter: brightness(1.03);
            box-shadow:
                0 14px 28px rgba(34, 211, 238, 0.22),
                0 0 36px rgba(163, 230, 53, 0.12);
        }

        .metric-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.45rem 0.7rem;
            border-radius: 9999px;
            border: 1px solid rgba(103, 232, 249, 0.14);
            background: rgba(8, 15, 29, 0.84);
            color: rgba(236, 254, 255, 0.88);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .metric-chip i {
            width: 0.85rem;
            height: 0.85rem;
            color: var(--accent-soft);
        }

        .mini-kicker {
            color: var(--text-dim);
            font-size: 0.72rem;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            font-weight: 700;
        }

        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.3rem 0.55rem;
            border-radius: 9999px;
            border: 1px solid rgba(103, 232, 249, 0.14);
            background: rgba(255, 255, 255, 0.03);
            color: rgba(199, 247, 255, 0.72);
            font-size: 11px;
            font-weight: 700;
        }

        .status-chip--done {
            border-color: rgba(163, 230, 53, 0.24);
            background: rgba(163, 230, 53, 0.08);
            color: rgba(217, 249, 157, 0.9);
        }

        .toggle-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.8rem;
            height: 1.8rem;
            border-radius: 9999px;
            border: 1px solid rgba(103, 232, 249, 0.16);
            background: rgba(255, 255, 255, 0.03);
            color: rgba(199, 247, 255, 0.76);
        }

        .meta-chip {
            display: inline-flex;
            max-width: 100%;
            align-items: center;
            border-radius: 0.85rem;
            border: 1px solid rgba(34, 211, 238, 0.18);
            background: rgba(34, 211, 238, 0.08);
            padding: 0.35rem 0.6rem;
            color: rgba(165, 243, 252, 0.95);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.01em;
            word-break: break-all;
        }

        #toast {
            background: rgba(3, 10, 22, 0.96);
            border: 1px solid rgba(103, 232, 249, 0.16);
            color: var(--text-main);
        }

        #inputText {
            color: var(--text-main);
        }

        #inputText::placeholder {
            color: rgba(82, 114, 138, 0.9);
        }

        #settingsModal {
            background: rgba(1, 4, 10, 0.72);
            backdrop-filter: blur(10px);
        }

        #settingsModal input,
        #settingsModal select {
            background: rgba(3, 10, 22, 0.92) !important;
            border-color: rgba(103, 232, 249, 0.16) !important;
            color: var(--text-main) !important;
        }

        #settingsModal input::placeholder {
            color: rgba(82, 114, 138, 0.88);
        }

        #tabsContainer,
        #subTabsContainer {
            background: rgba(5, 11, 22, 0.92);
            border-color: rgba(103, 232, 249, 0.14) !important;
        }

        #resultsMeta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
            margin-top: 0.8rem;
        }

        #emptyState h3,
        #resultsSummary,
        #settingsTitle {
            color: var(--text-main) !important;
        }

        #emptyState,
        #copyTabBtn,
        #resetProgressBtn {
            border-color: rgba(103, 232, 249, 0.14) !important;
        }

        #copyTabBtn,
        #resetProgressBtn {
            background: rgba(7, 15, 29, 0.92);
            color: var(--text-soft);
        }

        @media (max-width: 640px) {
            #toast {
                left: 1rem;
                right: 1rem;
                top: auto;
                bottom: calc(1rem + var(--safe-bottom));
            }

            #settingsModal > div {
                max-height: calc(100dvh - var(--safe-top) - var(--safe-bottom) - 0.75rem);
            }
        }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">

    <div id="toast" class="fixed top-4 right-4 z-50 bg-slate-800/95 text-white px-5 py-3 rounded-2xl shadow-2xl items-center gap-2 animate-bounce-in hidden">
        <i data-lucide="check" class="text-green-400 w-[18px] h-[18px]"></i>
        <span id="toastMsg" class="font-medium"></span>
    </div>

    <header class="glass-panel sticky top-0 z-40 border-b border-cyan-400/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 rounded-2xl bg-slate-950/90 shadow-[0_0_24px_rgba(34,211,238,0.12)] border border-cyan-400/20 flex items-center justify-center overflow-hidden">
                    <svg viewBox="0 0 64 64" class="w-8 h-8" aria-hidden="true">
                        <defs>
                            <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#22d3ee"></stop>
                                <stop offset="100%" stop-color="#a3e635"></stop>
                            </linearGradient>
                        </defs>
                        <rect x="8" y="8" width="48" height="48" rx="14" fill="url(#logoBg)"></rect>
                        <path d="M21 22h22c2.8 0 5 2.2 5 5v1c0 2.8-2.2 5-5 5H21c-2.8 0-5-2.2-5-5v-1c0-2.8 2.2-5 5-5Z" fill="#eff6ff"></path>
                        <path d="M21 29h22M21 37h13M21 44h17" stroke="#dbeafe" stroke-width="3.5" stroke-linecap="round"></path>
                        <path d="M38 33l-9 13M44 33l-9 13" stroke="#0f172a" stroke-width="4" stroke-linecap="round"></path>
                        <circle cx="43" cy="29" r="4" fill="#0f172a"></circle>
                        <circle cx="30" cy="48" r="4" fill="#0f172a"></circle>
                    </svg>
                </div>
                <div>
                    <p class="mini-kicker">Neon Splitter</p>
                    <h1 class="text-lg sm:text-xl font-bold text-cyan-50 tracking-[0.04em]">
                        Prompt Splitter
                    </h1>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-2 w-full sm:w-auto">
                <button id="settingsBtn" type="button" aria-label="Open rules" title="Rules" class="chrome-btn soft-ring w-full text-sm font-medium px-3 py-2.5 rounded-2xl transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="settings-2" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Rules</span>
                </button>
                <button id="soundToggle" type="button" aria-label="Toggle audio" title="Audio" class="chrome-btn soft-ring w-full text-sm font-medium px-3 py-2.5 rounded-2xl transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="volume-2" class="w-4 h-4"></i>
                    <span id="soundToggleText" class="hidden sm:inline">Audio</span>
                </button>
                <button id="installBtn" type="button" aria-label="Install app" title="Install" class="chrome-btn soft-ring hidden w-full text-sm font-medium px-3 py-2.5 rounded-2xl transition-colors items-center justify-center gap-2">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Install</span>
                </button>
                <button id="exampleBtn" onclick="loadExample()" aria-label="Load demo" title="Demo" class="chrome-btn soft-ring w-full text-sm font-medium px-3 py-2.5 rounded-2xl transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Demo</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 sm:py-6 pb-10">
        <div class="grid lg:grid-cols-12 gap-4 sm:gap-5">

            <div class="lg:col-span-5 min-w-0 flex flex-col gap-4">
                <div class="glass-panel rounded-[1.8rem] border flex flex-col flex-grow overflow-hidden">
                    <div class="p-4 border-b border-cyan-400/10 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                        <div class="flex items-center gap-2">
                            <i data-lucide="file-text" class="w-5 h-5 text-cyan-300"></i>
                            <h2 class="text-base font-semibold text-cyan-50">Script</h2>
                        </div>

                        <div class="grid grid-cols-2 gap-2 sm:flex sm:items-center">
                            <input type="file" id="fileUpload" accept=".txt,.docx" class="hidden" onchange="handleFileUpload(event)">
                            <button id="uploadBtn" onclick="document.getElementById('fileUpload').click()" title="Upload .docx or .txt" class="chrome-btn soft-ring flex items-center justify-center gap-2 text-sm font-medium px-3 py-2 rounded-2xl transition-colors">
                                <i data-lucide="upload" class="w-4 h-4"></i>
                                Add
                            </button>
                            <button id="clearBtn" onclick="handleClearAll()" title="Clear" class="chrome-btn soft-ring p-2 rounded-2xl transition-colors justify-self-end sm:justify-self-auto">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>

                    <textarea id="inputText" placeholder="Paste script" class="soft-ring w-full flex-grow min-h-[38vh] sm:min-h-[300px] p-4 sm:p-5 resize-none text-sm bg-transparent"></textarea>

                    <div class="p-4 border-t border-cyan-400/10 bg-slate-950/20 rounded-b-[1.8rem]">
                        <button id="processBtn" onclick="processText()" class="neon-primary soft-ring w-full py-3.5 px-4 font-semibold rounded-2xl transition-all flex items-center justify-center gap-2">
                            <i data-lucide="scissors" class="w-5 h-5"></i>
                            Split
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 min-w-0">
                <div id="emptyState" class="glass-panel border border-dashed rounded-[1.8rem] h-full min-h-[320px] sm:min-h-[400px] flex flex-col items-center justify-center p-6 text-center">
                    <i data-lucide="zap" class="w-11 h-11 mb-4 text-cyan-300/70"></i>
                    <h3 class="text-lg font-semibold">Ready</h3>
                </div>

                <div id="resultsArea" class="hidden min-w-0 flex-col h-full min-h-[320px] gap-3">
                    <div class="glass-panel min-w-0 rounded-[1.8rem] border p-4">
                        <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
                            <div>
                                <p class="mini-kicker">Workspace</p>
                                <h3 id="resultsSummary" class="text-lg font-semibold mt-1">0 Prompts</h3>
                                <div id="resultsMeta" class="mt-3"></div>
                            </div>

                            <div class="flex flex-col sm:flex-row gap-2 sm:items-center">
                                <div class="grid grid-cols-2 p-1 rounded-2xl bg-slate-950/50 border border-cyan-400/10 w-full sm:w-auto">
                                    <button id="viewTabsBtn" type="button" class="soft-ring view-pill-idle px-3 sm:px-4 py-2 text-sm font-medium rounded-xl transition-all min-w-0 inline-flex items-center justify-center gap-2">
                                        <i data-lucide="layout-template" class="w-4 h-4"></i>
                                        <span>Tabs</span>
                                    </button>
                                    <button id="viewGlobalBtn" type="button" class="soft-ring view-pill-idle px-3 sm:px-4 py-2 text-sm font-medium rounded-xl transition-all min-w-0 inline-flex items-center justify-center gap-2">
                                        <i data-lucide="rows-3" class="w-4 h-4"></i>
                                        <span>Flow</span>
                                    </button>
                                </div>
                                <button id="resetProgressBtn" type="button" class="chrome-btn soft-ring hidden px-4 py-2.5 rounded-2xl text-sm font-medium inline-flex items-center justify-center gap-2">
                                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                                    Reset
                                </button>
                            </div>
                        </div>
                    </div>

                    <div id="tabsContainer" class="flex overflow-x-auto hide-scrollbar rounded-t-[1.6rem] border border-b-0 snap-x snap-mandatory"></div>
                    <div id="subTabsContainer" class="flex overflow-x-auto hide-scrollbar border-x border-b px-3 sm:px-4 py-3 gap-2 hidden"></div>

                    <div class="glass-panel min-w-0 border rounded-[1.8rem] flex-grow p-4 sm:p-5">
                        <div id="copyTabContainer" class="flex justify-end items-center mb-4 hidden">
                            <button id="copyTabBtn" class="chrome-btn soft-ring flex items-center justify-center gap-2 w-full sm:w-auto px-4 py-2.5 rounded-2xl text-sm font-medium transition-all">
                                <span class="copy-tab-icon"><i data-lucide="files" class="w-4 h-4"></i></span>
                                <span id="copyTabText">Copy B-roll</span>
                            </button>
                        </div>

                        <div id="blocksContainer" class="min-w-0 space-y-3 sm:space-y-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle" class="fixed inset-0 z-50 hidden items-end justify-center bg-slate-950/35 p-3 sm:items-center sm:p-6">
        <div class="glass-panel animate-rise-in w-full max-w-xl max-h-[90vh] overflow-hidden rounded-[2rem] border shadow-2xl">
            <div class="flex items-start justify-between gap-4 border-b border-cyan-400/10 px-5 py-4 sm:px-6">
                <div>
                    <p class="mini-kicker">Controls</p>
                    <h2 id="settingsTitle" class="mt-1 text-xl font-semibold">Rules</h2>
                </div>
                <button id="closeSettingsBtn" type="button" aria-label="Close settings" class="chrome-btn soft-ring inline-flex h-11 w-11 items-center justify-center rounded-2xl">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="space-y-4 overflow-y-auto px-5 py-5 sm:px-6 sm:py-6">
                <div>
                    <label class="flex items-center gap-2 text-sm font-medium mb-1">
                        <i data-lucide="layout-template" class="w-4 h-4 text-cyan-300"></i>
                        Tabs
                    </label>
                    <select id="splitMethod" onchange="toggleMainDelimiter()" class="soft-ring w-full px-4 py-3 rounded-xl transition-all text-sm font-medium">
                        <option value="smart">Smart</option>
                        <option value="keyword">Keyword</option>
                    </select>
                </div>

                <div id="keywordContainer" class="hidden">
                    <label class="flex items-center gap-2 text-sm font-medium mb-1">
                        <i data-lucide="type" class="w-4 h-4 text-cyan-300"></i>
                        Split Key
                    </label>
                    <input type="text" id="mainDelimiter" placeholder="Video" class="soft-ring w-full px-4 py-3 rounded-xl transition-all">
                </div>

                <div>
                    <label class="flex items-center gap-2 text-sm font-medium mb-1">
                        <i data-lucide="braces" class="w-4 h-4 text-cyan-300"></i>
                        Prompts
                    </label>
                    <input type="text" id="subDelimiters" placeholder="IMAGE PROMPT:, VIDEO PROMPT:" class="soft-ring w-full px-4 py-3 rounded-xl transition-all">
                </div>

                <div>
                    <label class="flex items-center gap-2 text-sm font-medium mb-1">
                        <i data-lucide="layers-3" class="w-4 h-4 text-cyan-300"></i>
                        B-roll
                    </label>
                    <input type="text" id="itemDelimiter" placeholder="B-roll" class="soft-ring w-full px-4 py-3 rounded-xl transition-all">
                </div>

                <div>
                    <label class="flex items-center gap-2 text-sm font-medium mb-1">
                        <i data-lucide="ban" class="w-4 h-4 text-cyan-300"></i>
                        Ignore
                    </label>
                    <input type="text" id="ignoreDelimiter" placeholder="[DONE]" class="soft-ring w-full px-4 py-3 rounded-xl transition-all">
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            parsedData: [],
            activeTabId: null,
            activeSubTabIds: {},
            contentMap: {},
            blockKeyMap: {},
            expandedBlocks: {},
            copiedBlockKeys: {},
            soundEnabled: true,
            viewMode: 'tabbed',
            deferredInstallPrompt: null
        };

        const DOM = {
            inputText: document.getElementById('inputText'),
            splitMethod: document.getElementById('splitMethod'),
            keywordContainer: document.getElementById('keywordContainer'),
            mainDelimiter: document.getElementById('mainDelimiter'),
            subDelimiters: document.getElementById('subDelimiters'),
            itemDelimiter: document.getElementById('itemDelimiter'),
            ignoreDelimiter: document.getElementById('ignoreDelimiter'),
            emptyState: document.getElementById('emptyState'),
            resultsArea: document.getElementById('resultsArea'),
            tabsContainer: document.getElementById('tabsContainer'),
            subTabsContainer: document.getElementById('subTabsContainer'),
            blocksContainer: document.getElementById('blocksContainer'),
            toast: document.getElementById('toast'),
            toastMsg: document.getElementById('toastMsg'),
            copyTabContainer: document.getElementById('copyTabContainer'),
            copyTabBtn: document.getElementById('copyTabBtn'),
            copyTabText: document.getElementById('copyTabText'),
            settingsBtn: document.getElementById('settingsBtn'),
            settingsModal: document.getElementById('settingsModal'),
            closeSettingsBtn: document.getElementById('closeSettingsBtn'),
            soundToggle: document.getElementById('soundToggle'),
            soundToggleText: document.getElementById('soundToggleText'),
            installBtn: document.getElementById('installBtn'),
            viewTabsBtn: document.getElementById('viewTabsBtn'),
            viewGlobalBtn: document.getElementById('viewGlobalBtn'),
            resultsSummary: document.getElementById('resultsSummary'),
            resultsMeta: document.getElementById('resultsMeta'),
            resetProgressBtn: document.getElementById('resetProgressBtn')
        };

        let audioContext;
        let toastTimeout;

        function getExtractionSnapshotKey() {
            return 'sps_extractedState';
        }

        function rebuildDerivedStateFromParsedData() {
            state.contentMap = {};
            state.blockKeyMap = {};

            state.parsedData.forEach((tab) => {
                tab.items.forEach((item) => {
                    item.blocks.forEach((block) => {
                        state.contentMap[block.id] = block.content;
                        state.blockKeyMap[block.id] = block.copyKey;
                    });
                });
            });
        }

        function persistExtractedState() {
            const snapshot = {
                parsedData: state.parsedData,
                activeTabId: state.activeTabId,
                activeSubTabIds: state.activeSubTabIds,
                expandedBlocks: state.expandedBlocks
            };
            localStorage.setItem(getExtractionSnapshotKey(), JSON.stringify(snapshot));
        }

        function restoreExtractedState() {
            try {
                const snapshot = JSON.parse(localStorage.getItem(getExtractionSnapshotKey()) || 'null');
                if (!snapshot || !Array.isArray(snapshot.parsedData) || snapshot.parsedData.length === 0) return false;

                state.parsedData = snapshot.parsedData;
                state.activeTabId = snapshot.activeTabId || snapshot.parsedData[0].id;
                state.activeSubTabIds = snapshot.activeSubTabIds || {};
                state.expandedBlocks = snapshot.expandedBlocks || {};

                rebuildDerivedStateFromParsedData();

                const validTabIds = new Set(state.parsedData.map((tab) => tab.id));
                if (!validTabIds.has(state.activeTabId)) {
                    state.activeTabId = state.parsedData[0].id;
                }

                state.parsedData.forEach((tab) => {
                    const validItemIds = new Set(tab.items.map((item) => item.id));
                    if (!validItemIds.has(state.activeSubTabIds[tab.id]) && tab.items[0]) {
                        state.activeSubTabIds[tab.id] = tab.items[0].id;
                    }
                });

                return true;
            } catch (error) {
                return false;
            }
        }

        function clearExtractedState() {
            localStorage.removeItem(getExtractionSnapshotKey());
        }

        function init() {
            DOM.inputText.value = localStorage.getItem('sps_inputText') || '';
            DOM.splitMethod.value = localStorage.getItem('sps_splitMethod') || 'smart';
            DOM.mainDelimiter.value = localStorage.getItem('sps_mainDelimiter') || 'Video';
            DOM.subDelimiters.value = localStorage.getItem('sps_subDelimiters') || 'IMAGE PROMPT:, VIDEO PROMPT:';
            DOM.itemDelimiter.value = localStorage.getItem('sps_itemDelimiter') || 'B-roll';
            DOM.ignoreDelimiter.value = localStorage.getItem('sps_ignoreDelimiter') || '[DONE]';
            state.soundEnabled = localStorage.getItem('sps_soundEnabled') !== 'false';
            state.viewMode = localStorage.getItem('sps_viewMode') || 'tabbed';
            state.copiedBlockKeys = loadCopiedProgress();

            toggleMainDelimiter();
            syncSoundToggle();
            syncViewToggle();
            registerPWA();
            restoreExtractedState();

            const saveToLocal = () => {
                localStorage.setItem('sps_inputText', DOM.inputText.value);
                localStorage.setItem('sps_splitMethod', DOM.splitMethod.value);
                localStorage.setItem('sps_mainDelimiter', DOM.mainDelimiter.value);
                localStorage.setItem('sps_subDelimiters', DOM.subDelimiters.value);
                localStorage.setItem('sps_itemDelimiter', DOM.itemDelimiter.value);
                localStorage.setItem('sps_ignoreDelimiter', DOM.ignoreDelimiter.value);
            };

            DOM.inputText.addEventListener('input', saveToLocal);
            DOM.splitMethod.addEventListener('change', () => {
                toggleMainDelimiter();
                saveToLocal();
            });
            DOM.mainDelimiter.addEventListener('input', saveToLocal);
            DOM.subDelimiters.addEventListener('input', saveToLocal);
            DOM.itemDelimiter.addEventListener('input', saveToLocal);
            DOM.ignoreDelimiter.addEventListener('input', saveToLocal);
            DOM.settingsBtn.addEventListener('click', openSettings);
            DOM.closeSettingsBtn.addEventListener('click', closeSettings);
            DOM.settingsModal.addEventListener('click', (event) => {
                if (event.target === DOM.settingsModal) {
                    closeSettings();
                }
            });
            DOM.soundToggle.addEventListener('click', toggleSound);
            DOM.installBtn.addEventListener('click', installPWA);
            DOM.viewTabsBtn.addEventListener('click', () => setViewMode('tabbed'));
            DOM.viewGlobalBtn.addEventListener('click', () => setViewMode('global'));
            DOM.resetProgressBtn.addEventListener('click', resetCopiedProgress);
            DOM.copyTabBtn.addEventListener('click', copyPrimarySelection);

            document.addEventListener('pointerdown', primeAudio, { once: true });
            document.addEventListener('keydown', primeAudio, { once: true });

            DOM.inputText.addEventListener('keydown', (event) => {
                if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
                    processText();
                }
            });
            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape') {
                    closeSettings();
                }
            });

            lucide.createIcons();
            renderUI();
        }

        function loadCopiedProgress() {
            try {
                const stored = JSON.parse(localStorage.getItem('sps_copiedBlockKeys') || '[]');
                if (!Array.isArray(stored)) return {};
                return Object.fromEntries(stored.map((key) => [key, true]));
            } catch (error) {
                return {};
            }
        }

        function persistCopiedProgress() {
            const keys = Object.keys(state.copiedBlockKeys).filter((key) => state.copiedBlockKeys[key]);
            localStorage.setItem('sps_copiedBlockKeys', JSON.stringify(keys));
        }

        function hashText(text) {
            let hash = 0;
            for (let index = 0; index < text.length; index++) {
                hash = ((hash << 5) - hash) + text.charCodeAt(index);
                hash |= 0;
            }
            return Math.abs(hash).toString(36);
        }

        function buildCopyKey(sectionTitle, itemTitle, blockTitle, content, metaTag = '') {
            return `copy-${hashText([sectionTitle, itemTitle, blockTitle, metaTag, content].join('||'))}`;
        }

        function isCopied(block) {
            return !!state.copiedBlockKeys[block.copyKey];
        }

        function findBlockById(blockId) {
            return getAllBlocks().find((block) => block.id === blockId) || null;
        }

        function isMetadataLine(line) {
            return /^\[[^\]]+\]$/.test((line || '').trim());
        }

        function isDecorativeLine(line) {
            const trimmed = (line || '').trim();
            return !!trimmed && /^[^\p{L}\p{N}]+$/u.test(trimmed);
        }

        function extractNearestMetadataLine(text) {
            const lines = (text || '').split('\n');

            for (let index = lines.length - 1; index >= 0; index--) {
                const line = lines[index].trim();
                if (!line) continue;
                if (isDecorativeLine(line)) continue;
                return isMetadataLine(line) ? line : '';
            }

            return '';
        }

        function stripTrailingPromptArtifacts(text) {
            const lines = (text || '').split('\n');

            while (lines.length) {
                const line = (lines[lines.length - 1] || '').trim();
                if (!line) {
                    lines.pop();
                    continue;
                }
                if (isMetadataLine(line) || isDecorativeLine(line)) {
                    lines.pop();
                    continue;
                }
                break;
            }

            return lines.join('\n').trim();
        }

        function formatBlockForCopy(block) {
            if (!block) return '';

            const parts = [];
            if (block.metaTag) parts.push(block.metaTag);
            parts.push(`${block.title}:`);
            if (block.content) parts.push(block.content);
            return parts.join('\n').trim();
        }

        function getAllBlocks() {
            return state.parsedData.flatMap((tab) => tab.items.flatMap((item) => item.blocks));
        }

        function getGlobalItems() {
            return state.parsedData.flatMap((tab) => {
                return tab.items.map((item) => ({
                    tabId: tab.id,
                    tabTitle: tab.title,
                    itemId: item.id,
                    itemTitle: item.title,
                    blocks: item.blocks
                }));
            }).filter((entry) => entry.blocks && entry.blocks.length > 0);
        }

        function findBlockContext(blockId) {
            for (let tabIndex = 0; tabIndex < state.parsedData.length; tabIndex++) {
                const tab = state.parsedData[tabIndex];
                for (let itemIndex = 0; itemIndex < tab.items.length; itemIndex++) {
                    const item = tab.items[itemIndex];
                    const blockIndex = item.blocks.findIndex((block) => block.id === blockId);
                    if (blockIndex !== -1) {
                        return { tab, item, tabIndex, itemIndex, blockIndex };
                    }
                }
            }

            return null;
        }

        function moveToNextBroll(fromContext) {
            if (!fromContext || state.viewMode !== 'tabbed') return false;

            for (let tabIndex = fromContext.tabIndex; tabIndex < state.parsedData.length; tabIndex++) {
                const tab = state.parsedData[tabIndex];
                const startItemIndex = tabIndex === fromContext.tabIndex ? fromContext.itemIndex + 1 : 0;

                for (let itemIndex = startItemIndex; itemIndex < tab.items.length; itemIndex++) {
                    const nextItem = tab.items[itemIndex];
                    if (!nextItem || !nextItem.blocks || !nextItem.blocks.length) continue;

                    state.activeTabId = tab.id;
                    state.activeSubTabIds[tab.id] = nextItem.id;
                    state.expandedBlocks = {};
                    persistExtractedState();
                    renderUI();
                    return true;
                }
            }

            return false;
        }

        function getProgressStats() {
            const blocks = getAllBlocks();
            const items = getGlobalItems();
            const totalPrompts = blocks.length;
            const copiedPrompts = blocks.filter((block) => isCopied(block)).length;
            const fullyCopiedItems = items.filter((item) => item.blocks.every((block) => isCopied(block))).length;

            return {
                totalSections: state.parsedData.length,
                totalItems: items.length,
                totalPrompts,
                copiedPrompts,
                fullyCopiedItems
            };
        }

        function setViewMode(mode) {
            state.viewMode = mode;
            localStorage.setItem('sps_viewMode', mode);
            syncViewToggle();
            renderUI();
        }

        function syncViewToggle() {
            DOM.viewTabsBtn.classList.toggle('view-pill-active', state.viewMode === 'tabbed');
            DOM.viewGlobalBtn.classList.toggle('view-pill-active', state.viewMode === 'global');
            DOM.viewTabsBtn.classList.toggle('view-pill-idle', state.viewMode !== 'tabbed');
            DOM.viewGlobalBtn.classList.toggle('view-pill-idle', state.viewMode !== 'global');
        }

        function toggleMainDelimiter() {
            if (DOM.splitMethod.value === 'keyword') {
                DOM.keywordContainer.classList.remove('hidden');
            } else {
                DOM.keywordContainer.classList.add('hidden');
            }
        }

        function openSettings() {
            DOM.settingsModal.classList.remove('hidden');
            DOM.settingsModal.classList.add('flex');
            document.body.classList.add('modal-open');
            setTimeout(() => DOM.splitMethod.focus(), 0);
        }

        function closeSettings() {
            if (DOM.settingsModal.classList.contains('hidden')) return;
            DOM.settingsModal.classList.add('hidden');
            DOM.settingsModal.classList.remove('flex');
            document.body.classList.remove('modal-open');
        }

        function syncSoundToggle() {
            DOM.soundToggleText.textContent = state.soundEnabled ? 'Audio' : 'Muted';
            DOM.soundToggle.classList.toggle('is-muted', !state.soundEnabled);
            const icon = DOM.soundToggle.querySelector('i');
            icon.setAttribute('data-lucide', state.soundEnabled ? 'volume-2' : 'volume-x');
            lucide.createIcons();
        }

        function toggleSound() {
            state.soundEnabled = !state.soundEnabled;
            localStorage.setItem('sps_soundEnabled', String(state.soundEnabled));
            syncSoundToggle();

            if (state.soundEnabled) {
                primeAudio();
                playSound('success');
            }
        }

        function primeAudio() {
            if (!state.soundEnabled) return;
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return;
            if (!audioContext) audioContext = new AudioContextClass();
            if (audioContext.state === 'suspended') audioContext.resume();
        }

        function playSound(type) {
            if (!state.soundEnabled) return;
            primeAudio();
            if (!audioContext || audioContext.state !== 'running') return;

            const tones = type === 'error'
                ? [
                    { freq: 280, start: 0, duration: 0.08, gain: 0.018 },
                    { freq: 220, start: 0.09, duration: 0.12, gain: 0.014 }
                ]
                : [
                    { freq: 523.25, start: 0, duration: 0.08, gain: 0.018 },
                    { freq: 659.25, start: 0.08, duration: 0.12, gain: 0.014 },
                    { freq: 783.99, start: 0.18, duration: 0.18, gain: 0.011 }
                ];

            const now = audioContext.currentTime;

            tones.forEach((tone) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.type = type === 'error' ? 'triangle' : 'sine';
                oscillator.frequency.setValueAtTime(tone.freq, now + tone.start);
                gainNode.gain.setValueAtTime(0.0001, now + tone.start);
                gainNode.gain.exponentialRampToValueAtTime(tone.gain, now + tone.start + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, now + tone.start + tone.duration);

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.start(now + tone.start);
                oscillator.stop(now + tone.start + tone.duration);
            });
        }

        function showToast(message, tone = 'none') {
            DOM.toastMsg.textContent = message;
            DOM.toast.classList.remove('hidden');
            DOM.toast.classList.add('flex');

            if (tone === 'success') playSound('success');
            if (tone === 'error') playSound('error');

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                DOM.toast.classList.add('hidden');
                DOM.toast.classList.remove('flex');
            }, 3000);
        }

        function fallbackCopyText(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.top = '0';
            textArea.style.left = '0';
            textArea.style.position = 'fixed';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            const copied = document.execCommand('copy');
            document.body.removeChild(textArea);
            return copied;
        }

        async function copyTextAndMark(text, blockKeys, successMessage) {
            primeAudio();

            try {
                let copied = false;

                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                    copied = true;
                } else {
                    copied = fallbackCopyText(text);
                }

                if (!copied) {
                    showToast('Failed to copy.', 'error');
                    return false;
                }

                blockKeys.forEach((key) => {
                    state.copiedBlockKeys[key] = true;
                });
                persistCopiedProgress();
                renderUI();
                showToast(successMessage, 'success');
                return true;
            } catch (error) {
                showToast('Error copying text.', 'error');
                return false;
            }
        }

        function copyPrimarySelection() {
            if (state.viewMode === 'global') {
                copyAllVisible();
                return;
            }

            const activeTab = state.parsedData.find((tab) => tab.id === state.activeTabId);
            if (!activeTab) return;

            const activeSubTabId = state.activeSubTabIds[activeTab.id];
            const activeItem = activeTab.items.find((item) => item.id === activeSubTabId) || activeTab.items[0];
            if (!activeItem || !activeItem.blocks.length) return;

            copyItemGroup(activeTab.id, activeItem.id);
        }

        async function copyBlock(blockId) {
            const block = findBlockById(blockId);
            if (!block || !block.copyKey) return;

            const blockContext = findBlockContext(blockId);
            const copied = await copyTextAndMark(formatBlockForCopy(block), [block.copyKey], 'Prompt copied and marked.');
            if (!copied || !blockContext) return;

            const isLastPromptInBroll = blockContext.blockIndex === blockContext.item.blocks.length - 1;
            if (isLastPromptInBroll) {
                moveToNextBroll(blockContext);
            }
        }

        function copyItemGroup(tabId, itemId) {
            const tab = state.parsedData.find((entry) => entry.id === tabId);
            if (!tab) return;
            const item = tab.items.find((entry) => entry.id === itemId);
            if (!item || !item.blocks.length) return;

            const text = item.blocks.map((block) => formatBlockForCopy(block)).join('\n\n');
            const blockKeys = item.blocks.map((block) => block.copyKey);
            copyTextAndMark(text.trim(), blockKeys, `"${item.title}" copied and tracked.`);
        }

        function copyAllVisible() {
            const globalItems = getGlobalItems();
            if (!globalItems.length) return;

            const sections = globalItems.map((item) => {
                const body = item.blocks.map((block) => formatBlockForCopy(block)).join('\n\n');
                return `${item.tabTitle} - ${item.itemTitle}\n\n${body}`;
            });

            const blockKeys = globalItems.flatMap((item) => item.blocks.map((block) => block.copyKey));
            copyTextAndMark(sections.join('\n\n---\n\n'), blockKeys, 'Global prompt list copied and tracked.');
        }

        function resetCopiedProgress() {
            primeAudio();
            if (!window.confirm('Reset copied progress for the current session?')) return;
            state.copiedBlockKeys = {};
            persistCopiedProgress();
            renderUI();
            showToast('Copied progress reset.', 'success');
        }

        function handleClearAll() {
            primeAudio();
            if (!window.confirm('Are you sure you want to clear your text?')) return;

            DOM.inputText.value = '';
            state.parsedData = [];
            state.contentMap = {};
            state.blockKeyMap = {};
            state.expandedBlocks = {};
            state.activeTabId = null;
            state.activeSubTabIds = {};
            state.copiedBlockKeys = {};

            localStorage.setItem('sps_inputText', '');
            persistCopiedProgress();
            clearExtractedState();
            renderUI();
            showToast('Board cleared!', 'success');
        }

        function handleFileUpload(event) {
            primeAudio();
            const file = event.target.files[0];
            if (!file) return;

            showToast('Extracting document...');

            if (file.name.endsWith('.txt')) {
                const reader = new FileReader();
                reader.onload = (loadEvent) => {
                    DOM.inputText.value = loadEvent.target.result;
                    localStorage.setItem('sps_inputText', loadEvent.target.result);
                    showToast('Text file loaded completely!', 'success');
                };
                reader.readAsText(file);
            } else if (file.name.endsWith('.docx')) {
                const reader = new FileReader();
                reader.onload = (loadEvent) => {
                    const arrayBuffer = loadEvent.target.result;
                    mammoth.extractRawText({ arrayBuffer })
                        .then((result) => {
                            DOM.inputText.value = result.value;
                            localStorage.setItem('sps_inputText', result.value);
                            showToast('Word document extracted!', 'success');
                        })
                        .catch((error) => {
                            console.error(error);
                            showToast('Error reading .docx file.', 'error');
                        });
                };
                reader.readAsArrayBuffer(file);
            } else {
                showToast('Please upload a .txt or .docx file.', 'error');
            }

            event.target.value = '';
        }

        function processText() {
            primeAudio();

            const text = DOM.inputText.value;
            const splitMethod = DOM.splitMethod.value;
            const mainDelim = DOM.mainDelimiter.value.trim();
            const subDelims = DOM.subDelimiters.value;
            const itemDelim = DOM.itemDelimiter.value.trim();
            const ignoreKeyword = DOM.ignoreDelimiter.value.trim().toLowerCase();

            if (!text.trim()) {
                showToast('Please paste some text first.', 'error');
                return;
            }

            if (splitMethod === 'keyword' && !mainDelim) {
                showToast('Add a keyword splitter first.', 'error');
                return;
            }

            let rawChunks = [];

            if (splitMethod === 'smart') {
                const headerRegex = /^((?:\*\*|\*|#)?\s*(?:Video\s+|Tab\s+|Scene\s+)?\d{1,3}[a-z]?(?:\s*(?:\u2705|\[DONE\]|\u2714\uFE0F?|\bdone\b|[^\p{L}\p{N}\r\n]+))*\s*)$/gimu;
                const splitPieces = text.split(headerRegex);

                let currentChunk = splitPieces[0];
                for (let index = 1; index < splitPieces.length; index += 2) {
                    if (currentChunk.trim().length > 0) rawChunks.push(currentChunk);
                    currentChunk = splitPieces[index] + '\n' + (splitPieces[index + 1] || '');
                }
                if (currentChunk.trim().length > 0) rawChunks.push(currentChunk);
            } else {
                const escapedMainDelim = mainDelim.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const mainDelimRegex = new RegExp(`(?=${escapedMainDelim})`, 'gi');
                rawChunks = text.split(mainDelimRegex).filter((chunk) => chunk.trim().length > 0);
            }

            const subDelimsArray = subDelims.split(',').map((entry) => entry.trim()).filter(Boolean);
            const subDelimMatchers = subDelimsArray.map((delimiter) => {
                const cleanDelim = delimiter.replace(/[^a-zA-Z0-9\s]/g, '').trim();
                const escaped = cleanDelim.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                return {
                    clean: cleanDelim,
                    regex: new RegExp(`(${escaped})[^a-zA-Z0-9]*`, 'gi')
                };
            });

            state.contentMap = {};
            state.blockKeyMap = {};
            state.expandedBlocks = {};

            const parsed = rawChunks.map((chunk, chunkIndex) => {
                const lines = chunk.trim().split('\n');
                let title = (lines[0] || '').trim();

                title = title.replace(/^[\*\#\s]+|[\*\#\s]+$/g, '');
                if (title.length > 40) title = `${title.substring(0, 40)}...`;

                if (splitMethod === 'keyword' && !title.toLowerCase().includes(mainDelim.toLowerCase())) {
                    title = `${mainDelim} ${chunkIndex + 1}`;
                } else if (splitMethod === 'smart' && title.length > 25) {
                    title = `Section ${chunkIndex + 1}`;
                }

                const parsedItems = [];
                let items = [chunk];

                if (itemDelim) {
                    const escapedItemDelim = itemDelim.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const itemRegex = new RegExp(`(?=${escapedItemDelim})`, 'gi');
                    items = chunk.split(itemRegex).filter((part) => part.trim().length > 0);
                }

                items.forEach((itemText, itemIndex) => {
                    const extractedBlocks = [];
                    let itemTitle = itemText.trim().split('\n')[0].replace(/[\*\#\:]/g, '').trim();
                    if (itemTitle.length > 30 || itemTitle.length === 0) {
                        itemTitle = `${itemDelim || 'Item'} ${itemIndex + 1}`;
                    }

                    if (subDelimMatchers.length > 0) {
                        const foundIndices = [];

                        subDelimMatchers.forEach(({ clean, regex }) => {
                            const matches = [...itemText.matchAll(regex)];
                            matches.forEach((match) => {
                                foundIndices.push({ delim: clean, index: match.index, matchText: match[0] });
                            });
                        });

                        foundIndices.sort((a, b) => a.index - b.index);
                        const uniqueIndices = foundIndices.filter((entry, position, array) => {
                            return !position || entry.index !== array[position - 1].index;
                        });

                        for (let index = 0; index < uniqueIndices.length; index++) {
                            const current = uniqueIndices[index];
                            const next = uniqueIndices[index + 1];
                            const start = current.index + current.matchText.length;
                            const end = next ? next.index : itemText.length;
                            const previous = uniqueIndices[index - 1];
                            const preambleStart = previous ? previous.index + previous.matchText.length : 0;
                            const preamble = itemText.substring(preambleStart, current.index);
                            const metaTag = extractNearestMetadataLine(preamble);

                            let content = stripTrailingPromptArtifacts(itemText.substring(start, end).trim());
                            content = content.replace(/[\*\#\-\s]+$/, '');

                            const blockId = `block-${chunkIndex}-${itemIndex}-${index}`;
                            const copyKey = buildCopyKey(title, itemTitle, current.delim.toUpperCase(), content, metaTag);
                            extractedBlocks.push({
                                id: blockId,
                                title: current.delim.toUpperCase(),
                                metaTag,
                                content,
                                copyKey
                            });
                            state.contentMap[blockId] = content;
                            state.blockKeyMap[blockId] = copyKey;
                        }
                    }

                    if (extractedBlocks.length > 0) {
                        parsedItems.push({
                            id: `item-${chunkIndex}-${itemIndex}`,
                            title: itemTitle,
                            blocks: extractedBlocks
                        });
                    }
                });

                if (parsedItems.length === 0) {
                    const blockId = `block-${chunkIndex}-raw`;
                    const content = chunk.trim();
                    const copyKey = buildCopyKey(title, 'Raw Content', 'RAW CONTENT', content);
                    parsedItems.push({
                        id: `item-${chunkIndex}-0`,
                        title: 'Raw Content',
                        blocks: [{ id: blockId, title: 'RAW CONTENT', content, copyKey }]
                    });
                    state.contentMap[blockId] = content;
                    state.blockKeyMap[blockId] = copyKey;
                }

                return {
                    id: `tab-${chunkIndex}`,
                    title,
                    rawContent: chunk,
                    items: parsedItems
                };
            });

            const filteredParsed = parsed.filter((tab) => {
                if (!ignoreKeyword) return true;
                const ignoreList = ignoreKeyword.split(',').map((entry) => entry.trim()).filter(Boolean);
                const chunkTextLower = tab.rawContent.toLowerCase();
                return !ignoreList.some((ignoreStr) => chunkTextLower.includes(ignoreStr));
            });

            state.parsedData = filteredParsed;
            state.activeSubTabIds = {};
            state.activeTabId = filteredParsed.length ? filteredParsed[0].id : null;

            filteredParsed.forEach((tab) => {
                if (tab.items && tab.items.length > 0) {
                    state.activeSubTabIds[tab.id] = tab.items[0].id;
                }
            });

            persistExtractedState();

            renderUI();

            if (filteredParsed.length < parsed.length) {
                showToast(`Extracted ${filteredParsed.length} tabs (Ignored ${parsed.length - filteredParsed.length} completed ones!)`, 'success');
            } else if (filteredParsed.length > 0) {
                showToast(`Successfully extracted ${filteredParsed.length} sections!`, 'success');
            } else {
                showToast('Nothing extracted. Check your ignore string.', 'error');
            }
        }

        function renderBlockCard(block, options = {}) {
            const copied = isCopied(block);
            const compact = !!options.compact;
            const isExpanded = !!state.expandedBlocks[block.id];
            const cardClass = copied ? 'copied-shell' : 'border border-cyan-400/12 bg-slate-950/55 shadow-[0_16px_34px_rgba(0,0,0,0.3)]';
            const badge = copied
                ? '<span class="status-chip status-chip--done"><i data-lucide="check" class="w-3.5 h-3.5"></i>Copied</span>'
                : '<span class="status-chip">Queued</span>';
            const buttonLabel = copied ? 'Copy Again' : 'Copy';

            return `
                <div class="relative group rounded-[1.4rem] border overflow-hidden ${cardClass}">
                    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between px-4 py-3 bg-white/[0.03] border-b border-white/8">
                        <div
                            class="min-w-0 flex-1 cursor-pointer"
                            role="button"
                            tabindex="0"
                            aria-expanded="${isExpanded ? 'true' : 'false'}"
                            onclick="toggleCollapse('${block.id}')"
                            onkeydown="if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); toggleCollapse('${block.id}'); }"
                        >
                            <div class="flex flex-wrap items-center gap-2">
                                <h4 class="font-bold text-cyan-50 tracking-[0.12em] text-sm uppercase">${block.title}</h4>
                                ${badge}
                                <span class="toggle-chip" aria-hidden="true">
                                    <i data-lucide="${isExpanded ? 'chevron-up' : 'chevron-down'}" class="w-3.5 h-3.5"></i>
                                </span>
                            </div>
                            ${block.metaTag ? `<p class="meta-chip mt-2">${escapeHtml(block.metaTag)}</p>` : ''}
                            ${options.meta ? `<p class="text-[11px] text-cyan-100/50 mt-2 uppercase tracking-[0.18em]">${options.meta}</p>` : ''}
                        </div>
                        <div class="flex flex-col sm:flex-row gap-2 w-full sm:w-auto">
                            <button onclick="event.stopPropagation(); triggerCopy('${block.id}')" class="chrome-btn soft-ring w-full sm:w-auto flex items-center justify-center gap-2 px-3 py-2 rounded-2xl text-sm font-medium transition-all ${copied ? 'text-lime-200 border-lime-400/20 bg-lime-400/10 hover:bg-lime-400/14' : ''}">
                                <i data-lucide="copy" class="w-4 h-4"></i>
                                ${buttonLabel}
                            </button>
                        </div>
                    </div>
                    <div class="${compact ? 'p-4' : 'p-4 sm:p-5'} ${isExpanded ? 'block' : 'hidden'}">
                        <div class="prompt-content text-sm leading-relaxed min-w-0">
                            ${block.content ? escapeHtml(block.content) : '<span class="text-cyan-100/40 italic">No prompt found.</span>'}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderTabbedView() {
            DOM.tabsContainer.classList.remove('hidden');
            DOM.tabsContainer.innerHTML = state.parsedData.map((tab) => `
                <button onclick="switchTab('${tab.id}')" class="snap-start whitespace-nowrap px-4 sm:px-5 py-3.5 font-semibold text-sm transition-colors border-b-2 flex-shrink-0 ${
                    state.activeTabId === tab.id
                        ? 'text-cyan-50 border-cyan-300 bg-cyan-400/8'
                        : 'text-cyan-100/60 border-transparent hover:text-cyan-50 hover:bg-white/[0.03]'
                }">${tab.title}</button>
            `).join('');

            const activeTabData = state.parsedData.find((tab) => tab.id === state.activeTabId);

            if (!activeTabData || !activeTabData.items || activeTabData.items.length === 0) {
                DOM.subTabsContainer.classList.add('hidden');
                DOM.copyTabContainer.classList.add('hidden');
                DOM.blocksContainer.innerHTML = '<div class="p-8 text-center text-cyan-100/45">No prompts found.</div>';
                return;
            }

            DOM.subTabsContainer.classList.remove('hidden');
            DOM.subTabsContainer.innerHTML = activeTabData.items.map((item) => {
                const isActive = state.activeSubTabIds[state.activeTabId] === item.id;
                const copiedCount = item.blocks.filter((block) => isCopied(block)).length;
                return `
                    <button onclick="switchSubTab('${item.id}')" class="whitespace-nowrap px-4 py-2 font-medium text-xs rounded-2xl transition-colors border ${
                        isActive
                            ? 'bg-cyan-400/14 text-cyan-50 border-cyan-300/35 shadow-[0_0_18px_rgba(34,211,238,0.08)]'
                            : 'bg-white/[0.03] text-cyan-100/70 border-cyan-400/10 hover:bg-white/[0.06]'
                    }">${item.title}${copiedCount ? ` ${copiedCount}/${item.blocks.length}` : ''}</button>
                `;
            }).join('');

            const activeItem = activeTabData.items.find((item) => item.id === state.activeSubTabIds[state.activeTabId]) || activeTabData.items[0];

            if (!activeItem || !activeItem.blocks || activeItem.blocks.length === 0) {
                DOM.copyTabContainer.classList.add('hidden');
                DOM.blocksContainer.innerHTML = '<div class="p-8 text-center text-cyan-100/45">No prompts in this b-roll.</div>';
                return;
            }

            DOM.copyTabContainer.classList.remove('hidden');
            DOM.copyTabText.textContent = 'Copy B-roll';
            DOM.copyTabBtn.querySelector('.copy-tab-icon').innerHTML = '<i data-lucide="files" class="w-4 h-4"></i>';

            DOM.blocksContainer.innerHTML = activeItem.blocks.map((block) => {
                if (state.expandedBlocks[block.id] === undefined) state.expandedBlocks[block.id] = false;
                return renderBlockCard(block, {
                    meta: `${activeTabData.title} / ${activeItem.title}`
                });
            }).join('');
        }

        function renderGlobalView() {
            DOM.tabsContainer.classList.add('hidden');
            DOM.subTabsContainer.classList.add('hidden');

            const globalItems = getGlobalItems();
            if (!globalItems.length) {
                DOM.copyTabContainer.classList.add('hidden');
                DOM.blocksContainer.innerHTML = '<div class="p-8 text-center text-cyan-100/45">No visible prompts.</div>';
                return;
            }

            DOM.copyTabContainer.classList.remove('hidden');
            DOM.copyTabText.textContent = 'Copy Visible';
            DOM.copyTabBtn.querySelector('.copy-tab-icon').innerHTML = '<i data-lucide="files" class="w-4 h-4"></i>';

            DOM.blocksContainer.innerHTML = globalItems.map((item) => {
                const copiedCount = item.blocks.filter((block) => isCopied(block)).length;
                const allCopied = copiedCount === item.blocks.length;
                return `
                    <div class="rounded-[1.6rem] border ${allCopied ? 'copied-shell' : 'border-cyan-400/12 bg-slate-950/55'} shadow-sm p-4">
                        <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                            <div class="min-w-0">
                                <div class="flex flex-wrap items-center gap-2">
                                    <span class="status-chip">${item.tabTitle}</span>
                                    <span class="status-chip">${item.itemTitle}</span>
                                    <span class="status-chip ${allCopied ? 'status-chip--done' : ''}">${copiedCount}/${item.blocks.length}</span>
                                </div>
                            </div>
                            <button onclick="copyItemGroup('${item.tabId}','${item.itemId}')" class="chrome-btn soft-ring w-full lg:w-auto px-4 py-2.5 rounded-2xl text-sm font-medium ${allCopied ? 'text-lime-200 border-lime-400/20 bg-lime-400/10 hover:bg-lime-400/14' : ''}">
                                ${allCopied ? 'Copy Again' : 'Copy B-roll'}
                            </button>
                        </div>

                        <div class="mt-4 space-y-3">
                            ${item.blocks.map((block) => renderBlockCard(block, { compact: true })).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderUI() {
            syncViewToggle();

            if (state.parsedData.length === 0) {
                DOM.emptyState.classList.remove('hidden');
                DOM.resultsArea.classList.add('hidden');
                DOM.resultsArea.classList.remove('flex');
                return;
            }

            DOM.emptyState.classList.add('hidden');
            DOM.resultsArea.classList.remove('hidden');
            DOM.resultsArea.classList.add('flex');

            const stats = getProgressStats();
            DOM.resultsSummary.textContent = `${stats.totalPrompts} Prompts`;
            DOM.resultsMeta.innerHTML = `
                <span class="metric-chip"><i data-lucide="copy"></i>${stats.copiedPrompts}/${stats.totalPrompts} copied</span>
                <span class="metric-chip"><i data-lucide="layers-3"></i>${stats.totalItems} b-rolls</span>
                <span class="metric-chip"><i data-lucide="check"></i>${stats.fullyCopiedItems} done</span>
            `;
            DOM.resetProgressBtn.classList.toggle('hidden', stats.copiedPrompts === 0);

            if (state.viewMode === 'global') {
                renderGlobalView();
            } else {
                renderTabbedView();
            }

            lucide.createIcons();
        }

        function switchTab(id) {
            state.activeTabId = id;
            persistExtractedState();
            renderUI();
        }

        function switchSubTab(id) {
            state.activeSubTabIds[state.activeTabId] = id;
            persistExtractedState();
            renderUI();
        }

        function toggleCollapse(id) {
            state.expandedBlocks[id] = !state.expandedBlocks[id];
            persistExtractedState();
            renderUI();
        }

        function triggerCopy(id) {
            copyBlock(id);
        }

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function registerPWA() {
            if ('serviceWorker' in navigator && (window.isSecureContext || ['localhost', '127.0.0.1'].includes(window.location.hostname))) {
                navigator.serviceWorker.register('./sw.js').catch((error) => {
                    console.error('Service worker registration failed', error);
                });
            }

            window.addEventListener('beforeinstallprompt', (event) => {
                event.preventDefault();
                state.deferredInstallPrompt = event;
                DOM.installBtn.classList.remove('hidden');
                DOM.installBtn.classList.add('inline-flex');
            });

            window.addEventListener('appinstalled', () => {
                state.deferredInstallPrompt = null;
                DOM.installBtn.classList.add('hidden');
                DOM.installBtn.classList.remove('inline-flex');
                showToast('App installed to your device.', 'success');
            });
        }

        async function installPWA() {
            if (!state.deferredInstallPrompt) return;
            primeAudio();
            state.deferredInstallPrompt.prompt();
            await state.deferredInstallPrompt.userChoice;
            state.deferredInstallPrompt = null;
            DOM.installBtn.classList.add('hidden');
            DOM.installBtn.classList.remove('inline-flex');
        }

        function loadExample() {
            DOM.inputText.value = `2a

**B-roll 1:**
Salary credited in bank app then cut to balance drop
**IMAGE PROMPT:**
A highly detailed 2.5D illustration of a banking interface.
**VIDEO PROMPT:**
This unbroken, six-second motion sequence utilizes smooth digital easing.

2b

**B-roll 2:**
UPI payment scan at small shop or cafe
**IMAGE PROMPT:**
A charming, slice-of-life 2.5D illustration capturing a daily micro-transaction.
**VIDEO PROMPT:**
This continuous six-second motion sequence captures the casual nature.

2c [DONE]

**B-roll 3:**
Notification panel with pending bill reminder
**IMAGE PROMPT:**
A clean phone UI scene with emphasis on an overdue payment reminder.
**VIDEO PROMPT:**
The camera glides gently while the reminder animates into focus.`;

            DOM.splitMethod.value = 'smart';
            DOM.subDelimiters.value = 'IMAGE PROMPT:, VIDEO PROMPT:';
            DOM.ignoreDelimiter.value = '[DONE]';

            localStorage.setItem('sps_inputText', DOM.inputText.value);
            localStorage.setItem('sps_splitMethod', DOM.splitMethod.value);
            localStorage.setItem('sps_subDelimiters', DOM.subDelimiters.value);
            localStorage.setItem('sps_ignoreDelimiter', DOM.ignoreDelimiter.value);

            toggleMainDelimiter();
            processText();
        }

        init();
    </script>
</body>
</html>
