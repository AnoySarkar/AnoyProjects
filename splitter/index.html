        function hashText(text) {
            let hash = 0;
            for (let index = 0; index < text.length; index++) {
                hash = ((hash << 5) - hash) + text.charCodeAt(index);
                hash |= 0;
            }
            return Math.abs(hash).toString(36);
        }

        function buildCopyKey(sectionTitle, itemTitle, blockTitle, content, metaTag = '') {
            return `copy-${hashText([sectionTitle, itemTitle, blockTitle, metaTag, content].join('||'))}`;
        }

        function isCopied(block) {
            return !!state.copiedBlockKeys[block.copyKey];
        }

        function findBlockById(blockId) {
            return getAllBlocks().find((block) => block.id === blockId) || null;
        }

        function isMetadataLine(line) {
            return /^\[[^\]]+\]$/.test((line || '').trim());
        }

        function isDecorativeLine(line) {
            const trimmed = (line || '').trim();
            return !!trimmed && /^[^\p{L}\p{N}]+$/u.test(trimmed);
        }

        function extractNearestMetadataLine(text) {
            const lines = (text || '').split('\n');

            for (let index = lines.length - 1; index >= 0; index--) {
                const line = lines[index].trim();
                if (!line) continue;
                if (isDecorativeLine(line)) continue;
                return isMetadataLine(line) ? line : '';
            }

            return '';
        }

        function stripTrailingPromptArtifacts(text) {
            const lines = (text || '').split('\n');

            while (lines.length) {
                const line = (lines[lines.length - 1] || '').trim();
                if (!line) {
                    lines.pop();
                    continue;
                }
                if (isMetadataLine(line) || isDecorativeLine(line)) {
                    lines.pop();
                    continue;
                }
                break;
            }

            return lines.join('\n').trim();
        }

        const NUMBER_WORDS = {
            zero: 0,
            one: 1,
            two: 2,
            three: 3,
            four: 4,
            five: 5,
            six: 6,
            seven: 7,
            eight: 8,
            nine: 9,
            ten: 10,
            eleven: 11,
            twelve: 12,
            thirteen: 13,
            fourteen: 14,
            fifteen: 15,
            sixteen: 16,
            seventeen: 17,
            eighteen: 18,
            nineteen: 19,
            twenty: 20
        };

        function parseMetadataTag(metaTag) {
            const match = /^\[([^:\]]+)(?::\s*(.+))?\]$/.exec((metaTag || '').trim());
            if (!match) return { code: '', label: '' };

            return {
                code: match[1].trim(),
                label: (match[2] || '').trim()
            };
        }

        function extractTaraCode(...sources) {
            for (const source of sources) {
                const match = /\b([A-Z]{2,12}\d{4,})\b/i.exec(source || '');
                if (match) return match[1].toUpperCase();
            }
            return '';
        }

        function normalizePromptLabel(text) {
            return (text || '')
                .replace(/^\s*(?:[-*]\s*)?(?:\*\*|\*)?\s*/, '')
                .replace(/\s*(?:\*\*|\*)?\s*$/, '')
                .trim()
                .replace(/:+$/, '')
                .replace(/\s+/g, ' ')
                .toUpperCase();
        }

        function getPromptLabels(subDelims) {
            return subDelims.split(',').map((entry) => normalizePromptLabel(entry)).filter(Boolean);
        }

        function isPromptLabelLine(line, promptLabels = []) {
            const normalized = normalizePromptLabel(line);
            return !!normalized && promptLabels.includes(normalized);
        }

        function extractFirstMetadataLine(text) {
            const lines = (text || '').split('\n');
            for (const rawLine of lines) {
                const line = rawLine.trim();
                if (!line) continue;
                if (isMetadataLine(line)) return line;
            }
            return '';
        }

        function buildItemHeaderMatchers(itemDelim) {
            const rawTokens = itemDelim.split(',').map((entry) => entry.trim()).filter(Boolean);
            const matchers = [];
            let includeSmartRollMatcher = false;

            rawTokens.forEach((token) => {
                const normalized = token.replace(/[^a-z0-9]/gi, '').toUpperCase();
                if (!normalized) return;

                if (['AROLL', 'BROLL', 'ROLL'].includes(normalized)) {
                    includeSmartRollMatcher = true;
                    return;
                }

                const escaped = token.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                matchers.push(new RegExp(`^\\s*(?:[-*]\\s*)?(?:\\*\\*|\\*)?\\s*(?:${escaped})\\b[^:]*:?\\s*(?:\\*\\*|\\*)?\\s*$`, 'i'));
            });

            if (includeSmartRollMatcher) {
                matchers.unshift(/^\s*(?:[-*]\s*)?(?:\*\*|\*)?\s*(?:A\s*[- ]?\s*ROLL|B\s*[- ]?\s*ROLL|AROLL|BROLL)\b[^:]*:?\s*(?:\*\*|\*)?\s*$/i);
            }

            return matchers;
        }

        function isItemHeaderLine(line, matchers) {
            const trimmed = (line || '').trim();
            if (!trimmed || !matchers.length) return false;
            return matchers.some((matcher) => matcher.test(trimmed));
        }

        function splitItemSections(chunk, itemDelim) {
            if (!itemDelim) return [chunk];

            const matchers = buildItemHeaderMatchers(itemDelim);
            if (!matchers.length) return [chunk];

            const lines = chunk.split('\n');
            const headerIndexes = [];

            lines.forEach((line, index) => {
                if (isItemHeaderLine(line, matchers)) {
                    headerIndexes.push(index);
                }
            });

            if (!headerIndexes.length) return [chunk];

            const items = [];
            headerIndexes.forEach((startIndex, position) => {
                const endIndex = position + 1 < headerIndexes.length ? headerIndexes[position + 1] : lines.length;
                const itemText = lines.slice(startIndex, endIndex).join('\n').trim();
                if (itemText) items.push(itemText);
            });

            return items.length ? items : [chunk];
        }

        function extractScriptLine(itemText, promptLabels = []) {
            const headerlessText = (itemText || '').split('\n').slice(1).join('\n');
            const quotedMatch = /"([^"\n]+)"/.exec(headerlessText);
            if (quotedMatch) return quotedMatch[1].trim();

            const lines = headerlessText.split('\n');

            for (const rawLine of lines) {
                const line = rawLine.trim();
                if (!line) continue;
                if (isMetadataLine(line)) continue;
                if (isDecorativeLine(line)) continue;
                if (isPromptLabelLine(line, promptLabels)) break;
                return line.replace(/^[\*\#\s]+|[\*\#\s]+$/g, '');
            }

            return '';
        }

        function findPromptSections(itemText, promptLabels = []) {
            const sections = [];
            const lines = (itemText || '').split('\n');
            let offset = 0;

            lines.forEach((line) => {
                const normalized = normalizePromptLabel(line);
                if (normalized && promptLabels.includes(normalized)) {
                    const lineStart = offset;
                    const lineEnd = offset + line.length;
                    sections.push({
                        delim: normalized,
                        index: lineStart,
                        contentStart: itemText[lineEnd] === '\n' ? lineEnd + 1 : lineEnd
                    });
                }

                offset += line.length + 1;
            });

            return sections;
        }

        function parseDurationToken(token) {
            if (!token) return null;
            const cleaned = token.toLowerCase().replace(/[^a-z0-9.]/g, '');
            if (!cleaned) return null;
            if (/^\d+(?:\.\d+)?$/.test(cleaned)) return Number(cleaned);
            return NUMBER_WORDS[cleaned] ?? null;
        }

        function inferVideoDurationSeconds(text) {
            if (!text) return null;

            let maxSeconds = null;

            const pushDuration = (value) => {
                if (value === null || value === undefined || Number.isNaN(value)) return;
                maxSeconds = maxSeconds === null ? value : Math.max(maxSeconds, value);
            };

            const shortTimestampRangeRegex = /\b(\d+(?:\.\d+)?)\s*(?:s|sec|secs|second|seconds)?\s*(?:-|to)\s*(\d+(?:\.\d+)?)\s*(?:s|sec|secs|second|seconds)\b(?=\s*:|:|\b)/gi;
            for (const match of text.matchAll(shortTimestampRangeRegex)) {
                pushDuration(Number(match[2]));
            }

            const wordOrNumericRangeRegex = /\b(?:timeframe\s+)?(\d+(?:\.\d+)?|zero|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve|thirteen|fourteen|fifteen|sixteen|seventeen|eighteen|nineteen|twenty)\s*(?:to|-)\s*(\d+(?:\.\d+)?|zero|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve|thirteen|fourteen|fifteen|sixteen|seventeen|eighteen|nineteen|twenty)\s*(?:s|sec|secs|second|seconds)?(?=\b|:)/gi;
            for (const match of text.matchAll(wordOrNumericRangeRegex)) {
                pushDuration(parseDurationToken(match[2]));
            }

            const explicitDurationRegex = /\b(\d+(?:\.\d+)?|zero|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve|thirteen|fourteen|fifteen|sixteen|seventeen|eighteen|nineteen|twenty)\s*(?:-| )?(?:s|sec|secs|second|seconds)(?=\b|:)/gi;
            for (const match of text.matchAll(explicitDurationRegex)) {
                pushDuration(parseDurationToken(match[1]));
            }

            return maxSeconds;
        }

        function formatDurationLabel(seconds) {
            if (seconds === null || seconds === undefined || Number.isNaN(seconds)) return '';
            return Number.isInteger(seconds) ? `${seconds}s` : `${seconds}s`;
        }

        function inferItemDurationLabel(blocks = []) {
            const videoBlock = blocks.find((block) => normalizePromptLabel(block.title) === 'VIDEO PROMPT');
            const seconds = inferVideoDurationSeconds(videoBlock ? videoBlock.content : '');
            return formatDurationLabel(seconds);
        }

        function getAffixRules() {
            const cards = DOM.affixRulesContainer.querySelectorAll('[data-affix-rule]');
            return Array.from(cards).map((card) => {
                const prefix = card.querySelector('[data-field="prefix"]')?.value.trim() || '';
                const suffix = card.querySelector('[data-field="suffix"]')?.value.trim() || '';
                const target = card.querySelector('[data-field="target"]')?.value || 'all';
                const specific = normalizePromptLabel(card.querySelector('[data-field="specific"]')?.value || '');
                return createAffixRule({
                    id: card.getAttribute('data-affix-rule'),
                    prefix,
                    suffix,
                    target,
                    specific
                });
            });
        }

        function renderAffixRules(rules = []) {
            const normalizedRules = normalizeAffixRules(rules);
            if (!normalizedRules.length) {
                DOM.affixRulesContainer.innerHTML = `
                    <div class="affix-rule-empty rounded-[1.4rem] px-4 py-4 text-sm">
                        No prefix/suffix rules yet. Add one when you want custom text on specific prompts.
                    </div>
                `;
                return;
            }

            DOM.affixRulesContainer.innerHTML = normalizedRules.map((rule, index) => `
                <div class="affix-rule-card rounded-[1.5rem] p-4 space-y-3" data-affix-rule="${rule.id}">
                    <div class="flex items-center justify-between gap-3">
                        <div class="inline-flex items-center gap-2">
                            <span class="status-chip">Rule ${index + 1}</span>
                            <span class="text-xs text-cyan-100/45">Match then add your custom text</span>
                        </div>
                        <button type="button" onclick="removeAffixRule('${rule.id}')" class="chrome-btn soft-ring px-3 py-1.5 rounded-2xl text-xs font-medium inline-flex items-center gap-2">
                            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                            Remove
                        </button>
                    </div>
                    <div>
                        <label class="flex items-center gap-2 text-sm font-medium mb-1">
                            <i data-lucide="filter" class="w-4 h-4 text-cyan-300"></i>
                            Apply To
                        </label>
                        <select data-field="target" class="soft-ring w-full px-4 py-3 rounded-xl transition-all text-sm font-medium">
                            <option value="all" ${rule.target === 'all' ? 'selected' : ''}>All Prompts</option>
                            <option value="image" ${rule.target === 'image' ? 'selected' : ''}>Image Prompts</option>
                            <option value="video" ${rule.target === 'video' ? 'selected' : ''}>Video Prompts</option>
                            <option value="specific" ${rule.target === 'specific' ? 'selected' : ''}>Specific Label</option>
                        </select>
                    </div>
                    <div class="${rule.target === 'specific' ? '' : 'hidden'}" data-specific-wrap>
                        <label class="flex items-center gap-2 text-sm font-medium mb-1">
                            <i data-lucide="tag" class="w-4 h-4 text-cyan-300"></i>
                            Specific Label
                        </label>
                        <input type="text" data-field="specific" value="${escapeHtml(rule.specific)}" placeholder="IMAGE PROMPT" class="soft-ring w-full px-4 py-3 rounded-xl transition-all">
                    </div>
                    <div>
                        <label class="flex items-center gap-2 text-sm font-medium mb-1">
                            <i data-lucide="arrow-up-from-line" class="w-4 h-4 text-cyan-300"></i>
                            Prefix
                        </label>
                        <textarea data-field="prefix" rows="2" placeholder="Text added before prompt content" class="soft-ring w-full px-4 py-3 rounded-xl transition-all resize-y">${escapeHtml(rule.prefix)}</textarea>
                    </div>
                    <div>
                        <label class="flex items-center gap-2 text-sm font-medium mb-1">
                            <i data-lucide="arrow-down-to-line" class="w-4 h-4 text-cyan-300"></i>
                            Suffix
                        </label>
                        <textarea data-field="suffix" rows="2" placeholder="Text added after prompt content" class="soft-ring w-full px-4 py-3 rounded-xl transition-all resize-y">${escapeHtml(rule.suffix)}</textarea>
                    </div>
                </div>
            `).join('');

            DOM.affixRulesContainer.querySelectorAll('select, input, textarea').forEach((element) => {
                const eventName = element.tagName === 'SELECT' ? 'change' : 'input';
                element.addEventListener(eventName, handleAffixRuleInput);
            });
            lucide.createIcons();
        }

        function handleAffixRuleInput(event) {
            const card = event.target.closest('[data-affix-rule]');
            if (card && event.target.matches('[data-field="target"]')) {
                const specificWrap = card.querySelector('[data-specific-wrap]');
                const isSpecific = event.target.value === 'specific';
                specificWrap?.classList.toggle('hidden', !isSpecific);
            }

            syncActiveWorkspace();
            if (state.parsedData.length > 0) renderUI();
        }

        function addAffixRule() {
            const rules = [...getAffixRules(), createAffixRule()];
            renderAffixRules(rules);
            syncActiveWorkspace();
        }

        function removeAffixRule(ruleId) {
            const rules = getAffixRules().filter((rule) => rule.id !== ruleId);
            renderAffixRules(rules);
            syncActiveWorkspace();
            if (state.parsedData.length > 0) renderUI();
        }

        function getAffixSettings() {
            return getAffixRules();
        }

        function shouldDecorateBlock(block, settings = getAffixSettings()) {
            if (!block) return false;
            return settings.some((rule) => {
                if (!rule.prefix && !rule.suffix) return false;
                const blockTitle = normalizePromptLabel(block.title);
                if (rule.target === 'all') return true;
                if (rule.target === 'image') return blockTitle === 'IMAGE PROMPT';
                if (rule.target === 'video') return blockTitle === 'VIDEO PROMPT';
                if (rule.target === 'specific') return !!rule.specific && blockTitle === rule.specific;
                return false;
            });
        }

        function getDecoratedBlockContent(block) {
            if (!block) return '';

            const settings = getAffixSettings();
            let content = (block.content || '').trim();
            if (!shouldDecorateBlock(block, settings)) return content;

            const blockTitle = normalizePromptLabel(block.title);
            const matchingRules = settings.filter((rule) => {
                if (!rule.prefix && !rule.suffix) return false;
                if (rule.target === 'all') return true;
                if (rule.target === 'image') return blockTitle === 'IMAGE PROMPT';
                if (rule.target === 'video') return blockTitle === 'VIDEO PROMPT';
                if (rule.target === 'specific') return !!rule.specific && blockTitle === rule.specific;
                return false;
            });

            const prefixText = matchingRules.map((rule) => rule.prefix.trim()).filter(Boolean).join('\n');
            const suffixText = matchingRules.map((rule) => rule.suffix.trim()).filter(Boolean).join('\n');

            if (prefixText) {
                content = content ? `${prefixText}\n${content}` : prefixText;
            }

            if (suffixText) {
                content = content ? `${content}\n${suffixText}` : suffixText;
            }

            return content.trim();
        }

        function formatBlockForCopy(block) {
            if (!block) return '';

            let decoratedContent = getDecoratedBlockContent(block);
            if (normalizePromptLabel(block.title) === 'VIDEO PROMPT' && block.durationLabel) {
                decoratedContent = decoratedContent ? `${decoratedContent}\n${block.durationLabel}` : block.durationLabel;
            }
            const parts = [`${block.title}:`];
            if (decoratedContent) parts.push(decoratedContent);
            return parts.join('\n').trim();
        }

        function getAllBlocks() {
            return state.parsedData.flatMap((tab) => tab.items.flatMap((item) => item.blocks));
        }

        function getRollSearchQuery() {
            return (DOM.rollSearchInput.value || '').trim().toLowerCase();
        }

        function getItemSearchText(tab, item) {
            const itemTitle = item?.title || '';
            const blockSearch = (item?.blocks || []).map((block) => {
                return [
                    block.title || '',
                    block.taraCode || '',
                    block.taraLabel || '',
                    block.scriptLine || '',
                    block.metaTag || ''
                ].join(' ');
            }).join(' ');

            return [
                tab?.title || '',
                itemTitle,
                blockSearch
            ].join(' ').toLowerCase();
        }

        function itemMatchesSearch(tab, item, query = getRollSearchQuery()) {
            if (!query) return true;
            return getItemSearchText(tab, item).includes(query);
        }

        function getVisibleItemsForTab(tab) {
            return (tab?.items || []).filter((item) => item.blocks?.length && itemMatchesSearch(tab, item));
        }

        function getOrderedVisibleRollEntries() {
            return state.parsedData.flatMap((tab) => {
                return getVisibleItemsForTab(tab).map((item) => ({
                    tab,
                    item
                }));
            });
        }

        function ensureVisibleRollSelection() {
            const entries = getOrderedVisibleRollEntries();
            if (!entries.length) return false;

            const currentIndex = getCurrentVisibleRollEntryIndex(entries);
            if (currentIndex !== -1) return false;

            return activateRollEntry(entries[0]);
        }

        function getGlobalItems() {
            return state.parsedData.flatMap((tab) => {
                return getVisibleItemsForTab(tab).map((item) => ({
                    tabId: tab.id,
                    tabTitle: tab.title,
                    itemId: item.id,
                    itemTitle: item.title,
                    blocks: item.blocks
                }));
            }).filter((entry) => entry.blocks && entry.blocks.length > 0);
        }

        function findBlockContext(blockId) {
            for (let tabIndex = 0; tabIndex < state.parsedData.length; tabIndex++) {
                const tab = state.parsedData[tabIndex];
                for (let itemIndex = 0; itemIndex < tab.items.length; itemIndex++) {
                    const item = tab.items[itemIndex];
                    const blockIndex = item.blocks.findIndex((block) => block.id === blockId);
                    if (blockIndex !== -1) {
                        return { tab, item, tabIndex, itemIndex, blockIndex };
                    }
                }
            }

            return null;
        }

        function getCurrentVisibleRollEntryIndex(entries) {
            if (!entries.length) return -1;
            return entries.findIndex((entry) => {
                return entry.tab.id === state.activeTabId && state.activeSubTabIds[entry.tab.id] === entry.item.id;
            });
        }

        function activateRollEntry(entry) {
            if (!entry) return false;
            state.activeTabId = entry.tab.id;
            state.activeSubTabIds[entry.tab.id] = entry.item.id;
            state.expandedBlocks = {};
            persistExtractedState();
            renderUI();
            return true;
        }

        function moveBetweenVisibleRolls(direction = 1) {
            if (state.viewMode !== 'tabbed') return false;
            const entries = getOrderedVisibleRollEntries();
            if (!entries.length) return false;

            const currentIndex = getCurrentVisibleRollEntryIndex(entries);
            if (currentIndex === -1) {
                return activateRollEntry(entries[0]);
            }

            const nextIndex = currentIndex + direction;
            if (nextIndex < 0 || nextIndex >= entries.length) return false;
            return activateRollEntry(entries[nextIndex]);
        }

        function moveToNextBroll() {
            return moveBetweenVisibleRolls(1);
        }

        function moveToPreviousBroll() {
            return moveBetweenVisibleRolls(-1);
        }

        function getPercentComplete(completed, total) {
            if (!total) return 0;
            return Math.round((completed / total) * 100);
        }

        function getProgressTone(completed, total) {
            const percent = getPercentComplete(completed, total);
            if (percent <= 0) return 'progress-tone-empty';
            if (percent < 50) return 'progress-tone-started';
            if (percent < 80) return 'progress-tone-mid';
            if (percent < 100) return 'progress-tone-near';
            return 'progress-tone-done';
        }

        function renderProgressPill(completed, total, label = 'copied') {
            const percent = getPercentComplete(completed, total);
            const toneClass = getProgressTone(completed, total);
            return `<span class="progress-pill ${toneClass}"><strong>${percent}%</strong><span>${completed}/${total} ${label}</span></span>`;
        }

        function renderMiniProgressPill(completed, total) {
            const percent = getPercentComplete(completed, total);
            const toneClass = getProgressTone(completed, total);
            return `<span class="progress-pill progress-pill--mini ${toneClass}" title="${completed}/${total} copied"><strong>${percent}%</strong></span>`;
        }

        function renderProgressMetric(completed, total) {
            const percent = getPercentComplete(completed, total);
            const toneClass = getProgressTone(completed, total);
            return `
                <span class="metric-chip metric-chip--progress ${toneClass}">
                    <span class="metric-progress-head">
                        <span class="metric-progress-copy">
                            <i data-lucide="copy"></i>
                            <span class="metric-progress-label">
                                <strong>Copy Progress</strong>
                                <span>${completed} of ${total} prompts copied</span>
                            </span>
                        </span>
                        <span class="metric-progress-value ${toneClass}">${percent}%</span>
                    </span>
                    <span class="progress-track">
                        <span class="progress-fill ${toneClass}" style="--progress: ${percent}%"></span>
                    </span>
                </span>
            `;
        }

        function getProgressStats() {
            const blocks = getAllBlocks();
            const items = getGlobalItems();
            const totalPrompts = blocks.length;
            const copiedPrompts = blocks.filter((block) => isCopied(block)).length;
            const fullyCopiedItems = items.filter((item) => item.blocks.every((block) => isCopied(block))).length;

            return {
                totalSections: state.parsedData.length,
                totalItems: items.length,
                totalPrompts,
                copiedPrompts,
                fullyCopiedItems,
                copiedPercent: getPercentComplete(copiedPrompts, totalPrompts)
            };
        }

        function setViewMode(mode) {
            state.viewMode = mode;
            syncActiveWorkspace();
            syncViewToggle();
            renderUI();
        }

        function syncViewToggle() {
            DOM.viewTabsBtn.classList.toggle('view-pill-active', state.viewMode === 'tabbed');
            DOM.viewGlobalBtn.classList.toggle('view-pill-active', state.viewMode === 'global');
            DOM.viewTabsBtn.classList.toggle('view-pill-idle', state.viewMode !== 'tabbed');
            DOM.viewGlobalBtn.classList.toggle('view-pill-idle', state.viewMode !== 'global');
        }

        function toggleMainDelimiter() {
            if (DOM.splitMethod.value === 'keyword') {
                DOM.keywordContainer.classList.remove('hidden');
            } else {
                DOM.keywordContainer.classList.add('hidden');
            }
        }

        function toggleAffixSpecific() {
            renderAffixRules(getAffixRules());
        }

        function openSettings() {
            DOM.settingsModal.classList.remove('hidden');
            DOM.settingsModal.classList.add('flex');
            document.body.classList.add('modal-open');
            setTimeout(() => DOM.splitMethod.focus(), 0);
        }

        function closeSettings() {
            if (DOM.settingsModal.classList.contains('hidden')) return;
            DOM.settingsModal.classList.add('hidden');
            DOM.settingsModal.classList.remove('flex');
            document.body.classList.remove('modal-open');
        }

        function syncSoundToggle() {
            DOM.soundToggleText.textContent = state.soundEnabled ? 'Audio' : 'Muted';
            DOM.soundToggle.classList.toggle('is-muted', !state.soundEnabled);
            const iconHost = DOM.soundToggle.querySelector('.sound-toggle-icon');
            if (iconHost) {
                iconHost.innerHTML = `<i data-lucide="${state.soundEnabled ? 'volume-2' : 'volume-x'}" class="w-4 h-4"></i>`;
            }
            lucide.createIcons();
        }

        function toggleSound() {
            state.soundEnabled = !state.soundEnabled;
            localStorage.setItem('sps_soundEnabled', String(state.soundEnabled));
            syncSoundToggle();

            if (state.soundEnabled) {
                primeAudio();
                playSound('success');
            }
        }

        function primeAudio() {
            if (!state.soundEnabled) return;
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return;
            if (!audioContext) audioContext = new AudioContextClass();
            if (audioContext.state === 'suspended') audioContext.resume();
        }

        function playSound(type) {
            if (!state.soundEnabled) return;
            primeAudio();
            if (!audioContext || audioContext.state !== 'running') return;

            const tones = type === 'error'
                ? [
                    { freq: 280, start: 0, duration: 0.08, gain: 0.018 },
                    { freq: 220, start: 0.09, duration: 0.12, gain: 0.014 }
                ]
                : [
                    { freq: 523.25, start: 0, duration: 0.08, gain: 0.018 },
                    { freq: 659.25, start: 0.08, duration: 0.12, gain: 0.014 },
                    { freq: 783.99, start: 0.18, duration: 0.18, gain: 0.011 }
                ];

            const now = audioContext.currentTime;

            tones.forEach((tone) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.type = type === 'error' ? 'triangle' : 'sine';
                oscillator.frequency.setValueAtTime(tone.freq, now + tone.start);
                gainNode.gain.setValueAtTime(0.0001, now + tone.start);
                gainNode.gain.exponentialRampToValueAtTime(tone.gain, now + tone.start + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, now + tone.start + tone.duration);

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.start(now + tone.start);
                oscillator.stop(now + tone.start + tone.duration);
            });
        }

        function showToast(message, tone = 'none') {
            DOM.toastMsg.textContent = message;
            DOM.toast.classList.remove('hidden');
            DOM.toast.classList.add('flex');

            if (tone === 'success') playSound('success');
            if (tone === 'error') playSound('error');

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                DOM.toast.classList.add('hidden');
                DOM.toast.classList.remove('flex');
            }, 3000);
        }

        function fallbackCopyText(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.top = '0';
            textArea.style.left = '0';
            textArea.style.position = 'fixed';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            const copied = document.execCommand('copy');
            document.body.removeChild(textArea);
            return copied;
        }

        async function copyTextAndMark(text, blockKeys, successMessage) {
            primeAudio();

            try {
                let copied = false;

                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                    copied = true;
                } else {
                    copied = fallbackCopyText(text);
                }

                if (!copied) {
                    showToast('Failed to copy.', 'error');
                    return false;
                }

                blockKeys.forEach((key) => {
                    state.copiedBlockKeys[key] = true;
                });
                persistCopiedProgress();
                renderUI();
                showToast(successMessage, 'success');
                return true;
            } catch (error) {
                showToast('Error copying text.', 'error');
                return false;
            }
        }

        function isTextEditingTarget(target = document.activeElement) {
            if (!target) return false;
            if (target.isContentEditable) return true;
            const tagName = target.tagName;
            if (tagName === 'TEXTAREA' || tagName === 'SELECT') return true;
            if (tagName === 'INPUT') {
                const type = (target.getAttribute('type') || 'text').toLowerCase();
                return !['button', 'checkbox', 'color', 'file', 'hidden', 'radio', 'range', 'reset', 'submit'].includes(type);
            }
            return false;
        }

        function isSettingsOpen() {
            return !DOM.settingsModal.classList.contains('hidden');
        }

        function findFirstUncopiedBlock() {
            if (state.viewMode === 'global') {
                const globalItems = getGlobalItems();
                for (const item of globalItems) {
                    const uncopied = item.blocks.find((block) => !isCopied(block));
                    if (uncopied) return uncopied;
                }
                return null;
            }

            const entries = getOrderedVisibleRollEntries();
            if (!entries.length) return null;
            const currentIndex = getCurrentVisibleRollEntryIndex(entries);
            const orderedEntries = currentIndex === -1
                ? entries
                : [...entries.slice(currentIndex), ...entries.slice(0, currentIndex)];

            for (const entry of orderedEntries) {
                const uncopied = entry.item.blocks.find((block) => !isCopied(block));
                if (uncopied) return uncopied;
            }

            return null;
        }

        async function copyFirstUncopiedPrompt() {
            const block = findFirstUncopiedBlock();
            if (!block) {
                showToast('No uncopied prompts left.', 'error');
                return false;
            }

            if (state.viewMode === 'tabbed') {
                const context = findBlockContext(block.id);
                if (context) {
                    activateRollEntry({ tab: context.tab, item: context.item });
                }
            }

            await copyBlock(block.id);
            return true;
        }

        function handleGlobalShortcuts(event) {
            if (event.defaultPrevented) return;
            if (isTextEditingTarget(event.target)) return;
            if (isSettingsOpen()) return;

            const key = (event.key || '').toLowerCase();
            const hasShortcutModifier = event.ctrlKey || event.metaKey;

            if (hasShortcutModifier && key === 'c') {
                event.preventDefault();
                copyFirstUncopiedPrompt();
                return;
            }

            if (event.altKey || event.shiftKey || hasShortcutModifier) return;

            if (key === 'q') {
                event.preventDefault();
                moveToPreviousBroll();
                return;
            }
            if (key === 'w') {
                event.preventDefault();
                copyFirstUncopiedPrompt();
                return;
            }
            if (key === 'e') {
                event.preventDefault();
                moveToNextBroll();
                return;
            }
            if (key === 's') {
                event.preventDefault();
                processText();
                return;
            }
            if (key === 'd') {
                event.preventDefault();
                handleClearAll();
                return;
            }
            if (key === 'a') {
                event.preventDefault();
                DOM.fileUpload.click();
            }
        }

        function shouldAutoAdvance(blockContext) {
            if (!blockContext) return false;

            const mode = DOM.autoAdvanceMode.value || 'last';
            if (mode === 'none') return false;

            const activeBlock = blockContext.item.blocks[blockContext.blockIndex];
            const blockTitle = normalizePromptLabel(activeBlock?.title);

            if (mode === 'last') {
                return blockContext.blockIndex === blockContext.item.blocks.length - 1;
            }
            if (mode === 'first') {
                return blockContext.blockIndex === 0;
            }
            if (mode === 'video') {
                return blockTitle === 'VIDEO PROMPT';
            }
            if (mode === 'image') {
                return blockTitle === 'IMAGE PROMPT';
            }

            return false;
        }

        function copyPrimarySelection() {
            if (state.viewMode === 'global') {
                copyAllVisible();
                return;
            }

            const activeTab = state.parsedData.find((tab) => tab.id === state.activeTabId);
            if (!activeTab) return;

            const activeSubTabId = state.activeSubTabIds[activeTab.id];
            const activeItem = activeTab.items.find((item) => item.id === activeSubTabId) || activeTab.items[0];
            if (!activeItem || !activeItem.blocks.length) return;

            copyItemGroup(activeTab.id, activeItem.id);
        }

        async function copyBlock(blockId) {
            const block = findBlockById(blockId);
            if (!block || !block.copyKey) return;

            const blockContext = findBlockContext(blockId);
            const copied = await copyTextAndMark(formatBlockForCopy(block), [block.copyKey], 'Prompt copied and marked.');
            if (!copied || !blockContext) return;

            if (shouldAutoAdvance(blockContext)) {
                moveToNextBroll(blockContext);
            }
        }

        function copyItemGroup(tabId, itemId) {
            const tab = state.parsedData.find((entry) => entry.id === tabId);
            if (!tab) return;
            const item = tab.items.find((entry) => entry.id === itemId);
            if (!item || !item.blocks.length) return;

            const text = item.blocks.map((block) => formatBlockForCopy(block)).join('\n\n');
            const blockKeys = item.blocks.map((block) => block.copyKey);
            copyTextAndMark(text.trim(), blockKeys, `"${item.title}" copied and tracked.`);
        }

        function copyAllVisible() {
            const globalItems = getGlobalItems();
            if (!globalItems.length) return;

            const sections = globalItems.map((item) => {
                const body = item.blocks.map((block) => formatBlockForCopy(block)).join('\n\n');
                return `${item.tabTitle} - ${item.itemTitle}\n\n${body}`;
            });

            const blockKeys = globalItems.flatMap((item) => item.blocks.map((block) => block.copyKey));
            copyTextAndMark(sections.join('\n\n---\n\n'), blockKeys, 'Global prompt list copied and tracked.');
        }

        function resetCopiedProgress() {
            primeAudio();
            if (!window.confirm('Reset copied progress for the current session?')) return;
            state.copiedBlockKeys = {};
            persistCopiedProgress();
            renderUI();
            showToast('Copied progress reset.', 'success');
        }

        function handleClearAll() {
            primeAudio();
            const workspace = getActiveWorkspace();
            if (!window.confirm(`Clear everything in ${workspace ? `"${workspace.name}"` : 'this directory'}?`)) return;

            DOM.inputText.value = '';
            state.parsedData = [];
            state.contentMap = {};
            state.blockKeyMap = {};
            state.expandedBlocks = {};
            state.activeTabId = null;
            state.activeSubTabIds = {};
            state.copiedBlockKeys = {};

            persistCopiedProgress();
            clearExtractedState();
            renderUI();
            showToast('Directory cleared.', 'success');
        }

        function handleFileUpload(event) {
            primeAudio();
            const file = event.target.files[0];
            if (!file) return;

            showToast('Extracting document...');

            if (file.name.endsWith('.txt')) {
                const reader = new FileReader();
                reader.onload = (loadEvent) => {
                    DOM.inputText.value = loadEvent.target.result;
                    syncActiveWorkspace();
                    showToast('Text file loaded completely!', 'success');
                };
                reader.readAsText(file);
            } else if (file.name.endsWith('.docx')) {
                const reader = new FileReader();
                reader.onload = (loadEvent) => {
                    const arrayBuffer = loadEvent.target.result;
                    mammoth.extractRawText({ arrayBuffer })
                        .then((result) => {
                            DOM.inputText.value = result.value;
                            syncActiveWorkspace();
                            showToast('Word document extracted!', 'success');
                        })
                        .catch((error) => {
                            console.error(error);
                            showToast('Error reading .docx file.', 'error');
                        });
                };
                reader.readAsArrayBuffer(file);
            } else {
                showToast('Please upload a .txt or .docx file.', 'error');
            }

            event.target.value = '';
        }

        function processText() {
            primeAudio();

            const text = DOM.inputText.value.replace(/\r\n?/g, '\n');
            const splitMethod = DOM.splitMethod.value;
            const mainDelim = DOM.mainDelimiter.value.trim();
            const subDelims = DOM.subDelimiters.value;
            const itemDelim = DOM.itemDelimiter.value.trim();
            const ignoreKeyword = DOM.ignoreDelimiter.value.trim().toLowerCase();

            if (!text.trim()) {
                showToast('Please paste some text first.', 'error');
                return;
            }

            if (splitMethod === 'keyword' && !mainDelim) {
                showToast('Add a keyword splitter first.', 'error');
                return;
            }

            let rawChunks = [];

            if (splitMethod === 'smart') {
                const headerRegex = /^((?:\*\*|\*|#)?\s*(?:Video\s+|Tab\s+|Scene\s+)?\d{1,3}[a-z]?(?:\s*(?:\u2705|\[DONE\]|\u2714\uFE0F?|\bdone\b|[^\p{L}\p{N}\r\n]+))*\s*)$/gimu;
                const splitPieces = text.split(headerRegex);

                let currentChunk = splitPieces[0];
                for (let index = 1; index < splitPieces.length; index += 2) {
                    if (currentChunk.trim().length > 0) rawChunks.push(currentChunk);
                    currentChunk = splitPieces[index] + '\n' + (splitPieces[index + 1] || '');
                }
                if (currentChunk.trim().length > 0) rawChunks.push(currentChunk);
            } else {
                const escapedMainDelim = mainDelim.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const mainDelimRegex = new RegExp(`(?=${escapedMainDelim})`, 'gi');
                rawChunks = text.split(mainDelimRegex).filter((chunk) => chunk.trim().length > 0);
            }

            const promptLabels = getPromptLabels(subDelims);

            state.contentMap = {};
            state.blockKeyMap = {};
            state.expandedBlocks = {};

            const parsed = rawChunks.map((chunk, chunkIndex) => {
                const lines = chunk.trim().split('\n');
                let title = (lines[0] || '').trim();

                title = title.replace(/^[\*\#\s]+|[\*\#\s]+$/g, '');
                if (title.length > 40) title = `${title.substring(0, 40)}...`;

                if (splitMethod === 'keyword' && !title.toLowerCase().includes(mainDelim.toLowerCase())) {
                    title = `${mainDelim} ${chunkIndex + 1}`;
                } else if (splitMethod === 'smart' && title.length > 25) {
                    title = `Section ${chunkIndex + 1}`;
                }

                const parsedItems = [];
                const items = splitItemSections(chunk, itemDelim);

                items.forEach((itemText, itemIndex) => {
                    const extractedBlocks = [];
                    let itemTitle = itemText.trim().split('\n')[0].replace(/[\*\#\:]/g, '').trim();
                    if (itemTitle.length > 30 || itemTitle.length === 0) {
                        itemTitle = `${itemDelim || 'Item'} ${itemIndex + 1}`;
                    }

                    const itemMetaTag = extractFirstMetadataLine(itemText);
                    const itemMetadata = parseMetadataTag(itemMetaTag);
                    const scriptLine = extractScriptLine(itemText, promptLabels);
                    const itemTaraCode = extractTaraCode(itemText, itemMetaTag, itemMetadata.code);

                    if (promptLabels.length > 0) {
                        const promptSections = findPromptSections(itemText, promptLabels);

                        for (let index = 0; index < promptSections.length; index++) {
                            const current = promptSections[index];
                            const next = promptSections[index + 1];
                            const end = next ? next.index : itemText.length;
                            const previous = promptSections[index - 1];
                            const preambleStart = previous ? previous.contentStart : 0;
                            const preamble = itemText.substring(preambleStart, current.index);
                            const metaTag = extractNearestMetadataLine(preamble) || itemMetaTag;
                            const blockMetadata = parseMetadataTag(metaTag);

                            let content = stripTrailingPromptArtifacts(itemText.substring(current.contentStart, end).trim());
                            content = content.replace(/[\*\#\-\s]+$/, '');
                            const taraCode = extractTaraCode(metaTag, preamble, content, itemTaraCode, blockMetadata.code);

                            const blockId = `block-${chunkIndex}-${itemIndex}-${index}`;
                            const copyKey = buildCopyKey(title, itemTitle, current.delim, content, metaTag);
                            extractedBlocks.push({
                                id: blockId,
                                title: current.delim,
                                metaTag,
                                taraCode,
                                taraLabel: blockMetadata.label || itemMetadata.label,
                                scriptLine,
                                content,
                                copyKey
                            });
                            state.contentMap[blockId] = content;
                            state.blockKeyMap[blockId] = copyKey;
                        }

                        const durationLabel = inferItemDurationLabel(extractedBlocks);
                        if (durationLabel) {
                            extractedBlocks.forEach((block) => {
                                if (normalizePromptLabel(block.title) === 'VIDEO PROMPT') {
                                    block.durationLabel = durationLabel;
                                }
                            });
                        }
                    }

                    if (extractedBlocks.length > 0) {
                        parsedItems.push({
                            id: `item-${chunkIndex}-${itemIndex}`,
                            title: itemTitle,
                            blocks: extractedBlocks
                        });
                    }
                });

                if (parsedItems.length === 0) {
                    const blockId = `block-${chunkIndex}-raw`;
                    const content = chunk.trim();
                    const copyKey = buildCopyKey(title, 'Raw Content', 'RAW CONTENT', content);
                    parsedItems.push({
                        id: `item-${chunkIndex}-0`,
                        title: 'Raw Content',
                        blocks: [{ id: blockId, title: 'RAW CONTENT', content, copyKey }]
                    });
                    state.contentMap[blockId] = content;
                    state.blockKeyMap[blockId] = copyKey;
                }

                return {
                    id: `tab-${chunkIndex}`,
                    title,
                    rawContent: chunk,
                    items: parsedItems
                };
            });

            const filteredParsed = parsed.filter((tab) => {
                if (!ignoreKeyword) return true;
                const ignoreList = ignoreKeyword.split(',').map((entry) => entry.trim()).filter(Boolean);
                const chunkTextLower = tab.rawContent.toLowerCase();
                return !ignoreList.some((ignoreStr) => chunkTextLower.includes(ignoreStr));
            });

            state.parsedData = filteredParsed;
            state.activeSubTabIds = {};
            state.activeTabId = filteredParsed.length ? filteredParsed[0].id : null;

            filteredParsed.forEach((tab) => {
                if (tab.items && tab.items.length > 0) {
                    state.activeSubTabIds[tab.id] = tab.items[0].id;
                }
            });

            persistExtractedState();

            renderUI();

            if (filteredParsed.length < parsed.length) {
                showToast(`Extracted ${filteredParsed.length} tabs (Ignored ${parsed.length - filteredParsed.length} completed ones!)`, 'success');
            } else if (filteredParsed.length > 0) {
                showToast(`Successfully extracted ${filteredParsed.length} sections!`, 'success');
            } else {
                showToast('Nothing extracted. Check your ignore string.', 'error');
            }
        }

        function renderBlockCard(block, options = {}) {
            const copied = isCopied(block);
            const compact = options.compact !== false;
            const isExpanded = !!state.expandedBlocks[block.id];
            const decoratedContent = getDecoratedBlockContent(block);
            const headerMeta = [
                block.taraCode ? `<span class="meta-chip mt-1.5">Code ${escapeHtml(block.taraCode)}</span>` : '',
                block.durationLabel ? `<span class="meta-chip mt-2">${escapeHtml(block.durationLabel)}</span>` : ''
            ].filter(Boolean).join('');
            const cardClass = copied ? 'copied-shell' : 'border border-cyan-400/12 bg-slate-950/55 shadow-[0_16px_34px_rgba(0,0,0,0.3)]';
            const badge = copied
                ? '<span class="status-chip status-chip--done"><i data-lucide="check" class="w-3.5 h-3.5"></i>Copied</span>'
                : '<span class="status-chip">Queued</span>';
            const buttonLabel = copied ? 'Copy Again' : 'Copy';
            const shellRadius = compact ? 'rounded-[1.1rem]' : 'rounded-[1.25rem]';
            const headerPadding = compact ? 'px-3 py-2.5' : 'px-3.5 py-3';
            const bodyPadding = compact ? 'p-3' : 'p-3.5 sm:p-4';
            const titleClass = compact ? 'text-[12px]' : 'text-sm';

            return `
                <div class="relative group ${shellRadius} border overflow-hidden ${cardClass}">
                    <div class="flex flex-col gap-2.5 sm:flex-row sm:items-center sm:justify-between ${headerPadding} bg-white/[0.03] border-b border-white/8">
                        <div
                            class="min-w-0 flex-1 cursor-pointer"
                            role="button"
                            tabindex="0"
                            aria-expanded="${isExpanded ? 'true' : 'false'}"
                            onclick="toggleCollapse('${block.id}')"
                            onkeydown="if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); toggleCollapse('${block.id}'); }"
                        >
                            <div class="flex flex-wrap items-center gap-2">
                                <h4 class="font-bold text-cyan-50 tracking-[0.12em] ${titleClass} uppercase">${block.title}</h4>
                                ${badge}
                                <span class="toggle-chip" aria-hidden="true">
                                    <i data-lucide="${isExpanded ? 'chevron-up' : 'chevron-down'}" class="w-3.5 h-3.5"></i>
                                </span>
                            </div>
                            ${headerMeta ? `<div class="mt-1.5 flex flex-wrap gap-2">${headerMeta}</div>` : ''}
                            ${block.scriptLine ? `<p class="text-[11px] text-cyan-100/72 mt-1.5 leading-relaxed">${escapeHtml(block.scriptLine)}</p>` : ''}
                            ${block.taraLabel ? `<p class="text-[11px] text-cyan-100/46 mt-1">${escapeHtml(block.taraLabel)}</p>` : ''}
                            ${options.meta ? `<p class="text-[10px] text-cyan-100/50 mt-1.5 uppercase tracking-[0.18em]">${options.meta}</p>` : ''}
                        </div>
                        <div class="flex flex-col sm:flex-row gap-2 w-full sm:w-auto">
                            <button onclick="event.stopPropagation(); triggerCopy('${block.id}')" class="chrome-btn soft-ring w-full sm:w-auto flex items-center justify-center gap-2 px-3 py-1.5 rounded-2xl text-sm font-medium transition-all ${copied ? 'text-lime-200 border-lime-400/20 bg-lime-400/10 hover:bg-lime-400/14' : ''}">
                                <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                                ${buttonLabel}
                            </button>
                        </div>
                    </div>
                    <div class="${bodyPadding} ${isExpanded ? 'block' : 'hidden'}">
                        <div class="prompt-content text-sm leading-relaxed min-w-0">
                            ${decoratedContent ? escapeHtml(decoratedContent) : '<span class="text-cyan-100/40 italic">No prompt found.</span>'}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderTabbedView() {
            DOM.tabsContainer.classList.remove('hidden');
            DOM.tabsContainer.innerHTML = state.parsedData.map((tab) => `
                <button onclick="switchTab('${tab.id}')" class="snap-start whitespace-nowrap px-4 sm:px-5 py-3.5 font-semibold text-sm transition-colors border-b-2 flex-shrink-0 ${
                    state.activeTabId === tab.id
                        ? 'text-cyan-50 border-cyan-300 bg-cyan-400/8'
                        : 'text-cyan-100/60 border-transparent hover:text-cyan-50 hover:bg-white/[0.03]'
                }">${tab.title}</button>
            `).join('');

            const activeTabData = state.parsedData.find((tab) => tab.id === state.activeTabId);

            if (!activeTabData || !activeTabData.items || activeTabData.items.length === 0) {
                DOM.subTabsContainer.classList.add('hidden');
                DOM.copyTabContainer.classList.add('hidden');
                DOM.blocksContainer.innerHTML = '<div class="p-8 text-center text-cyan-100/45">No prompts found.</div>';
                return;
            }

            const visibleItems = getVisibleItemsForTab(activeTabData);
            if (!visibleItems.length) {
                DOM.subTabsContainer.classList.remove('hidden');
                DOM.subTabsContainer.innerHTML = '<div class="w-full px-2 py-2 text-xs text-cyan-100/45">No rolls match this search.</div>';
                DOM.copyTabContainer.classList.add('hidden');
                DOM.blocksContainer.innerHTML = '<div class="p-8 text-center text-cyan-100/45">No matching rolls in this tab.</div>';
                return;
            }

            DOM.subTabsContainer.classList.remove('hidden');
            DOM.subTabsContainer.innerHTML = visibleItems.map((item) => {
                const isActive = state.activeSubTabIds[state.activeTabId] === item.id;
                const copiedCount = item.blocks.filter((block) => isCopied(block)).length;
                return `
                    <button onclick="switchSubTab('${item.id}')" class="subtab-chip min-w-0 inline-flex items-center gap-1.5 ${
                        isActive
                            ? 'subtab-chip--active'
                            : ''
                        }">
                        <span class="subtab-chip-title">${item.title}</span>
                        <span class="shrink-0">
                            ${renderMiniProgressPill(copiedCount, item.blocks.length)}
                        </span>
                    </button>
                `;
            }).join('');

            const activeItem = visibleItems.find((item) => item.id === state.activeSubTabIds[state.activeTabId]) || visibleItems[0];
            if (activeItem && state.activeSubTabIds[state.activeTabId] !== activeItem.id) {
                state.activeSubTabIds[state.activeTabId] = activeItem.id;
                persistExtractedState();
            }

            if (!activeItem || !activeItem.blocks || activeItem.blocks.length === 0) {
                DOM.copyTabContainer.classList.add('hidden');
                DOM.blocksContainer.innerHTML = '<div class="p-8 text-center text-cyan-100/45">No prompts in this roll.</div>';
                return;
            }

            DOM.copyTabContainer.classList.remove('hidden');
            DOM.copyTabText.textContent = 'Copy Roll';
            DOM.copyTabBtn.querySelector('.copy-tab-icon').innerHTML = '<i data-lucide="files" class="w-4 h-4"></i>';

            DOM.blocksContainer.innerHTML = activeItem.blocks.map((block) => {
                if (state.expandedBlocks[block.id] === undefined) state.expandedBlocks[block.id] = false;
                return renderBlockCard(block, {
                    compact: true,
                    meta: `${activeTabData.title} / ${activeItem.title}`
                });
            }).join('');
        }

        function renderGlobalView() {
            DOM.tabsContainer.classList.add('hidden');
            DOM.subTabsContainer.classList.add('hidden');

            const globalItems = getGlobalItems();
            if (!globalItems.length) {
                DOM.copyTabContainer.classList.add('hidden');
                DOM.blocksContainer.innerHTML = '<div class="p-8 text-center text-cyan-100/45">No visible prompts.</div>';
                return;
            }

            DOM.copyTabContainer.classList.remove('hidden');
            DOM.copyTabText.textContent = 'Copy Visible';
            DOM.copyTabBtn.querySelector('.copy-tab-icon').innerHTML = '<i data-lucide="files" class="w-4 h-4"></i>';

            DOM.blocksContainer.innerHTML = globalItems.map((item) => {
                const copiedCount = item.blocks.filter((block) => isCopied(block)).length;
                const allCopied = copiedCount === item.blocks.length;
                return `
                    <div class="rounded-[1.3rem] border ${allCopied ? 'copied-shell' : 'border-cyan-400/12 bg-slate-950/55'} shadow-sm p-3.5">
                        <div class="flex flex-col gap-2.5 lg:flex-row lg:items-center lg:justify-between">
                            <div class="min-w-0">
                                <div class="flex flex-wrap items-center gap-2">
                                    <span class="status-chip">${item.tabTitle}</span>
                                    <span class="status-chip">${item.itemTitle}</span>
                                    ${renderProgressPill(copiedCount, item.blocks.length)}
                                </div>
                            </div>
                            <button onclick="copyItemGroup('${item.tabId}','${item.itemId}')" class="chrome-btn soft-ring w-full lg:w-auto px-4 py-2 rounded-2xl text-sm font-medium ${allCopied ? 'text-lime-200 border-lime-400/20 bg-lime-400/10 hover:bg-lime-400/14' : ''}">
                                ${allCopied ? 'Copy Again' : 'Copy Roll'}
                            </button>
                        </div>

                        <div class="mt-3 space-y-2.5">
                            ${item.blocks.map((block) => renderBlockCard(block, { compact: true })).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderUI() {
            syncViewToggle();

            if (state.parsedData.length === 0) {
                DOM.emptyState.classList.remove('hidden');
                DOM.resultsArea.classList.add('hidden');
                DOM.resultsArea.classList.remove('flex');
                return;
            }

            DOM.emptyState.classList.add('hidden');
            DOM.resultsArea.classList.remove('hidden');
            DOM.resultsArea.classList.add('flex');

            const stats = getProgressStats();
            DOM.resultsSummary.textContent = `${stats.totalPrompts} Prompts - ${stats.copiedPercent}% Copied`;
            DOM.resultsMeta.innerHTML = `
                ${renderProgressMetric(stats.copiedPrompts, stats.totalPrompts)}
                <span class="metric-chip"><i data-lucide="layers-3"></i>${stats.totalItems} rolls</span>
                <span class="metric-chip"><i data-lucide="check"></i>${stats.fullyCopiedItems} done</span>
            `;
            DOM.resetProgressBtn.classList.toggle('hidden', stats.copiedPrompts === 0);

            if (state.viewMode === 'global') {
                renderGlobalView();
            } else {
                renderTabbedView();
            }

            lucide.createIcons();
        }

        function switchTab(id) {
            state.activeTabId = id;
            persistExtractedState();
            renderUI();
        }

        function switchSubTab(id) {
            state.activeSubTabIds[state.activeTabId] = id;
            persistExtractedState();
            renderUI();
        }

        function toggleCollapse(id) {
            state.expandedBlocks[id] = !state.expandedBlocks[id];
            persistExtractedState();
            renderUI();
        }

        function triggerCopy(id) {
            copyBlock(id);
        }

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function registerPWA() {
            if ('serviceWorker' in navigator && (window.isSecureContext || ['localhost', '127.0.0.1'].includes(window.location.hostname))) {
                navigator.serviceWorker.register('./sw.js').catch((error) => {
                    console.error('Service worker registration failed', error);
                });
            }

            window.addEventListener('beforeinstallprompt', (event) => {
                event.preventDefault();
                state.deferredInstallPrompt = event;
                DOM.installBtn.classList.remove('hidden');
                DOM.installBtn.classList.add('inline-flex');
            });

            window.addEventListener('appinstalled', () => {
                state.deferredInstallPrompt = null;
                DOM.installBtn.classList.add('hidden');
                DOM.installBtn.classList.remove('inline-flex');
                showToast('App installed to your device.', 'success');
            });
        }

        async function installPWA() {
            if (!state.deferredInstallPrompt) return;
            primeAudio();
            state.deferredInstallPrompt.prompt();
            await state.deferredInstallPrompt.userChoice;
            state.deferredInstallPrompt = null;
            DOM.installBtn.classList.add('hidden');
            DOM.installBtn.classList.remove('inline-flex');
        }

        function loadExample() {
            DOM.inputText.value = `2a
