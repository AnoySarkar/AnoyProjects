<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Splitter by Avi</title>
    <meta name="theme-color" content="#020617">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Splitter by Avi">
    <meta name="description" content="Split long scripts into clean, copyable prompt sections with mobile-friendly controls.">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root {
            color-scheme: dark;
            --page-top: #01030a;
            --page-bottom: #020617;
            --panel-bg: rgba(4, 10, 22, 0.82);
            --panel-bg-strong: rgba(3, 8, 18, 0.94);
            --panel-border: rgba(103, 232, 249, 0.16);
            --panel-border-strong: rgba(103, 232, 249, 0.34);
            --text-main: #ecfeff;
            --text-soft: #c7f7ff;
            --text-muted: #7dd3fc;
            --text-dim: #52728a;
            --accent: #22d3ee;
            --accent-soft: #67e8f9;
            --accent-lime: #a3e635;
            --focus-ring: rgba(34, 211, 238, 0.32);
            --glow-one: rgba(34, 211, 238, 0.18);
            --glow-two: rgba(163, 230, 53, 0.1);
            --glow-three: rgba(34, 211, 238, 0.08);
            --grid-line: rgba(103, 232, 249, 0.045);
            --grid-mask: rgba(0, 0, 0, 0.5);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
        }

        body[data-theme="ember"] {
            --page-top: #14070a;
            --page-bottom: #2a0f0c;
            --panel-border: rgba(251, 146, 60, 0.16);
            --panel-border-strong: rgba(248, 113, 113, 0.32);
            --text-muted: #fdba74;
            --text-dim: #8d5240;
            --accent: #fb923c;
            --accent-soft: #fdba74;
            --accent-lime: #f87171;
            --focus-ring: rgba(251, 146, 60, 0.3);
            --glow-one: rgba(251, 146, 60, 0.18);
            --glow-two: rgba(248, 113, 113, 0.12);
            --glow-three: rgba(253, 186, 116, 0.08);
            --grid-line: rgba(251, 146, 60, 0.04);
        }

        body[data-theme="aurora"] {
            --page-top: #06111b;
            --page-bottom: #071a17;
            --panel-border: rgba(45, 212, 191, 0.16);
            --panel-border-strong: rgba(96, 165, 250, 0.32);
            --text-muted: #5eead4;
            --text-dim: #4a7e84;
            --accent: #2dd4bf;
            --accent-soft: #67e8f9;
            --accent-lime: #60a5fa;
            --focus-ring: rgba(45, 212, 191, 0.28);
            --glow-one: rgba(45, 212, 191, 0.18);
            --glow-two: rgba(96, 165, 250, 0.12);
            --glow-three: rgba(103, 232, 249, 0.08);
            --grid-line: rgba(45, 212, 191, 0.04);
        }

        body[data-theme="rose"] {
            --page-top: #180911;
            --page-bottom: #250d1e;
            --panel-border: rgba(244, 114, 182, 0.17);
            --panel-border-strong: rgba(192, 132, 252, 0.34);
            --text-muted: #f9a8d4;
            --text-dim: #8b5c7f;
            --accent: #f472b6;
            --accent-soft: #f9a8d4;
            --accent-lime: #c084fc;
            --focus-ring: rgba(244, 114, 182, 0.28);
            --glow-one: rgba(244, 114, 182, 0.17);
            --glow-two: rgba(192, 132, 252, 0.12);
            --glow-three: rgba(249, 168, 212, 0.08);
            --grid-line: rgba(244, 114, 182, 0.04);
        }

        body[data-theme="amber"] {
            --page-top: #171005;
            --page-bottom: #241709;
            --panel-border: rgba(250, 204, 21, 0.16);
            --panel-border-strong: rgba(251, 146, 60, 0.32);
            --text-muted: #fcd34d;
            --text-dim: #8a6c2e;
            --accent: #facc15;
            --accent-soft: #fde68a;
            --accent-lime: #fb923c;
            --focus-ring: rgba(250, 204, 21, 0.28);
            --glow-one: rgba(250, 204, 21, 0.17);
            --glow-two: rgba(251, 146, 60, 0.12);
            --glow-three: rgba(253, 230, 138, 0.08);
            --grid-line: rgba(250, 204, 21, 0.04);
        }

        body[data-theme="forest"] {
            --page-top: #071108;
            --page-bottom: #0c1d12;
            --panel-border: rgba(74, 222, 128, 0.16);
            --panel-border-strong: rgba(45, 212, 191, 0.32);
            --text-muted: #86efac;
            --text-dim: #54785d;
            --accent: #4ade80;
            --accent-soft: #86efac;
            --accent-lime: #2dd4bf;
            --focus-ring: rgba(74, 222, 128, 0.28);
            --glow-one: rgba(74, 222, 128, 0.17);
            --glow-two: rgba(45, 212, 191, 0.12);
            --glow-three: rgba(134, 239, 172, 0.08);
            --grid-line: rgba(74, 222, 128, 0.04);
        }

        body[data-theme="ocean"] {
            --page-top: #05111a;
            --page-bottom: #092132;
            --panel-border: rgba(56, 189, 248, 0.16);
            --panel-border-strong: rgba(99, 102, 241, 0.34);
            --text-muted: #7dd3fc;
            --text-dim: #4f6f92;
            --accent: #38bdf8;
            --accent-soft: #7dd3fc;
            --accent-lime: #6366f1;
            --focus-ring: rgba(56, 189, 248, 0.3);
            --glow-one: rgba(56, 189, 248, 0.18);
            --glow-two: rgba(99, 102, 241, 0.12);
            --glow-three: rgba(125, 211, 252, 0.08);
            --grid-line: rgba(56, 189, 248, 0.04);
        }

        body[data-theme="mono"] {
            --page-top: #090909;
            --page-bottom: #151515;
            --panel-border: rgba(212, 212, 216, 0.14);
            --panel-border-strong: rgba(161, 161, 170, 0.28);
            --text-main: #f5f5f5;
            --text-soft: #e5e7eb;
            --text-muted: #d4d4d8;
            --text-dim: #737373;
            --accent: #e5e7eb;
            --accent-soft: #fafafa;
            --accent-lime: #a1a1aa;
            --focus-ring: rgba(229, 231, 235, 0.2);
            --glow-one: rgba(229, 231, 235, 0.1);
            --glow-two: rgba(161, 161, 170, 0.08);
            --glow-three: rgba(245, 245, 245, 0.04);
            --grid-line: rgba(212, 212, 216, 0.03);
        }

        body[data-theme="violet"] {
            --page-top: #0d0920;
            --page-bottom: #17122f;
            --panel-border: rgba(167, 139, 250, 0.16);
            --panel-border-strong: rgba(96, 165, 250, 0.32);
            --text-muted: #c4b5fd;
            --text-dim: #6f67a8;
            --accent: #a78bfa;
            --accent-soft: #c4b5fd;
            --accent-lime: #60a5fa;
            --focus-ring: rgba(167, 139, 250, 0.28);
            --glow-one: rgba(167, 139, 250, 0.18);
            --glow-two: rgba(96, 165, 250, 0.12);
            --glow-three: rgba(196, 181, 253, 0.08);
            --grid-line: rgba(167, 139, 250, 0.04);
        }

        body[data-theme="sunset"] {
            --page-top: #1a0b14;
            --page-bottom: #2b1410;
            --panel-border: rgba(251, 146, 60, 0.16);
            --panel-border-strong: rgba(244, 114, 182, 0.3);
            --text-muted: #fdba74;
            --text-dim: #8a5c57;
            --accent: #fb923c;
            --accent-soft: #fdba74;
            --accent-lime: #f472b6;
            --focus-ring: rgba(251, 146, 60, 0.28);
            --glow-one: rgba(251, 146, 60, 0.18);
            --glow-two: rgba(244, 114, 182, 0.12);
            --glow-three: rgba(253, 186, 116, 0.08);
            --grid-line: rgba(251, 146, 60, 0.04);
        }

        html {
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            overflow-x: hidden;
            background: var(--page-bottom);
        }

        body {
            min-height: 100dvh;
            overflow-x: hidden;
            touch-action: manipulation;
            color: var(--text-main);
            font-family: "Segoe UI Variable", "Segoe UI", "Bahnschrift", sans-serif;
            background:
                radial-gradient(circle at top left, var(--glow-one), transparent 26rem),
                radial-gradient(circle at top right, var(--glow-two), transparent 24rem),
                radial-gradient(circle at bottom center, var(--glow-three), transparent 30rem),
                linear-gradient(180deg, var(--page-top) 0%, var(--page-bottom) 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: linear-gradient(180deg, var(--grid-mask), transparent 88%);
            opacity: 0.42;
        }

        header,
        main,
        #toast,
        #settingsModal {
            padding-left: max(0px, var(--safe-left));
            padding-right: max(0px, var(--safe-right));
        }

        header {
            padding-top: max(0px, var(--safe-top));
        }

        main {
            padding-bottom: calc(2.5rem + var(--safe-bottom));
        }

        #toast {
            top: calc(1rem + var(--safe-top));
        }

        #settingsModal {
            padding-top: calc(0.75rem + var(--safe-top));
            padding-bottom: calc(0.75rem + var(--safe-bottom));
        }

        #settingsModal > div {
            max-height: calc(100dvh - var(--safe-top) - var(--safe-bottom) - 1.5rem);
        }

        .settings-scroll {
            min-height: 0;
            overflow-y: auto;
            overscroll-behavior: contain;
            padding-bottom: calc(1.25rem + var(--safe-bottom));
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        img,
        svg,
        canvas,
        video {
            max-width: 100%;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
            overscroll-behavior-x: contain;
        }

        .glass-panel {
            background: linear-gradient(180deg, color-mix(in srgb, var(--page-top) 64%, transparent), color-mix(in srgb, var(--page-bottom) 78%, transparent));
            backdrop-filter: blur(20px);
            border-color: var(--panel-border) !important;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.04),
                0 20px 48px rgba(0, 0, 0, 0.42),
                0 0 30px color-mix(in srgb, var(--accent) 22%, transparent);
        }

        .soft-ring:focus-visible {
            outline: none;
            box-shadow:
                0 0 0 2px rgba(2, 6, 23, 0.95),
                0 0 0 4px var(--focus-ring),
                0 0 22px rgba(34, 211, 238, 0.16);
        }

        .view-pill-active {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-lime) 100%);
            color: #041018 !important;
            box-shadow: 0 0 0 1px rgba(163, 230, 53, 0.22), 0 10px 26px rgba(34, 211, 238, 0.18);
        }

        .view-pill-idle {
            color: rgba(199, 247, 255, 0.72);
        }

        .copied-shell {
            border-color: rgba(163, 230, 53, 0.34) !important;
            background: linear-gradient(180deg, rgba(12, 22, 19, 0.94), rgba(7, 17, 15, 0.94));
            box-shadow: 0 16px 30px rgba(163, 230, 53, 0.08);
        }

        @keyframes bounce-in {
            0% { transform: scale(0.9); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-bounce-in {
            animation: bounce-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes rise-in {
            0% { transform: translateY(18px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .animate-rise-in {
            animation: rise-in 0.24s ease-out forwards;
        }

        body.modal-open {
            overflow: hidden;
        }

        .prompt-content {
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            word-break: break-word;
            color: var(--text-soft);
        }

        .chrome-btn {
            min-height: 2.85rem;
            border: 1px solid rgba(125, 211, 252, 0.16);
            background: rgba(7, 15, 29, 0.92);
            color: var(--text-soft);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .chrome-btn:hover {
            border-color: rgba(103, 232, 249, 0.34);
            background: rgba(10, 21, 38, 0.98);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                0 0 18px rgba(34, 211, 238, 0.12);
        }

        .chrome-btn.is-muted {
            color: rgba(199, 247, 255, 0.58);
            border-color: rgba(82, 114, 138, 0.28);
        }

        .neon-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-lime) 100%);
            border: 1px solid rgba(163, 230, 53, 0.3);
            color: #03131a;
            box-shadow:
                0 12px 24px rgba(34, 211, 238, 0.18),
                0 0 30px rgba(163, 230, 53, 0.1);
        }

        .neon-primary:hover {
            filter: brightness(1.03);
            box-shadow:
                0 14px 28px rgba(34, 211, 238, 0.22),
                0 0 36px rgba(163, 230, 53, 0.12);
        }

        .metric-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.45rem 0.7rem;
            border-radius: 9999px;
            border: 1px solid rgba(103, 232, 249, 0.14);
            background: rgba(8, 15, 29, 0.84);
            color: rgba(236, 254, 255, 0.88);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .metric-chip i {
            width: 0.85rem;
            height: 0.85rem;
            color: var(--accent-soft);
        }

        .metric-chip--progress {
            position: relative;
            overflow: hidden;
            min-width: min(100%, 17rem);
            align-items: stretch;
            flex-direction: column;
            gap: 0.4rem;
            padding: 0.7rem 0.85rem;
            border-color: rgba(163, 230, 53, 0.22);
            box-shadow: inset 0 0 0 1px rgba(163, 230, 53, 0.04), 0 0 28px rgba(163, 230, 53, 0.08);
        }

        .metric-chip--progress::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at right center, rgba(163, 230, 53, 0.14), transparent 42%);
            pointer-events: none;
        }

        .metric-chip--progress.progress-tone-empty {
            border-color: rgba(71, 85, 105, 0.28);
            box-shadow: inset 0 0 0 1px rgba(71, 85, 105, 0.06);
        }

        .metric-chip--progress.progress-tone-started {
            border-color: rgba(248, 113, 113, 0.24);
            box-shadow: inset 0 0 0 1px rgba(248, 113, 113, 0.05), 0 0 28px rgba(248, 113, 113, 0.08);
        }

        .metric-chip--progress.progress-tone-mid {
            border-color: rgba(250, 204, 21, 0.24);
            box-shadow: inset 0 0 0 1px rgba(250, 204, 21, 0.05), 0 0 28px rgba(250, 204, 21, 0.08);
        }

        .metric-chip--progress.progress-tone-near {
            border-color: rgba(45, 212, 191, 0.24);
            box-shadow: inset 0 0 0 1px rgba(45, 212, 191, 0.05), 0 0 28px rgba(45, 212, 191, 0.08);
        }

        .metric-progress-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            position: relative;
            z-index: 1;
        }

        .metric-progress-copy {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
        }

        .metric-progress-label {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        .metric-progress-label strong {
            color: rgba(236, 254, 255, 0.96);
            font-size: 0.8rem;
            letter-spacing: 0.03em;
        }

        .metric-progress-label span {
            color: rgba(199, 247, 255, 0.58);
            font-size: 0.66rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .metric-progress-value {
            color: rgba(217, 249, 157, 0.98);
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            text-shadow: 0 0 16px rgba(163, 230, 53, 0.38);
        }

        .progress-track {
            position: relative;
            height: 0.48rem;
            border-radius: 9999px;
            background: rgba(12, 22, 33, 0.95);
            overflow: hidden;
            border: 1px solid rgba(103, 232, 249, 0.1);
        }

        .progress-fill {
            position: absolute;
            inset: 0 auto 0 0;
            width: var(--progress, 0%);
            border-radius: inherit;
            background: linear-gradient(90deg, rgba(34, 211, 238, 0.95), rgba(163, 230, 53, 0.98));
            box-shadow: 0 0 18px rgba(34, 211, 238, 0.28), 0 0 24px rgba(163, 230, 53, 0.22);
        }

        .progress-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.35rem 0.62rem;
            border-radius: 9999px;
            border: 1px solid rgba(163, 230, 53, 0.18);
            background: rgba(14, 25, 18, 0.92);
            color: rgba(236, 254, 255, 0.92);
            font-size: 11px;
            font-weight: 700;
            line-height: 1;
            box-shadow: 0 0 16px rgba(163, 230, 53, 0.08);
        }

        .progress-pill strong {
            color: rgba(217, 249, 157, 1);
            font-size: 12px;
            text-shadow: 0 0 12px rgba(163, 230, 53, 0.32);
        }

        .progress-pill span {
            color: rgba(199, 247, 255, 0.62);
            font-size: 10px;
        }

        .progress-pill--mini {
            padding: 0.22rem 0.42rem;
            gap: 0;
            min-width: 2.7rem;
            justify-content: center;
            font-size: 10px;
        }

        .progress-pill--mini strong {
            font-size: 10px;
        }

        .subtab-chip {
            min-width: 0;
            max-width: 9rem;
            padding: 0.38rem 0.55rem;
            border-radius: 0.95rem;
            border: 1px solid rgba(103, 232, 249, 0.1);
            background: rgba(255, 255, 255, 0.025);
            color: rgba(199, 247, 255, 0.72);
            font-size: 11px;
            font-weight: 700;
            line-height: 1.1;
            transition: background-color 140ms ease, border-color 140ms ease, box-shadow 140ms ease, color 140ms ease;
        }

        .subtab-chip:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(103, 232, 249, 0.16);
            color: rgba(236, 254, 255, 0.92);
        }

        .subtab-chip--active {
            background: rgba(34, 211, 238, 0.12);
            border-color: rgba(103, 232, 249, 0.3);
            color: rgba(236, 254, 255, 0.98);
            box-shadow: 0 0 16px rgba(34, 211, 238, 0.08);
        }

        .subtab-chip-title {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .progress-tone-empty {
            border-color: rgba(71, 85, 105, 0.34);
            background: rgba(10, 15, 24, 0.9);
            box-shadow: none;
        }

        .progress-tone-empty strong {
            color: rgba(148, 163, 184, 0.96);
            text-shadow: none;
        }

        .progress-tone-started {
            border-color: rgba(248, 113, 113, 0.3);
            background: rgba(36, 14, 18, 0.92);
            box-shadow: 0 0 16px rgba(248, 113, 113, 0.08);
        }

        .progress-tone-started strong {
            color: rgba(254, 202, 202, 0.98);
            text-shadow: 0 0 12px rgba(248, 113, 113, 0.22);
        }

        .progress-tone-mid {
            border-color: rgba(250, 204, 21, 0.28);
            background: rgba(38, 28, 8, 0.92);
            box-shadow: 0 0 16px rgba(250, 204, 21, 0.08);
        }

        .progress-tone-mid strong {
            color: rgba(254, 240, 138, 0.98);
            text-shadow: 0 0 12px rgba(250, 204, 21, 0.24);
        }

        .progress-tone-near {
            border-color: rgba(45, 212, 191, 0.28);
            background: rgba(8, 30, 27, 0.92);
            box-shadow: 0 0 18px rgba(45, 212, 191, 0.08);
        }

        .progress-tone-near strong {
            color: rgba(153, 246, 228, 0.98);
            text-shadow: 0 0 12px rgba(45, 212, 191, 0.24);
        }

        .progress-tone-done {
            border-color: rgba(163, 230, 53, 0.26);
            background: rgba(14, 25, 18, 0.92);
            box-shadow: 0 0 16px rgba(163, 230, 53, 0.08);
        }

        .progress-tone-done strong {
            color: rgba(217, 249, 157, 1);
            text-shadow: 0 0 12px rgba(163, 230, 53, 0.32);
        }

        .metric-progress-value.progress-tone-empty {
            color: rgba(148, 163, 184, 0.96);
            text-shadow: none;
        }

        .metric-progress-value.progress-tone-started {
            color: rgba(254, 202, 202, 0.98);
            text-shadow: 0 0 16px rgba(248, 113, 113, 0.3);
        }

        .metric-progress-value.progress-tone-mid {
            color: rgba(254, 240, 138, 0.98);
            text-shadow: 0 0 16px rgba(250, 204, 21, 0.3);
        }

        .metric-progress-value.progress-tone-near {
            color: rgba(153, 246, 228, 0.98);
            text-shadow: 0 0 16px rgba(45, 212, 191, 0.3);
        }

        .metric-progress-value.progress-tone-done {
            color: rgba(217, 249, 157, 1);
            text-shadow: 0 0 16px rgba(163, 230, 53, 0.34);
        }

        .progress-fill.progress-tone-empty {

            }

            if (fallback.prefixText || fallback.suffixText) {

            const fallbackWorkspace = state.workspaces[Math.max(0, currentIndex - 1)] || state.workspaces[0];
            state.activeWorkspaceId = fallbackWorkspace.id;
            applyWorkspace(fallbackWorkspace);

        }

            syncActiveWorkspace();
