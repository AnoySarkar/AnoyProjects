<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WorkFlow</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="icon" href="icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#312e81">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Space Grotesk', 'system-ui', 'sans-serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          }
        }
      }
    };
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');
    :root { color-scheme: dark; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(79, 70, 229, 0.20), transparent 28rem),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.08), transparent 22rem),
        #09090b;
      color: #e4e4e7;
      font-family: 'Space Grotesk', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .fade-in { animation: fadeIn 0.28s ease-out forwards; }
    .slide-up { animation: slideUp 0.32s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .zoom-in { animation: zoomIn 0.22s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .project-dragging { opacity: 0.42; }
    .project-drop-before::before,
    .project-drop-after::after {
      content: '';
      position: absolute;
      left: 1rem;
      right: 1rem;
      height: 3px;
      border-radius: 9999px;
      background: linear-gradient(90deg, rgba(99, 102, 241, 0.12), rgba(129, 140, 248, 0.95), rgba(34, 211, 238, 0.28));
      box-shadow: 0 0 20px rgba(129, 140, 248, 0.35);
      pointer-events: none;
      z-index: 30;
    }
    .project-drop-before::before { top: -1px; }
    .project-drop-after::after { bottom: -1px; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    @media print {
      @page { size: portrait; margin: 10mm; }
      body { background: white !important; color: black !important; }
      .print-hidden { display: none !important; }
      .print-only { display: block !important; }
      .page-break-inside-avoid { page-break-inside: avoid; break-inside: avoid; }
    }
    .print-only { display: none; }
  </style>
</head>
<body class="selection:bg-indigo-500/30">
  <div class="print-hidden fixed left-1/2 top-0 z-0 h-[340px] w-full max-w-6xl -translate-x-1/2 rounded-full bg-indigo-600/5 blur-[150px] pointer-events-none"></div>
  <div id="app" class="relative z-10"></div>
  <input id="jsonUploadInput" type="file" accept="application/json,.json" class="hidden" onchange="handleUploadJson(event)">
  <script>
    function playSound(type) {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        const now = ctx.currentTime;
        if (type === 'click') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(780, now);
          osc.frequency.exponentialRampToValueAtTime(120, now + 0.05);
          gain.gain.setValueAtTime(0.18, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
          osc.start(now);
          osc.stop(now + 0.05);
        } else if (type === 'pop') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(420, now);
          osc.frequency.exponentialRampToValueAtTime(210, now + 0.1);
          filter.type = 'lowpass';
          filter.frequency.value = 1050;
          gain.gain.setValueAtTime(0.15, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          osc.start(now);
          osc.stop(now + 0.1);
        } else if (type === 'done') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(600, now);
          osc.frequency.setValueAtTime(920, now + 0.1);
          gain.gain.setValueAtTime(0.12, now);
          gain.gain.linearRampToValueAtTime(0, now + 0.3);
          osc.start(now);
          osc.stop(now + 0.3);
        } else if (type === 'delete' || type === 'longpress') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(150, now);
          osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
          filter.type = 'lowpass';
          filter.frequency.value = 380;
          gain.gain.setValueAtTime(0.18, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
          osc.start(now);
          osc.stop(now + 0.15);
        }
      } catch (error) {
        console.warn('Audio not supported', error);
      }
    }

    const APP_TITLE = 'WorkFlow';
    const CONFIG_STORAGE_KEY = 'workflow_config_v2';
    const PROJECTS_STORAGE_KEY = 'workflow_projects_v2';
    const WORKSPACES_STORAGE_KEY = 'workflow_workspaces_v1';
    const WORKSPACE_CONFIGS_STORAGE_KEY = 'workflow_workspace_configs_v1';
    const ACTIVE_WORKSPACE_STORAGE_KEY = 'workflow_active_workspace_v1';
    const UI_STATE_STORAGE_KEY = 'workflow_ui_state_v1';
    const LEGACY_PROJECTS_STORAGE_KEY = 'tk_workflow_data';
    const MANAGED_STORAGE_KEYS = [
      CONFIG_STORAGE_KEY,
      PROJECTS_STORAGE_KEY,
      WORKSPACES_STORAGE_KEY,
      WORKSPACE_CONFIGS_STORAGE_KEY,
      ACTIVE_WORKSPACE_STORAGE_KEY,
      UI_STATE_STORAGE_KEY,
      LEGACY_PROJECTS_STORAGE_KEY
    ];
    const DEFAULT_WORKSPACE_NAME = 'Main Workspace';
    const STATUSES = ['Not started', 'Started', 'Half way', 'Almost done', 'Done', 'Pending', 'Not needed', 'Cancelled'];
    const COMPLETED_STATUSES = ['Done', 'Not needed', 'Cancelled'];

    const STATUS_STYLES = {
      'Not started': 'bg-zinc-900/50 text-zinc-500 border-zinc-800',
      'Started': 'bg-blue-950/60 text-blue-400 border-blue-900/50',
      'Half way': 'bg-indigo-950/60 text-indigo-400 border-indigo-900/50',
      'Almost done': 'bg-violet-950/60 text-violet-400 border-violet-900/50',
      'Done': 'bg-emerald-950/60 text-emerald-400 border-emerald-900/50 shadow-[0_0_15px_rgba(52,211,153,0.15)]',
      'Pending': 'bg-red-400/20 text-red-300 border-red-400/30',
      'Not needed': 'bg-zinc-800/30 text-zinc-600 border-zinc-700 border-dashed',
      'Cancelled': 'bg-red-950/50 text-red-500 border-red-900/50 line-through',
    };

    const PRINT_STYLES = {
      'Not started': 'bg-gray-100 text-gray-500 border-gray-200',
      'Started': 'bg-blue-50 text-blue-600 border-blue-200',
      'Half way': 'bg-indigo-50 text-indigo-600 border-indigo-200',
      'Almost done': 'bg-violet-50 text-violet-600 border-violet-200',
      'Done': 'bg-emerald-50 text-emerald-600 border-emerald-200',
      'Pending': 'bg-red-50 text-red-600 border-red-200',
      'Not needed': 'bg-gray-50 text-gray-400 border-gray-200 border-dashed',
      'Cancelled': 'bg-red-50 text-red-500 border-red-200 line-through',
    };

    const LEGACY_BASE = ['draftingScript', 'finalScript', 'mscScript', 'elevenLScript', 'workflowReady', 'audioReady', 'bRoll', 'microVeo', 'shortVeo', 'coreVeo'];
    const LEGACY_MICRO = ['micro_postEditingReady', 'micro_audio', 'micro_videoSync', 'micro_transactions', 'micro_textSetting', 'micro_videoEffects', 'micro_soundEffects', 'micro_bgm', 'micro_thumbnailSet', 'micro_finishingTouch', 'micro_finalCut', 'micro_uploaded'];
    const LEGACY_SHORT = ['short_microAdoption', 'short_audioAddition', 'short_videoSyncing', 'short_transactions', 'short_textSetting', 'short_videoEffects', 'short_soundEffects', 'short_bgm', 'short_thumbnailSet', 'short_finishingTouch', 'short_finalCut', 'short_uploaded'];
    const LEGACY_CORE = ['core_shortAdoption', 'core_audioAddition', 'core_videoSyncing', 'core_broll', 'core_transactions', 'core_textSetting', 'core_videoEffects', 'core_soundEffects', 'core_bgm', 'core_thumbnailSet', 'core_finishingTouch', 'core_finalCut', 'core_uploaded'];

    let expandedProjects = {};
    let activeTabs = {};
    let activeModal = null;
    let modalData = {};
    let pressTimer = null;
    let dragState = {
      draggedProjectId: null,
      dropTargetId: null,
      dropPosition: 'before',
      justDragged: false
    };
    let projectSearchQuery = '';
    let customizeScrollTop = 0;

    function generateId(prefix) {
      const safePrefix = prefix || 'id';
      return safePrefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function legacyLabel(key) {
      const withoutPrefix = key.replace(/^(micro|short|core)_/, '');
      const withSpaces = withoutPrefix.replace(/([A-Z])/g, ' $1').replace(/\bmsc\b/i, 'MSC').replace(/\bbgm\b/i, 'BGM').replace(/\byt\b/i, 'YT');
      return withSpaces.charAt(0).toUpperCase() + withSpaces.slice(1);
    }

    function escapeHTML(value) {
      if (value === null || value === undefined) return '';
      return String(value).replace(/[&<>'"]/g, function(tag) {
        return {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          "'": '&#39;',
          '"': '&quot;'
        }[tag] || tag;
      });
    }

    function normalizeDateValue(value) {
      if (!value) return '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
      const slashMatch = String(value).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (slashMatch) {
        const day = slashMatch[1].padStart(2, '0');
        const month = slashMatch[2].padStart(2, '0');
        return slashMatch[3] + '-' + month + '-' + day;
      }
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return '';
      const year = parsed.getFullYear();
      const month = String(parsed.getMonth() + 1).padStart(2, '0');
      const day = String(parsed.getDate()).padStart(2, '0');
      return year + '-' + month + '-' + day;
    }

    function formatDateDisplay(value, emptyLabel) {
      const normalized = normalizeDateValue(value);
      if (!normalized) return emptyLabel || 'Pick date';
      const date = new Date(normalized + 'T00:00:00');
      return new Intl.DateTimeFormat('en-GB', {
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      }).format(date);
    }

    function createStep(id, label) {
      return { id: id || generateId('step'), label: label || 'New Step' };
    }

    function createField(id, label, type) {
      const normalizedType = ['text', 'number', 'date'].includes(type) ? type : 'text';
      return { id: id || generateId('field'), label: label || 'New Field', type: normalizedType };
    }

    function createWorkspace(definition) {
      const source = definition || {};
      const rawName = typeof source.name === 'string' ? source.name.trim() : '';
      return {
        id: source.id || generateId('workspace'),
        name: rawName || DEFAULT_WORKSPACE_NAME,
        createdAt: Number(source.createdAt) || Date.now(),
      };
    }

    function normalizeAttachmentUrl(url) {
      const raw = typeof url === 'string' ? url.trim() : '';
      if (!raw) return '';
      if (/^[a-z]+:\/\//i.test(raw)) return raw;
      if (/^(docs|sheets)\.google\.com/i.test(raw)) return 'https://' + raw;
      if (/^www\./i.test(raw)) return 'https://' + raw;
      return raw;
    }

    function createFork(definition) {
      const source = definition || {};
      return {
        id: source.id || generateId('fork'),
        name: source.name || 'New Fork',
        icon: source.icon || 'layers-3',
        steps: Array.isArray(source.steps) ? source.steps.map(function(step) { return createStep(step.id, step.label); }) : [],
        fields: Array.isArray(source.fields) ? source.fields.map(function(field) { return createField(field.id, field.label, field.type); }) : [],
      };
    }

    function createDefaultConfig() {
      return {
        version: 2,
        forks: [
          createFork({
            id: 'base',
            name: 'Base',
            icon: 'film',
            steps: LEGACY_BASE.map(function(stepId) { return createStep(stepId, legacyLabel(stepId)); }),
          }),
          createFork({
            id: 'micro',
            name: 'Micro',
            icon: 'sparkles',
            steps: LEGACY_MICRO.map(function(stepId) { return createStep(stepId, legacyLabel(stepId)); }),
            fields: [
              createField('micro_realUploadDate', 'Real Upload Date', 'date'),
              createField('micro_instaViews', 'Insta Views', 'number'),
              createField('micro_fbViews', 'FB Views', 'number'),
              createField('micro_ytViews', 'YT Views', 'number'),
            ]
          }),
          createFork({
            id: 'short',
            name: 'Short',
            icon: 'scissors',
            steps: LEGACY_SHORT.map(function(stepId) { return createStep(stepId, legacyLabel(stepId)); }),
            fields: [
              createField('short_realUploadDate', 'Real Upload Date', 'date'),
              createField('short_instaViews', 'Insta Views', 'number'),
              createField('short_fbViews', 'FB Views', 'number'),
              createField('short_ytViews', 'YT Views', 'number'),
            ]
          }),
          createFork({
            id: 'core',
            name: 'Core',
            icon: 'play-circle',
            steps: LEGACY_CORE.map(function(stepId) { return createStep(stepId, legacyLabel(stepId)); }),
            fields: [
              createField('core_realUploadDate', 'Real Upload Date', 'date'),
              createField('core_instaViews', 'Insta Views', 'number'),
              createField('core_fbViews', 'FB Views', 'number'),
              createField('core_ytViews', 'YT Views', 'number'),
            ]
          }),
        ]
      };
    }

    function normalizeConfig(rawConfig) {
      const config = rawConfig && Array.isArray(rawConfig.forks) ? rawConfig : createDefaultConfig();
      const forks = config.forks.map(function(fork) { return createFork(fork); });
      return { version: 2, forks: forks.length ? forks : createDefaultConfig().forks };
    }

    function normalizeWorkspaces(rawWorkspaces) {
      const source = Array.isArray(rawWorkspaces) ? rawWorkspaces : [];
      const seen = {};
      const workspaces = source.map(function(workspace) {
        return createWorkspace(workspace);
      }).filter(function(workspace) {
        if (seen[workspace.id]) return false;
        seen[workspace.id] = true;
        return true;
      });
      return workspaces.length ? workspaces : [createWorkspace({ id: 'workspace_main', name: DEFAULT_WORKSPACE_NAME })];
    }

    function normalizeActivityEntry(entry, index) {
      const source = entry || {};
      if (!source.message) return null;
      return {
        id: source.id || generateId('activity_' + index),
        message: String(source.message),
        timestamp: Number(source.timestamp) || Date.now(),
        signature: typeof source.signature === 'string' ? source.signature : '',
      };
    }

    function normalizeAttachment(attachment, index) {
      const source = attachment || {};
      const label = typeof source.label === 'string' ? source.label.trim() : '';
      const url = normalizeAttachmentUrl(source.url);
      if (!label && !url) return null;
      return {
        id: source.id || generateId('attachment_' + index),
        label: label || url || ('Reference ' + (index + 1)),
        url: url || label,
      };
    }

    function buildDefaultForkData(fork) {
      const stepStatus = {};
      const fieldValues = {};
      fork.steps.forEach(function(step) { stepStatus[step.id] = 'Not started'; });
      fork.fields.forEach(function(field) { fieldValues[field.id] = field.type === 'number' ? 0 : ''; });
      return { stepStatus: stepStatus, fieldValues: fieldValues };
    }

    function syncProjectToConfig(project, currentConfig, currentWorkspaces) {
      const source = project || {};
      const safeWorkspaces = normalizeWorkspaces(currentWorkspaces);
      const workspaceIds = safeWorkspaces.map(function(workspace) { return workspace.id; });
      const defaultWorkspaceId = workspaceIds[0];
      const nextProject = {
        id: source.id || generateId('project'),
        topic: typeof source.topic === 'string' ? source.topic : '',
        uploadDate: normalizeDateValue(source.uploadDate),
        workingDate: normalizeDateValue(source.workingDate),
        createdAt: Number(source.createdAt) || Date.now(),
        lastEditedAt: Number(source.lastEditedAt) || Number(source.createdAt) || Date.now(),
        workspaceId: workspaceIds.includes(source.workspaceId) ? source.workspaceId : defaultWorkspaceId,
        pinned: !!source.pinned,
        archived: !!source.archived,
        notes: typeof source.notes === 'string' ? source.notes : '',
        attachments: Array.isArray(source.attachments) ? source.attachments.map(normalizeAttachment).filter(Boolean) : [],
        activityLog: Array.isArray(source.activityLog) ? source.activityLog.map(normalizeActivityEntry).filter(Boolean) : [],
        forkData: {}
      };
      currentConfig.forks.forEach(function(fork) {
        const existingForkData = source.forkData && source.forkData[fork.id] ? source.forkData[fork.id] : {};
        const defaultForkData = buildDefaultForkData(fork);
        const stepStatus = {};
        const fieldValues = {};
        fork.steps.forEach(function(step) {
          const existingStatus = existingForkData.stepStatus ? existingForkData.stepStatus[step.id] : undefined;
          stepStatus[step.id] = STATUSES.includes(existingStatus) ? existingStatus : defaultForkData.stepStatus[step.id];
        });
        fork.fields.forEach(function(field) {
          const existingValue = existingForkData.fieldValues ? existingForkData.fieldValues[field.id] : undefined;
          if (existingValue === undefined || existingValue === null) {
            fieldValues[field.id] = defaultForkData.fieldValues[field.id];
          } else if (field.type === 'date') {
            fieldValues[field.id] = normalizeDateValue(existingValue);
          } else {
            fieldValues[field.id] = existingValue;
          }
        });
        nextProject.forkData[fork.id] = { stepStatus: stepStatus, fieldValues: fieldValues };
      });
      return nextProject;
    }

    function migrateLegacyProject(legacyProject) {
      const defaultConfig = createDefaultConfig();
      const migrated = {
        id: legacyProject && legacyProject.id ? legacyProject.id : generateId('project'),
        topic: legacyProject && legacyProject.topic ? legacyProject.topic : '',
        uploadDate: normalizeDateValue(legacyProject && legacyProject.uploadDate),
        workingDate: normalizeDateValue(legacyProject && legacyProject.workingDate),
        createdAt: legacyProject && legacyProject.createdAt ? legacyProject.createdAt : Date.now(),
        lastEditedAt: legacyProject && legacyProject.createdAt ? legacyProject.createdAt : Date.now(),
        workspaceId: 'workspace_main',
        pinned: false,
        archived: false,
        notes: '',
        attachments: [],
        activityLog: [],
        forkData: {}
      };
      defaultConfig.forks.forEach(function(fork) {
        const stepStatus = {};
        const fieldValues = {};
        fork.steps.forEach(function(step) {
          const candidate = legacyProject ? legacyProject[step.id] : undefined;
          stepStatus[step.id] = STATUSES.includes(candidate) ? candidate : 'Not started';
        });
        fork.fields.forEach(function(field) {
          const candidate = legacyProject ? legacyProject[field.id] : undefined;
          if (candidate === undefined || candidate === null || candidate === '') {
            fieldValues[field.id] = field.type === 'number' ? 0 : '';
          } else if (field.type === 'date') {
            fieldValues[field.id] = normalizeDateValue(candidate);
          } else {
            fieldValues[field.id] = candidate;
          }
        });
        migrated.forkData[fork.id] = { stepStatus: stepStatus, fieldValues: fieldValues };
      });
      return migrated;
    }

    function readStorageJson(key, fallbackValue) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallbackValue;
        return JSON.parse(raw);
      } catch (error) {
        console.warn('Failed to read localStorage for', key, error);
        return fallbackValue;
      }
    }

    function normalizeUiState(rawState) {
      const source = rawState && typeof rawState === 'object' ? rawState : {};
      const nextExpandedProjects = {};
      const nextActiveTabs = {};
      if (source.expandedProjects && typeof source.expandedProjects === 'object') {
        Object.keys(source.expandedProjects).forEach(function(projectId) {
          if (source.expandedProjects[projectId]) nextExpandedProjects[projectId] = true;
        });
      }
      if (source.activeTabs && typeof source.activeTabs === 'object') {
        Object.keys(source.activeTabs).forEach(function(projectId) {
          if (typeof source.activeTabs[projectId] === 'string' && source.activeTabs[projectId]) {
            nextActiveTabs[projectId] = source.activeTabs[projectId];
          }
        });
      }
      return {
        expandedProjects: nextExpandedProjects,
        activeTabs: nextActiveTabs,
        projectSearchQuery: typeof source.projectSearchQuery === 'string' ? source.projectSearchQuery : '',
      };
    }

    function loadUiState() {
      return normalizeUiState(readStorageJson(UI_STATE_STORAGE_KEY, {}));
    }

    function applyUiState(rawState) {
      const nextUiState = normalizeUiState(rawState);
      expandedProjects = nextUiState.expandedProjects;
      activeTabs = nextUiState.activeTabs;
      projectSearchQuery = nextUiState.projectSearchQuery;
    }

    function captureUiState() {
      return normalizeUiState({
        expandedProjects: expandedProjects,
        activeTabs: activeTabs,
        projectSearchQuery: projectSearchQuery
      });
    }

    function captureManagedStorage() {
      const snapshot = {};
      snapshot[CONFIG_STORAGE_KEY] = JSON.stringify(workspaceConfigs[workspaces[0].id] || config);
      snapshot[PROJECTS_STORAGE_KEY] = JSON.stringify(projects);
      snapshot[WORKSPACES_STORAGE_KEY] = JSON.stringify(workspaces);
      snapshot[WORKSPACE_CONFIGS_STORAGE_KEY] = JSON.stringify(workspaceConfigs);
      snapshot[ACTIVE_WORKSPACE_STORAGE_KEY] = activeWorkspaceId;
      snapshot[UI_STATE_STORAGE_KEY] = JSON.stringify(captureUiState());
      const legacyRaw = localStorage.getItem(LEGACY_PROJECTS_STORAGE_KEY);
      if (legacyRaw !== null) snapshot[LEGACY_PROJECTS_STORAGE_KEY] = legacyRaw;
      return snapshot;
    }

    function restoreManagedStorage(storageSnapshot) {
      if (!storageSnapshot || typeof storageSnapshot !== 'object' || Array.isArray(storageSnapshot)) return false;
      MANAGED_STORAGE_KEYS.forEach(function(key) {
        if (typeof storageSnapshot[key] === 'string') localStorage.setItem(key, storageSnapshot[key]);
        else localStorage.removeItem(key);
      });
      return true;
    }

    function loadConfig() {
      const storedConfig = readStorageJson(CONFIG_STORAGE_KEY, null);
      return normalizeConfig(storedConfig);
    }

    function loadWorkspaces() {
      const storedWorkspaces = readStorageJson(WORKSPACES_STORAGE_KEY, null);
      return normalizeWorkspaces(storedWorkspaces);
    }

    function loadWorkspaceConfigs(currentWorkspaces, fallbackConfig) {
      const storedConfigs = readStorageJson(WORKSPACE_CONFIGS_STORAGE_KEY, {});
      const configs = {};
      currentWorkspaces.forEach(function(workspace, index) {
        const fromStorage = storedConfigs && storedConfigs[workspace.id];
        configs[workspace.id] = normalizeConfig(fromStorage || (index === 0 ? fallbackConfig : createDefaultConfig()));
      });
      return configs;
    }

    function loadActiveWorkspaceId(currentWorkspaces) {
      const workspaceIds = currentWorkspaces.map(function(workspace) { return workspace.id; });
      const storedWorkspaceId = localStorage.getItem(ACTIVE_WORKSPACE_STORAGE_KEY);
      return workspaceIds.includes(storedWorkspaceId) ? storedWorkspaceId : workspaceIds[0];
    }

    function loadProjects(currentConfig, currentWorkspaces, currentWorkspaceConfigs) {
      const storedProjects = readStorageJson(PROJECTS_STORAGE_KEY, null);
      if (Array.isArray(storedProjects)) {
        return storedProjects.map(function(project) {
          const workspaceId = project && project.workspaceId ? project.workspaceId : currentWorkspaces[0].id;
          const workspaceConfig = currentWorkspaceConfigs && currentWorkspaceConfigs[workspaceId] ? normalizeConfig(currentWorkspaceConfigs[workspaceId]) : currentConfig;
          return syncProjectToConfig(project, workspaceConfig, currentWorkspaces);
        });
      }
      const legacyProjects = readStorageJson(LEGACY_PROJECTS_STORAGE_KEY, []);
      if (Array.isArray(legacyProjects)) {
        return legacyProjects.map(function(project) {
          return syncProjectToConfig(migrateLegacyProject(project), currentConfig, currentWorkspaces);
        });
      }
      return [];
    }

    let config = loadConfig();
    let workspaces = loadWorkspaces();
    let workspaceConfigs = loadWorkspaceConfigs(workspaces, config);
    let activeWorkspaceId = loadActiveWorkspaceId(workspaces);
    config = normalizeConfig(workspaceConfigs[activeWorkspaceId] || createDefaultConfig());
    let projects = loadProjects(config, workspaces, workspaceConfigs);
    applyUiState(loadUiState());

    function reloadStateFromStorage() {
      config = loadConfig();
      workspaces = loadWorkspaces();
      workspaceConfigs = loadWorkspaceConfigs(workspaces, config);
      activeWorkspaceId = loadActiveWorkspaceId(workspaces);
      config = normalizeConfig(workspaceConfigs[activeWorkspaceId] || createDefaultConfig());
      projects = loadProjects(config, workspaces, workspaceConfigs);
      applyUiState(loadUiState());
      syncAllProjects();
    }

    function saveState() {
      workspaceConfigs[activeWorkspaceId] = normalizeConfig(config);
      localStorage.setItem(CONFIG_STORAGE_KEY, JSON.stringify(workspaceConfigs[workspaces[0].id] || config));
      localStorage.setItem(PROJECTS_STORAGE_KEY, JSON.stringify(projects));
      localStorage.setItem(WORKSPACES_STORAGE_KEY, JSON.stringify(workspaces));
      localStorage.setItem(WORKSPACE_CONFIGS_STORAGE_KEY, JSON.stringify(workspaceConfigs));
      localStorage.setItem(ACTIVE_WORKSPACE_STORAGE_KEY, activeWorkspaceId);
      localStorage.setItem(UI_STATE_STORAGE_KEY, JSON.stringify(captureUiState()));
    }

    function ensureActiveTabs() {
      const validForkIds = config.forks.map(function(fork) { return fork.id; });
      const firstForkId = validForkIds[0];
      projects.forEach(function(project) {
        if (!activeTabs[project.id] || !validForkIds.includes(activeTabs[project.id])) {
          activeTabs[project.id] = firstForkId;
        }
      });
    }

    function getConfigForWorkspace(workspaceId) {
      if (!workspaceConfigs[workspaceId]) {
        workspaceConfigs[workspaceId] = createDefaultConfig();
      }
      workspaceConfigs[workspaceId] = normalizeConfig(workspaceConfigs[workspaceId]);
      return workspaceConfigs[workspaceId];
    }

    function syncAllProjects() {
      projects = projects.map(function(project) {
        return syncProjectToConfig(project, getConfigForWorkspace(project.workspaceId), workspaces);
      });
      if (!workspaces.some(function(workspace) { return workspace.id === activeWorkspaceId; })) {
        activeWorkspaceId = workspaces[0].id;
      }
      config = getConfigForWorkspace(activeWorkspaceId);
      ensureActiveTabs();
    }

    syncAllProjects();
    saveState();

    function getProjectById(projectId) {
      return projects.find(function(project) { return project.id === projectId; });
    }

    function getWorkspaceById(workspaceId) {
      return workspaces.find(function(workspace) { return workspace.id === workspaceId; }) || workspaces[0];
    }

    function getForkById(forkId) {
      return config.forks.find(function(fork) { return fork.id === forkId; });
    }

    function getFieldById(forkId, fieldId) {
      const fork = getForkById(forkId);
      return fork ? fork.fields.find(function(field) { return field.id === fieldId; }) : null;
    }

    function getStepById(forkId, stepId) {
      const fork = getForkById(forkId);
      return fork ? fork.steps.find(function(step) { return step.id === stepId; }) : null;
    }

    function getForkStatus(project, fork) {
      const forkState = project.forkData[fork.id];
      const activeSteps = fork.steps.filter(function(step) {
        const currentStatus = forkState && forkState.stepStatus ? forkState.stepStatus[step.id] : 'Not started';
        return currentStatus !== 'Not needed';
      });
      if (activeSteps.length === 0) return 'Done';
      if (activeSteps.some(function(step) { return forkState.stepStatus[step.id] === 'Cancelled'; })) return 'Cancelled';
      if (activeSteps.some(function(step) { return forkState.stepStatus[step.id] === 'Pending'; })) return 'Pending';
      if (activeSteps.every(function(step) { return forkState.stepStatus[step.id] === 'Done'; })) return 'Done';
      if (activeSteps.every(function(step) { return forkState.stepStatus[step.id] === 'Not started'; })) return 'Not started';
      return 'WIP';
    }

    function getBoxStyle(status) {
      if (status === 'Done') return 'bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.8)] border-emerald-400';
      if (status === 'Cancelled') return 'bg-red-800 border-red-600';
      if (status === 'Pending') return 'bg-red-400 border-red-300';
      if (status === 'WIP') return 'bg-yellow-500 shadow-[0_0_8px_rgba(234,179,8,0.5)] border-yellow-400';
      return 'bg-transparent border-zinc-700/50';
    }

    function touchProject(project) {
      if (!project) return;
      project.lastEditedAt = Date.now();
    }

    function appendProjectActivity(project, message, signature) {
      if (!project || !message) return;
      project.activityLog = Array.isArray(project.activityLog) ? project.activityLog : [];
      project.activityLog.unshift({
        id: generateId('activity'),
        message: message,
        timestamp: Date.now(),
        signature: signature || '',
      });
      touchProject(project);
    }

    function buildActivityMessage(scope, detail) {
      const safeScope = String(scope || 'PROJECT').trim().toUpperCase();
      return safeScope + ': ' + detail;
    }

    function removeProjectActivityBySignature(project, signature) {
      if (!project || !signature || !Array.isArray(project.activityLog)) return;
      project.activityLog = project.activityLog.filter(function(entry) {
        return entry.signature !== signature;
      });
    }

    function formatActivityTimestamp(value) {
      const timestamp = Number(value) || Date.now();
      return new Intl.DateTimeFormat('en-GB', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      }).format(new Date(timestamp));
    }

    function formatRelativeTime(value) {
      const timestamp = Number(value);
      if (!timestamp) return 'Just now';
      const diffMs = Date.now() - timestamp;
      const diffMinutes = Math.max(1, Math.round(diffMs / 60000));
      if (diffMinutes < 60) return diffMinutes + 'm ago';
      const diffHours = Math.round(diffMinutes / 60);
      if (diffHours < 24) return diffHours + 'h ago';
      const diffDays = Math.round(diffHours / 24);
      if (diffDays < 7) return diffDays + 'd ago';
      return new Intl.DateTimeFormat('en-GB', { day: 'numeric', month: 'short' }).format(new Date(timestamp));
    }

    function getProgressStats(project) {
      const allSteps = config.forks.reduce(function(total, fork) {
        return total + fork.steps.length;
      }, 0);
      if (!allSteps) return { done: 0, total: 0, percent: 0 };
      let completedSteps = 0;
      config.forks.forEach(function(fork) {
        fork.steps.forEach(function(step) {
          const value = project.forkData[fork.id] && project.forkData[fork.id].stepStatus ? project.forkData[fork.id].stepStatus[step.id] : 'Not started';
          if (COMPLETED_STATUSES.includes(value)) completedSteps += 1;
        });
      });
      return {
        done: completedSteps,
        total: allSteps,
        percent: Math.round((completedSteps / allSteps) * 100),
      };
    }

    function estimateCompletionLabel(project) {
      const progress = getProgressStats(project);
      if (!progress.total || progress.percent === 0) return 'ETA after progress starts';
      if (project.uploadDate) return formatDateDisplay(project.uploadDate, 'TBD');
      if (progress.percent >= 100) return 'Completed';
      const fraction = progress.percent / 100;
      const elapsedDays = Math.max(1, (Date.now() - Number(project.createdAt || Date.now())) / 86400000);
      const projectedTotalDays = elapsedDays / fraction;
      const remainingDays = Math.max(0, Math.ceil(projectedTotalDays - elapsedDays));
      const estimatedDate = new Date(Date.now() + (remainingDays * 86400000));
      return formatDateDisplay(estimatedDate.toISOString().slice(0, 10), 'TBD');
    }

    function matchesProjectSearch(project) {
      if (!projectSearchQuery.trim()) return true;
      return (project.topic || '').toLowerCase().includes(projectSearchQuery.trim().toLowerCase());
    }

    function getWorkspaceProjects(workspaceId) {
      return projects.filter(function(project) {
        return project.workspaceId === workspaceId;
      });
    }

    function sortProjectsForDisplay(projectList) {
      const pinnedProjects = [];
      const regularProjects = [];
      projectList.forEach(function(project) {
        if (project.pinned) pinnedProjects.push(project);
        else regularProjects.push(project);
      });
      return pinnedProjects.concat(regularProjects);
    }

    function getVisibleProjects(options) {
      const settings = options || {};
      const includeArchived = !!settings.archived;
      return sortProjectsForDisplay(getWorkspaceProjects(activeWorkspaceId).filter(function(project) {
        return project.archived === includeArchived && matchesProjectSearch(project);
      }));
    }

    function getWorkspaceOverviewProjects() {
      return sortProjectsForDisplay(getWorkspaceProjects(activeWorkspaceId));
    }

    function setActiveWorkspace(workspaceId) {
      if (!workspaces.some(function(workspace) { return workspace.id === workspaceId; })) return;
      workspaceConfigs[activeWorkspaceId] = normalizeConfig(config);
      activeWorkspaceId = workspaceId;
      config = getConfigForWorkspace(activeWorkspaceId);
      saveState();
      render();
    }

    function addWorkspace() {
      const name = window.prompt('Workspace name?', 'New Workspace');
      if (name === null) return;
      const trimmedName = name.trim();
      if (!trimmedName) return;
      const workspace = createWorkspace({ name: trimmedName });
      workspaces.push(workspace);
      workspaceConfigs[workspace.id] = createDefaultConfig();
      activeWorkspaceId = workspace.id;
      config = getConfigForWorkspace(activeWorkspaceId);
      saveState();
      render();
    }

    function renameActiveWorkspace() {
      const workspace = getWorkspaceById(activeWorkspaceId);
      const nextName = window.prompt('Rename workspace', workspace.name);
      if (nextName === null) return;
      const trimmedName = nextName.trim();
      if (!trimmedName) return;
      workspace.name = trimmedName;
      saveState();
      render();
    }

    function deleteActiveWorkspace() {
      if (workspaces.length === 1) {
        alert('Keep at least one workspace.');
        return;
      }
      const workspace = getWorkspaceById(activeWorkspaceId);
      const targetWorkspace = workspaces.find(function(item) { return item.id !== activeWorkspaceId; });
      if (!window.confirm('Delete "' + workspace.name + '"? Its projects will move to "' + targetWorkspace.name + '".')) return;
      delete workspaceConfigs[activeWorkspaceId];
      projects = projects.map(function(project) {
        if (project.workspaceId !== activeWorkspaceId) return project;
        project.workspaceId = targetWorkspace.id;
        touchProject(project);
        appendProjectActivity(project, buildActivityMessage('WORKSPACE', 'Moved to ' + targetWorkspace.name), 'workspace-move:' + targetWorkspace.id);
        return syncProjectToConfig(project, getConfigForWorkspace(targetWorkspace.id), workspaces);
      });
      workspaces = workspaces.filter(function(item) {
        return item.id !== activeWorkspaceId;
      });
      activeWorkspaceId = targetWorkspace.id;
      config = getConfigForWorkspace(activeWorkspaceId);
      saveState();
      render();
    }

    function updateProjectWorkspace(projectId, workspaceId) {
      const project = getProjectById(projectId);
      if (!project || !workspaces.some(function(workspace) { return workspace.id === workspaceId; })) return;
      const previousWorkspace = getWorkspaceById(project.workspaceId);
      if (project.workspaceId === workspaceId) return;
      project.workspaceId = workspaceId;
      appendProjectActivity(project, buildActivityMessage('WORKSPACE', 'Changed from ' + previousWorkspace.name + ' to ' + getWorkspaceById(workspaceId).name), 'workspace-change:' + workspaceId);
      touchProject(project);
      const syncedProject = syncProjectToConfig(project, getConfigForWorkspace(workspaceId), workspaces);
      projects = projects.map(function(item) {
        return item.id === projectId ? syncedProject : item;
      });
      saveState();
      render();
    }

    function toggleProjectPinned(projectId) {
      const project = getProjectById(projectId);
      if (!project) return;
      project.pinned = !project.pinned;
      touchProject(project);
      saveState();
      render();
    }

    function toggleProjectArchived(projectId) {
      const project = getProjectById(projectId);
      if (!project) return;
      project.archived = !project.archived;
      appendProjectActivity(project, buildActivityMessage('PROJECT', project.archived ? 'Archived' : 'Restored'), 'project-archived');
      touchProject(project);
      saveState();
      render();
    }

    function updateProjectNotes(projectId, value, shouldRender) {
      const project = getProjectById(projectId);
      if (!project) return;
      const previousValue = project.notes || '';
      project.notes = value;
      if (shouldRender !== false && previousValue !== value) {
        appendProjectActivity(project, buildActivityMessage('PROJECT', 'Notes updated'), 'project-notes');
      }
      touchProject(project);
      saveState();
      if (shouldRender !== false) render();
    }

    function openProjectLog(projectId) {
      activeModal = 'log';
      modalData = { projectId: projectId };
      render();
    }

    function addProjectAttachment(projectId) {
      const project = getProjectById(projectId);
      if (!project) return;
      const label = window.prompt('Attachment label?', 'Script doc');
      if (label === null) return;
      const url = window.prompt('Attachment link or file/path reference?', 'https://');
      if (url === null) return;
      const normalized = normalizeAttachment({ label: label, url: url }, project.attachments.length);
      if (!normalized) return;
      project.attachments.push(normalized);
      appendProjectActivity(project, buildActivityMessage('PROJECT', 'Attachment added: ' + normalized.label), 'attachment:' + normalized.id);
      touchProject(project);
      saveState();
      render();
    }

    function removeProjectAttachment(projectId, attachmentId) {
      const project = getProjectById(projectId);
      if (!project) return;
      project.attachments = project.attachments.filter(function(attachment) {
        return attachment.id !== attachmentId;
      });
      appendProjectActivity(project, buildActivityMessage('PROJECT', 'Attachment removed'), 'attachment-removed:' + attachmentId);
      touchProject(project);
      saveState();
      render();
    }

    function withConfigMutation(mutator, shouldRender) {
      const draft = normalizeConfig(JSON.parse(JSON.stringify(config)));
      mutator(draft);
      config = normalizeConfig(draft);
      workspaceConfigs[activeWorkspaceId] = config;
      projects = projects.map(function(project) {
        return project.workspaceId === activeWorkspaceId ? syncProjectToConfig(project, config, workspaces) : project;
      });
      ensureActiveTabs();
      saveState();
      if (shouldRender !== false) render();
    }

    function createNewProject() {
      return syncProjectToConfig({
        id: generateId('project'),
        topic: '',
        uploadDate: '',
        workingDate: '',
        createdAt: Date.now(),
        lastEditedAt: Date.now(),
        workspaceId: activeWorkspaceId,
        pinned: false,
        archived: false,
        notes: '',
        attachments: [],
        forkData: {}
      }, config, workspaces);
    }

    function addProject() {
      playSound('pop');
      const project = createNewProject();
      appendProjectActivity(project, buildActivityMessage('PROJECT', 'Created'), 'project-created');
      projects.unshift(project);
      expandedProjects[project.id] = true;
      activeTabs[project.id] = config.forks[0] ? config.forks[0].id : null;
      saveState();
      render();
    }

    function updateProjectValue(projectId, field, value, shouldRender) {
      const project = getProjectById(projectId);
      if (!project) return;
      const previousValue = project[field];
      project[field] = field === 'uploadDate' || field === 'workingDate' ? normalizeDateValue(value) : value;
      if (shouldRender !== false && previousValue !== project[field]) {
        const labels = { topic: 'Project title', uploadDate: 'Upload date', workingDate: 'Working date' };
        appendProjectActivity(project, buildActivityMessage('PROJECT', (labels[field] || field) + ' updated to ' + (project[field] || 'blank')), 'project-field:' + field);
      }
      touchProject(project);
      saveState();
      if (shouldRender !== false) render();
    }

    function updateStepStatus(projectId, forkId, stepId, status) {
      const project = getProjectById(projectId);
      if (!project || !STATUSES.includes(status)) return;
      const previousStatus = project.forkData[forkId].stepStatus[stepId];
      if (previousStatus === status) return;
      project.forkData[forkId].stepStatus[stepId] = status;
      const fork = getForkById(forkId);
      const step = getStepById(forkId, stepId);
      const stepLabel = step ? step.label : stepId;
      const scopeLabel = fork ? fork.name : 'PROJECT';
      const doneSignature = 'step-done:' + forkId + ':' + stepId;
      if (status !== 'Done') removeProjectActivityBySignature(project, doneSignature);
      appendProjectActivity(project, buildActivityMessage(scopeLabel, stepLabel + ' set to ' + status), status === 'Done' ? doneSignature : 'step-status:' + forkId + ':' + stepId + ':' + status);
      touchProject(project);
      saveState();
      render();
    }

    function updateForkFieldValue(projectId, forkId, fieldId, value, shouldRender) {
      const project = getProjectById(projectId);
      const field = getFieldById(forkId, fieldId);
      if (!project || !field) return;
      const previousValue = project.forkData[forkId].fieldValues[fieldId];
      project.forkData[forkId].fieldValues[fieldId] = field.type === 'date' ? normalizeDateValue(value) : value;
      if (shouldRender !== false && previousValue !== project.forkData[forkId].fieldValues[fieldId]) {
        const fork = getForkById(forkId);
        appendProjectActivity(project, buildActivityMessage(fork ? fork.name : 'PROJECT', field.label + ' updated to ' + (project.forkData[forkId].fieldValues[fieldId] || 'blank')), 'fork-field:' + forkId + ':' + fieldId);
      }
      touchProject(project);
      saveState();
      if (shouldRender !== false) render();
    }

    function bulkUpdate(projectId, forkId, value) {
      const project = getProjectById(projectId);
      const fork = getForkById(forkId);
      if (!project || !fork || !STATUSES.includes(value)) return;
      playSound(value === 'Done' ? 'done' : 'delete');
      fork.steps.forEach(function(step) {
        project.forkData[forkId].stepStatus[step.id] = value;
      });
      touchProject(project);
      saveState();
      closeModal();
    }

    function deleteProject() {
      playSound('delete');
      projects = projects.filter(function(project) {
        return project.id !== modalData.projectId;
      });
      delete expandedProjects[modalData.projectId];
      delete activeTabs[modalData.projectId];
      saveState();
      closeModal();
    }

    function toggleExpand(projectId) {
      playSound('click');
      expandedProjects[projectId] = !expandedProjects[projectId];
      ensureActiveTabs();
      render();
    }

    function switchTab(projectId, forkId) {
      playSound('click');
      activeTabs[projectId] = forkId;
      render();
    }

    function openStatusModal(projectId, forkId, stepId) {
      activeModal = 'status';
      modalData = { projectId: projectId, forkId: forkId, stepId: stepId };
      render();
    }

    function openBulkModal(projectId, forkId) {
      activeModal = 'bulk';
      modalData = { projectId: projectId, forkId: forkId };
      render();
    }

    function openDeleteModal(projectId) {
      activeModal = 'delete';
      modalData = { projectId: projectId };
      render();
    }

    function openCustomizeModal() {
      activeModal = 'customize';
      modalData = {};
      render();
    }

    function setProjectSearchQuery(value) {
      projectSearchQuery = value || '';
      render();
    }

    function isInteractiveElement(target) {
      return !!(target && target.closest('input, button, label, select, textarea, a'));
    }

    function clearProjectDragClasses() {
      document.querySelectorAll('[data-project-card]').forEach(function(card) {
        card.classList.remove('project-dragging', 'project-drop-before', 'project-drop-after');
      });
    }

    function getProjectDropPosition(element, clientY) {
      const rect = element.getBoundingClientRect();
      return clientY >= rect.top + rect.height / 2 ? 'after' : 'before';
    }

    function moveProject(draggedProjectId, targetProjectId, position) {
      const fromIndex = projects.findIndex(function(project) { return project.id === draggedProjectId; });
      const targetIndex = projects.findIndex(function(project) { return project.id === targetProjectId; });
      if (fromIndex === -1 || targetIndex === -1 || draggedProjectId === targetProjectId) return;

      const movedProject = projects.splice(fromIndex, 1)[0];
      let insertAt = projects.findIndex(function(project) { return project.id === targetProjectId; });
      if (position === 'after') insertAt += 1;
      projects.splice(insertAt, 0, movedProject);
      saveState();
      render();
    }

    function handleProjectHeaderClick(projectId) {
      if (dragState.justDragged) {
        dragState.justDragged = false;
        return;
      }
      toggleExpand(projectId);
    }

    function startProjectDrag(event, projectId) {
      if (isInteractiveElement(event.target)) {
        event.preventDefault();
        return false;
      }
      dragState.draggedProjectId = projectId;
      dragState.dropTargetId = null;
      dragState.dropPosition = 'before';
      dragState.justDragged = true;
      clearProjectDragClasses();
      const card = event.currentTarget.closest('[data-project-card]');
      if (card) card.classList.add('project-dragging');
      if (event.dataTransfer) {
        event.dataTransfer.effectAllowed = 'move';
        event.dataTransfer.setData('text/plain', projectId);
      }
      return true;
    }

    function handleProjectDragOver(event, projectId) {
      if (!dragState.draggedProjectId) return;
      event.preventDefault();
      if (dragState.draggedProjectId === projectId) return;

      const card = event.currentTarget.closest('[data-project-card]');
      if (!card) return;

      const nextPosition = getProjectDropPosition(card, event.clientY);
      if (dragState.dropTargetId === projectId && dragState.dropPosition === nextPosition) return;

      clearProjectDragClasses();
      const draggedCard = document.querySelector('[data-project-card="' + dragState.draggedProjectId + '"]');
      if (draggedCard) draggedCard.classList.add('project-dragging');
      card.classList.add(nextPosition === 'after' ? 'project-drop-after' : 'project-drop-before');
      dragState.dropTargetId = projectId;
      dragState.dropPosition = nextPosition;
      if (event.dataTransfer) event.dataTransfer.dropEffect = 'move';
    }

    function endProjectDrag() {
      dragState.draggedProjectId = null;
      dragState.dropTargetId = null;
      dragState.dropPosition = 'before';
      clearProjectDragClasses();
      window.setTimeout(function() {
        dragState.justDragged = false;
      }, 0);
    }

    function handleProjectDrop(event, projectId) {
      if (!dragState.draggedProjectId) return;
      event.preventDefault();
      const draggedProjectId = dragState.draggedProjectId;
      const card = event.currentTarget.closest('[data-project-card]');
      const dropPosition = dragState.dropTargetId === projectId && dragState.dropPosition
        ? dragState.dropPosition
        : (card ? getProjectDropPosition(card, event.clientY) : 'before');
      endProjectDrag();
      if (draggedProjectId !== projectId) {
        moveProject(draggedProjectId, projectId, dropPosition);
      }
    }

    function closeModal() {
      activeModal = null;
      modalData = {};
      render();
    }

    function startPress(event, projectId, forkId) {
      if (event.type === 'touchstart') event.preventDefault();
      pressTimer = setTimeout(function() {
        playSound('longpress');
        openBulkModal(projectId, forkId);
      }, 500);
    }

    function cancelPress(event, projectId, forkId) {
      if (pressTimer) clearTimeout(pressTimer);
      if (event.type === 'mouseup' || event.type === 'touchend') {
        switchTab(projectId, forkId);
      }
    }

    function handlePrint() {
      render();
      setTimeout(function() { window.print(); }, 100);
    }

    function moveItem(list, currentIndex, direction) {
      const targetIndex = currentIndex + direction;
      if (currentIndex < 0 || targetIndex < 0 || targetIndex >= list.length) return;
      const removed = list.splice(currentIndex, 1)[0];
      list.splice(targetIndex, 0, removed);
    }

    function addFork() {
      const fork = createFork({
        name: 'New Fork',
        icon: 'layers-3',
        steps: [createStep(null, 'First Step')],
      });
      withConfigMutation(function(draft) {
        draft.forks.push(fork);
      });
    }

    function updateForkSetting(forkId, field, value, shouldRender) {
      withConfigMutation(function(draft) {
        const fork = draft.forks.find(function(item) { return item.id === forkId; });
        if (!fork) return;
        fork[field] = value;
      }, shouldRender);
    }

    function moveFork(forkId, direction) {
      withConfigMutation(function(draft) {
        const index = draft.forks.findIndex(function(fork) { return fork.id === forkId; });
        moveItem(draft.forks, index, direction);
      });
    }

    function removeFork(forkId) {
      if (config.forks.length === 1) {
        alert('Keep at least one fork in the workflow.');
        return;
      }
      if (!window.confirm('Remove this fork from every project?')) return;
      withConfigMutation(function(draft) {
        draft.forks = draft.forks.filter(function(fork) {
          return fork.id !== forkId;
        });
      });
    }

      withConfigMutation(function(draft) {
        const fork = draft.forks.find(function(item) { return item.id === forkId; });

        fork.steps.push(createStep(null, 'New Step'));

      withConfigMutation(function(draft) {
        const fork = draft.forks.find(function(item) { return item.id === forkId; });
        if (!fork) return;
        const step = fork.steps.find(function(item) { return item.id === stepId; });

    }

    function moveStep(forkId, stepId, direction) {

        const fork = draft.forks.find(function(item) { return item.id === forkId; });
        if (!fork) return;
        const index = fork.steps.findIndex(function(step) { return step.id === stepId; });

        fork.fields.push(createField(null, 'New Field', 'text'));

    function updateFieldConfig(forkId, fieldId, property, value, shouldRender) {
      withConfigMutation(function(draft) {
        const fork = draft.forks.find(function(item) { return item.id === forkId; });
        if (!fork) return;
        const field = fork.fields.find(function(item) { return item.id === fieldId; });
        if (!field) return;
        field[property] = property === 'type' ? (['text', 'number', 'date'].includes(value) ? value : 'text') : value;
      }, shouldRender);
    }

    function moveField(forkId, fieldId, direction) {
      withConfigMutation(function(draft) {
        const fork = draft.forks.find(function(item) { return item.id === forkId; });
        if (!fork) return;

      withConfigMutation(function(draft) {

    function downloadDataJson() {
      playSound('pop');
      const payload = {
        version: 5,
        exportedAt: new Date().toISOString(),
        config: config,
        workspaceConfigs: workspaceConfigs,
        workspaces: workspaces,
        activeWorkspaceId: activeWorkspaceId,
        projects: projects,
        uiState: captureUiState(),
        storage: captureManagedStorage()
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = url;
      anchor.download = 'workflow-data.json';
      document.body.appendChild(anchor);
      anchor.click();
      document.body.removeChild(anchor);
      URL.revokeObjectURL(url);
    }

    async function handleUploadJson(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        const contents = await file.text();
        const parsed = JSON.parse(contents);
        let nextConfig = config;
        let nextProjects = [];
        if (Array.isArray(parsed)) {
          nextProjects = parsed.map(function(item) {
            const normalizedItem = item && item.forkData ? item : migrateLegacyProject(item);
            return syncProjectToConfig(normalizedItem, getConfigForWorkspace(normalizedItem.workspaceId || activeWorkspaceId), workspaces);
          });
          applyUiState({});
        } else if (restoreManagedStorage(parsed && parsed.storage)) {
          if ((!parsed.storage || typeof parsed.storage[UI_STATE_STORAGE_KEY] !== 'string') && parsed && parsed.uiState) {
            localStorage.setItem(UI_STATE_STORAGE_KEY, JSON.stringify(normalizeUiState(parsed.uiState)));
          }
          reloadStateFromStorage();
        } else if (parsed && typeof parsed === 'object' && Array.isArray(parsed.projects)) {
          nextConfig = parsed.config && Array.isArray(parsed.config.forks) ? normalizeConfig(parsed.config) : nextConfig;
          const nextWorkspaces = normalizeWorkspaces(parsed.workspaces);
          workspaces = nextWorkspaces;
          activeWorkspaceId = nextWorkspaces.some(function(workspace) { return workspace.id === parsed.activeWorkspaceId; }) ? parsed.activeWorkspaceId : nextWorkspaces[0].id;
          workspaceConfigs = parsed.workspaceConfigs && typeof parsed.workspaceConfigs === 'object'
            ? (function() {
                const importedConfigs = {};
                nextWorkspaces.forEach(function(workspace, index) {
                  importedConfigs[workspace.id] = normalizeConfig(parsed.workspaceConfigs[workspace.id] || (index === 0 ? nextConfig : createDefaultConfig()));
                });
                return importedConfigs;
              })()
            : loadWorkspaceConfigs(nextWorkspaces, nextConfig);
          nextConfig = getConfigForWorkspace(activeWorkspaceId);
          nextProjects = parsed.projects.map(function(item) {
            const normalizedItem = item && item.forkData ? item : migrateLegacyProject(item);
            return syncProjectToConfig(normalizedItem, getConfigForWorkspace(normalizedItem.workspaceId || activeWorkspaceId), nextWorkspaces);
          });
          applyUiState(parsed.uiState || {});
        } else {
          throw new Error('Expected an exported workflow file.');
        }
        if (!Array.isArray(parsed) && !restoreManagedStorage(parsed && parsed.storage)) {
          config = nextConfig;
          projects = nextProjects;
          syncAllProjects();
        } else if (Array.isArray(parsed)) {
          config = nextConfig;
          projects = nextProjects;
          syncAllProjects();
        }
        saveState();
        render();
        playSound('done');
        alert('Workflow data restored from JSON.');
      } catch (error) {
        console.warn('JSON upload failed', error);
        alert('Upload failed: ' + (error.message || 'Invalid JSON file.'));
      } finally {
        event.target.value = '';
      }
    }

                    onchange="updateProjectNotes('${project.id}', this.value)"
                    placeholder="Comments, blockers, next steps..."
                    class="min-h-[120px] w-full resize-y rounded-2xl border border-zinc-800 bg-zinc-900/70 px-4 py-3 text-sm text-zinc-200 outline-none transition-colors focus:border-indigo-500"

                </div>
                <div class="rounded-[1.5rem] border border-zinc-800 bg-zinc-950/50 p-4">
                  <div class="mb-3 flex items-center justify-between gap-3">
                    <h4 class="text-sm font-bold text-zinc-100">Attachments</h4>
                    <button onclick="event.stopPropagation(); addProjectAttachment('${project.id}')" class="rounded-xl bg-indigo-500/10 px-3 py-2 text-xs font-semibold text-indigo-300 hover:bg-indigo-500/20">Add Attachment</button>
                  </div>
                  <div class="space-y-2">${attachmentItems}</div>
                </div>
              </div>
            </div>
          </div>

      return `
        <div
          data-project-card="${project.id}"
          class="relative mb-4 overflow-hidden rounded-[1.7rem] border transition-all duration-500 ${allDone ? 'border-emerald-500 shadow-[0_0_30px_rgba(16,185,129,0.14)]' : isExpanded ? 'border-indigo-500/30 shadow-[0_8px_30px_rgba(99,102,241,0.1)]' : 'border-zinc-800 hover:border-zinc-700'} bg-[#121214] print-hidden"
          ondragover="handleProjectDragOver(event, '${project.id}')"
          ondrop="handleProjectDrop(event, '${project.id}')"
        >
          ${allDone ? '<div class="pointer-events-none absolute inset-0 bg-emerald-500/5"></div>' : ''}
          <div
            class="relative z-10 flex cursor-pointer flex-col gap-3 p-3.5 sm:flex-row sm:items-center sm:justify-between sm:p-4"
            draggable="true"
            ondragstart="startProjectDrag(event, '${project.id}')"
            ondragend="endProjectDrag()"
            onclick="handleProjectHeaderClick('${project.id}')"
            title="Drag to reorder this project"
          >
            <div class="flex min-w-0 flex-1 flex-col gap-2.5">
              <div class="flex items-start gap-3">
                <div class="mt-0.5 flex flex-col items-center gap-2 text-zinc-500">
                  <div class="flex flex-wrap gap-1" title="Fork progress">
                    ${forkStatuses.map(function(item) {
                      return `<div class="h-2.5 w-2.5 rounded-[4px] border transition-colors duration-500 ${getBoxStyle(item.status)}" title="${escapeHTML(item.fork.name)}"></div>`;
                    }).join('')}
                  </div>
                  <div class="rounded-lg border border-zinc-800 bg-zinc-900/70 p-1.5 text-zinc-500">
                    <i data-lucide="grip-vertical" class="w-3.5 h-3.5"></i>
                  </div>
                </div>
                <div class="min-w-0 flex-1">
                  <input
                    type="text"
                    value="${escapeHTML(project.topic)}"
                    onclick="event.stopPropagation()"
                    oninput="updateProjectValue('${project.id}', 'topic', this.value, false)"
                    onchange="updateProjectValue('${project.id}', 'topic', this.value)"
                    placeholder="Enter project title..."
                    class="w-full border-b border-transparent bg-transparent py-0.5 text-lg font-bold text-zinc-100 outline-none transition-colors placeholder:text-zinc-700 hover:border-zinc-700 focus:border-indigo-500 sm:max-w-xl sm:text-[1.15rem]"
                  />
                  <div class="mt-2 flex items-center gap-3 text-[11px] font-semibold text-zinc-400" onclick="event.stopPropagation()">
                    <span>${progress.percent}% complete</span>
                    <span>${progress.done}/${progress.total} tasks</span>
                    <span>Edited ${escapeHTML(formatRelativeTime(project.lastEditedAt))}</span>
                  </div>
                </div>
              </div>
            </div>
            <div class="flex items-center gap-1.5 self-end sm:self-auto">
              <button onclick="event.stopPropagation(); openProjectLog('${project.id}')" class="rounded-lg p-2.5 text-zinc-600 transition-colors hover:bg-zinc-800 hover:text-cyan-300">
                <i data-lucide="scroll-text" class="w-4 h-4"></i>
              </button>
              <button onclick="event.stopPropagation(); toggleProjectPinned('${project.id}')" class="rounded-lg p-2.5 transition-colors ${project.pinned ? 'text-amber-300 hover:bg-amber-500/10' : 'text-zinc-600 hover:bg-zinc-800 hover:text-amber-300'}">
                <i data-lucide="star" class="w-4 h-4"></i>
              </button>
              <button onclick="event.stopPropagation(); toggleProjectArchived('${project.id}')" class="rounded-lg p-2.5 transition-colors ${project.archived ? 'text-cyan-300 hover:bg-cyan-500/10' : 'text-zinc-600 hover:bg-zinc-800 hover:text-cyan-300'}">
                <i data-lucide="archive" class="w-4 h-4"></i>
              </button>
              <button onclick="event.stopPropagation(); openDeleteModal('${project.id}')" class="rounded-lg p-2.5 text-zinc-600 transition-colors hover:bg-red-950/50 hover:text-red-400">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
              <div class="rounded-lg border border-zinc-800 bg-zinc-900/60 p-2.5 text-zinc-400 transition-colors hover:text-white">
                <i data-lucide="${isExpanded ? 'chevron-up' : 'chevron-down'}" class="w-4 h-4"></i>
              </div>
            </div>
          </div>
          ${content}
        </div>
      `;
    }

    function renderStatusModal() {
      const step = getStepById(modalData.forkId, modalData.stepId);
      const project = getProjectById(modalData.projectId);
      if (!step || !project) return '';
      const currentValue = project.forkData[modalData.forkId].stepStatus[modalData.stepId];
      const buttons = STATUSES.map(function(status) {
        return `
          <button
            onclick="updateStepStatus('${modalData.projectId}', '${modalData.forkId}', '${modalData.stepId}', '${status}'); if('${status}' === 'Done') playSound('done'); else playSound('pop'); closeModal();"
            class="rounded-2xl border py-4 text-xs font-bold transition-all active:scale-95 ${STATUS_STYLES[status]} ${currentValue === status ? 'ring-2 ring-white/20' : 'opacity-80 hover:opacity-100'}"
          >${status}</button>
        `;
      }).join('');
      return `
        <div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 p-4 backdrop-blur-md fade-in" onclick="closeModal()">
          <div class="w-full max-w-sm rounded-[2rem] border border-zinc-800 bg-[#121214] p-6 shadow-2xl zoom-in" onclick="event.stopPropagation()">
            <h3 class="mb-6 border-b border-zinc-800 pb-4 text-center text-sm font-mono uppercase tracking-widest text-zinc-500">${escapeHTML(step.label)}</h3>
            <div class="grid grid-cols-2 gap-3">${buttons}</div>
          </div>
        </div>
      `;
    }

    function renderBulkModal() {

      return `

          <div class="mb-4 w-full max-w-sm rounded-[2rem] border border-zinc-800 bg-[#121214] p-6 shadow-2xl slide-up sm:mb-0 sm:zoom-in" onclick="event.stopPropagation()">
            <h3 class="mb-2 text-center text-xl font-bold text-white">${escapeHTML(fork.name)} Actions</h3>
            <p class="mb-8 text-center text-xs text-zinc-500">Update every step inside this fork for the selected project.</p>
            <div class="flex flex-col gap-3">
              <button onclick="bulkUpdate('${modalData.projectId}', '${modalData.forkId}', 'Done')" class="flex w-full items-center justify-center gap-2 rounded-2xl bg-emerald-500 py-4 text-sm font-bold text-emerald-950 transition-colors hover:bg-emerald-400 active:scale-95">
                <i data-lucide="check-circle-2" class="w-5 h-5"></i>Set All to Done
              </button>
              <button onclick="bulkUpdate('${modalData.projectId}', '${modalData.forkId}', 'Not needed')" class="flex w-full items-center justify-center gap-2 rounded-2xl bg-zinc-800 py-4 text-sm font-bold text-zinc-300 transition-colors hover:bg-zinc-700 active:scale-95">
                <i data-lucide="slash" class="w-5 h-5"></i>Set All Not Needed
              </button>
              <button onclick="bulkUpdate('${modalData.projectId}', '${modalData.forkId}', 'Cancelled')" class="flex w-full items-center justify-center gap-2 rounded-2xl border border-red-900/50 bg-red-950/50 py-4 text-sm font-bold text-red-500 transition-colors hover:bg-red-900/50 active:scale-95">
                <i data-lucide="x-circle" class="w-5 h-5"></i>Set All Cancelled

            </div>
          </div>
        </div>
      `;

    function renderDeleteModal() {
      const project = getProjectById(modalData.projectId);
      return `
        <div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 p-4 backdrop-blur-sm fade-in">
          <div class="w-full max-w-sm rounded-3xl border border-zinc-800 bg-zinc-900 p-6 shadow-2xl zoom-in">
            <div class="mb-4 flex items-center gap-3 text-red-400">
              <i data-lucide="alert-triangle" class="w-6 h-6"></i>
              <h3 class="text-xl font-bold">Delete Project?</h3>
            </div>
            <p class="mb-8 text-sm leading-relaxed text-zinc-400">This will permanently remove <span class="text-zinc-200">${escapeHTML(project && project.topic ? project.topic : 'this project')}</span> and its saved workflow data.</p>
            <div class="flex justify-end gap-3">
              <button onclick="closeModal()" class="rounded-xl px-5 py-2.5 text-sm font-bold text-zinc-300 hover:bg-zinc-800">Cancel</button>
              <button onclick="deleteProject()" class="rounded-xl border border-red-500/50 bg-red-500/10 px-5 py-2.5 text-sm font-bold text-red-500 hover:bg-red-500 hover:text-white">Delete</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderLogModal() {
      const project = getProjectById(modalData.projectId);

        return `

                <h3 class="text-2xl font-bold text-white">Project Log</h3>
                <p class="mt-1 text-sm text-zinc-500">${escapeHTML(project && project.topic ? project.topic : 'Untitled Project')}</p>

              <div class="space-y-3">${entriesHtml}</div>

    function renderCustomizeModal() {
      const forksHtml = config.forks.map(function(fork) {
        const stepsHtml = fork.steps.length ? fork.steps.map(function(step, stepIndex) {
          return `
            <div class="grid grid-cols-[auto,1fr,auto] items-center gap-3 rounded-2xl border border-zinc-800 bg-zinc-950/70 px-3 py-3">
              <span class="rounded-full bg-zinc-800 px-2 py-1 text-[10px] font-mono text-zinc-400">${stepIndex + 1}</span>
              <input type="text" value="${escapeHTML(step.label)}" data-customize-focus-key="step-${fork.id}-${step.id}" onchange="updateStepLabel('${fork.id}', '${step.id}', this.value, false)" class="min-w-0 bg-transparent text-sm font-medium text-zinc-100 outline-none" />
              <div class="flex items-center gap-1">
                <button type="button" onclick="moveStep('${fork.id}', '${step.id}', -1)" class="rounded-lg p-2 text-zinc-500 hover:bg-zinc-800 hover:text-zinc-200"><i data-lucide="arrow-up" class="w-4 h-4"></i></button>
                <button type="button" onclick="moveStep('${fork.id}', '${step.id}', 1)" class="rounded-lg p-2 text-zinc-500 hover:bg-zinc-800 hover:text-zinc-200"><i data-lucide="arrow-down" class="w-4 h-4"></i></button>
                <button type="button" onclick="removeStep('${fork.id}', '${step.id}')" class="rounded-lg p-2 text-zinc-500 hover:bg-red-950/50 hover:text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
              </div>
            </div>
          `;
        }).join('') : '<div class="rounded-2xl border border-dashed border-zinc-800 px-4 py-5 text-sm text-zinc-500">No steps yet. Add one below.</div>';

        const fieldsHtml = fork.fields.length ? fork.fields.map(function(field, fieldIndex) {
          return `
            <div class="grid grid-cols-[auto,1fr,130px,auto] items-center gap-3 rounded-2xl border border-zinc-800 bg-zinc-950/70 px-3 py-3">
              <span class="rounded-full bg-zinc-800 px-2 py-1 text-[10px] font-mono text-zinc-400">${fieldIndex + 1}</span>
              <input type="text" value="${escapeHTML(field.label)}" data-customize-focus-key="field-label-${fork.id}-${field.id}" onchange="updateFieldConfig('${fork.id}', '${field.id}', 'label', this.value, false)" class="min-w-0 bg-transparent text-sm font-medium text-zinc-100 outline-none" />
              <select data-customize-focus-key="field-type-${fork.id}-${field.id}" onchange="updateFieldConfig('${fork.id}', '${field.id}', 'type', this.value, false)" class="rounded-xl border border-zinc-700 bg-zinc-900 px-3 py-2 text-xs font-semibold text-zinc-200 outline-none">
                <option value="text" ${field.type === 'text' ? 'selected' : ''}>Text</option>
                <option value="number" ${field.type === 'number' ? 'selected' : ''}>Number</option>
                <option value="date" ${field.type === 'date' ? 'selected' : ''}>Date</option>
              </select>
              <div class="flex items-center gap-1">
                <button type="button" onclick="moveField('${fork.id}', '${field.id}', -1)" class="rounded-lg p-2 text-zinc-500 hover:bg-zinc-800 hover:text-zinc-200"><i data-lucide="arrow-up" class="w-4 h-4"></i></button>
                <button type="button" onclick="moveField('${fork.id}', '${field.id}', 1)" class="rounded-lg p-2 text-zinc-500 hover:bg-zinc-800 hover:text-zinc-200"><i data-lucide="arrow-down" class="w-4 h-4"></i></button>
                <button type="button" onclick="removeField('${fork.id}', '${field.id}')" class="rounded-lg p-2 text-zinc-500 hover:bg-red-950/50 hover:text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
              </div>
            </div>
          `;
        }).join('') : '<div class="rounded-2xl border border-dashed border-zinc-800 px-4 py-5 text-sm text-zinc-500">No extra fields yet. Add one if this fork needs dates, counts, or notes.</div>';

        return `
          <div class="rounded-[2rem] border border-zinc-800 bg-[#0b0b0d] p-5 shadow-[0_12px_40px_rgba(0,0,0,0.25)]">
            <div class="flex flex-col gap-4 border-b border-zinc-800 pb-5 lg:flex-row lg:items-center lg:justify-between">
              <div class="flex flex-1 items-center gap-3">
                <div class="rounded-2xl border border-indigo-400/20 bg-zinc-950 p-3 text-indigo-300"><i data-lucide="${escapeHTML(fork.icon || 'layers-3')}" class="w-5 h-5"></i></div>
                <div class="grid flex-1 gap-3 md:grid-cols-[1fr,150px]">
                  <input type="text" value="${escapeHTML(fork.name)}" data-customize-focus-key="fork-name-${fork.id}" onchange="updateForkSetting('${fork.id}', 'name', this.value, false)" class="rounded-2xl border border-zinc-700 bg-zinc-950/80 px-4 py-3 text-sm font-semibold text-zinc-100 outline-none" />
                  <input type="text" value="${escapeHTML(fork.icon || 'layers-3')}" data-customize-focus-key="fork-icon-${fork.id}" onchange="updateForkSetting('${fork.id}', 'icon', this.value, false)" class="rounded-2xl border border-zinc-700 bg-zinc-950/80 px-4 py-3 text-sm font-semibold text-zinc-100 outline-none" placeholder="lucide icon" />
                </div>
              </div>
              <div class="flex items-center gap-2">
                <button type="button" onclick="moveFork('${fork.id}', -1)" class="rounded-xl border border-zinc-700 px-3 py-2 text-xs font-semibold text-zinc-300 hover:bg-zinc-800">Move Up</button>
                <button type="button" onclick="moveFork('${fork.id}', 1)" class="rounded-xl border border-zinc-700 px-3 py-2 text-xs font-semibold text-zinc-300 hover:bg-zinc-800">Move Down</button>
                <button type="button" onclick="removeFork('${fork.id}')" class="rounded-xl border border-red-900/50 bg-red-950/40 px-3 py-2 text-xs font-semibold text-red-400 hover:bg-red-900/60">Remove</button>
              </div>
            </div>
            <div class="mt-5 grid gap-6 xl:grid-cols-2">
              <div>
                <div class="mb-3 flex items-center justify-between">
                  <h4 class="text-sm font-bold text-zinc-100">Steps</h4>
                  <button type="button" onclick="addStep('${fork.id}')" class="rounded-xl bg-indigo-500/10 px-3 py-2 text-xs font-semibold text-indigo-300 hover:bg-indigo-500/20">Add Step</button>
                </div>
                <div class="space-y-3">${stepsHtml}</div>
              </div>
              <div>
                <div class="mb-3 flex items-center justify-between">
                  <h4 class="text-sm font-bold text-zinc-100">Extra Fields</h4>
                  <button type="button" onclick="addField('${fork.id}')" class="rounded-xl bg-indigo-500/10 px-3 py-2 text-xs font-semibold text-indigo-300 hover:bg-indigo-500/20">Add Field</button>
                </div>
                <div class="space-y-3">${fieldsHtml}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
      return `
        <div class="fixed inset-0 z-[100] bg-black/75 p-4 backdrop-blur-md fade-in" onclick="closeModal()">
          <div class="mx-auto flex h-full w-full max-w-6xl flex-col overflow-hidden rounded-[2rem] border border-zinc-800 bg-[#121214] shadow-2xl zoom-in" onclick="event.stopPropagation()">
            <div class="flex items-start justify-between gap-4 border-b border-zinc-800 px-6 py-5">
              <div>
                <h3 class="text-2xl font-bold text-white">Customize ${escapeHTML(getWorkspaceById(activeWorkspaceId).name)}</h3>
                <p class="mt-1 max-w-2xl text-sm leading-6 text-zinc-500">Add or remove forks, reorder them, rename steps, and define the extra fields each fork needs. These changes apply to every project and are included in downloads.</p>
              </div>
              <div class="flex items-center gap-3">
                <button type="button" onclick="addFork()" class="rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-indigo-500">Add Fork</button>
                <button type="button" onclick="closeModal()" class="rounded-xl border border-zinc-700 px-4 py-2.5 text-sm font-semibold text-zinc-300 hover:bg-zinc-800">Close</button>
              </div>
            </div>
            <div id="customizeModalScroll" class="flex-1 overflow-y-auto px-6 py-6">
              <div class="space-y-5">${forksHtml}</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderWorkspaceManagerModal() {
      return `
        <div class="fixed inset-0 z-[100] bg-black/75 p-4 backdrop-blur-md fade-in" onclick="closeModal()">
          <div class="mx-auto flex h-full w-full max-w-4xl flex-col overflow-hidden rounded-[2rem] border border-zinc-800 bg-[#121214] shadow-2xl zoom-in" onclick="event.stopPropagation()">

                        ${isActive ? '<span class="rounded-full border border-indigo-500/40 bg-indigo-500/12 px-3 py-1 text-[10px] font-mono uppercase tracking-[0.2em] text-indigo-200">Active</span>' : ''}

                      <div class="mt-4 flex flex-wrap gap-2">

                        ${isActive ? '<button onclick="deleteActiveWorkspace()" class="rounded-xl border border-red-900/50 bg-red-950/30 px-3 py-2 text-xs font-semibold text-red-300 hover:bg-red-900/50 ' + (workspaces.length === 1 ? 'opacity-40 pointer-events-none' : '') + '">Delete</button>' : ''}

              </div>
            </div>
          </div>
        </div>
      `;
