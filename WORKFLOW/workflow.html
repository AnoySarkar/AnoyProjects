    function renderOverviewModal() {
      const workspaceProjects = getWorkspaceOverviewProjects();
      const activeCount = workspaceProjects.filter(function(project) { return !project.archived; }).length;
      const archivedCount = workspaceProjects.filter(function(project) { return project.archived; }).length;
      const pinnedCount = workspaceProjects.filter(function(project) { return project.pinned; }).length;
      const overviewItems = workspaceProjects.length ? workspaceProjects.map(function(project) {
        const progress = getProgressStats(project);
        return `
          <div class="flex items-center justify-between gap-3 rounded-2xl border border-zinc-800 bg-zinc-950/60 px-4 py-3">
            <div class="min-w-0">
              <div class="truncate text-sm font-semibold text-zinc-100">${escapeHTML(project.topic || 'Untitled Project')}</div>
              <div class="mt-1 text-[10px] font-mono uppercase tracking-[0.24em] text-zinc-500">${project.archived ? 'Archived' : 'Active'}${project.pinned ? ' | Pinned' : ''}</div>
            </div>
            <div class="min-w-[88px] text-right">
              <div class="text-sm font-bold text-indigo-200">${progress.percent}%</div>
              <div class="mt-1 h-1.5 rounded-full bg-zinc-800">
                <div class="h-full rounded-full bg-gradient-to-r from-indigo-400 to-cyan-400" style="width:${progress.percent}%"></div>
              </div>
            </div>
          </div>
        `;
      }).join('') : '<div class="rounded-2xl border border-dashed border-zinc-800 px-4 py-10 text-center text-sm text-zinc-500">No projects in this workspace yet.</div>';
      return `
        <div class="fixed inset-0 z-[100] bg-black/75 p-4 backdrop-blur-md fade-in" onclick="closeModal()">
          <div class="mx-auto flex h-full w-full max-w-4xl flex-col overflow-hidden rounded-[2rem] border border-zinc-800 bg-[#121214] shadow-2xl zoom-in" onclick="event.stopPropagation()">
            <div class="flex items-start justify-between gap-4 border-b border-zinc-800 px-6 py-5">
              <div>
                <h3 class="text-2xl font-bold text-white">Quick Overview</h3>
                <p class="mt-1 text-sm text-zinc-500">${escapeHTML(getWorkspaceById(activeWorkspaceId).name)} workspace snapshot.</p>
              </div>
              <button onclick="closeModal()" class="rounded-xl border border-zinc-700 px-4 py-2.5 text-sm font-semibold text-zinc-300 hover:bg-zinc-800">Close</button>
            </div>
            <div class="border-b border-zinc-800 px-6 py-4">
              <div class="grid gap-3 sm:grid-cols-4">
                <div class="rounded-2xl border border-zinc-800 bg-zinc-950/60 px-4 py-3"><div class="text-[10px] font-mono uppercase tracking-[0.26em] text-zinc-500">Total</div><div class="mt-2 text-2xl font-bold text-zinc-100">${workspaceProjects.length}</div></div>
                <div class="rounded-2xl border border-zinc-800 bg-zinc-950/60 px-4 py-3"><div class="text-[10px] font-mono uppercase tracking-[0.26em] text-zinc-500">Active</div><div class="mt-2 text-2xl font-bold text-zinc-100">${activeCount}</div></div>
                <div class="rounded-2xl border border-zinc-800 bg-zinc-950/60 px-4 py-3"><div class="text-[10px] font-mono uppercase tracking-[0.26em] text-zinc-500">Pinned</div><div class="mt-2 text-2xl font-bold text-zinc-100">${pinnedCount}</div></div>
                <div class="rounded-2xl border border-zinc-800 bg-zinc-950/60 px-4 py-3"><div class="text-[10px] font-mono uppercase tracking-[0.26em] text-zinc-500">Archived</div><div class="mt-2 text-2xl font-bold text-zinc-100">${archivedCount}</div></div>
              </div>
            </div>
            <div class="flex-1 overflow-y-auto px-6 py-6">
              <div class="space-y-2">${overviewItems}</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderModals() {
      if (!activeModal) return '';
      if (activeModal === 'status') return renderStatusModal();
      if (activeModal === 'bulk') return renderBulkModal();
      if (activeModal === 'delete') return renderDeleteModal();
      if (activeModal === 'log') return renderLogModal();
      if (activeModal === 'workspacePanel') return renderWorkspaceManagerModal();
      if (activeModal === 'overview') return renderOverviewModal();
      if (activeModal === 'customize') return renderCustomizeModal();
      return '';
    }

    function renderPrintFork(project, fork, index) {
      const cells = fork.steps.map(function(step, stepIndex) {
        const value = project.forkData[fork.id].stepStatus[step.id] || 'Not started';
        return `
          <div class="flex flex-col">
            <span class="text-[9px] uppercase tracking-widest text-gray-500">${stepIndex + 1}. ${escapeHTML(step.label)}</span>
            <span class="mt-1 inline-block rounded border px-2 py-1 text-center text-[10px] font-semibold ${PRINT_STYLES[value]}">${escapeHTML(value)}</span>
          </div>
        `;
      }).join('');

      const fields = fork.fields.map(function(field) {
        const rawValue = project.forkData[fork.id].fieldValues[field.id];
        const displayValue = field.type === 'date' ? formatDateDisplay(rawValue, 'TBD') : (rawValue === '' || rawValue === null || rawValue === undefined ? 'TBD' : rawValue);
        return `
          <div class="rounded-lg border border-gray-200 bg-white px-3 py-2">
            <span class="block text-[9px] uppercase tracking-widest text-gray-500">${escapeHTML(field.label)}</span>
            <span class="mt-1 block text-xs font-semibold text-gray-800">${escapeHTML(displayValue)}</span>
          </div>
        `;
      }).join('');

      return `
        <div class="mb-6">
          <h4 class="mb-3 border-b border-gray-200 pb-1 text-sm font-bold text-gray-800">${index + 1}. ${escapeHTML(fork.name)}</h4>
          <div class="grid grid-cols-4 gap-3">${cells || '<div class="col-span-4 text-sm text-gray-500">No steps configured.</div>'}</div>
          ${fields ? `<div class="mt-4 grid grid-cols-2 gap-3">${fields}</div>` : ''}
        </div>
      `;
    }

    function renderPrintView() {
      const printableProjects = getWorkspaceProjects(activeWorkspaceId).filter(function(project) {
        return !project.archived;
      });
      return `
        <div class="print-only mx-auto max-w-5xl py-8">
          <div class="mb-10 flex items-center gap-4 border-b-2 border-indigo-600 pb-6">
            <div class="rounded-2xl bg-indigo-600 p-3 text-white">${renderBrandMark('w-10 h-10')}</div>
            <div>
              <h1 class="text-3xl font-black tracking-tight text-gray-900">${APP_TITLE}</h1>
              <p class="mt-1 text-sm font-mono font-bold uppercase tracking-widest text-indigo-600">${escapeHTML(getWorkspaceById(activeWorkspaceId).name)} Workspace Export</p>
            </div>
          </div>
          ${printableProjects.map(function(project) {
            return `
              <div class="page-break-inside-avoid mb-12 rounded-2xl border border-gray-100 bg-gray-50/50 p-6">
                <div class="mb-6 flex items-end justify-between border-b border-gray-300 pb-4">
                  <h2 class="text-2xl font-bold text-gray-900">${escapeHTML(project.topic) || 'Untitled Project'}</h2>
                  <div class="flex gap-6 rounded-lg border border-gray-200 bg-white px-4 py-2 text-sm font-mono text-gray-600 shadow-sm">
                    <span><strong class="mr-2 text-indigo-600">WORKING:</strong> ${escapeHTML(formatDateDisplay(project.workingDate, 'TBD'))}</span>
                    <span><strong class="mr-2 text-indigo-600">UPLOAD:</strong> ${escapeHTML(formatDateDisplay(project.uploadDate, 'TBD'))}</span>
                  </div>
                </div>
                ${config.forks.map(function(fork, forkIndex) { return renderPrintFork(project, fork, forkIndex); }).join('')}
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function captureCustomizeFocus() {
      if (activeModal !== 'customize') return null;
      const activeElement = document.activeElement;
      if (!activeElement || typeof activeElement.getAttribute !== 'function') return null;
      const key = activeElement.getAttribute('data-customize-focus-key');
      if (!key) return null;
      const snapshot = { key: key };
      if (typeof activeElement.selectionStart === 'number' && typeof activeElement.selectionEnd === 'number') {
        snapshot.start = activeElement.selectionStart;
        snapshot.end = activeElement.selectionEnd;
      }
      return snapshot;
    }

    function restoreCustomizeFocus(snapshot) {
      if (activeModal !== 'customize' || !snapshot || !snapshot.key) return;
      const selector = '[data-customize-focus-key="' + String(snapshot.key).replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"]';
      const target = document.querySelector(selector);
      if (!target) return;
      target.focus();
      if (typeof snapshot.start === 'number' && typeof snapshot.end === 'number' && typeof target.setSelectionRange === 'function') {
        try {
          target.setSelectionRange(snapshot.start, snapshot.end);
        } catch (error) {
          console.warn('Unable to restore customize selection', error);
        }
      }
    }

    function render() {
      ensureActiveTabs();
      const searchWasFocused = document.activeElement && document.activeElement.id === 'projectSearchInput'
        ? {
            start: document.activeElement.selectionStart,
            end: document.activeElement.selectionEnd
          }
        : null;
      const previousCustomizeFocus = captureCustomizeFocus();
      const previousCustomizeScroll = activeModal === 'customize'
        ? (document.getElementById('customizeModalScroll') ? document.getElementById('customizeModalScroll').scrollTop : customizeScrollTop)
        : customizeScrollTop;
      const activeProjects = getVisibleProjects({ archived: false });
      const archivedProjects = getVisibleProjects({ archived: true });
      const currentWorkspaceProjects = getWorkspaceProjects(activeWorkspaceId);
      const appDiv = document.getElementById('app');
      let html = '';
      html += renderHeader();
      html += '<main class="print-hidden relative z-10 mx-auto max-w-7xl p-4 pb-20 md:p-8">';
      html += renderWorkspacePanel();
      if (!currentWorkspaceProjects.length) {
        html += renderEmptyState('No Projects In This Workspace', 'Create a project in this workspace or switch to another workspace from the tabs above.');
      } else if (!activeProjects.length && !archivedProjects.length) {
        html += renderEmptyState('No Search Matches', 'Try a different search term or clear the quick search to see all projects again.');
      } else {
        html += renderProjectSection('Active Projects', 'Pinned projects stay at the top. Drag the header to reorder within the list.', activeProjects, 'No active projects here right now.');
        html += renderProjectSection('Archived Projects', 'Completed or paused work can live here without cluttering the active board.', archivedProjects, 'No archived projects in this workspace.');
      }
      html += '</main>';
      html += renderModals();
      html += renderPrintView();
      appDiv.innerHTML = html;
      lucide.createIcons();
      if (searchWasFocused) {
        const searchInput = document.getElementById('projectSearchInput');
        if (searchInput) {
          searchInput.focus();
          if (typeof searchWasFocused.start === 'number' && typeof searchWasFocused.end === 'number') {
            searchInput.setSelectionRange(searchWasFocused.start, searchWasFocused.end);
          }
        }
      }
      if (activeModal === 'customize') {
        customizeScrollTop = previousCustomizeScroll || 0;
        const customizeContainer = document.getElementById('customizeModalScroll');
        if (customizeContainer) customizeContainer.scrollTop = customizeScrollTop;
        restoreCustomizeFocus(previousCustomizeFocus);
      }
    }

    window.addEventListener('load', function() {
      render();
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async function() {
        try {
          const registration = await navigator.serviceWorker.register('service-worker.js');
          console.log('Service Worker registered:', registration);
        } catch (error) {
          console.warn('Service Worker registration failed:', error);
        }
      });
    }
  </script>
</body>
</html>
