<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trackerbox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* Futuristic Base & Variables */
    :root {
      --bg-color: #05070e;
      --panel-bg: rgba(15, 23, 42, 0.5);
      --sticky-bg: #0b1120;
      --border-color: rgba(255, 255, 255, 0.08);
      --mouse-x: 50vw;
      --mouse-y: 50vh;
    }

    body {
      background-color: var(--bg-color);
      color: #e2e8f0;
      overflow-x: hidden;
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* Interactive Alive Background Glow */
    .mouse-glow {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: -1;
      background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(124, 58, 237, 0.15) 0%, rgba(6, 182, 212, 0.05) 30%, rgba(0,0,0,0) 60%);
      transition: background 0.1s ease-out;
    }

    /* Smooth Glass Panels */
    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .neon-text { text-shadow: 0 0 15px currentColor; }
    
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .alive-pulse { animation: heartbeat 3s ease-in-out infinite; }

    @keyframes modalEnter {
      0% { opacity: 0; transform: scale(0.95) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .animate-modal { animation: modalEnter 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* Rigid square cells */
    .square-cell-inner { width: 52px; height: 52px; }
    @media (min-width: 768px) { .square-cell-inner { width: 60px; height: 60px; } }
    
    /* Touch actions */
    .paintable-svg { touch-action: none; }
    .scrollable-container { touch-action: pan-x pan-y; }

    /* Cyberpunk Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* Clean Number Inputs for Timer */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    /* Print Logic */
    @media print {
      body { background: white !important; color: black !important; }
      .mouse-glow { display: none !important; }
      .glass-panel { background: white !important; border: 2px solid #111827 !important; color: black !important; box-shadow: none !important; backdrop-filter: none !important; }
      .print-hidden { display: none !important; }
      .print-break-inside-avoid { break-inside: avoid; }
      .print-page-break { page-break-after: always; }
      th, td { border-color: #111827 !important; }
      .sticky-bg-override { background: white !important; }
      line { stroke: #111827 !important; }
      .print-border { border: 2px solid #111827 !important; }
    }
  </style>
</head>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, Fragment, useRef } = React;

    // --- Audio Engine ---
    let audioCtx = null;
    let lastSoundTime = 0;

    const playSound = (type) => {
      try {
        if (!audioCtx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) audioCtx = new AudioContext();
          else return;
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const now = Date.now();
        if ((type === 'paint' || type === 'erase') && now - lastSoundTime < 40) return;
        if (type === 'paint' || type === 'erase') lastSoundTime = now;

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const t = audioCtx.currentTime;
        if (type === 'paint') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800 + Math.random() * 400, t);
          gainNode.gain.setValueAtTime(0.08, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
          osc.start(t);
          osc.stop(t + 0.15);
        } else if (type === 'erase') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(400, t);
          osc.frequency.exponentialRampToValueAtTime(150, t + 0.1);
          gainNode.gain.setValueAtTime(0.05, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
          osc.start(t);
          osc.stop(t + 0.1);
        } else if (type === 'click') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(600, t);
          gainNode.gain.setValueAtTime(0.05, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
          osc.start(t);
          osc.stop(t + 0.05);
        } else if (type === 'trash') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(100, t);
          osc.frequency.exponentialRampToValueAtTime(20, t + 0.3);
          gainNode.gain.setValueAtTime(0.1, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          osc.start(t);
          osc.stop(t + 0.3);
        } else if (type === 'success') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(400, t);
          osc.frequency.exponentialRampToValueAtTime(800, t + 0.2);
          gainNode.gain.setValueAtTime(0.1, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          osc.start(t);
          osc.stop(t + 0.3);
        } else if (type === 'peaceful') {
          const freqs = [523.25, 659.25, 783.99, 987.77];
          freqs.forEach((freq, i) => {
            const chordOsc = audioCtx.createOscillator();
            const chordGain = audioCtx.createGain();
            chordOsc.connect(chordGain);
            chordGain.connect(audioCtx.destination);
            
            chordOsc.type = 'sine';
            chordOsc.frequency.setValueAtTime(freq, t);
            
            chordGain.gain.setValueAtTime(0, t);
            chordGain.gain.linearRampToValueAtTime(0.05, t + 0.5 + (i * 0.1));
            chordGain.gain.exponentialRampToValueAtTime(0.001, t + 4);
            
            chordOsc.start(t);
            chordOsc.stop(t + 4);
          });
        }
      } catch (e) { console.warn("Audio not supported"); }
    };

      { id: 'waste', name: 'Waste', color: '#ef4444', target: 0 }  
    ];

    const SECTIONS = [
      { id: 'night', label: 'Night (12am - 6am)', icon: Moon, hours: [0, 1, 2, 3, 4, 5] },
      { id: 'morning', label: 'Morning (6am - 12pm)', icon: Sunrise, hours: [6, 7, 8, 9, 10, 11] },
      { id: 'afternoon', label: 'Afternoon (12pm - 6pm)', icon: Sun, hours: [12, 13, 14, 15, 16, 17] },
      { id: 'evening', label: 'Evening (6pm - 12am)', icon: Sunset, hours: [18, 19, 20, 21, 22, 23] }
    ];

    // --- Utilities ---
    const formatHourLabel = (h) => {
      if (h === 0) return '12 AM';
      if (h === 12) return '12 PM';
      return h > 12 ? `${h - 12} PM` : `${h} AM`;
    };

    const formatDateString = (date) => {
      const d = new Date(date);
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const getDisplayDate = (dateString) => {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    };

    const getWeeksInMonth = (yearMonthStr) => {
      if(!yearMonthStr) return [];
      const [year, month] = yearMonthStr.split('-').map(Number);
      const weeks = [];
      let currentDate = new Date(year, month - 1, 1);
      let dayOfWeek = currentDate.getDay(); 
      let diff = (dayOfWeek === 0 ? -6 : 1) - dayOfWeek;
      currentDate.setDate(currentDate.getDate() + diff);

      for (let i = 0; i < 6; i++) {
        const weekStart = new Date(currentDate);
        const weekEnd = new Date(currentDate);
        weekEnd.setDate(weekEnd.getDate() + 6);

        if (weekStart.getMonth() === month - 1 || weekEnd.getMonth() === month - 1) {
          const datesArray = [];
          const tempDate = new Date(weekStart);
          for (let j = 0; j < 7; j++) {
            datesArray.push(formatDateString(tempDate));
            tempDate.setDate(tempDate.getDate() + 1);
          }
          weeks.push({
            id: `week-${i}`,
            label: `${getDisplayDate(weekStart).slice(0,-5)} - ${getDisplayDate(weekEnd).slice(0,-5)}`,
            dates: datesArray
          });
        }
        currentDate.setDate(currentDate.getDate() + 7);
      }
      return weeks;
    };

    const hasActivity = (dayData) => {
      if (!dayData) return false;
      for (let i = 0; i < 24; i++) {
        if (dayData[i] && (dayData[i].t1 || dayData[i].t2)) return true;
      }
      return false;
    };

    const hasFullActivity = (dayData) => {
      if (!dayData) return false;
      for (let i = 0; i < 24; i++) {
        if (!dayData[i] || (!dayData[i].t1 && !dayData[i].t2)) return false;
      }
      return true;
    };

    // --- Main Application ---
    function App() {
      const [isLoaded, setIsLoaded] = useState(false);
      const [showHelp, setShowHelp] = useState(false);
      const [isZenMode, setIsZenMode] = useState(false);
      
      // Core States
      const [allData, setAllData] = useState({});
      const [journalData, setJournalData] = useState({});
      const [todosData, setTodosData] = useState({});
      
      const [habitsConfig, setHabitsConfig] = useState(() => {
        const saved = localStorage.getItem(LOCAL_HABITS_CONFIG_KEY);
        return saved ? JSON.parse(saved) : [];
      });
      const [habitLogs, setHabitLogs] = useState(() => {
        const saved = localStorage.getItem(LOCAL_HABIT_LOGS_KEY);
        return saved ? JSON.parse(saved) : {};
      });

      const [dayClipboard, setDayClipboard] = useState(null); 
      const [categories, setCategories] = useState(() => {
        const saved = localStorage.getItem(LOCAL_CATEGORIES_KEY);
        return saved ? JSON.parse(saved) : DEFAULT_CATEGORIES;
      });
      const [selectedColorId, setSelectedColorId] = useState(categories.length > 0 ? categories[0].id : 'lock');
      const [isPainting, setIsPainting] = useState(false);

      const fileInputRef = useRef(null);

      useEffect(() => {
        if (!categories.find(c => c.id === selectedColorId) && selectedColorId !== 'lock') {
          setSelectedColorId('lock');
        }
      }, [categories, selectedColorId]);

      // Timeline States
      const today = new Date();
      const todayStr = formatDateString(today);
      const initialMonthStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
      const initialYearStr = `${today.getFullYear()}`;
      
      const [selectedMonthStr, setSelectedMonthStr] = useState(initialMonthStr);
      const availableWeeks = useMemo(() => getWeeksInMonth(selectedMonthStr), [selectedMonthStr]);
      const [selectedWeekIndex, setSelectedWeekIndex] = useState(0);

      const [statDate, setStatDate] = useState(todayStr);
      const [statWeekMonth, setStatWeekMonth] = useState(initialMonthStr);
      const [statWeekIndex, setStatWeekIndex] = useState(0);
      const statAvailableWeeks = useMemo(() => getWeeksInMonth(statWeekMonth), [statWeekMonth]);
      const [statMonth, setStatMonth] = useState(initialMonthStr);
      const [statYear, setStatYear] = useState(initialYearStr);

      const printMonthStr = initialMonthStr;
      const printWeeks = useMemo(() => getWeeksInMonth(printMonthStr), [printMonthStr]);

      const [resetDay, setResetDay] = useState(todayStr);
      const [resetWeekMonth, setResetWeekMonth] = useState(initialMonthStr);
      const [resetWeekIdx, setResetWeekIdx] = useState(0);
      const resetAvailableWeeks = useMemo(() => getWeeksInMonth(resetWeekMonth), [resetWeekMonth]);
      const [resetMonthStr, setResetMonthStr] = useState(initialMonthStr);
      const [pendingReset, setPendingReset] = useState(null);

      // Feature States: Journal & Timer
      const [activeJournalDate, setActiveJournalDate] = useState(null);
      const [todoInput, setTodoInput] = useState('');
      
      const [showTimer, setShowTimer] = useState(true); 
      const [timer, setTimer] = useState({ 
        isOpen: false, 
        isRunning: false, 
        hasStarted: false,
        mode: 'focus', // 'focus' | 'break'
        initialMinutes: 25, 
        minutes: 25, 
        seconds: 0, 
        categoryId: categories.length > 0 ? categories[0].id : null
      });

      // --- Timer Logic ---
      useEffect(() => {
        let interval = null;
        if (timer.isRunning) {
          interval = setInterval(() => {
            setTimer(prev => {
              if (prev.mode === 'focus') {
                if (prev.minutes === 0 && prev.seconds === 0) {
                  playSound('peaceful');
                  return { ...prev, mode: 'break', minutes: 0, seconds: 1, hasStarted: true };
                }
                if (prev.seconds === 0) {
                  return { ...prev, minutes: prev.minutes - 1, seconds: 59 };
                }
                return { ...prev, seconds: prev.seconds - 1 };
              } else {
                // Break / Stopwatch Mode
                if (prev.seconds === 59) {
                  return { ...prev, minutes: prev.minutes + 1, seconds: 0 };
                }
                return { ...prev, seconds: prev.seconds + 1 };
              }
            });
          }, 1000);
        }
        return () => clearInterval(interval);
      }, [timer.isRunning, timer.minutes, timer.seconds, timer.mode]);

      const toggleTimer = () => {
        playSound('click');
        setTimer(prev => {
          const fallbackMinutes = prev.initialMinutes === '' ? 25 : prev.initialMinutes;
          return { 
             ...prev, 
             initialMinutes: prev.initialMinutes === '' ? 25 : prev.initialMinutes,
             minutes: prev.hasStarted ? prev.minutes : fallbackMinutes,
             isRunning: !prev.isRunning,
             hasStarted: true
          };
        });
      };
      
      const resetTimer = () => {
        playSound('erase');
        setTimer(prev => ({ 
           ...prev, 
           isRunning: false, 
           hasStarted: false,
           mode: 'focus', 
           minutes: prev.initialMinutes === '' ? 25 : prev.initialMinutes, 
           seconds: 0 
        }));
      };

      // --- Background Setup ---
      useEffect(() => {
        const handleMove = (e) => {
          const x = e.touches ? e.touches[0].clientX : e.clientX;
          const y = e.touches ? e.touches[0].clientY : e.clientY;
          document.documentElement.style.setProperty('--mouse-x', `${x}px`);
          document.documentElement.style.setProperty('--mouse-y', `${y}px`);
        };
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove);
        return () => {
          window.removeEventListener('mousemove', handleMove);
          window.removeEventListener('touchmove', handleMove);
        };
      }, []);

      // --- Hotkey Listeners ---
      useEffect(() => {
        const handleKeyDown = (e) => {
          if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return; 
          const key = e.key.toLowerCase();
          
          if (key === 'l') {
            playSound('click');
            setSelectedColorId('lock');
            return;
          }
          
          const num = parseInt(key);
          if (!isNaN(num) && num > 0 && num <= categories.length) {
            playSound('click');
            setSelectedColorId(categories[num - 1].id);
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [categories]);

      useEffect(() => {
        const weekIdx = availableWeeks.findIndex(w => w.dates.includes(todayStr));
        setSelectedWeekIndex(weekIdx !== -1 ? weekIdx : 0);
      }, [selectedMonthStr, availableWeeks, todayStr]);

      useEffect(() => {
        const weekIdx = statAvailableWeeks.findIndex(w => w.dates.includes(todayStr));
        setStatWeekIndex(weekIdx !== -1 ? weekIdx : 0);
      }, [statWeekMonth, statAvailableWeeks, todayStr]);

      useEffect(() => {
        const weekIdx = resetAvailableWeeks.findIndex(w => w.dates.includes(todayStr));
        setResetWeekIdx(weekIdx !== -1 ? weekIdx : 0);
      }, [resetWeekMonth, resetAvailableWeeks, todayStr]);

      const currentWeekDates = availableWeeks[selectedWeekIndex]?.dates || [];

      useEffect(() => {
        const savedData = localStorage.getItem(LOCAL_STORAGE_KEY);
        const savedJournal = localStorage.getItem(LOCAL_JOURNAL_KEY);
        const savedTodos = localStorage.getItem(LOCAL_TODOS_KEY);
        
        if (savedData) {
          try { setAllData(JSON.parse(savedData)); } 
          catch (e) { console.error("Error loading local data", e); }
        }
        if (savedJournal) {
          try { setJournalData(JSON.parse(savedJournal)); } 
          catch (e) { console.error("Error loading journal data", e); }
        }
        if (savedTodos) {
          try { setTodosData(JSON.parse(savedTodos)); } 
          catch (e) { console.error("Error loading todos data", e); }
        }
        setIsLoaded(true);
      }, []);

      // --- Robust Habit Synchronization Engine ---
      useEffect(() => {
        if (activeJournalDate) {
          const dateObj = new Date(activeJournalDate);
          const dayOfWeek = dateObj.getDay(); 
          const applicableHabits = habitsConfig.filter(h => h.days.includes(dayOfWeek));
          const currentTodayStr = formatDateString(new Date());
          const isPast = activeJournalDate < currentTodayStr;

          setHabitLogs(prev => {
            const currentLogs = prev[activeJournalDate] || [];
            let hasChanges = false;
            let newLogs = [...currentLogs];

            if (isPast && currentLogs.length > 0) {
               // Protect past days from deletions. Only dynamically update names if they changed in config.
               newLogs = currentLogs.map(log => {
                  const conf = habitsConfig.find(h => h.id === log.id);
                  if (conf && conf.name !== log.name) {
                     hasChanges = true;
                     return { ...log, name: conf.name };
                  }
                  return log;
               });
            } else {
               // Strict Sync for Today, Future, or completely empty past days
               newLogs = applicableHabits.map(h => {
                 const existing = currentLogs.find(log => log.id === h.id);
                 if (existing) {
                   if (existing.name !== h.name) hasChanges = true;
                   return { ...existing, name: h.name };
                 }
                 hasChanges = true;
                 return { id: h.id, name: h.name, status: 'red', remark: '' };
               });
               if (currentLogs.length !== newLogs.length) hasChanges = true;
            }

            if (hasChanges) {
              const updated = { ...prev, [activeJournalDate] : newLogs };
              localStorage.setItem(LOCAL_HABIT_LOGS_KEY, JSON.stringify(updated));
              return updated;
            }
            
            return prev;
          });
        }
      }, [activeJournalDate, habitsConfig]);

      // Reset Todo Input on Journal Open
      useEffect(() => {
        if (activeJournalDate) setTodoInput('');
      }, [activeJournalDate]);

      // --- Chrono-Clone Handlers ---
      const handleCopyDay = (dateStr) => {
        playSound('click');
        setDayClipboard(allData[dateStr] || {});
      };

      const handlePasteDay = (dateStr) => {
        if (!dayClipboard) return;
        playSound('success');
        setAllData(prev => {
          const newData = { ...prev, [dateStr]: JSON.parse(JSON.stringify(dayClipboard)) };
          localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(newData));
          return newData;
        });
      };

      const handleMagicFill = (dateStr) => {
        playSound('success');
        const sleepCat = categories.find(c => c.name.toLowerCase().includes('sleep')) || categories[0];
        
        setAllData(prev => {
          const dayData = { ...(prev[dateStr] || {}) };
          for (let i = 0; i <= 7; i++) {
            dayData[i] = { t1: sleepCat.id, t2: sleepCat.id };
          }
          const newData = { ...prev, [dateStr]: dayData };
          localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(newData));
          return newData;
        });
      };

      // --- Journal & Todo & Habit Handlers ---
      const handleJournalSave = (dateStr, text) => {
        setJournalData(prev => {
          const newData = { ...prev, [dateStr]: text };
          localStorage.setItem(LOCAL_JOURNAL_KEY, JSON.stringify(newData));
          return newData;
        });
      };

      const handleAddTodo = (dateStr, text) => {
        if (!text.trim()) return;
        playSound('click');
        setTodosData(prev => {
          const dayTodos = prev[dateStr] || [];
          const newData = { ...prev, [dateStr]: [...dayTodos, { id: Date.now().toString(), text, status: 'red', remark: '' }] };
          localStorage.setItem(LOCAL_TODOS_KEY, JSON.stringify(newData));
          return newData;
        });
      };

      const handleToggleTodo = (dateStr, id) => {
        playSound('click');
        setTodosData(prev => {
          const dayTodos = prev[dateStr] || [];
          const newData = { ...prev, [dateStr]: dayTodos.map(t => {
            if (t.id === id) {
              let currentStatus = t.status || (t.done ? 'green' : 'red');
              let nextStatus = 'red';
              if (currentStatus === 'red') nextStatus = 'yellow';
              else if (currentStatus === 'yellow') nextStatus = 'green';
              return { ...t, status: nextStatus, done: nextStatus === 'green' };
            }
            return t;
          }) };
          localStorage.setItem(LOCAL_TODOS_KEY, JSON.stringify(newData));
          return newData;
        });
      };

      const handleUpdateTodoRemark = (dateStr, id, remark) => {
        setTodosData(prev => {
          const dayTodos = prev[dateStr] || [];
          const newData = { ...prev, [dateStr]: dayTodos.map(t => t.id === id ? { ...t, remark } : t) };
          localStorage.setItem(LOCAL_TODOS_KEY, JSON.stringify(newData));
          return newData;
        });
      };

      const handleDeleteTodo = (dateStr, id) => {
        playSound('trash');
        setTodosData(prev => {
          const dayTodos = prev[dateStr] || [];
          const newData = { ...prev, [dateStr]: dayTodos.filter(t => t.id !== id) };
          localStorage.setItem(LOCAL_TODOS_KEY, JSON.stringify(newData));
          return newData;
        });
      };

      const handleToggleHabit = (dateStr, id) => {
        playSound('click');
        setHabitLogs(prev => {
          const logs = prev[dateStr] || [];
          const updatedLogs = logs.map(h => {
             if (h.id === id) {
                let nextStatus = 'red';
                if (h.status === 'red') nextStatus = 'yellow';
                else if (h.status === 'yellow') nextStatus = 'green';
                return { ...h, status: nextStatus };
             }
             return h;
          });
          const updated = { ...prev, [dateStr]: updatedLogs };
          localStorage.setItem(LOCAL_HABIT_LOGS_KEY, JSON.stringify(updated));
          return updated;
        });
      };

      const handleUpdateHabitRemark = (dateStr, id, remark) => {
        setHabitLogs(prev => {
          const logs = prev[dateStr] || [];
          const updatedLogs = logs.map(h => h.id === id ? { ...h, remark } : h);
          const updated = { ...prev, [dateStr]: updatedLogs };
          localStorage.setItem(LOCAL_HABIT_LOGS_KEY, JSON.stringify(updated));
          return updated;
        });
      };

      const handleDeleteDailyHabit = (dateStr, id) => {
        playSound('trash');
        setHabitLogs(prev => {
          const logs = prev[dateStr] || [];
          const updatedLogs = logs.map(h => h.id === id ? { ...h, deleted: true } : h);
          const updated = { ...prev, [dateStr]: updatedLogs };
          localStorage.setItem(LOCAL_HABIT_LOGS_KEY, JSON.stringify(updated));
          return updated;
        });
      };

      // --- Habit Tracker Config Handlers ---
      const addHabitConfig = () => {
        playSound('click');
        const newHabit = { id: 'hab_' + Date.now(), name: 'New Habit', days: [0,1,2,3,4,5,6] }; 
        setHabitsConfig(prev => {
          const updated = [...prev, newHabit];
          localStorage.setItem(LOCAL_HABITS_CONFIG_KEY, JSON.stringify(updated));
          return updated;
        });
      }

      const updateHabitConfig = (id, field, value) => {
         setHabitsConfig(prev => {
          const updated = prev.map(h => h.id === id ? { ...h, [field]: value } : h);
          localStorage.setItem(LOCAL_HABITS_CONFIG_KEY, JSON.stringify(updated));
          return updated;
        });
      }

      const toggleHabitDay = (id, day) => {
         playSound('click');
         setHabitsConfig(prev => {
           const updated = prev.map(h => {
             if (h.id === id) {
               const newDays = h.days.includes(day) ? h.days.filter(d => d !== day) : [...h.days, day];
               return { ...h, days: newDays };
             }
             return h;
           });
           localStorage.setItem(LOCAL_HABITS_CONFIG_KEY, JSON.stringify(updated));
           return updated;
         });
      }

      const removeHabitConfig = (id, name) => {
        playSound('click');
        setPendingReset({ type: 'habit', payload: { id, name } });
      }

      // --- Gamification & Streak Logic ---
      const currentStreak = useMemo(() => {
        let streak = 0;
        let checkDate = new Date();
        
        let checkStr = formatDateString(checkDate);
        if (!hasFullActivity(allData[checkStr])) {
          checkDate.setDate(checkDate.getDate() - 1);
          checkStr = formatDateString(checkDate);
          if (!hasFullActivity(allData[checkStr])) return 0;
        }

        while (true) {
          let dStr = formatDateString(checkDate);
          if (hasFullActivity(allData[dStr])) {
            streak++;
            checkDate.setDate(checkDate.getDate() - 1);
          } else {
            break;
          }
        }
        return streak;
      }, [allData]);

      const { totalXP, level, rankTitle, currentLevelBaseXP, nextLevelXP } = useMemo(() => {
         let xp = 0;
         
         // 1. XP for Logged Hours
         let trackedHours = 0;
         Object.values(allData).forEach(day => {
            Object.values(day).forEach(h => {
               if (h.t1) trackedHours += 0.5;
               if (h.t2) trackedHours += 0.5;
            });
         });
         xp += trackedHours * 10;

         // 2. XP for Todos Completed
         let todosDone = 0;
         Object.values(todosData).forEach(day => {
            todosDone += day.filter(t => t.status === 'green' || t.done).length;
         });
         xp += todosDone * 20;

         // 3. XP for Habits Completed
         let habitsDone = 0;
         Object.values(habitLogs).forEach(day => {
            habitsDone += day.filter(h => h.status === 'green').length;
         });
         xp += habitsDone * 10;

         // 4. Streak XP Bonus
         xp += currentStreak * 50;

         // Calculate Level Details
         // Level curve: 1=0XP, 2=200XP, 3=800XP, 4=1800XP...
         const lvl = Math.floor(Math.sqrt(xp / 200)) + 1;
         const currentBase = Math.pow(lvl - 1, 2) * 200;
         const nextBase = Math.pow(lvl, 2) * 200;

         let rank = "Novice Tracker";
         if (lvl >= 3) rank = "Adept Logger";
         if (lvl >= 7) rank = "Time Pathfinder";
         if (lvl >= 15) rank = "Master Architect";
         if (lvl >= 30) rank = "Chronos Legend";
         if (lvl >= 50) rank = "Ascended Being";

         return { totalXP: xp, level: lvl, rankTitle: rank, currentLevelBaseXP: currentBase, nextLevelXP: nextBase };
      }, [allData, todosData, habitLogs, currentStreak]);

      // --- Data Portability (Export/Import) ---
      const handleExportData = () => {
        playSound('click');
        const payload = { 
          data: allData, 
          categories, 
          journal: journalData, 
          todos: todosData, 
          habits: habitsConfig,
          habitLogs: habitLogs,
          version: 7 
        };
        const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `trackerbox_backup_${formatDateString(new Date())}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const handleImportData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const imported = JSON.parse(event.target.result);
            if (imported.data && imported.categories) {
              setAllData(imported.data);
              setCategories(imported.categories);
              if (imported.journal) setJournalData(imported.journal);
              if (imported.todos) setTodosData(imported.todos);
              if (imported.habits) setHabitsConfig(imported.habits);
              if (imported.habitLogs) setHabitLogs(imported.habitLogs);
              
              localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(imported.data));
              localStorage.setItem(LOCAL_CATEGORIES_KEY, JSON.stringify(imported.categories));
              if (imported.journal) localStorage.setItem(LOCAL_JOURNAL_KEY, JSON.stringify(imported.journal));
              if (imported.todos) localStorage.setItem(LOCAL_TODOS_KEY, JSON.stringify(imported.todos));
              if (imported.habits) localStorage.setItem(LOCAL_HABITS_CONFIG_KEY, JSON.stringify(imported.habits));
              if (imported.habitLogs) localStorage.setItem(LOCAL_HABIT_LOGS_KEY, JSON.stringify(imported.habitLogs));
              
              playSound('success');
              alert("System Restore Successful: All data has been synchronized.");
            } else {
              alert("Error: Invalid backup file structure.");
            }
          } catch (err) { alert("Error: Corrupted file."); }
          e.target.value = null;
        };
        reader.readAsText(file);
      };

      // --- Custom Category Logic ---
      const updateCategory = (id, field, value) => {
        const newCats = categories.map(c => c.id === id ? { ...c, [field]: value } : c);
        setCategories(newCats);
        localStorage.setItem(LOCAL_CATEGORIES_KEY, JSON.stringify(newCats));
      };

      const removeCategory = (id, name) => {
        if (categories.length <= 1) {
          alert("System Error: You must have at least one active category.");
          return;
        }
        playSound('click');
        setPendingReset({ type: 'category', payload: { id, name } });
      };

      const addCategory = () => {
        playSound('click');
        const newId = 'cat_' + Date.now();
        const newCats = [...categories, { id: newId, name: 'New Category', color: '#ffffff', target: 0 }];
        setCategories(newCats);
        localStorage.setItem(LOCAL_CATEGORIES_KEY, JSON.stringify(newCats));
      };

      const handleColorSelect = (id) => {
        playSound('click');
        setSelectedColorId(id);
      };

      // --- Toggle/Paint Logic ---
      const handleUpdateSegment = useCallback((dateStr, hourIndex, triangleId, colorId, overrideMode) => {
        if (colorId === 'lock') return; 

        setAllData(prev => {
          const dayData = prev[dateStr] || {};
          const hourData = dayData[hourIndex] || { t1: null, t2: null };
          const prevColor = hourData[triangleId];

          const finalColorId = (overrideMode === 'erase') ? null : colorId;
          if (prevColor === finalColorId) return prev; 

          playSound(overrideMode === 'erase' ? 'erase' : 'paint');

          const newData = {
            ...prev,
            [dateStr]: { ...dayData, [hourIndex]: { ...hourData, [triangleId]: finalColorId } }
          };
          
          localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(newData));
          return newData;
        });
      }, []);

      const handlePointerDown = (dateStr, hourIndex, triangleId, e) => {
        if (e.button !== 0 || selectedColorId === 'lock') return; 
        
        const prevColor = allData[dateStr]?.[hourIndex]?.[triangleId];
        const mode = (prevColor === selectedColorId) ? 'erase' : 'paint';
        
        setIsPainting(mode); 
        handleUpdateSegment(dateStr, hourIndex, triangleId, selectedColorId, mode);
      };

      const handlePointerEnter = (dateStr, hourIndex, triangleId) => {
        if (isPainting && selectedColorId !== 'lock') {
          handleUpdateSegment(dateStr, hourIndex, triangleId, selectedColorId, isPainting);
        }
      };

      useEffect(() => {
        const handleMouseUp = () => setIsPainting(false);
        window.addEventListener('pointerup', handleMouseUp);
        return () => window.removeEventListener('pointerup', handleMouseUp);
      }, []);

      // --- Data Core Logic ---
      const executeReset = () => {
        if (!pendingReset) return;
        playSound('trash');
        
        if (pendingReset.type === 'category') {
          const newCats = categories.filter(c => c.id !== pendingReset.payload.id);
          setCategories(newCats);
          localStorage.setItem(LOCAL_CATEGORIES_KEY, JSON.stringify(newCats));
          
          if (selectedColorId === pendingReset.payload.id) setSelectedColorId('lock');
          if (timer.categoryId === pendingReset.payload.id) setTimer(p => ({...p, categoryId: newCats[0]?.id}));
          setPendingReset(null);
          return;
        }

        if (pendingReset.type === 'habit') {
          const updated = habitsConfig.filter(h => h.id !== pendingReset.payload.id);
          setHabitsConfig(updated);
          localStorage.setItem(LOCAL_HABITS_CONFIG_KEY, JSON.stringify(updated));
          setPendingReset(null);
          return;
        }

        let currentData = { ...allData };
        let currentJournal = { ...journalData };
        let currentTodos = { ...todosData };
        let currentHabits = { ...habitLogs };

        if (pendingReset.type === 'day') {
          delete currentData[pendingReset.payload];
          delete currentJournal[pendingReset.payload];
          delete currentTodos[pendingReset.payload];
          delete currentHabits[pendingReset.payload];
        } else if (pendingReset.type === 'week') {
          pendingReset.payload.forEach(d => { delete currentData[d]; delete currentJournal[d]; delete currentTodos[d]; delete currentHabits[d]; });
        } else if (pendingReset.type === 'month') {
          Object.keys(currentData).forEach(d => { if (d.startsWith(pendingReset.payload)) delete currentData[d]; });
          Object.keys(currentJournal).forEach(d => { if (d.startsWith(pendingReset.payload)) delete currentJournal[d]; });
          Object.keys(currentTodos).forEach(d => { if (d.startsWith(pendingReset.payload)) delete currentTodos[d]; });
          Object.keys(currentHabits).forEach(d => { if (d.startsWith(pendingReset.payload)) delete currentHabits[d]; });
        }
        
        setAllData(currentData);
        setJournalData(currentJournal);
        setTodosData(currentTodos);
        setHabitLogs(currentHabits);
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(currentData));
        localStorage.setItem(LOCAL_JOURNAL_KEY, JSON.stringify(currentJournal));
        localStorage.setItem(LOCAL_TODOS_KEY, JSON.stringify(currentTodos));
        localStorage.setItem(LOCAL_HABIT_LOGS_KEY, JSON.stringify(currentHabits));
        setPendingReset(null); 
      };

      const calculateStats = (dateStringsArray) => {
        const totals = categories.reduce((acc, cat) => ({ ...acc, [cat.id]: 0 }), {});
        const completedTotals = categories.reduce((acc, cat) => ({ ...acc, [cat.id]: 0 }), {});
        
        let totalTrackedHours = 0;
        let completedDaysCount = 0;

        dateStringsArray.forEach(dateStr => {
          const dayData = allData[dateStr] || {};
          const isComplete = hasActivity(dayData);
          
          if (isComplete) completedDaysCount++;

          Object.values(dayData).forEach(hourData => {
            if (hourData.t1 && totals[hourData.t1] !== undefined) { 
              totals[hourData.t1] += 0.5; 
              totalTrackedHours += 0.5; 
              if (isComplete) completedTotals[hourData.t1] += 0.5;
            }
            if (hourData.t2 && totals[hourData.t2] !== undefined) { 
              totals[hourData.t2] += 0.5; 
              totalTrackedHours += 0.5; 
              if (isComplete) completedTotals[hourData.t2] += 0.5;
            }
          });
        });
        return { totals, completedTotals, totalTrackedHours, completedDaysCount };
      };

      const statsDay = calculateStats([statDate]);
      const statsWeek = calculateStats(statAvailableWeeks[statWeekIndex]?.dates || []);
      const statsMonth = calculateStats(Object.keys(allData).filter(d => d.startsWith(statMonth)));
      const statsYear = calculateStats(Object.keys(allData).filter(d => d.startsWith(statYear)));
      const printMonthStats = calculateStats(Object.keys(allData).filter(d => d.startsWith(printMonthStr)));

      if (!isLoaded) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-[#05070e]">
            <div className="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-cyan-400"></div>
          </div>
        );
      }

      const activeTimerCategory = categories.find(c => c.id === timer.categoryId) || categories[0];

      // --- Compute Active Day Progress Header ---
      const activeDayTodos = todosData[activeJournalDate] || [];
      const activeDayHabits = (habitLogs[activeJournalDate] || []).filter(h => !h.deleted);
      const activeTotalTasks = activeDayTodos.length + activeDayHabits.length;
      const activeCompletedTasks = activeDayTodos.filter(t => t.status === 'green' || t.done).length + activeDayHabits.filter(h => h.status === 'green').length;
      const activeCompletionRate = activeTotalTasks > 0 ? (activeCompletedTasks / activeTotalTasks) * 100 : 0;

      const activeDayData = allData[activeJournalDate] || {};
      let activeDayTrackedHours = 0;
      Object.values(activeDayData).forEach(hourData => {
         if (hourData.t1) activeDayTrackedHours += 0.5;
         if (hourData.t2) activeDayTrackedHours += 0.5;
      });

      return (
        <Fragment>
          <div className="mouse-glow print-hidden"></div>

          {/* --- TOGGLEABLE FOCUS CHRONOS --- */}
          {showTimer && (
            <div className={`fixed bottom-4 right-4 z-[150] transition-transform duration-300 print-hidden ${timer.isOpen ? 'translate-y-0' : 'translate-y-[calc(100%-48px)]'} ${isZenMode ? 'hidden' : ''}`}>
              <div className="glass-panel border-cyan-500/50 shadow-[0_0_20px_rgba(34,211,238,0.2)] rounded-2xl w-[calc(100vw-32px)] sm:w-64 max-w-sm overflow-hidden flex flex-col">
                <button onClick={() => { playSound('click'); setTimer(p => ({...p, isOpen: !p.isOpen})); }} className="w-full bg-cyan-500/20 hover:bg-cyan-500/30 text-cyan-300 font-black tracking-widest uppercase text-xs py-3 px-4 flex items-center justify-between border-b border-cyan-500/30">
                  <span className="flex items-center gap-2"><Clock size={14}/> Focus Chronos</span>
                  <span>{timer.isOpen ? '▼' : '▲'}</span>
                </button>
                
                <div className="p-4 flex flex-col gap-4">
                  <select value={timer.categoryId || ''} onChange={e => { playSound('click'); setTimer(p => ({...p, categoryId: e.target.value})); }} className="w-full bg-[#0b1120] text-slate-200 rounded-lg border border-cyan-500/30 px-3 py-2 font-bold text-sm outline-none focus:border-cyan-400">
                    {categories.map(cat => <option key={cat.id} value={cat.id}>{cat.name}</option>)}
                  </select>
                  
                  <div className="text-center relative">
                    {timer.mode === 'break' && (
                       <div className="text-green-400 text-[10px] font-bold uppercase tracking-widest mb-1 animate-pulse">Break / Stopwatch</div>
                    )}
                    {timer.mode === 'focus' && !timer.hasStarted ? (
                      <div className="flex items-center justify-center text-5xl font-black neon-text font-mono tracking-widest" style={{ color: activeTimerCategory?.color || '#22d3ee' }}>
                        <input 
                          type="number" 
                          value={timer.initialMinutes}
                          onChange={e => {
                            const valStr = e.target.value;
                            setTimer(p => ({
                              ...p, 
                              initialMinutes: valStr === '' ? '' : parseInt(valStr), 
                              minutes: valStr === '' ? 0 : parseInt(valStr), 
                              seconds: 0
                            }));
                          }}
                          className="bg-transparent border-b-2 border-dashed border-cyan-500/30 w-24 text-center outline-none focus:border-cyan-400"
                        />
                        <span>:00</span>
                      </div>
                    ) : (
                      <div className="text-5xl font-black neon-text font-mono tracking-widest text-center" style={{ color: timer.mode === 'break' ? '#4ade80' : (activeTimerCategory?.color || '#22d3ee') }}>
                        {String(timer.minutes).padStart(2, '0')}:{String(timer.seconds).padStart(2, '0')}
                      </div>
                    )}
                  </div>

                  <div className="flex gap-2">
                    <button onClick={toggleTimer} className="flex-1 bg-cyan-500/20 border border-cyan-400 text-cyan-300 hover:bg-cyan-500/40 font-bold py-2 rounded-xl uppercase tracking-wider transition-all">
                      {timer.isRunning ? 'Pause' : 'Start'}
                    </button>
                    <button onClick={resetTimer} className="px-4 bg-red-500/20 border border-red-400 text-red-300 hover:bg-red-500/40 font-bold py-2 rounded-xl uppercase transition-all">
                      Reset
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* --- CAPTAIN'S LOG DUAL-PANE MODAL --- */}
          {activeJournalDate && (
            <div className="fixed inset-0 z-[300] bg-black/80 backdrop-blur-sm flex items-center justify-center p-2 sm:p-4 print-hidden" onClick={() => setActiveJournalDate(null)}>
              <div className="glass-panel animate-modal border-purple-500/50 shadow-[0_0_30px_rgba(168,85,247,0.2)] rounded-3xl p-4 md:p-6 max-w-6xl w-full relative flex flex-col max-h-[95vh] md:h-[85vh] overflow-hidden" onClick={e => e.stopPropagation()}>
                <button onClick={() => { playSound('click'); setActiveJournalDate(null); }} className="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors z-10 bg-black/50 p-1 rounded-full md:bg-transparent md:p-0"><X size={24} /></button>
                
                <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4 md:mb-6 shrink-0 border-b border-white/10 pb-4">
                  <div className="flex items-center gap-3">
                    <FileText size={28} className="text-purple-400" />
                    <div>
                      <h2 className="text-xl md:text-2xl font-black uppercase text-white leading-none">Captain's Log</h2>
                      <span className="text-purple-400 text-xs md:text-sm font-bold tracking-widest">{getDisplayDate(activeJournalDate)}</span>
                    </div>
                  </div>

                  {/* IMPROVEMENT 1 & 2: Daily Summary & Progress Bar */}
                  <div className="flex flex-col flex-1 max-w-md w-full gap-2">
                    <div className="flex justify-between items-end">
                       <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex gap-2">
                          <span>Tasks: <strong className="text-white">{activeCompletedTasks}/{activeTotalTasks}</strong></span>
                          <span>|</span>
                          <span>Time: <strong className="text-white">{activeDayTrackedHours}h</strong></span>
                       </span>
                       <span className="text-xs font-black text-cyan-400">{Math.round(activeCompletionRate)}%</span>
                    </div>
                    <div className="w-full h-1.5 bg-[#0b1120] rounded-full overflow-hidden border border-white/10 shadow-inner">
                       <div className="h-full bg-gradient-to-r from-cyan-500 to-green-400 transition-all duration-500" style={{width: `${activeCompletionRate}%`}}></div>
                    </div>
                  </div>
                </div>

                {/* TRIPLE Pane Body (Responsive Stack & Scroll) */}
                <div className="flex flex-col lg:flex-row gap-4 md:gap-6 flex-1 min-h-0 overflow-y-auto lg:overflow-hidden custom-scrollbar pb-2">
                  
                  {/* Left Pane: Mission Objectives (Todos) */}
                  <div className="flex flex-col flex-1 border border-cyan-500/30 rounded-2xl bg-[#0b1120] overflow-hidden min-h-[300px] lg:min-h-0 shrink-0 lg:shrink">
                    <div className="bg-cyan-500/10 p-3 border-b border-cyan-500/30">
                      <span className="font-bold text-cyan-400 uppercase tracking-widest text-xs">Mission Objectives</span>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                      {activeDayTodos.map(todo => {
                        const status = todo.status || (todo.done ? 'green' : 'red'); 
                        
                        let Icon = Square;
                        let iconClass = 'text-red-500 hover:text-red-400';
                        let textClass = 'text-slate-200';
                        
                        if (status === 'yellow') {
                          Icon = MinusSquare;
                          iconClass = 'text-yellow-400 hover:text-yellow-300';
                          textClass = 'text-yellow-100/80';
                        } else if (status === 'green') {
                          Icon = CheckSquare;
                          iconClass = 'text-green-500 hover:text-green-400';
                          textClass = 'line-through text-slate-500';
                        }

                        return (
                          <div key={todo.id} className="flex flex-col gap-1 group">
                            <div className="flex items-start gap-3">
                              <button onClick={() => handleToggleTodo(activeJournalDate, todo.id)} className={`mt-0.5 shrink-0 ${iconClass} transition-colors`}>
                                 <Icon size={18}/>
                              </button>
                              <span className={`flex-1 text-sm ${textClass} transition-colors`}>{todo.text}</span>
                              <button onClick={() => handleDeleteTodo(activeJournalDate, todo.id)} className="opacity-100 lg:opacity-0 lg:group-hover:opacity-100 text-red-500 hover:text-red-400 transition-opacity">
                                <Trash2 size={16}/>
                              </button>
                            </div>
                            
                            {status === 'yellow' && (
                              <div className="pl-8 pr-6 w-full relative">
                                <div className="absolute top-0 left-3.5 w-px h-full bg-yellow-500/30"></div>
                                <input 
                                  type="text" 
                                  value={todo.remark || ''} 
                                  onChange={e => handleUpdateTodoRemark(activeJournalDate, todo.id, e.target.value)}
                                  placeholder="Remark (e.g. 50% done)..." 
                                  className="w-full bg-yellow-500/10 border border-yellow-500/30 text-yellow-200/80 text-xs rounded px-2 py-1 outline-none focus:border-yellow-400/50 placeholder-yellow-500/30"
                                />
                              </div>
                            )}
                          </div>
                        );
                      })}
                      {activeDayTodos.length === 0 && (
                        <div className="text-slate-500 text-sm italic text-center mt-10">No objectives assigned.</div>
                      )}
                    </div>
                    <div className="p-3 border-t border-cyan-500/30 bg-black/20 flex gap-2 shrink-0">
                      <input 
                        value={todoInput} 
                        onChange={e => setTodoInput(e.target.value)} 
                        onKeyDown={e => { if(e.key === 'Enter') { handleAddTodo(activeJournalDate, todoInput); setTodoInput(''); } }}
                        placeholder="New objective..." 
                        className="flex-1 bg-transparent outline-none text-sm text-slate-200"
                      />
                      <button onClick={() => { handleAddTodo(activeJournalDate, todoInput); setTodoInput(''); }} className="text-cyan-400 hover:text-cyan-300">
                         <Plus size={20}/>
                      </button>
                    </div>
                  </div>

                  {/* Middle Pane: Habit Tracking */}
                  <div className="flex flex-col flex-1 border border-emerald-500/30 rounded-2xl bg-[#0b1120] overflow-hidden min-h-[300px] lg:min-h-0 shrink-0 lg:shrink">
                    <div className="bg-emerald-500/10 p-3 border-b border-emerald-500/30">
                      <span className="font-bold text-emerald-400 uppercase tracking-widest text-xs">Habit Tracking</span>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                      {activeDayHabits.map(habit => {
                        const status = habit.status || 'red'; 
                        
                        let Icon = Square;
                        let iconClass = 'text-red-500 hover:text-red-400';
                        let textClass = 'text-slate-200';
                        
                        if (status === 'yellow') {
                          Icon = MinusSquare;
                          iconClass = 'text-yellow-400 hover:text-yellow-300';
                          textClass = 'text-yellow-100/80';
                        } else if (status === 'green') {
                          Icon = CheckSquare;
                          iconClass = 'text-green-500 hover:text-green-400';
                          textClass = 'line-through text-slate-500';
                        }

                        return (
                          <div key={habit.id} className="flex flex-col gap-1 group">
                            <div className="flex items-start gap-3">
                              <button onClick={() => handleToggleHabit(activeJournalDate, habit.id)} className={`mt-0.5 shrink-0 ${iconClass} transition-colors`}>
                                 <Icon size={18}/>
                              </button>
                              <span className={`flex-1 text-sm font-bold ${textClass} transition-colors`}>{habit.name}</span>
                              <button onClick={() => handleDeleteDailyHabit(activeJournalDate, habit.id)} className="opacity-100 lg:opacity-0 lg:group-hover:opacity-100 text-red-500 hover:text-red-400 transition-opacity">
                                <Trash2 size={16}/>
                              </button>
                            </div>
                            
                            {status === 'yellow' && (
                              <div className="pl-8 pr-6 w-full relative">
                                <div className="absolute top-0 left-3.5 w-px h-full bg-yellow-500/30"></div>
                                <input 
                                  type="text" 
                                  value={habit.remark || ''} 
                                  onChange={e => handleUpdateHabitRemark(activeJournalDate, habit.id, e.target.value)}
                                  placeholder="Remark (e.g. 50% done)..." 
                                  className="w-full bg-yellow-500/10 border border-yellow-500/30 text-yellow-200/80 text-xs rounded px-2 py-1 outline-none focus:border-yellow-400/50 placeholder-yellow-500/30"
                                />
                              </div>
                            )}
                          </div>
                        );
                      })}
                      {activeDayHabits.length === 0 && (
                        <div className="text-slate-500 text-sm italic text-center mt-10">No habits scheduled for today.</div>
                      )}
                    </div>
                  </div>

                  {/* Right Pane: Journal Notes */}
                  <div className="flex flex-col flex-1 border border-purple-500/30 rounded-2xl bg-[#0b1120] overflow-hidden min-h-[300px] lg:min-h-0 shrink-0 lg:shrink">
                    <div className="bg-purple-500/10 p-3 border-b border-purple-500/30">
                      <span className="font-bold text-purple-400 uppercase tracking-widest text-xs">Captain's Notes</span>
                    </div>
                    <textarea 
                      className="flex-1 bg-transparent p-4 text-slate-200 font-mono text-sm focus:outline-none resize-none custom-scrollbar"
                      placeholder="Record notable achievements, distractions, or context for this cycle..."
                      value={journalData[activeJournalDate] || ''}
                      onChange={e => handleJournalSave(activeJournalDate, e.target.value)}
                    />
                  </div>

                </div>
              </div>
            </div>
          )}

          {/* --- HELP / TUTORIAL MODAL --- */}
          {showHelp && (
            <div className="fixed inset-0 z-[300] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 print-hidden" onClick={() => setShowHelp(false)}>
              <div className="glass-panel animate-modal border-cyan-500/50 shadow-[0_0_30px_rgba(34,211,238,0.2)] rounded-3xl p-6 md:p-8 max-w-lg w-full relative max-h-[90vh] flex flex-col" onClick={e => e.stopPropagation()}>
                <button onClick={() => { playSound('click'); setShowHelp(false); }} className="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors"><X size={24} /></button>
                <div className="flex items-center gap-3 mb-6 shrink-0">
                  <Info size={32} className="text-cyan-400" />
                  <h2 className="text-xl md:text-2xl font-black uppercase text-white">System Protocol</h2>
                </div>
                
                <div className="space-y-4 text-slate-300 text-sm overflow-y-auto custom-scrollbar pr-2 flex-1 min-h-0">
                  <div className="bg-white/5 p-4 rounded-xl border border-white/10">
                    <h3 className="font-bold text-cyan-300 uppercase mb-2 border-b border-cyan-500/30 pb-1">Painting & Scrolling</h3>
                    <p>Select a category color to paint your grid. <strong className="text-white bg-red-500/20 px-1 rounded border border-red-500/30">CRITICAL:</strong> To scroll the grid on mobile, you MUST select the <strong>Lock</strong> icon. Selecting a color enables continuous painting which disables touch-scrolling.</p>
                  </div>
                  <div className="bg-white/5 p-4 rounded-xl border border-white/10">
                    <h3 className="font-bold text-yellow-300 uppercase mb-2 border-b border-yellow-500/30 pb-1">Magic Fill & Copy/Paste</h3>
                    <p>Hover over (or tap) any Day Header to reveal controls above it: <strong className="text-white">Zap (Auto-Fill Sleep 12am-8am)</strong>, <strong className="text-white">Copy</strong>, <strong className="text-white">Paste</strong>, and <strong className="text-white">Trash</strong>.</p>
                  </div>
                  <div className="bg-white/5 p-4 rounded-xl border border-white/10">
                    <h3 className="font-bold text-purple-400 uppercase mb-2 border-b border-purple-500/30 pb-1">Captain's Log & Objectives</h3>
                    <p>Click directly on any <strong className="text-white">Day Header</strong> to open the journal. Manage your daily Mission Objectives, Habit Tracking, and Notes. Toggling tasks cycles through <span className="text-red-400">Not Done</span> -> <span className="text-yellow-400">Partial</span> -> <span className="text-green-400">Done</span>.</p>
                  </div>
                  <div className="bg-white/5 p-4 rounded-xl border border-white/10">
                    <h3 className="font-bold text-green-400 uppercase mb-2 border-b border-green-500/30 pb-1">Focus Chronos</h3>
                    <p>The timer can be customized by clicking the numbers when paused. When a focus session finishes, a peaceful chord will play and a stopwatch will automatically start to time your break.</p>
                  </div>
                  <div className="bg-white/5 p-4 rounded-xl border border-white/10">
                    <h3 className="font-bold text-emerald-400 uppercase mb-2 border-b border-emerald-500/30 pb-1">Habit Tracker & Gamification</h3>
                    <p>Create Habits in the System Modules to have them appear on your daily logs automatically. Gain XP for every hour you track and every task you complete to Level up your Rank!</p>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* --- CONFIRMATION MODAL --- */}
          {pendingReset && (
            <div className="fixed inset-0 z-[300] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 print-hidden">
              <div className="glass-panel animate-modal border-red-500/50 shadow-[0_0_30px_rgba(239,68,68,0.3)] rounded-3xl p-8 max-w-sm w-full relative text-center">
                <AlertTriangle size={48} className="text-red-500 mx-auto mb-4 drop-shadow-[0_0_10px_rgba(239,68,68,0.8)]" />
                <h2 className="text-2xl font-black uppercase mb-2 text-white">Initiate Purge?</h2>
                <p className="text-sm text-slate-300 mb-6">
                  Data will be permanently erased for: <br/>
                  <span className="text-red-400 font-black text-lg neon-text mt-2 block">
                    {pendingReset.type === 'day' && pendingReset.payload}
                    {pendingReset.type === 'week' && "Selected Week"}
                    {pendingReset.type === 'month' && `Month of ${pendingReset.payload}`}
                    {pendingReset.type === 'category' && `Category: ${pendingReset.payload.name}`}
                    {pendingReset.type === 'habit' && `Habit: ${pendingReset.payload.name}`}
                  </span>
                </p>
                <div className="flex gap-4">
                  <button onClick={() => { playSound('click'); setPendingReset(null); }} className="flex-1 bg-white/5 border border-white/10 text-white font-bold py-3 rounded-2xl uppercase tracking-wider hover:bg-white/10 transition-colors">Abort</button>
                  <button onClick={executeReset} className="flex-1 bg-red-600/80 border border-red-500 text-white font-bold py-3 rounded-2xl uppercase tracking-wider hover:bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)] transition-all">Confirm</button>
                </div>
              </div>
            </div>
          )}

          {/* --- MAIN APP INTERFACE --- */}
          <div className="min-h-screen pb-20 print-hidden flex flex-col">
            {/* Header */}
            <header className={`glass-panel sticky top-0 z-50 border-b border-white/10 rounded-none shadow-none ${isZenMode ? 'hidden' : ''}`}>
              <div className="max-w-[1400px] mx-auto px-4 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
                
                {/* Logo Section */}
                <div className="flex items-center gap-4">
                  <div className="relative flex items-center justify-center shrink-0 alive-pulse">
                    <svg viewBox="0 0 100 100" className="w-12 h-12 md:w-14 md:h-14 drop-shadow-[0_0_15px_rgba(34,211,238,0.5)]">
                      <defs>
                        <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                          <stop offset="0%" stopColor="#22d3ee" />
                          <stop offset="100%" stopColor="#a855f7" />
                        </linearGradient>
                      </defs>
                      <rect x="10" y="10" width="80" height="80" rx="24" fill="none" stroke="url(#boxGrad)" strokeWidth="10" />
                      <rect x="35" y="35" width="30" height="30" rx="10" fill="url(#boxGrad)" />
                    </svg>
                  </div>
                  <div className="flex flex-col">
                    <h1 className="text-3xl md:text-4xl font-black tracking-tight uppercase text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 drop-shadow-[0_0_10px_rgba(34,211,238,0.3)] leading-none truncate max-w-[200px] sm:max-w-none">
                      Trackerbox<sup className="text-lg font-black ml-1 text-cyan-400 drop-shadow-none">©</sup>
                    </h1>
                    <p className="text-[10px] md:text-xs text-cyan-400/80 font-bold tracking-widest uppercase mt-1 truncate">Designed And Created by Anoy Sarkar</p>
                  </div>
                </div>

                {/* Main Toolbar & Stats */}
                <div className="flex flex-wrap items-center justify-start md:justify-end gap-3 mt-2 md:mt-0">
                  
                  {/* IMPROVEMENT 3: Gamification Display */}
                  <div className="flex items-center bg-[#0b1120] border border-white/10 rounded-2xl overflow-hidden shadow-[0_0_10px_rgba(0,0,0,0.5)] h-[44px]">
                    <div className="bg-gradient-to-r from-purple-500/20 to-transparent px-3 py-2 border-r border-white/10 flex items-center justify-center text-purple-400" title="Current Rank">
                      <Trophy size={18} />
                    </div>
                    <div className="flex flex-col px-3 min-w-[120px] justify-center h-full">
                      <div className="flex justify-between items-center gap-2 leading-none mb-1">
                        <span className="text-[10px] font-black uppercase text-purple-400 tracking-wider">Lvl {level} <span className="hidden sm:inline text-slate-300 ml-1 opacity-80">{rankTitle}</span></span>
                        <span className="text-[9px] font-bold text-slate-400">{totalXP} XP</span>
                      </div>
                      <div className="w-full h-1 bg-black/60 rounded-full overflow-hidden">
                         <div className="h-full bg-gradient-to-r from-purple-500 to-cyan-400" style={{ width: `${Math.max(0, Math.min(100, ((totalXP - currentLevelBaseXP) / (nextLevelXP - currentLevelBaseXP)) * 100))}%`}}></div>
                      </div>
                    </div>
                  </div>

                  <div className="flex items-center gap-2 bg-orange-500/10 border border-orange-500/50 px-3 py-2 md:px-4 rounded-xl shadow-[0_0_10px_rgba(249,115,22,0.2)] h-[44px]" title="Consecutive Full 24Hr Days Logged">
                    <Flame size={20} className={currentStreak > 0 ? "text-orange-400 drop-shadow-[0_0_8px_rgba(249,115,22,0.8)]" : "text-slate-500"} />
                    <span className={`font-black uppercase tracking-wider ${currentStreak > 0 ? "text-orange-300" : "text-slate-400"}`}>
                      {currentStreak} <span className="hidden sm:inline">Streak</span>
                    </span>
                  </div>

                  <div className="flex gap-2">
                    <button onClick={() => { playSound('click'); setShowTimer(!showTimer); }} className={`w-[44px] h-[44px] flex items-center justify-center rounded-xl border transition-all ${showTimer ? 'border-cyan-500/50 text-cyan-300 bg-cyan-500/10 shadow-[0_0_10px_rgba(34,211,238,0.2)]' : 'border-white/10 text-slate-400 hover:bg-white/5'}`} title="Toggle Focus Chronos">
                      <Clock size={20} />
                    </button>

                    <button onClick={() => { playSound('click'); setShowHelp(true); }} className="w-[44px] h-[44px] flex items-center justify-center rounded-xl border border-white/10 text-slate-400 hover:bg-white/5 transition-all" title="System Protocol">
                      <Info size={20} />
                    </button>

                    <button onClick={() => { playSound('click'); setIsZenMode(true); }} className="w-[44px] h-[44px] flex items-center justify-center rounded-xl border border-purple-500/30 text-purple-400 hover:bg-purple-500/10 transition-all" title="Zenith Mode (Focus Grid)">
                      <Maximize size={20} />
                    </button>
                  </div>
                </div>
              </div>
            </header>

            <main className={`${isZenMode ? 'p-4 h-[100dvh] w-screen overflow-hidden flex flex-col' : 'max-w-[1400px] w-full mx-auto px-4 py-8 space-y-10 flex-1'}`}>
              
              {/* Tracker Tools & Main Grid Header */}
              <section className={`glass-panel p-4 md:p-6 rounded-3xl flex-shrink-0 ${isZenMode ? 'mb-4' : ''} overflow-hidden w-full`}>
                <div className="flex flex-col xl:flex-row gap-4 md:gap-6 justify-between xl:items-center">
                  
                  {/* Main Grid Navigation */}
                  <div className="flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-4 bg-white/5 p-4 rounded-2xl border border-white/10 w-full xl:w-auto shrink-0">
                    <div className="flex items-center gap-3 w-full sm:w-auto">
                      <CalendarIcon size={28} className="text-purple-400 drop-shadow-[0_0_8px_rgba(192,132,252,0.5)] hidden sm:block" />
                      <div className="flex flex-col w-full sm:w-auto">
                        <span className="text-[10px] font-black uppercase text-purple-400 tracking-wider">Temporal Log</span>
                        <div className="flex flex-row items-center flex-wrap gap-2 mt-1 w-full">
                          <input type="month" value={selectedMonthStr} onChange={(e) => { playSound('click'); setSelectedMonthStr(e.target.value); setSelectedWeekIndex(0); }} className="flex-1 min-w-0 w-full sm:w-[140px] bg-[#0b1120] text-slate-200 rounded-lg border border-purple-500/30 px-3 py-1.5 font-bold focus:outline-none focus:border-purple-400 focus:shadow-[0_0_10px_rgba(192,132,252,0.3)] cursor-pointer transition-all" />
                          <select value={selectedWeekIndex} onChange={(e) => { playSound('click'); setSelectedWeekIndex(Number(e.target.value)); }} className="flex-1 min-w-0 w-full sm:w-[180px] bg-[#0b1120] text-slate-200 rounded-lg border border-purple-500/30 px-3 py-1.5 font-bold text-sm outline-none focus:border-purple-400 focus:shadow-[0_0_10px_rgba(192,132,252,0.3)] cursor-pointer transition-all">
                            {availableWeeks.map((week, idx) => (<option key={week.id} value={idx}>{week.label}</option>))}
                          </select>
                        </div>
                      </div>
                    </div>
                    {isZenMode && (
                      <div className="flex justify-end sm:border-l border-white/10 sm:pl-4 shrink-0">
                         <button onClick={() => { playSound('click'); setIsZenMode(false); }} className="flex items-center gap-2 p-2 px-4 rounded-xl border border-purple-500/50 bg-purple-500/20 text-purple-300 hover:bg-purple-500/30 transition-all w-full sm:w-auto justify-center" title="Exit Zenith Mode">
                           <Minimize size={20} />
                           <span className="font-bold text-xs uppercase tracking-widest sm:hidden">Exit</span>
                         </button>
                      </div>
                    )}
                  </div>

                  {/* Color Palette Toolbar */}
                  <div className="flex flex-wrap gap-2 md:gap-3 w-full">
                    <button onClick={() => handleColorSelect('lock')} className={`flex items-center gap-2 px-3 py-2 md:px-4 md:py-3 rounded-2xl transition-all border ${selectedColorId === 'lock' ? 'bg-red-500/20 border-red-500 text-red-300 shadow-[0_0_15px_rgba(239,68,68,0.3)]' : 'border-white/10 bg-white/5 hover:bg-white/10 text-slate-400'}`} title="Lock Screen for Scrolling (Hotkey: L)">
                      <Lock size={20} />
                      <span className="text-xs md:text-sm font-bold uppercase tracking-wide hidden sm:inline">Lock (Scroll)</span>
                    </button>
                    {categories.map((cat, idx) => (
                      <button key={cat.id} onClick={() => handleColorSelect(cat.id)} className={`relative flex items-center gap-2 px-3 py-2 md:px-4 md:py-3 rounded-2xl transition-all border shrink-0 ${selectedColorId === cat.id ? 'bg-white/10 border-white/50 scale-105' : 'border-white/10 bg-white/5 hover:bg-white/10'}`} style={selectedColorId === cat.id ? {boxShadow: `0 0 15px ${cat.color}40`} : {}} title={`Hotkey: ${idx + 1}`}>
                        <div className="w-5 h-5 md:w-6 md:h-6 rounded-lg" style={{ backgroundColor: cat.color, boxShadow: `0 0 10px ${cat.color}80` }} />
                        <span className="text-xs md:text-sm font-bold uppercase tracking-wide text-slate-200 hidden sm:inline">{cat.name}</span>
                      </button>
                    ))}
                  </div>

                </div>
              </section>

              {/* THE TRACKER GRID */}
              <section className={`glass-panel p-2 md:p-6 rounded-3xl overflow-hidden flex flex-col ${isZenMode ? 'flex-1 min-h-0' : ''}`}>
                <div className="overflow-x-auto custom-scrollbar scrollable-container relative flex-1 pt-12 pb-4">
                  <div className="min-w-max h-full flex flex-col"> 
                    <table className="w-full border-collapse">
                      <thead>
                        <tr>
                          <th className="w-[45px] md:w-[60px] sticky left-0 z-40 p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}></th>
                          <th className="w-[50px] md:w-[65px] sticky left-[45px] md:left-[60px] z-30 p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}></th>
                          
                          {currentWeekDates.map((dateStr) => {
                            const isToday = dateStr === todayStr;
                            const d = new Date(dateStr);
                            const hasJournal = journalData[dateStr] && journalData[dateStr].trim().length > 0;
                            
                            const dayTodos = todosData[dateStr] || [];
                            const dayHabits = (habitLogs[dateStr] || []).filter(h => !h.deleted);
                            
                            const totalTasks = dayTodos.length + dayHabits.length;
                            const completedTasks = dayTodos.filter(t => t.status === 'green' || t.done).length + dayHabits.filter(h => h.status === 'green').length;
                            const completionRate = totalTasks > 0 ? completedTasks / totalTasks : 0;
                            
                            const hasUncompletedTodos = dayTodos.length > dayTodos.filter(t => t.status === 'green' || t.done).length;
                            const hasUncompletedHabits = dayHabits.length > dayHabits.filter(h => h.status === 'green').length;

                            let headerBg = isToday ? 'bg-cyan-500/20' : 'bg-white/5';
                            let headerBorder = isToday ? 'border-cyan-400' : 'border-white/10 hover:border-purple-400/50';
                            let headerShadow = isToday ? 'shadow-[0_0_15px_rgba(34,211,238,0.2)]' : '';

                            if (totalTasks > 0) {
                               if (completionRate >= 0.9) {
                                  headerBg = 'bg-green-600/30 hover:bg-green-600/40';
                                  headerBorder = 'border-green-500';
                                  headerShadow = 'shadow-[0_0_20px_rgba(22,163,74,0.6)]';
                               } else if (completionRate >= 0.7) {
                                  headerBg = 'bg-emerald-500/20 hover:bg-emerald-500/30';
                                  headerBorder = 'border-emerald-400';
                                  headerShadow = 'shadow-[0_0_15px_rgba(52,211,153,0.4)]';
                               } else if (completionRate >= 0.5) {
                                  headerBg = 'bg-yellow-500/20 hover:bg-yellow-500/30';
                                  headerBorder = 'border-yellow-400';
                                  headerShadow = 'shadow-[0_0_15px_rgba(250,204,21,0.4)]';
                               } else if (completionRate < 0.3) {
                                  headerBg = 'bg-red-500/20 hover:bg-red-500/30';
                                  headerBorder = 'border-red-400';
                                  headerShadow = 'shadow-[0_0_15px_rgba(248,113,113,0.4)]';
                               }
                            }

                            return (
                              <th key={dateStr} className="p-1 md:p-2 text-center relative z-20 align-bottom border-none group/th h-[80px]">
                                
                                {/* Static Date Header - Clickable for Journal */}
                                <div onClick={() => { playSound('click'); setActiveJournalDate(dateStr); }} className={`cursor-pointer flex flex-col items-center justify-center py-2 px-1 md:p-3 rounded-2xl border ${headerBg} ${headerBorder} ${headerShadow} mx-auto w-[52px] md:w-[60px] h-[60px] md:h-[65px] transition-all relative`}>
                                  <span className={`text-[10px] font-black uppercase tracking-wider ${isToday ? 'text-cyan-300' : 'text-slate-400 group-hover/th:text-purple-300'}`}>
                                    {d.toLocaleDateString('en-US', { weekday: 'short' })}
                                  </span>
                                  <span className={`text-xl md:text-2xl font-black leading-none mt-1 ${isToday ? 'text-cyan-100 neon-text' : 'text-slate-200 group-hover/th:text-white'}`}>
                                    {d.getDate()}
                                  </span>
                                  
                                  {/* Journal/Todo/Habit Indicators */}
                                  <div className="absolute -top-1 -right-1 flex gap-1">
                                    {hasUncompletedHabits && <div className="w-3 h-3 bg-emerald-400 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.8)] animate-pulse" title="Pending Routines"></div>}
                                    {hasUncompletedTodos && <div className="w-3 h-3 bg-cyan-400 rounded-full shadow-[0_0_8px_rgba(34,211,238,0.8)] animate-pulse" title="Pending Objectives"></div>}
                                    {hasJournal && <div className="w-3 h-3 bg-purple-400 rounded-full shadow-[0_0_8px_rgba(192,132,252,0.8)] animate-pulse" title="Journal Entry"></div>}
                                  </div>
                                </div>

                                {/* Tooltip Menu (Safely positioned ABOVE the date block) */}
                                <div className="absolute bottom-[100%] pb-2 left-1/2 -translate-x-1/2 flex gap-1.5 opacity-0 invisible group-hover/th:opacity-100 group-hover/th:visible transition-all z-[100] drop-shadow-[0_0_8px_rgba(0,0,0,0.8)]">
                                  <div className="flex bg-[#0b1120]/95 backdrop-blur-md p-1.5 rounded-xl border border-white/20 gap-1.5 shadow-[0_8px_16px_rgba(0,0,0,0.5)]">
