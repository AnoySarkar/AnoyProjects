<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trackerbox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* Futuristic Base & Variables */
    :root {
      --bg-color: #05070e;
      --panel-bg: rgba(15, 23, 42, 0.5);
      --sticky-bg: #0b1120;
      --border-color: rgba(255, 255, 255, 0.08);
      --mouse-x: 50vw;
      --mouse-y: 50vh;
    }

    body {
      background-color: var(--bg-color);
      color: #e2e8f0;
      overflow-x: hidden;
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* Interactive Alive Background Glow */
    .mouse-glow {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: -1;
      background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(124, 58, 237, 0.15) 0%, rgba(6, 182, 212, 0.05) 30%, rgba(0,0,0,0) 60%);
      transition: background 0.1s ease-out;
    }

    /* Smooth Glass Panels */
    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .neon-text { text-shadow: 0 0 15px currentColor; }
    
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .alive-pulse { animation: heartbeat 3s ease-in-out infinite; }

    /* Rigid square cells to prevent rectangle stretching */
    .square-cell-inner { width: 52px; height: 52px; }
    @media (min-width: 768px) { .square-cell-inner { width: 60px; height: 60px; } }
    
    /* Touch actions */
    .paintable-svg { touch-action: none; }
    .scrollable-container { touch-action: pan-x pan-y; }

    /* Cyberpunk Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { height: 10px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* Print Logic (Overrides dark mode to standard white for ink saving) */
    @media print {
      body { background: white !important; color: black !important; }
      .mouse-glow { display: none !important; }
      .glass-panel { background: white !important; border: 2px solid #111827 !important; color: black !important; box-shadow: none !important; backdrop-filter: none !important; }
      .print-hidden { display: none !important; }
      .print-break-inside-avoid { break-inside: avoid; }
      .print-page-break { page-break-after: always; }
      th, td { border-color: #111827 !important; }
      .sticky-bg-override { background: white !important; }
      line { stroke: #111827 !important; }
      .print-border { border: 2px solid #111827 !important; }
    }
  </style>
</head>
<body class="selection:bg-cyan-500/30 selection:text-cyan-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, Fragment, useRef } = React;

    // --- Audio Engine ---
    let audioCtx = null;
    let lastSoundTime = 0;
    const playSound = (type) => {
      try {
        if (!audioCtx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) audioCtx = new AudioContext();
          else return;
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const now = Date.now();
        if ((type === 'paint' || type === 'erase') && now - lastSoundTime < 40) return;
        if (type === 'paint' || type === 'erase') lastSoundTime = now;

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const t = audioCtx.currentTime;
        if (type === 'paint') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800 + Math.random() * 400, t);
          gainNode.gain.setValueAtTime(0.08, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
          osc.start(t);
          osc.stop(t + 0.15);
        } else if (type === 'erase') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(400, t);
          osc.frequency.exponentialRampToValueAtTime(150, t + 0.1);
          gainNode.gain.setValueAtTime(0.05, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
          osc.start(t);
          osc.stop(t + 0.1);
        } else if (type === 'click') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(600, t);
          gainNode.gain.setValueAtTime(0.05, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
          osc.start(t);
          osc.stop(t + 0.05);
        } else if (type === 'trash') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(100, t);
          osc.frequency.exponentialRampToValueAtTime(20, t + 0.3);
          gainNode.gain.setValueAtTime(0.1, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          osc.start(t);
          osc.stop(t + 0.3);
        }
      } catch (e) { console.warn("Audio not supported or restricted"); }
    };

    // --- Inline Icon Components ---
    const CalendarIcon = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const Trash2 = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const PieChart = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>;
    const Download = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const Moon = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
    const Sun = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
    const Sunrise = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2v8"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m8 6 4-4 4 4"/><path d="M16 18a4 4 0 0 0-8 0"/></svg>;
    const Sunset = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 10V2"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m16 5-4-4-4 4"/><path d="M16 18a4 4 0 0 0-8 0"/></svg>;
    const Lock = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
    const X = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const AlertTriangle = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>;
    const Activity = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
    const Settings2 = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
    const Plus = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;

    // --- Local Storage Configuration ---
    const LOCAL_STORAGE_KEY = 'trackerbox_data_v3';
    const LOCAL_CATEGORIES_KEY = 'trackerbox_categories_v3';

    // --- Default Constants ---
    const DEFAULT_CATEGORIES = [
      { id: 'sleep', name: 'Sleep', color: '#86efac' }, 
      { id: 'essential', name: 'Essential', color: '#166534' }, 
      { id: 'study', name: 'Study/Learn', color: '#93c5fd' }, 
      { id: 'work', name: 'Job', color: '#1e3a8a' }, 
      { id: 'fun', name: 'Fun', color: '#fb923c' }, 
      { id: 'waste', name: 'Waste', color: '#ef4444' }  
    ];

    const SECTIONS = [
      { id: 'night', label: 'Night (12am - 6am)', icon: Moon, hours: [0, 1, 2, 3, 4, 5] },
      { id: 'morning', label: 'Morning (6am - 12pm)', icon: Sunrise, hours: [6, 7, 8, 9, 10, 11] },
      { id: 'afternoon', label: 'Afternoon (12pm - 6pm)', icon: Sun, hours: [12, 13, 14, 15, 16, 17] },
      { id: 'evening', label: 'Evening (6pm - 12am)', icon: Sunset, hours: [18, 19, 20, 21, 22, 23] }
    ];

    // --- Utilities ---
    const formatHourLabel = (h) => {
      if (h === 0) return '12 AM';
      if (h === 12) return '12 PM';
      return h > 12 ? `${h - 12} PM` : `${h} AM`;
    };

    const formatDateString = (date) => {
      const d = new Date(date);
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const getDisplayDate = (dateString) => {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    };

    const getWeeksInMonth = (yearMonthStr) => {
      if(!yearMonthStr) return [];
      const [year, month] = yearMonthStr.split('-').map(Number);
      const weeks = [];
      let currentDate = new Date(year, month - 1, 1);
      let dayOfWeek = currentDate.getDay(); 
      let diff = (dayOfWeek === 0 ? -6 : 1) - dayOfWeek;
      currentDate.setDate(currentDate.getDate() + diff);

      for (let i = 0; i < 6; i++) {
        const weekStart = new Date(currentDate);
        const weekEnd = new Date(currentDate);
        weekEnd.setDate(weekEnd.getDate() + 6);

        if (weekStart.getMonth() === month - 1 || weekEnd.getMonth() === month - 1) {
          const datesArray = [];
          const tempDate = new Date(weekStart);
          for (let j = 0; j < 7; j++) {
            datesArray.push(formatDateString(tempDate));
            tempDate.setDate(tempDate.getDate() + 1);
          }
          weeks.push({
            id: `week-${i}`,
            label: `${getDisplayDate(weekStart)} - ${getDisplayDate(weekEnd)} (Mon-Sun)`,
            dates: datesArray
          });
        }
        currentDate.setDate(currentDate.getDate() + 7);
      }
      return weeks;
    };

    const isDayComplete = (dayData) => {
      if (!dayData) return false;
      let filledSegments = 0;
      for (let i = 0; i < 24; i++) {
        if (dayData[i] && dayData[i].t1 && dayData[i].t2) {
          filledSegments++;
        }
      }
      return filledSegments === 24;
    };

    // --- Main Application ---
    function App() {
      const [isLoaded, setIsLoaded] = useState(false);
      
      // State Management
      const [allData, setAllData] = useState({});
      const [categories, setCategories] = useState(() => {
        const saved = localStorage.getItem(LOCAL_CATEGORIES_KEY);
        return saved ? JSON.parse(saved) : DEFAULT_CATEGORIES;
      });
      const [selectedColorId, setSelectedColorId] = useState(categories.length > 0 ? categories[0].id : 'lock');
      const [isPainting, setIsPainting] = useState(false);

      // Verify active tool exists
      useEffect(() => {
        if (!categories.find(c => c.id === selectedColorId) && selectedColorId !== 'lock') {
          setSelectedColorId('lock');
        }
      }, [categories, selectedColorId]);

      // Timeline States
      const today = new Date();
      const todayStr = formatDateString(today);
      const initialMonthStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
      const initialYearStr = `${today.getFullYear()}`;
      
      const [selectedMonthStr, setSelectedMonthStr] = useState(initialMonthStr);
      const availableWeeks = useMemo(() => getWeeksInMonth(selectedMonthStr), [selectedMonthStr]);
      const [selectedWeekIndex, setSelectedWeekIndex] = useState(0);

      const [statDate, setStatDate] = useState(todayStr);
      const [statWeekMonth, setStatWeekMonth] = useState(initialMonthStr);
      const [statWeekIndex, setStatWeekIndex] = useState(0);
      const statAvailableWeeks = useMemo(() => getWeeksInMonth(statWeekMonth), [statWeekMonth]);
      const [statMonth, setStatMonth] = useState(initialMonthStr);
      const [statYear, setStatYear] = useState(initialYearStr);

      const [isPrintModalOpen, setIsPrintModalOpen] = useState(false);
      const [printMonthStr, setPrintMonthStr] = useState(initialMonthStr);
      const printWeeks = useMemo(() => getWeeksInMonth(printMonthStr), [printMonthStr]);

      const [resetDay, setResetDay] = useState(todayStr);
      const [resetWeekMonth, setResetWeekMonth] = useState(initialMonthStr);
      const [resetWeekIdx, setResetWeekIdx] = useState(0);
      const resetAvailableWeeks = useMemo(() => getWeeksInMonth(resetWeekMonth), [resetWeekMonth]);
      const [resetMonthStr, setResetMonthStr] = useState(initialMonthStr);
      const [pendingReset, setPendingReset] = useState(null);

      // --- Interactive Glow Background Setup ---
      useEffect(() => {
        const handleMove = (e) => {
          const x = e.touches ? e.touches[0].clientX : e.clientX;
          const y = e.touches ? e.touches[0].clientY : e.clientY;
          document.documentElement.style.setProperty('--mouse-x', `${x}px`);
          document.documentElement.style.setProperty('--mouse-y', `${y}px`);
        };
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove);
        return () => {
          window.removeEventListener('mousemove', handleMove);
          window.removeEventListener('touchmove', handleMove);
        };
      }, []);

      useEffect(() => {
        const weekIdx = availableWeeks.findIndex(w => w.dates.includes(todayStr));
        setSelectedWeekIndex(weekIdx !== -1 ? weekIdx : 0);
      }, [selectedMonthStr, availableWeeks, todayStr]);

      useEffect(() => {
        const weekIdx = statAvailableWeeks.findIndex(w => w.dates.includes(todayStr));
        setStatWeekIndex(weekIdx !== -1 ? weekIdx : 0);
      }, [statWeekMonth, statAvailableWeeks, todayStr]);

      useEffect(() => {
        const weekIdx = resetAvailableWeeks.findIndex(w => w.dates.includes(todayStr));
        setResetWeekIdx(weekIdx !== -1 ? weekIdx : 0);
      }, [resetWeekMonth, resetAvailableWeeks, todayStr]);

      const currentWeekDates = availableWeeks[selectedWeekIndex]?.dates || [];

      useEffect(() => {
        const savedData = localStorage.getItem(LOCAL_STORAGE_KEY);
        if (savedData) {
          try { setAllData(JSON.parse(savedData)); } 
          catch (e) { console.error("Error loading local data", e); }
        }
        setIsLoaded(true);
      }, []);

      // --- Custom Category Logic ---
      const updateCategoryName = (id, newName) => {
        const newCats = categories.map(c => c.id === id ? { ...c, name: newName } : c);
        setCategories(newCats);
        localStorage.setItem(LOCAL_CATEGORIES_KEY, JSON.stringify(newCats));
      };

      const updateCategoryColor = (id, newColor) => {
        const newCats = categories.map(c => c.id === id ? { ...c, color: newColor } : c);
        setCategories(newCats);
        localStorage.setItem(LOCAL_CATEGORIES_KEY, JSON.stringify(newCats));
      };

      const removeCategory = (id, name) => {
        playSound('click');
        setPendingReset({ type: 'category', payload: { id, name } });
      };

      const addCategory = () => {
        playSound('click');
        const newId = 'cat_' + Date.now();
        const newCats = [...categories, { id: newId, name: 'New Category', color: '#ffffff' }];
        setCategories(newCats);
        localStorage.setItem(LOCAL_CATEGORIES_KEY, JSON.stringify(newCats));
      };

      const handleColorSelect = (id) => {
        playSound('click');
        setSelectedColorId(id);
      };

      // --- Toggle/Paint Logic (Touch to Erase) ---
      const handleUpdateSegment = useCallback((dateStr, hourIndex, triangleId, colorId, overrideMode) => {
        if (colorId === 'lock') return; // Safety check

        setAllData(prev => {
          const dayData = prev[dateStr] || {};
          const hourData = dayData[hourIndex] || { t1: null, t2: null };
          const prevColor = hourData[triangleId];

          // If overrideMode is 'erase', force null. Else, set to selected color.
          const finalColorId = (overrideMode === 'erase') ? null : colorId;

          if (prevColor === finalColorId) return prev; // Avoid useless renders

          playSound(overrideMode === 'erase' ? 'erase' : 'paint');

          const newData = {
            ...prev,
            [dateStr]: { ...dayData, [hourIndex]: { ...hourData, [triangleId]: finalColorId } }
          };
          
          localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(newData));
          return newData;
        });
      }, []);

      const handlePointerDown = (dateStr, hourIndex, triangleId, e) => {
        if (e.button === 2 || selectedColorId === 'lock') return; 
        
        // Check what's currently there. If it matches the current tool, clicking it erases it.
        const prevColor = allData[dateStr]?.[hourIndex]?.[triangleId];
        const mode = (prevColor === selectedColorId) ? 'erase' : 'paint';
        
        setIsPainting(mode); // lock this mode for the duration of the drag
        handleUpdateSegment(dateStr, hourIndex, triangleId, selectedColorId, mode);
      };

      const handlePointerEnter = (dateStr, hourIndex, triangleId) => {
        if (isPainting && selectedColorId !== 'lock') {
          handleUpdateSegment(dateStr, hourIndex, triangleId, selectedColorId, isPainting);
        }
      };

      useEffect(() => {
        const handleMouseUp = () => setIsPainting(false);
        window.addEventListener('pointerup', handleMouseUp);
        return () => window.removeEventListener('pointerup', handleMouseUp);
      }, []);

      // --- Data Core Logic ---
      const executeReset = () => {
        if (!pendingReset) return;
        playSound('trash');
        
        if (pendingReset.type === 'category') {
          const newCats = categories.filter(c => c.id !== pendingReset.payload.id);
          setCategories(newCats);
          localStorage.setItem(LOCAL_CATEGORIES_KEY, JSON.stringify(newCats));
          
          // Fallback to lock tool if active color was deleted
          if (selectedColorId === pendingReset.payload.id) {
            setSelectedColorId('lock');
          }
          setPendingReset(null);
          return;
        }

        let currentData = { ...allData };
        if (pendingReset.type === 'day') {
          delete currentData[pendingReset.payload];
        } else if (pendingReset.type === 'week') {
          pendingReset.payload.forEach(d => delete currentData[d]);
        } else if (pendingReset.type === 'month') {
          Object.keys(currentData).forEach(d => {
            if (d.startsWith(pendingReset.payload)) delete currentData[d];
          });
        }
        
        setAllData(currentData);
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(currentData));
        setPendingReset(null); 
      };

      const calculateStats = (dateStringsArray) => {
        const totals = categories.reduce((acc, cat) => ({ ...acc, [cat.id]: 0 }), {});
        const completedTotals = categories.reduce((acc, cat) => ({ ...acc, [cat.id]: 0 }), {});
        
        let totalTrackedHours = 0;
        let completedDaysCount = 0;

        dateStringsArray.forEach(dateStr => {
          const dayData = allData[dateStr] || {};
          const isComplete = isDayComplete(dayData);
          
          if (isComplete) completedDaysCount++;

          Object.values(dayData).forEach(hourData => {
            if (hourData.t1 && totals[hourData.t1] !== undefined) { 
              totals[hourData.t1] += 0.5; 
              totalTrackedHours += 0.5; 
              if (isComplete) completedTotals[hourData.t1] += 0.5;
            }
            if (hourData.t2 && totals[hourData.t2] !== undefined) { 
              totals[hourData.t2] += 0.5; 
              totalTrackedHours += 0.5; 
              if (isComplete) completedTotals[hourData.t2] += 0.5;
            }
          });
        });
        return { totals, completedTotals, totalTrackedHours, completedDaysCount };
      };

      const statsDay = calculateStats([statDate]);
      const statsWeek = calculateStats(statAvailableWeeks[statWeekIndex]?.dates || []);
      const statsMonth = calculateStats(Object.keys(allData).filter(d => d.startsWith(statMonth)));
      const statsYear = calculateStats(Object.keys(allData).filter(d => d.startsWith(statYear)));
      const printMonthStats = calculateStats(Object.keys(allData).filter(d => d.startsWith(printMonthStr)));

      if (!isLoaded) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-[#05070e]">
            <div className="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-cyan-400"></div>
          </div>
        );
      }

      return (
        <Fragment>
          {/* Background Interactive Glow Layer */}
          <div className="mouse-glow"></div>

          {/* --- CONFIRMATION MODAL --- */}
          {pendingReset && (
            <div className="fixed inset-0 z-[300] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 print-hidden">
              <div className="glass-panel border-red-500/50 shadow-[0_0_30px_rgba(239,68,68,0.3)] rounded-3xl p-8 max-w-sm w-full relative text-center">
                <AlertTriangle size={48} className="text-red-500 mx-auto mb-4 drop-shadow-[0_0_10px_rgba(239,68,68,0.8)]" />
                <h2 className="text-2xl font-black uppercase mb-2 text-white">Initiate Purge?</h2>
                <p className="text-sm text-slate-300 mb-6">
                  Data will be permanently erased for: <br/>
                  <span className="text-red-400 font-black text-lg neon-text mt-2 block">
                    {pendingReset.type === 'day' && pendingReset.payload}
                    {pendingReset.type === 'week' && "Selected Week"}
                    {pendingReset.type === 'month' && `Month of ${pendingReset.payload}`}
                    {pendingReset.type === 'category' && `Category: ${pendingReset.payload.name}`}
                  </span>
                </p>
                <div className="flex gap-4">
                  <button onClick={() => { playSound('click'); setPendingReset(null); }} className="flex-1 bg-white/5 border border-white/10 text-white font-bold py-3 rounded-2xl uppercase tracking-wider hover:bg-white/10 transition-colors">Abort</button>
                  <button onClick={executeReset} className="flex-1 bg-red-600/80 border border-red-500 text-white font-bold py-3 rounded-2xl uppercase tracking-wider hover:bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)] transition-all">Confirm</button>
                </div>
              </div>
            </div>
          )}

          {/* --- PDF DOWNLOAD MODAL --- */}
          {isPrintModalOpen && (
            <div className="fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center print-hidden p-4">
              <div className="glass-panel rounded-3xl p-8 max-w-sm w-full relative">
                <button onClick={() => { playSound('click'); setIsPrintModalOpen(false); }} className="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors"><X size={24} /></button>
                <h2 className="text-2xl font-black uppercase mb-4 text-white">Data Export</h2>
                <p className="text-sm text-slate-300 mb-6">Select the month module to compile.</p>
                <div className="flex flex-col gap-4">
                  <input type="month" value={printMonthStr} onChange={(e) => setPrintMonthStr(e.target.value)} className="bg-[#0b1120] border border-cyan-500/30 text-cyan-50 rounded-2xl px-4 py-3 font-bold text-lg focus:outline-none focus:border-cyan-400 focus:shadow-[0_0_10px_rgba(34,211,238,0.3)] transition-all" />
                  <button onClick={() => { playSound('click'); setIsPrintModalOpen(false); setTimeout(() => window.print(), 300); }} className="w-full bg-cyan-500/20 border border-cyan-400 text-cyan-300 hover:bg-cyan-500/30 hover:text-cyan-100 font-bold py-3 rounded-2xl uppercase tracking-wider mt-4 shadow-[0_0_15px_rgba(34,211,238,0.2)] transition-all">Compile PDF</button>
                </div>
              </div>
            </div>
          )}

          {/* --- MAIN APP INTERFACE --- */}
          <div className="min-h-screen pb-20 print-hidden">
            {/* Header */}
            <header className="glass-panel sticky top-0 z-50 border-b border-white/10 rounded-none shadow-none">
              <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
                <div className="flex items-center gap-4">
                  <div className="relative flex items-center justify-center shrink-0 alive-pulse">
                    <svg viewBox="0 0 100 100" className="w-12 h-12 md:w-14 md:h-14 drop-shadow-[0_0_15px_rgba(34,211,238,0.5)]">
                      <defs>
                        <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                          <stop offset="0%" stopColor="#22d3ee" />
                          <stop offset="100%" stopColor="#a855f7" />
                        </linearGradient>
                      </defs>
                      <rect x="10" y="10" width="80" height="80" rx="24" fill="none" stroke="url(#boxGrad)" strokeWidth="10" />
                      <rect x="35" y="35" width="30" height="30" rx="10" fill="url(#boxGrad)" />
                    </svg>
                  </div>
                  <div className="flex flex-col">
                    <h1 className="text-3xl md:text-4xl font-black tracking-tight uppercase text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 drop-shadow-[0_0_10px_rgba(34,211,238,0.3)] leading-none">
                      Trackerbox<sup className="text-lg font-black ml-1 text-cyan-400 drop-shadow-none">©</sup>
                    </h1>
                    <p className="text-[10px] md:text-xs text-cyan-400/80 font-bold tracking-widest uppercase mt-1">Designed And Created by Anoy Sarkar</p>
                  </div>
                </div>
                <div className="flex flex-wrap items-center gap-4">
                  <button onClick={() => { playSound('click'); setIsPrintModalOpen(true); }} className="flex items-center gap-2 font-bold uppercase tracking-wider text-cyan-300 bg-cyan-500/10 border border-cyan-500/50 hover:bg-cyan-500/20 hover:text-cyan-100 shadow-[0_0_10px_rgba(34,211,238,0.2)] px-5 py-2.5 rounded-2xl transition-all">
                    <Download size={18} /> Export
                  </button>
                </div>
              </div>
            </header>

            <main className="max-w-[1400px] mx-auto px-4 py-8 space-y-10">
              
              {/* Tracker Tools & Main Grid Header */}
              <section className="glass-panel p-6 rounded-3xl">
                <div className="flex flex-col xl:flex-row gap-6 justify-between xl:items-center">
                  
                  {/* Main Grid Navigation */}
                  <div className="flex items-center gap-4 bg-white/5 px-5 py-4 rounded-2xl border border-white/10 shrink-0">
                    <CalendarIcon size={28} className="text-purple-400 hidden sm:block drop-shadow-[0_0_8px_rgba(192,132,252,0.5)]" />
                    <div className="flex flex-col w-full sm:w-auto">
                      <span className="text-[10px] font-black uppercase text-purple-400 tracking-wider">Temporal Log</span>
                      <div className="flex flex-row items-center flex-wrap gap-2 mt-2">
                        <input type="month" value={selectedMonthStr} onChange={(e) => { playSound('click'); setSelectedMonthStr(e.target.value); setSelectedWeekIndex(0); }} className="flex-1 min-w-[140px] bg-[#0b1120] text-slate-200 rounded-lg border border-purple-500/30 px-3 py-1.5 font-bold focus:outline-none focus:border-purple-400 focus:shadow-[0_0_10px_rgba(192,132,252,0.3)] cursor-pointer transition-all" />
                        <select value={selectedWeekIndex} onChange={(e) => { playSound('click'); setSelectedWeekIndex(Number(e.target.value)); }} className="flex-1 min-w-[180px] bg-[#0b1120] text-slate-200 rounded-lg border border-purple-500/30 px-3 py-1.5 font-bold text-sm outline-none focus:border-purple-400 focus:shadow-[0_0_10px_rgba(192,132,252,0.3)] cursor-pointer transition-all">
                          {availableWeeks.map((week, idx) => (<option key={week.id} value={idx}>{week.label}</option>))}
                        </select>
                      </div>
                    </div>
                  </div>

                  {/* Color Palette Toolbar */}
                  <div className="flex flex-wrap gap-3">
                    <button onClick={() => handleColorSelect('lock')} className={`flex items-center gap-2 px-3 py-2 md:px-4 md:py-3 rounded-2xl transition-all border ${selectedColorId === 'lock' ? 'bg-red-500/20 border-red-500 text-red-300 scale-105 shadow-[0_0_15px_rgba(239,68,68,0.3)]' : 'border-white/10 bg-white/5 hover:bg-white/10 text-slate-400'}`} title="Lock Screen for Scrolling">
                      <Lock size={20} />
                      <span className="text-xs md:text-sm font-bold uppercase tracking-wide">Lock</span>
                    </button>
                    {categories.map(cat => (
                      <button key={cat.id} onClick={() => handleColorSelect(cat.id)} className={`flex items-center gap-2 px-3 py-2 md:px-4 md:py-3 rounded-2xl transition-all border ${selectedColorId === cat.id ? 'bg-white/10 border-white/50 scale-105' : 'border-white/10 bg-white/5 hover:bg-white/10'}`} style={selectedColorId === cat.id ? {boxShadow: `0 0 15px ${cat.color}40`} : {}}>
                        <div className="w-5 h-5 md:w-6 md:h-6 rounded-lg" style={{ backgroundColor: cat.color, boxShadow: `0 0 10px ${cat.color}80` }} />
                        <span className="text-xs md:text-sm font-bold uppercase tracking-wide text-slate-200">{cat.name}</span>
                      </button>
                    ))}
                  </div>

                </div>
              </section>

              {/* THE TRACKER GRID */}
              <section className="glass-panel p-2 md:p-6 rounded-3xl overflow-hidden">
                <div className="overflow-x-auto pb-4 custom-scrollbar scrollable-container relative">
                  <table className="w-full min-w-max border-collapse">
                    <thead>
                      <tr>
                        <th className="w-[50px] md:w-[60px] sticky left-0 z-40 p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}></th>
                        <th className="w-[55px] md:w-[65px] sticky left-[50px] md:left-[60px] z-30 p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}></th>
                        
                        {/* Date Headers */}
                        {currentWeekDates.map((dateStr) => {
                          const isToday = dateStr === todayStr;
                          const d = new Date(dateStr);
                          return (
                            <th key={dateStr} className="p-1 md:p-2 text-center relative z-20 align-bottom border-none">
                              <div className={`flex flex-col items-center justify-center py-2 px-1 md:p-3 rounded-2xl border ${isToday ? 'bg-cyan-500/20 border-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.2)]' : 'bg-white/5 border-white/10'} mx-auto w-[52px] md:w-[60px] transition-all`}>
                                <span className={`text-[10px] font-black uppercase tracking-wider ${isToday ? 'text-cyan-300' : 'text-slate-400'}`}>
                                  {d.toLocaleDateString('en-US', { weekday: 'short' })}
                                </span>
                                <span className={`text-xl md:text-2xl font-black leading-none mt-1 ${isToday ? 'text-cyan-100 neon-text' : 'text-slate-200'}`}>
                                  {d.getDate()}
                                </span>
                              </div>
                            </th>
                          );
                        })}
                      </tr>
                    </thead>
                    <tbody>
                      {SECTIONS.map((section) => (
                        <Fragment key={section.id}>
                          {/* Section Divider Row */}
                          <tr>
                            <td className="sticky left-0 z-40 p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}></td>
                            <td className="sticky left-[50px] md:left-[60px] z-30 p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}></td>
                            <td colSpan={currentWeekDates.length} className="pt-6 pb-2 text-center relative z-10 border-none">
                              <div className="inline-flex items-center gap-3 bg-white/10 backdrop-blur-sm px-6 py-2 rounded-full border border-white/20 font-bold text-slate-300 tracking-widest uppercase text-xs shadow-[0_4px_15px_rgba(0,0,0,0.5)]">
                                <section.icon size={16} className="text-slate-200" />
                                {section.label}
                              </div>
                            </td>
                          </tr>

                          {/* Hours */}
                          {section.hours.map((hour, idx) => (
                            <tr key={hour} className="group">
                              
                              {/* 1. Side Section Toolbar */}
                              {idx === 0 && (
                                <td rowSpan={6} className="align-middle sticky left-0 z-40 w-[50px] md:w-[60px] p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}>
                                  <div className="flex flex-col gap-1.5 md:gap-2 items-center justify-center bg-white/5 backdrop-blur-md py-3 px-1 rounded-[20px] border border-white/10 mx-auto w-[42px] md:w-[50px] shadow-[0_4px_15px_rgba(0,0,0,0.3)]">
                                    <button onClick={() => handleColorSelect('lock')} className={`p-1 md:p-1.5 rounded-xl border transition-all hover:scale-110 ${selectedColorId === 'lock' ? 'border-red-500 bg-red-500/20 text-red-300 shadow-[0_0_10px_rgba(239,68,68,0.3)]' : 'border-white/10 bg-transparent text-slate-400 hover:bg-white/10'}`} title="Lock">
                                      <Lock size={16} />
                                    </button>
                                    <div className="w-full h-px bg-white/10 my-1"></div>
                                    {categories.map(cat => (
                                      <button key={cat.id} onClick={() => handleColorSelect(cat.id)} className={`w-5 h-5 md:w-6 md:h-6 rounded-lg border border-white/20 transition-all hover:scale-110 ${selectedColorId === cat.id ? 'scale-110' : ''}`} style={{ backgroundColor: cat.color, boxShadow: selectedColorId === cat.id ? `0 0 12px ${cat.color}` : `0 0 4px ${cat.color}80` }} title={cat.name} />
                                    ))}
                                  </div>
                                </td>
                              )}

                              {/* 2. Time Label */}
                              <td className="text-right pr-1 md:pr-2 align-middle sticky left-[50px] md:left-[60px] z-30 w-[55px] md:w-[65px] p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}>
                                <span className="text-[9px] md:text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap bg-white/5 px-1.5 py-1.5 rounded-xl border border-transparent group-hover:border-white/20 transition-colors inline-block">
                                  {formatHourLabel(hour)}
                                </span>
                              </td>

                              {/* 3. The Grid Cells (Glassy look, neon fills) */}
                              {currentWeekDates.map(dateStr => {
                                const dayData = allData[dateStr] || {};
                                const cellData = dayData[hour] || { t1: null, t2: null };
                                
                                const t1Color = cellData.t1 ? categories.find(c => c.id === cellData.t1)?.color : 'rgba(255,255,255,0.02)';
                                const t2Color = cellData.t2 ? categories.find(c => c.id === cellData.t2)?.color : 'rgba(255,255,255,0.02)';
                                
                                const isColored = cellData.t1 || cellData.t2;
                                const glowColor = cellData.t1 ? t1Color : (cellData.t2 ? t2Color : 'transparent');
                                const cellStyle = isColored ? { boxShadow: `0 0 15px ${glowColor}20, inset 0 0 10px ${glowColor}10` } : {};

                                return (
                                  <td key={`${dateStr}-${hour}`} className="align-middle p-1 md:p-1.5 border-none print-border">
                                    <div className="square-cell-inner mx-auto relative rounded-2xl overflow-hidden bg-[#0b1120]/50 border border-white/10 transition-transform duration-100 hover:scale-105 z-10 hover:z-20 backdrop-blur-sm" style={cellStyle}>
                                      <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full block paintable-svg">
                                        {/* Perfect half triangles ensuring exact fit and individual hitboxes */}
                                        <polygon points="0,100 0,0 100,0" fill={t1Color} onPointerDown={(e) => { e.preventDefault(); handlePointerDown(dateStr, hour, 't1', e); }} onPointerEnter={() => handlePointerEnter(dateStr, hour, 't1')} className="cursor-pointer transition-opacity hover:opacity-80" />
                                        <polygon points="0,100 100,100 100,0" fill={t2Color} onPointerDown={(e) => { e.preventDefault(); handlePointerDown(dateStr, hour, 't2', e); }} onPointerEnter={() => handlePointerEnter(dateStr, hour, 't2')} className="cursor-pointer transition-opacity hover:opacity-80" />
                                        {/* Divider matches the background to look like negative space */}
                                        <line x1="0" y1="100" x2="100" y2="0" stroke="var(--sticky-bg)" strokeWidth="6" className="pointer-events-none" />
                                      </svg>
                                    </div>
                                  </td>
                                );
                              })}
                            </tr>
                          ))}
                        </Fragment>
                      ))}
                    </tbody>
                  </table>
                  
                  {/* Scroll Hint */}
                  <div className="mt-8 flex items-center justify-center gap-4 bg-cyan-500/10 border border-cyan-500/30 rounded-full p-3 text-cyan-300 font-bold uppercase tracking-widest text-xs mx-auto max-w-sm shadow-[0_0_15px_rgba(34,211,238,0.1)]">
                    <span className="opacity-50">⟵</span> Scroll Horizon <span className="opacity-50">⟶</span>
                  </div>
                </div>
              </section>

              {/* Analysis Center */}
              <section className="glass-panel p-6 md:p-8 rounded-3xl">
                <div className="flex items-center gap-4 mb-8">
                  <div className="bg-purple-500/20 p-3 rounded-2xl border border-purple-500/50 shadow-[0_0_15px_rgba(168,85,247,0.3)]">
                    <Activity size={28} className="text-purple-300" />
                  </div>
                  <h2 className="text-2xl md:text-3xl font-black uppercase tracking-wider text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]">Analytics Core</h2>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
                  <div className="flex flex-col h-full gap-4">
                    <div className="bg-white/5 rounded-2xl border border-white/10 p-3 flex flex-col">
                      <span className="text-[10px] md:text-xs font-black uppercase text-slate-400 tracking-wider">Daily Scan</span>
                      <input type="date" value={statDate} onChange={e => { playSound('click'); setStatDate(e.target.value); }} className="bg-transparent border-none outline-none font-bold text-slate-200 mt-1 cursor-pointer" />
                    </div>
                    <StatCard title="Selected Day" stats={statsDay} categories={categories} />
                  </div>

                  <div className="flex flex-col h-full gap-4">
                    <div className="bg-white/5 rounded-2xl border border-white/10 p-3 flex flex-col">
                      <span className="text-[10px] md:text-xs font-black uppercase text-slate-400 tracking-wider">Weekly Scan</span>
                      <div className="flex flex-col xl:flex-row items-stretch xl:items-center gap-2 mt-1">
                        <input type="month" value={statWeekMonth} onChange={e => { playSound('click'); setStatWeekMonth(e.target.value); setStatWeekIndex(0); }} className="w-full xl:w-1/2 bg-[#0b1120] rounded-md border border-white/20 px-2 py-1 outline-none font-bold text-slate-200 text-xs cursor-pointer" />
                        <select value={statWeekIndex} onChange={e => { playSound('click'); setStatWeekIndex(Number(e.target.value)); }} className="w-full xl:w-1/2 bg-[#0b1120] rounded-md border border-white/20 px-2 py-1 font-bold text-slate-200 text-xs outline-none cursor-pointer">
                          {statAvailableWeeks.map((week, idx) => (<option key={week.id} value={idx}>{week.label}</option>))}
                        </select>
                      </div>
                    </div>
                    <StatCard title="Selected Week" stats={statsWeek} categories={categories} />
                  </div>

                  <div className="flex flex-col h-full gap-4">
                    <div className="bg-white/5 rounded-2xl border border-white/10 p-3 flex flex-col">
                      <span className="text-[10px] md:text-xs font-black uppercase text-slate-400 tracking-wider">Monthly Scan</span>
                      <input type="month" value={statMonth} onChange={e => { playSound('click'); setStatMonth(e.target.value); }} className="bg-transparent border-none outline-none font-bold text-slate-200 mt-1 cursor-pointer" />
                    </div>
                    <StatCard title="Selected Month" stats={statsMonth} categories={categories} />
                  </div>

                  <div className="flex flex-col h-full gap-4">
                    <div className="bg-white/5 rounded-2xl border border-white/10 p-3 flex flex-col">
                      <span className="text-[10px] md:text-xs font-black uppercase text-slate-400 tracking-wider">Annual Scan</span>
                      <input type="number" value={statYear} onChange={e => { playSound('click'); setStatYear(e.target.value); }} min="2000" max="2100" className="bg-transparent border-none outline-none font-bold text-slate-200 mt-1 cursor-pointer" />
                    </div>
                    <StatCard title="Selected Year" stats={statsYear} categories={categories} />
                  </div>
                </div>
              </section>

              {/* Category Management Section */}
              <section className="glass-panel p-6 md:p-8 rounded-3xl border-cyan-900/50 shadow-[0_0_20px_rgba(34,211,238,0.05)]">
                <div className="flex items-center gap-4 mb-8 pt-2">
                  <div className="bg-cyan-500/20 p-3 rounded-2xl border border-cyan-500/50 shadow-[0_0_15px_rgba(34,211,238,0.3)]">
                    <Settings2 size={28} className="text-cyan-400" />
                  </div>
                  <div>
                    <h2 className="text-2xl md:text-3xl font-black uppercase tracking-wider text-white leading-none drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]">System Modules</h2>
                    <span className="text-xs font-bold text-cyan-500 uppercase tracking-widest neon-text">Customize Categories</span>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                  {categories.map(cat => (
                    <div key={cat.id} className="bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center gap-4 transition-all hover:border-cyan-500/30">
                      <div className="relative w-10 h-10 rounded-xl overflow-hidden shrink-0 border border-white/20 shadow-[0_0_10px_rgba(255,255,255,0.1)] cursor-pointer">
                        {/* Hidden native input styling */}
                        <input type="color" value={cat.color} onChange={e => updateCategoryColor(cat.id, e.target.value)} className="absolute -top-4 -left-4 w-20 h-20 cursor-pointer border-0 p-0" />
                      </div>
                      <input type="text" value={cat.name} onChange={e => updateCategoryName(cat.id, e.target.value)} className="flex-1 bg-transparent text-slate-200 font-bold border-b border-transparent focus:border-cyan-400 outline-none transition-all px-1 py-1 min-w-0" placeholder="Category Name" />
                      <button onClick={() => removeCategory(cat.id, cat.name)} className="text-red-400/50 hover:text-red-400 p-2 transition-colors shrink-0" title="Delete Category"><Trash2 size={18}/></button>
                    </div>
                  ))}
                  <button onClick={addCategory} className="bg-white/5 border border-dashed border-white/20 rounded-2xl p-4 flex items-center justify-center gap-2 text-slate-400 hover:text-white hover:border-cyan-400/50 hover:shadow-[0_0_15px_rgba(34,211,238,0.2)] transition-all font-bold uppercase tracking-wider h-[74px]">
                     <Plus size={20} /> Add Category
                  </button>
                </div>
              </section>

              {/* Data Management / Danger Zone */}
              <section className="glass-panel p-6 md:p-8 rounded-3xl border-red-900/50 shadow-[0_0_20px_rgba(239,68,68,0.1)] relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-red-600 to-orange-500 opacity-50"></div>
                
                <div className="flex items-center gap-4 mb-8 pt-2">
                  <div className="bg-red-500/20 p-3 rounded-2xl border border-red-500/50 shadow-[0_0_15px_rgba(239,68,68,0.3)]">
                    <Trash2 size={28} className="text-red-400" />
                  </div>
                  <div>
                    <h2 className="text-2xl md:text-3xl font-black uppercase tracking-wider text-white leading-none drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]">Data Purge</h2>
                    <span className="text-xs font-bold text-red-500 uppercase tracking-widest neon-text">Warning: Irreversible</span>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div className="bg-white/5 border border-red-500/20 rounded-2xl p-4 flex flex-col gap-4">
                    <h3 className="font-bold uppercase text-red-400 border-b border-red-500/20 pb-2">Erase Day</h3>
                    <input type="date" value={resetDay} onChange={e => setResetDay(e.target.value)} className="bg-[#0b1120] border border-red-500/30 text-slate-200 rounded-xl px-3 py-2 font-bold outline-none w-full" />
                    <button onClick={() => { playSound('click'); setPendingReset({type: 'day', payload: resetDay}); }} className="mt-auto bg-red-600/20 text-red-300 hover:bg-red-600/40 hover:text-red-100 font-bold uppercase tracking-wider py-2 rounded-xl border border-red-500/50 transition-all">Format Day</button>
                  </div>

                  <div className="bg-white/5 border border-red-500/20 rounded-2xl p-4 flex flex-col gap-4">
                    <h3 className="font-bold uppercase text-red-400 border-b border-red-500/20 pb-2">Erase Week</h3>
                    <div className="flex flex-col gap-2">
                      <input type="month" value={resetWeekMonth} onChange={e => {setResetWeekMonth(e.target.value); setResetWeekIdx(0);}} className="bg-[#0b1120] border border-red-500/30 text-slate-200 rounded-xl px-3 py-2 font-bold outline-none w-full text-sm" />
                      <select value={resetWeekIdx} onChange={e => setResetWeekIdx(Number(e.target.value))} className="bg-[#0b1120] border border-red-500/30 text-slate-200 rounded-xl px-3 py-2 font-bold outline-none w-full text-xs">
                        {resetAvailableWeeks.map((w, i) => <option key={w.id} value={i}>{w.label}</option>)}
                      </select>
                    </div>
                    <button onClick={() => { playSound('click'); setPendingReset({type: 'week', payload: resetAvailableWeeks[resetWeekIdx]?.dates}); }} className="mt-auto bg-red-600/20 text-red-300 hover:bg-red-600/40 hover:text-red-100 font-bold uppercase tracking-wider py-2 rounded-xl border border-red-500/50 transition-all">Format Week</button>
                  </div>

                  <div className="bg-white/5 border border-red-500/20 rounded-2xl p-4 flex flex-col gap-4">
                    <h3 className="font-bold uppercase text-red-400 border-b border-red-500/20 pb-2">Erase Month</h3>
                    <input type="month" value={resetMonthStr} onChange={e => setResetMonthStr(e.target.value)} className="bg-[#0b1120] border border-red-500/30 text-slate-200 rounded-xl px-3 py-2 font-bold outline-none w-full" />
                    <button onClick={() => { playSound('click'); setPendingReset({type: 'month', payload: resetMonthStr}); }} className="mt-auto bg-red-600/80 text-white hover:bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.4)] font-black uppercase tracking-wider py-2 rounded-xl border border-red-400 transition-all">Nuke System</button>
                  </div>
                </div>
              </section>

            </main>
          </div>

          {/* --- HIDDEN PRINT VIEW --- */}
          <div className="hidden print:block bg-white p-4">
            <div className="flex items-center gap-4 mb-8 border-b-4 border-gray-900 pb-4">
              <h1 className="text-4xl font-black tracking-tight uppercase text-gray-900">Trackerbox Report</h1>
              <div className="ml-auto text-2xl font-black text-gray-500 bg-gray-100 px-6 py-2 rounded-2xl border-4 border-gray-900">
                {new Date(printMonthStr + '-01').toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}
              </div>
            </div>

            <div className="mb-12 border-4 border-gray-900 p-6 rounded-3xl bg-gray-50">
              <h2 className="text-2xl font-black uppercase text-gray-900 mb-6 flex items-center gap-3"><PieChart size={28}/> Monthly Analysis</h2>
              <div className="w-full max-w-xl mx-auto"><StatCard title="Monthly Breakdown" stats={printMonthStats} categories={categories} /></div>
            </div>

            {printWeeks.map((week, idx) => (
              <div key={week.id} className="mb-12 print-break-inside-avoid print-page-break">
                <h3 className="text-xl font-black text-gray-700 bg-gray-100 inline-block px-4 py-2 rounded-t-2xl border-4 border-b-0 border-gray-900">Week {idx + 1}: {week.label}</h3>
                <table className="w-full border-separate" style={{ borderSpacing: '8px' }}>
                  <thead>
                    <tr>
                      <th className="w-16"></th>
                      {week.dates.map(dateStr => (
                        <th key={dateStr} className="p-2 text-center text-sm font-black uppercase bg-gray-100 border-4 border-gray-900 rounded-xl">
                          {new Date(dateStr).toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' })}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {SECTIONS.map((section) => (
                      <Fragment key={section.id}>
                        <tr>
                          <td colSpan={8} className="py-2 text-center text-xs font-black tracking-wider uppercase">
                             <span className="bg-gray-200 px-4 py-1 rounded-full border-2 border-gray-900">{section.label}</span>
                          </td>
                        </tr>
                        {section.hours.map(hour => (
                          <tr key={hour}>
                            <td className="p-1 text-center text-[10px] font-bold text-gray-600 whitespace-nowrap">
                              {formatHourLabel(hour)}
                            </td>
                            {week.dates.map(dateStr => {
                              const dayData = allData[dateStr] || {};
                              const cellData = dayData[hour] || { t1: null, t2: null };
                              const t1Color = cellData.t1 ? categories.find(c => c.id === cellData.t1)?.color : '#ffffff';
                              const t2Color = cellData.t2 ? categories.find(c => c.id === cellData.t2)?.color : '#ffffff';

                              return (
                                <td key={`${dateStr}-${hour}`} className="p-0 relative h-10 align-middle min-w-[50px]">
                                  <div className="absolute inset-0 rounded-lg border-2 border-gray-900 overflow-hidden bg-white">
                                    <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full block">
                                      <polygon points="0,100 0,0 100,0" fill={t1Color} />
                                      <polygon points="0,100 100,100 100,0" fill={t2Color} />
                                      <line x1="0" y1="100" x2="100" y2="0" stroke="#111827" strokeWidth="2" />
                                    </svg>
                                  </div>
                                </td>
                              );
                            })}
                          </tr>
                        ))}
                      </Fragment>
                    ))}
                  </tbody>
                </table>
              </div>
            ))}
          </div>
        </Fragment>
      );
    }

    // --- Component: StatCard ---
    function StatCard({ title, stats, categories }) {
      const { totals, completedTotals, totalTrackedHours, completedDaysCount } = stats;
      
      return (
        <div className="bg-white/5 p-6 rounded-2xl border border-white/10 flex flex-col h-full print:bg-white print:border-2 print:border-gray-900 print:shadow-none">
          <h3 className="font-bold text-lg text-white print:text-gray-900 uppercase tracking-wide mb-1 drop-shadow-[0_0_5px_rgba(255,255,255,0.2)] print:drop-shadow-none">{title}</h3>
          
          <div className="flex flex-col gap-2 mb-6">
            <span className="text-[10px] md:text-xs font-black text-slate-400 print:text-gray-500 uppercase tracking-widest">{totalTrackedHours} hours logged</span>
            {completedDaysCount > 0 ? (
              <span className="inline-block w-fit bg-green-500/20 text-green-300 print:bg-green-100 print:text-green-700 px-2 py-1 rounded-md text-[9px] md:text-[10px] font-bold uppercase tracking-wider border border-green-500/50 print:border-2 print:border-green-800">
                {completedDaysCount} Full Cycle(s) For Avg
              </span>
            ) : (
              <span className="inline-block w-fit bg-white/5 text-slate-400 print:bg-gray-100 print:text-gray-500 px-2 py-1 rounded-md text-[9px] md:text-[10px] font-bold uppercase tracking-wider border border-white/10 print:border-2 print:border-gray-300">
                0 Full Cycles (Avg Disabled)
              </span>
            )}
          </div>
          
          {totalTrackedHours === 0 ? (
            <div className="flex-1 flex items-center justify-center text-slate-500 print:text-gray-400 font-bold uppercase border border-dashed border-slate-600 print:border-4 print:border-gray-200 rounded-xl p-4 tracking-widest text-center">
              No Data Found
            </div>
          ) : (
            <div className="space-y-4 mt-auto">
              {categories.map(cat => {
                const hours = totals[cat.id] || 0;
                if (hours === 0) return null;
                
                const percentage = Math.round((hours / totalTrackedHours) * 100);
                const completedHours = completedTotals[cat.id] || 0;
                const average = completedDaysCount > 0 ? (completedHours / completedDaysCount).toFixed(1) : '-';

                return (
                  <div key={cat.id} className="relative">
                    <div className="flex justify-between items-end text-xs md:text-sm font-bold mb-1 md:mb-2">
                      <span className="text-slate-200 print:text-gray-800 uppercase tracking-wide truncate pr-2" style={{textShadow: `0 0 5px ${cat.color}80`}}>{cat.name}</span>
                      <div className="flex flex-col items-end">
                        <span className="text-white print:text-gray-900">{hours}h <span className="text-slate-400 print:text-gray-500 text-[10px]">({percentage}%)</span></span>
                        {completedDaysCount > 0 && <span className="text-[10px] text-cyan-400 print:text-blue-600 tracking-wide mt-0.5">Avg: {average}h/d</span>}
                      </div>
                    </div>
                    <div className="w-full h-2 md:h-3 bg-[#0b1120] print:bg-gray-100 rounded-full overflow-hidden border border-white/10 print:border-2 print:border-gray-900 print:h-4">
                      <div className="h-full rounded-full print:border-none print:!bg-opacity-100" style={{ width: `${percentage}%`, backgroundColor: cat.color, boxShadow: `0 0 10px ${cat.color}`, WebkitPrintColorAdjust: 'exact', printColorAdjust: 'exact' }} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
