            <span className="bg-lime-500/20 text-lime-300 border border-lime-500/30 px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-widest whitespace-nowrap drop-shadow-[0_0_8px_rgba(163,230,53,0.5)]">{totalPoints > 0 ? '+' : ''}{totalPoints} PTS</span>
          </div>
          <div className="flex flex-col gap-1 md:gap-2 mb-4 md:mb-6">
            <span className="text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest">{totalTrackedHours} hours logged</span>
            {showAverage && (
              completedDaysCount > 0 ? (
                <span className="inline-block w-fit bg-green-500/20 text-green-300 px-2 py-1 rounded-md text-[9px] md:text-[10px] font-bold uppercase tracking-wider border border-green-500/50">
                  {completedDaysCount} Active Day(s) For Avg
                </span>
              ) : (
                <span className="inline-block w-fit bg-white/5 text-slate-400 px-2 py-1 rounded-md text-[9px] md:text-[10px] font-bold uppercase tracking-wider border border-white/10">
                  0 Active Days (Avg Disabled)
                </span>
              )
            )}
          </div>
          {totalTrackedHours === 0 ? (
            <div className="flex-1 flex items-center justify-center text-slate-500 font-bold uppercase border border-dashed border-slate-600 rounded-xl p-4 tracking-widest text-center text-xs md:text-sm print:border-gray-800 print:text-gray-500">
              No Data Found
            </div>
          ) : (
            <div className="space-y-3 md:space-y-4 mt-auto w-full">
              {categories.map(cat => {
                const hours = totals[cat.id] || 0;
                if (hours === 0) return null;
                const targetHours = (cat.target || 0) * multiplier;
                const isGoalMet = showGoals && targetHours > 0 && hours >= targetHours;
                let percentage = 0;
                if (showGoals && targetHours > 0) {
                  percentage = Math.min(100, (hours / targetHours) * 100);
                } else {
                  percentage = Math.round((hours / totalTrackedHours) * 100);
                }
                const completedHours = completedTotals[cat.id] || 0;
                const average = completedDaysCount > 0 ? (completedHours / completedDaysCount).toFixed(1) : '-';
                return (
                  <div key={cat.id} className="relative w-full">
                    <div className="flex justify-between items-end text-xs md:text-sm font-bold mb-1 md:mb-2 w-full gap-2">
                      <span className="text-slate-200 uppercase tracking-wide truncate pr-1" style={{textShadow: isGoalMet ? `0 0 10px ${cat.color}` : `0 0 5px ${cat.color}80`}} title={cat.name}>{cat.name}</span>
                      <div className="flex flex-col items-end shrink-0">
                        <span className="text-white whitespace-nowrap">
                          {hours}h
                          {showGoals && targetHours > 0
                            ? <span className="text-slate-400 text-[9px] md:text-[10px]"> / {targetHours}h Goal</span>
                            : <span className="text-slate-400 text-[9px] md:text-[10px]"> ({percentage}%)</span>
                          }
                        </span>
                        {showAverage && completedDaysCount > 0 && <span className="text-[9px] md:text-[10px] text-cyan-400 tracking-wide mt-0.5 whitespace-nowrap">Avg: {average}h/d</span>}
                      </div>
                    </div>
                    <div className={`w-full h-2 md:h-3 bg-[#0b1120] rounded-full overflow-hidden border ${isGoalMet ? 'border-transparent' : 'border-white/10'} print:border-gray-800 transition-all`} style={isGoalMet ? {boxShadow: `0 0 8px ${cat.color}`} : {}}>
                      <div className="h-full rounded-full transition-all duration-500" style={{ width: `${percentage}%`, backgroundColor: cat.color, boxShadow: `0 0 10px ${cat.color}` }} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }
    // --- WALLET TRACKER COMPONENTS ---
    function WalletForm({ addTransaction, categories, currency, todayStr, activeWalletId, templates = [], setTemplates, setTemplateDraft, setShowTemplateModal, focusTrigger = 0 }) {
      const [type, setType] = useState(() => {
        try { return localStorage.getItem('trackerbox_wallet_draft_type') || 'expense'; } catch (e) { return 'expense'; }
      });
      const [categoryId, setCategoryId] = useState(() => {
        try {
          const saved = localStorage.getItem('trackerbox_wallet_draft_cat');
          return saved && categories.some(c => c.id === saved) ? saved : (categories.find(c => c.type === 'expense')?.id || '');
        } catch (e) { return categories.find(c => c.type === 'expense')?.id || ''; }
      });
      const [amount, setAmount] = useState(() => {
        try { return localStorage.getItem('trackerbox_wallet_draft_amount') || ''; } catch (e) { return ''; }
      });
      const [remark, setRemark] = useState(() => {
        try { return localStorage.getItem('trackerbox_wallet_draft_remark') || ''; } catch (e) { return ''; }
      });
      const [date, setDate] = useState(todayStr);

      useEffect(() => {
        try {
          localStorage.setItem('trackerbox_wallet_draft_type', type);
          localStorage.setItem('trackerbox_wallet_draft_cat', categoryId);
          localStorage.setItem('trackerbox_wallet_draft_amount', amount);
          localStorage.setItem('trackerbox_wallet_draft_remark', remark);
        } catch (e) {}
      }, [type, categoryId, amount, remark]);

      const amountInputRef = useRef(null);

      useEffect(() => {
        if (focusTrigger > 0) {
          amountInputRef.current?.focus();
        }
      }, [focusTrigger]);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!amount) return;

        let parsedAmount = amount;
        const expression = String(amount).trim();
        let expressionRemark = '';
        let evaluated = false;

        if (/^[0-9\s.+\-*/()]+$/.test(expression) && /[+\-*/]/.test(expression)) {
          try {
            // eslint-disable-next-line no-new-func
            const result = new Function(`return (${expression})`)();
            if (Number.isFinite(result)) {
              parsedAmount = result;
              evaluated = true;
              expressionRemark = `(${expression})`;
            }
          } catch (_err) {
            // invalid expression, keep original amount string
          }
        }

        let finalRemark = remark.trim();
        if (evaluated) {
          if (!finalRemark) {
            finalRemark = expressionRemark;
          } else {
            finalRemark = `${finalRemark}  ${expressionRemark}`;
          }
        }

        addTransaction(type, categoryId, parsedAmount, finalRemark, date, activeWalletId);
        setAmount('');
        setRemark('');
        try {
          localStorage.removeItem('trackerbox_wallet_draft_amount');
          localStorage.removeItem('trackerbox_wallet_draft_remark');
        } catch (e) {}
      };

      const fillFromTemplate = (t) => {
        setType(t.type || 'expense');
        setCategoryId(t.categoryId || (categories.find(c => c.type === (t.type || 'expense'))?.id || ''));
        setAmount(t.amount || '');
        setRemark(t.remark || '');
        setDate(todayStr);
        playSound('click');
      };

      const deleteTemplate = (e, tid) => {
        e.stopPropagation();
        if (confirm('Delete this template?')) {
          setTemplates(prev => prev.filter(t => t.id !== tid));
          playSound('trash');
        }
      };

      const editTemplate = (e, t) => {
        e.stopPropagation();
        setTemplateDraft({ ...t });
        setShowTemplateModal(true);
        playSound('click');
      };

      const filteredCategories = categories.filter(c => c.type === type);

      return (
        <form onSubmit={handleSubmit} className="space-y-4">
          <div className="flex bg-[#0b1120] p-1 rounded-2xl border border-white/10">
            <button
              type="button"
              onClick={() => { setType('expense'); setCategoryId(categories.find(c => c.type === 'expense')?.id || ''); }}
              className={`flex-1 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all ${type === 'expense' ? 'bg-rose-500 text-white shadow-[0_0_15px_rgba(244,63,94,0.4)]' : 'text-slate-500 hover:text-slate-300'}`}
            >
              Expense
            </button>
            <button
              type="button"
              onClick={() => { setType('income'); setCategoryId(categories.find(c => c.type === 'income')?.id || ''); }}
              className={`flex-1 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all ${type === 'income' ? 'bg-emerald-500 text-white shadow-[0_0_15px_rgba(16,185,129,0.4)]' : 'text-slate-500 hover:text-slate-300'}`}
            >
              Income
            </button>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Amount</label>
              <div className="relative">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold">{currency}</span>
                <input
                  ref={amountInputRef}
                  type="text"
                  value={amount}
                  onChange={e => setAmount(e.target.value)}
                  placeholder="0.00 or 8+2"
                  className="w-full bg-[#0b1120] border border-white/10 focus:border-cyan-500/50 text-white font-bold rounded-xl pl-8 pr-4 py-2.5 outline-none transition-all"
                  required
                />
              </div>
            </div>
            <div>
              <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Date</label>
              <input
                type="date"
                value={date}
                onChange={e => setDate(e.target.value)}
                className="w-full bg-[#0b1120] border border-white/10 focus:border-cyan-500/50 text-white font-bold rounded-xl px-3 py-2.5 outline-none transition-all text-xs"
                required
              />
            </div>
          </div>

          <div>
            <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Category</label>
            <div className="flex flex-wrap gap-2">
              {filteredCategories.map(cat => (
                <button
                  key={cat.id}
                  type="button"
                  onClick={() => setCategoryId(cat.id)}
                  className={`px-3 py-1.5 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all ${categoryId === cat.id ? 'border border-white/50 text-white font-black' : 'border hover:border-white/30'}`}
                  style={{
                    backgroundColor: categoryId === cat.id ? `${cat.color}40` : `${cat.color}15`,
                    borderColor: categoryId === cat.id ? cat.color : `${cat.color}40`,
                    color: cat.color
                  }}
                >
                  {cat.name}
                </button>
              ))}
            </div>
          </div>

          <div>
            <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 ml-1">Remark (Optional)</label>
            <input
              type="text"
              value={remark}
              onChange={e => setRemark(e.target.value)}
              placeholder="What was this for?"
              className="w-full bg-[#0b1120] border border-white/10 focus:border-cyan-500/50 text-white font-medium rounded-xl px-4 py-2.5 outline-none transition-all placeholder:text-slate-600"
            />
          </div>

          {templates.length > 0 && (
            <div className="flex flex-wrap gap-2 py-2">
              {templates.map(t => (
                <div key={t.id} className="group relative">
                  <button
                    type="button"
                    onClick={() => fillFromTemplate(t)}
                    className="pl-3 pr-10 py-1.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-[10px] font-bold text-slate-300 uppercase tracking-wider transition-all"
                    title={`Use template: ${t.name}`}
                  >
                    {t.name}
                  </button>
                  <div className="absolute right-1.5 top-1/2 -translate-y-1/2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button type="button" onClick={(e) => editTemplate(e, t)} className="p-1 text-slate-500 hover:text-cyan-400 transition-colors" title="Edit Template">
                      <Settings2 size={10} />
                    </button>
                    <button type="button" onClick={(e) => deleteTemplate(e, t.id)} className="p-1 text-slate-500 hover:text-rose-400 transition-colors" title="Delete Template">
                      <Trash2 size={10} />
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}

          <button
            type="submit"
            className="w-full bg-cyan-600/20 hover:bg-cyan-500 text-cyan-400 hover:text-white border border-cyan-500/50 font-black uppercase tracking-widest py-3 rounded-2xl transition-all flex items-center justify-center gap-2 mt-2"
          >
            <DollarSign size={18} /> Add Transaction
          </button>
        </form>
      );
    }

    function WalletMonthlyStats({ transactions, categories, currency, walletId }) {
      const now = new Date();
      const currentMonth = now.toISOString().substring(0, 7); // YYYY-MM
      
      const monthlyTxs = transactions.filter(t => t.date.startsWith(currentMonth) && t.walletId === walletId);
      const income = monthlyTxs.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
      const expense = monthlyTxs.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
      const savings = income - expense;

      // Category budgets
      const categoryExpenses = monthlyTxs.filter(t => t.type === 'expense').reduce((acc, t) => {
        acc[t.categoryId] = (acc[t.categoryId] || 0) + t.amount;
        return acc;
      }, {});

      return (
        <div className="space-y-6">
          <div className="flex justify-between items-center text-xs">
            <span className="text-slate-400 font-bold uppercase tracking-widest">This Month</span>
            <span className="text-white font-black">{now.toLocaleString('default', { month: 'long', year: 'numeric' })}</span>
          </div>
          
          <div className="space-y-3">
            <div className="flex justify-between items-end">
              <span className="text-[10px] font-bold text-cyan-400 uppercase tracking-widest">Income</span>
              <span className="text-sm font-black text-white">{currency}{income.toLocaleString()}</span>
            </div>
            <div className="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
              <div className="h-full bg-cyan-500 shadow-[0_0_8px_rgba(6,182,212,0.6)]" style={{ width: '100%' }}></div>
            </div>

            <div className="flex justify-between items-end">
              <span className="text-[10px] font-bold text-rose-400 uppercase tracking-widest">Expense</span>
              <span className="text-sm font-black text-white">{currency}{expense.toLocaleString()}</span>
            </div>
            <div className="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
              <div className="h-full bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.6)]" style={{ width: income > 0 ? `${Math.min(100, (expense / income) * 100)}%` : (expense > 0 ? '100%' : '0%') }}></div>
            </div>

            <div className="pt-2 flex justify-between items-center border-t border-white/10 mt-2">
              <span className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">Net Savings</span>
              <span className={`text-base font-black ${savings >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                {savings < 0 ? '-' : ''}{currency}{Math.abs(savings).toLocaleString()}
              </span>
            </div>
          </div>

          {/* Budget Thresholds */}
          <div className="pt-4 border-t border-white/10 space-y-4">
            <div className="flex items-center justify-between gap-3">
              <h4 className="text-[10px] font-bold text-amber-400 uppercase tracking-widest">Budget Thresholds</h4>
              <div className="text-[10px] text-slate-500 uppercase tracking-[0.25em]">60% calm · 85% watch · 100% over</div>
            </div>
            <div className="space-y-3">
              {categories
                .filter(c => c.type === 'expense')
                .sort((a, b) => {
                  const aHas = a.monthlyLimit !== null && a.monthlyLimit !== undefined && a.monthlyLimit > 0;
                  const bHas = b.monthlyLimit !== null && b.monthlyLimit !== undefined && b.monthlyLimit > 0;
                  if (aHas !== bHas) return aHas ? -1 : 1;
                  const aPct = aHas ? ((categoryExpenses[a.id] || 0) / a.monthlyLimit) : -1;
                  const bPct = bHas ? ((categoryExpenses[b.id] || 0) / b.monthlyLimit) : -1;
                  return bPct - aPct;
                })
                .map(cat => {
                  const spent = categoryExpenses[cat.id] || 0;
                  const hasLimit = cat.monthlyLimit !== null && cat.monthlyLimit !== undefined && cat.monthlyLimit > 0;
                  const rawRatio = hasLimit ? (spent / cat.monthlyLimit) : 0;
                  const fillPercent = hasLimit ? Math.max(0, Math.min(100, rawRatio * 100)) : 0;
                  const exceeded = hasLimit && rawRatio > 1;
                  const nearLimit = hasLimit && rawRatio >= 0.85 && rawRatio <= 1;
                  const healthy = hasLimit && rawRatio < 0.6;
                  const statusLabel = !hasLimit ? 'No limit' : exceeded ? 'Over cap' : nearLimit ? 'Watch' : healthy ? 'Healthy' : 'Active';
                  const statusTone = !hasLimit
                    ? 'border-white/10 bg-white/5 text-slate-400'
                    : exceeded
                      ? 'border-rose-400/30 bg-rose-500/10 text-rose-300'
                      : nearLimit
                        ? 'border-amber-400/30 bg-amber-500/10 text-amber-300'
                        : healthy
                          ? 'border-emerald-400/30 bg-emerald-500/10 text-emerald-300'
                          : 'border-cyan-400/30 bg-cyan-500/10 text-cyan-300';
                  const barTone = !hasLimit
                    ? 'bg-slate-500/30'
                    : exceeded
                      ? 'bg-rose-500 shadow-[0_0_12px_rgba(244,63,94,0.45)]'
                      : nearLimit
                        ? 'bg-amber-400 shadow-[0_0_12px_rgba(251,191,36,0.35)]'
                        : healthy
                          ? 'bg-emerald-400 shadow-[0_0_12px_rgba(52,211,153,0.35)]'
                          : 'bg-cyan-400 shadow-[0_0_12px_rgba(34,211,238,0.35)]';
                  return (
                    <div key={cat.id} className="rounded-3xl border border-white/10 bg-white/5 p-4">
                      <div className="flex items-start justify-between gap-3">
                        <div className="min-w-0">
                          <div className="flex items-center gap-2">
                            <div className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: cat.color }}></div>
                            <div className="text-sm font-black uppercase tracking-widest text-white truncate">{cat.name}</div>
                          </div>
                          <div className="text-[11px] text-slate-400 mt-1">
                            {hasLimit ? `${Math.round(rawRatio * 100)}% of ${currency}${cat.monthlyLimit.toLocaleString()} used` : 'Set a monthly limit to activate threshold tracking.'}
                          </div>
                        </div>
                        <div className={`shrink-0 rounded-full border px-3 py-1 text-[10px] font-black uppercase tracking-[0.25em] ${statusTone}`}>
                          {statusLabel}
                        </div>
                      </div>
                      <div className="mt-4 grid grid-cols-3 gap-2">
                        <div className="rounded-2xl border border-white/10 bg-black/15 px-3 py-2">
                          <div className="text-[9px] uppercase tracking-[0.25em] text-slate-500">Spent</div>
                          <div className="text-sm font-black text-white mt-1">{currency}{spent.toLocaleString()}</div>
                        </div>
                        <div className="rounded-2xl border border-white/10 bg-black/15 px-3 py-2">
                          <div className="text-[9px] uppercase tracking-[0.25em] text-slate-500">Limit</div>
                          <div className="text-sm font-black text-white mt-1">{hasLimit ? `${currency}${cat.monthlyLimit.toLocaleString()}` : '--'}</div>
                        </div>
                        <div className="rounded-2xl border border-white/10 bg-black/15 px-3 py-2">
                          <div className="text-[9px] uppercase tracking-[0.25em] text-slate-500">{exceeded ? 'Over' : 'Left'}</div>
                          <div className={`text-sm font-black mt-1 ${exceeded ? 'text-rose-300' : 'text-emerald-300'}`}>
                            {hasLimit ? `${currency}${Math.abs(cat.monthlyLimit - spent).toLocaleString()}` : '--'}
                          </div>
                        </div>
                      </div>
                      <div className="mt-4">
                        <div className="w-full h-2 bg-white/5 rounded-full overflow-hidden border border-white/10">
                          <div className={`h-full transition-all duration-500 ${barTone}`} style={{ width: `${fillPercent}%` }}></div>
                        </div>
                        {hasLimit && exceeded && (
                          <div className="mt-2 text-[11px] text-rose-300">Over budget by {currency}{(spent - cat.monthlyLimit).toLocaleString()} this month.</div>
                        )}
                      </div>
                    </div>
                  );
                })}
            </div>
            {categories.filter(c => c.type === 'expense').length === 0 && (
              <p className="text-[10px] text-slate-600 italic">No expense categories available.</p>
            )}
          </div>
        </div>
      );
    }

    function WalletLogs({ transactions, categories, currency, deleteTransaction, editTransaction, toggleStar, isPrivacyMode }) {
      const [editingTxId, setEditingTxId] = useState(null);
      const [editDraft, setEditDraft] = useState(null);

      if (transactions.length === 0) {
        return (
          <div className="flex flex-col items-center justify-center py-20 text-slate-600">
            <Wallet size={48} className="mb-4 opacity-20" />
            <p className="font-black uppercase tracking-[0.2em] text-sm">No transactions yet</p>
          </div>
        );
      }

      const startEditing = (tx) => {
        setEditingTxId(tx.id);
        setEditDraft({ ...tx });
        playSound('click');
      };

      const cancelEditing = () => {
        setEditingTxId(null);
        setEditDraft(null);
        playSound('click');
      };

      const saveEdit = () => {
        if (!editDraft.amount || isNaN(editDraft.amount)) return;
        editTransaction(editingTxId, {
          ...editDraft,
          amount: parseFloat(editDraft.amount)
        });
        setEditingTxId(null);
        setEditDraft(null);
      };

      // Helper to format date as "10 Feb 2026"
      const formatLogDate = (dateStr) => {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        const day = d.getDate();
        const month = d.toLocaleDateString('en-GB', { month: 'short' });
        const year = d.getFullYear();
        return `${day} ${month} ${year}`;
      };

      // Group by date
      const grouped = transactions.reduce((acc, tx) => {
        if (!acc[tx.date]) acc[tx.date] = [];
        acc[tx.date].push(tx);
        return acc;
      }, {});

      const sortedDates = Object.keys(grouped).sort().reverse();

      return (
        <div className="space-y-8">
          {sortedDates.map(date => (
            <div key={date} className="space-y-3">
              <div className="sticky top-0 z-10 py-2 flex items-center gap-3 bg-transparent">
                <span className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">
                  {date === new Date().toISOString().split('T')[0] ? 'TODAY' : formatLogDate(date)}
                </span>
                <div className="h-px bg-white/10 flex-1"></div>
              </div>
              <div className="space-y-2">
                {grouped[date].map(tx => {
                  const cat = categories.find(c => c.id === tx.categoryId) || { name: 'Unknown', color: '#64748b' };
                  const isEditing = editingTxId === tx.id;

                  if (isEditing) {
                    return (
                      <div key={tx.id} className="bg-white/10 border border-cyan-500/50 rounded-2xl p-4 space-y-3 animate-pulse-slow">
                        <div className="flex gap-2">
                          <select
                            value={editDraft.type}
                            onChange={e => setEditDraft({ ...editDraft, type: e.target.value })}
                            className="bg-[#0b1120] border border-white/10 text-white text-xs font-bold rounded-lg px-2 py-1 outline-none"
                          >
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                          </select>
                          <select
                            value={editDraft.categoryId}
                            onChange={e => setEditDraft({ ...editDraft, categoryId: e.target.value })}
                            className="flex-1 bg-[#0b1120] border border-white/10 text-white text-xs font-bold rounded-lg px-2 py-1 outline-none"
                          >
                            {categories.filter(c => c.type === editDraft.type).map(c => (
                              <option key={c.id} value={c.id}>{c.name}</option>
                            ))}
                          </select>
                        </div>
                        <div className="flex gap-2">
                          <div className="relative flex-1">
                            <span className="absolute left-2 top-1/2 -translate-y-1/2 text-slate-500 text-xs">{currency}</span>
                            <input
                              type="number"
                              value={editDraft.amount}
                              onChange={e => setEditDraft({ ...editDraft, amount: e.target.value })}
                              className="w-full bg-[#0b1120] border border-white/10 text-white text-xs font-bold rounded-lg pl-6 pr-2 py-1.5 outline-none"
                            />
                          </div>
                          <input
                            type="date"
                            value={editDraft.date}
                            onChange={e => setEditDraft({ ...editDraft, date: e.target.value })}
                            className="bg-[#0b1120] border border-white/10 text-white text-[10px] font-bold rounded-lg px-2 py-1.5 outline-none"
                          />
                        </div>
                        <input
                          type="text"
                          value={editDraft.remark}
                          onChange={e => setEditDraft({ ...editDraft, remark: e.target.value })}
                          placeholder="Remark"
                          className="w-full bg-[#0b1120] border border-white/10 text-white text-xs font-medium rounded-lg px-3 py-1.5 outline-none"
                        />
                        <div className="flex justify-end gap-2">
                          <button onClick={cancelEditing} className="px-3 py-1 text-[10px] font-black uppercase text-slate-400 hover:text-white transition-all">Cancel</button>
                          <button onClick={saveEdit} className="px-4 py-1 bg-cyan-500 text-black text-[10px] font-black uppercase rounded-lg hover:bg-cyan-400 transition-all">Save</button>
                        </div>
                      </div>
                    );
                  }

                  return (
                    <div key={tx.id} className="group flex items-center gap-4 bg-white/5 hover:bg-white/10 border border-white/5 rounded-2xl p-3 transition-all">
                      <div className="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" style={{ backgroundColor: `${cat.color}20`, border: `1px solid ${cat.color}40` }}>
                        {tx.type === 'income' ? <TrendingUp size={18} className="text-emerald-400" /> : <TrendingDown size={18} className="text-rose-400" />}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex justify-between items-start mb-0.5">
                          <span className="font-bold text-white text-sm truncate">{cat.name}</span>
                          <span className={`font-black text-sm ${isPrivacyMode ? 'blur-sm select-none' : (tx.type === 'income' ? 'text-emerald-400' : 'text-rose-400')}`}>
                            {tx.type === 'income' ? '+' : '-'}{currency}{tx.amount.toLocaleString()}
                          </span>
                        </div>
                        <div className="flex justify-between items-center gap-2">
                          <span className="text-[10px] text-slate-500 truncate italic">{tx.remark || 'No remark'}</span>
                          <span className="text-[10px] text-slate-600 shrink-0">{tx.createdAt ? new Date(tx.createdAt).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }) : '-'}</span>
                          <div className="flex items-center gap-1">
                            <button
                              onClick={() => toggleStar(tx.id)}
                              className={`opacity-100 lg:opacity-0 lg:group-hover:opacity-100 p-1 transition-all ${tx.starred ? 'text-amber-300' : 'text-slate-600 hover:text-amber-300'}`}
                              title={tx.starred ? 'Remove star' : 'Star transaction'}
                            >
                              <Star size={14} className={tx.starred ? 'fill-current' : ''} />
                            </button>
                            <button
                              onClick={() => startEditing(tx)}
                              className="opacity-0 group-hover:opacity-100 p-1 text-slate-600 hover:text-cyan-400 transition-all"
                              title="Edit"
                            >
                              <Edit2 size={14} />
                            </button>
                            <button
                              onClick={() => { if(confirm('Delete this transaction?')) deleteTransaction(tx.id); }}
                              className="opacity-0 group-hover:opacity-100 p-1 text-slate-600 hover:text-rose-400 transition-all"
                              title="Delete"
                            >
                              <Trash2 size={14} />
                            </button>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      );
    }

    function WalletCategoryChart({ transactions, categories, currency, type }) {
      const filtered = transactions.filter(t => t.type === type);
      if (filtered.length === 0) return <div className="h-40 flex items-center justify-center text-[10px] text-slate-600 uppercase font-bold">No {type} data</div>;

      const totals = filtered.reduce((acc, t) => {
        acc[t.categoryId] = (acc[t.categoryId] || 0) + t.amount;
        return acc;
      }, {});

      const totalAmount = Object.values(totals).reduce((sum, a) => sum + a, 0);
      const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);

      return (
        <div className="space-y-4">
          {sorted.map(([catId, amount]) => {
            const cat = categories.find(c => c.id === catId) || { name: 'Unknown', color: '#64748b' };
            const percentage = totalAmount ? Math.round((amount / totalAmount) * 100) : 0;
            return (
              <div key={catId} className="space-y-1.5">
                <div className="flex justify-between items-center text-[10px] font-bold uppercase tracking-wider">
                  <span className="text-slate-300">{cat.name}</span>
                  <span className="text-slate-400">{currency}{amount.toLocaleString()}</span>
                </div>
                <div className="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
                  <div className="h-full transition-all duration-700" style={{ width: `${percentage}%`, backgroundColor: cat.color, boxShadow: `0 0 8px ${cat.color}60` }}></div>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function WalletDailyTrend({ transactions, period = 'week', currency }) {
      const today = new Date();
      const nowKey = formatDateString(today);
      const barGroups = [];
      const dailyTotals = transactions.reduce((acc, t) => {
        acc[t.date] = (acc[t.date] || 0) + t.amount;
        return acc;
      }, {});

      if (period === 'day' || period === 'week') {
        const days = 7;
        for (let i = days - 1; i >= 0; i--) {
          const d = new Date(today);
          d.setDate(today.getDate() - i);
          const dateKey = formatDateString(d);
          const label = d.toLocaleDateString('default', { weekday: 'short' });
          barGroups.push({ label, value: dailyTotals[dateKey] || 0, title: `${dateKey}` });
        }
      } else if (period === 'month') {
        const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
        for (let week = 0; week < 4; week++) {
          const start = new Date(monthStart);
          start.setDate(1 + week * 7);
          const end = new Date(start);
          end.setDate(start.getDate() + 6);
          const label = `W${week + 1}`;
          const value = transactions.reduce((sum, t) => {
            const d = new Date(t.date);
            return d >= start && d <= end ? sum + t.amount : sum;
          }, 0);
          barGroups.push({ label, value, title: `${label} ${start.toLocaleDateString('default', { month: 'short' })}` });
        }
      } else if (period === 'year') {
        const year = today.getFullYear();
        for (let m = 0; m < 12; m++) {
          const monthStart = new Date(year, m, 1);
          const monthEnd = new Date(year, m + 1, 0);
          const label = monthStart.toLocaleDateString('default', { month: 'short' });
          const value = transactions.reduce((sum, t) => {
            const d = new Date(t.date);
            return d >= monthStart && d <= monthEnd ? sum + t.amount : sum;
          }, 0);
          barGroups.push({ label, value, title: label });
        }
      }

      const maxVal = Math.max(...barGroups.map(group => group.value), 1);

      return (
        <div className="h-40 flex items-end gap-1.5 px-2">
          {barGroups.map(group => {
            const height = (group.value / maxVal) * 100;
            return (
              <div key={group.label} className="flex-1 flex flex-col items-center group relative h-full justify-end">
                <div
                  className={`w-full rounded-t-lg transition-all duration-500 ${group.value > 0 ? 'bg-amber-400' : 'bg-white/10 group-hover:bg-white/30'}`}
                  style={{ height: `${Math.max(5, height)}%`, boxShadow: group.value > 0 ? '0 0 15px rgba(251,191,36,0.4)' : 'none' }}
                ></div>
                <div className="opacity-0 group-hover:opacity-100 absolute bottom-full mb-2 bg-slate-900 border border-white/20 text-white text-[9px] font-bold py-1 px-2 rounded-md whitespace-nowrap z-20 pointer-events-none">
                  {group.title}: {currency}{group.value.toLocaleString()}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>n
</body>
