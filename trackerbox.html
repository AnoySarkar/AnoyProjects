    }
    // --- Component: WeeklyChart (now clickable dates open Captain's Log) ---
    function WeeklyChart({ weekDates, allData, categories, onDayClick }) {
      if (!weekDates || weekDates.length === 0) return null;
      const chartData = weekDates.map(dateStr => {
         const dayData = allData[dateStr] || {};
         const segments = [];
         let totalHours = 0;
         for (let i = 0; i < 24; i++) {
            const h = dayData[i] || {};
      
            if (h.split1) {
                segments.push({ id: h.q1, duration: 0.25 });
                segments.push({ id: h.q2, duration: 0.25 });
                if (h.q1 && !h.q1.startsWith('bp_')) totalHours += 0.25;
                if (h.q2 && !h.q2.startsWith('bp_')) totalHours += 0.25;
            } else {
                segments.push({ id: h.t1, duration: 0.5 });
                if (h.t1 && !h.t1.startsWith('bp_')) totalHours += 0.5;
            }
            if (h.split2) {
                segments.push({ id: h.q3, duration: 0.25 });
                segments.push({ id: h.q4, duration: 0.25 });
                if (h.q3 && !h.q3.startsWith('bp_')) totalHours += 0.25;
                if (h.q4 && !h.q4.startsWith('bp_')) totalHours += 0.25;
            } else {
                segments.push({ id: h.t2, duration: 0.5 });
                if (h.t2 && !h.t2.startsWith('bp_')) totalHours += 0.5;
            }
         }
         const dateObj = new Date(dateStr);
         const dayName = dateObj.toLocaleDateString('en-US', { weekday: 'short' });
         return { dayName, segments, totalHours, dateStr };
      });
      return (
         <div className="mt-6 md:mt-8 bg-[#0b1120] p-4 md:p-6 rounded-2xl border border-white/10 w-full overflow-hidden print:border-none print:shadow-none print:p-0 print:bg-transparent">
            <h3 className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">Weekly Activity Timeline</h3>
            <div className="flex items-end justify-between gap-1 sm:gap-2 h-48 md:h-64 pt-4">
               {chartData.map((data, i) => (
                     <div
                       key={i}
                       className="flex flex-col items-center flex-1 gap-2 group h-full cursor-pointer active:scale-95 transition-transform"
                       onClick={() => onDayClick && onDayClick(data.dateStr)}
                       title="Click to open Captain's Log"
                     >
                        <div className="w-full sm:w-10 md:w-12 max-w-[40px] relative flex flex-col h-full bg-white/5 rounded-md border border-white/10 overflow-hidden print:border-gray-800">
                           <div className="opacity-0 group-hover:opacity-100 absolute -top-7 md:-top-8 left-1/2 -translate-x-1/2 bg-black text-white text-[9px] md:text-[10px] py-1 px-1.5 md:px-2 rounded shadow-lg pointer-events-none transition-opacity font-bold whitespace-nowrap z-10 print:opacity-100 print:bg-transparent print:text-slate-300 print:shadow-none print:-top-5">
                              {data.totalHours}h
                           </div>
                           {data.segments.map((seg, idx) => {
                              const baseId = seg.id && seg.id.startsWith('bp_') ? seg.id.slice(3) : seg.id;
                              const cat = categories.find(c => c.id === baseId);
                              const bgColor = cat ? cat.color : 'transparent';
                              return <div key={idx} className="w-full" style={{ backgroundColor: bgColor, flexGrow: seg.duration }}></div>
                           })}
                        </div>
                        <span className="text-[8px] md:text-[10px] font-bold text-slate-500 uppercase text-center mt-auto group-hover:text-purple-300 transition-colors">{data.dayName}</span>
                     </div>
                  )
               )}
            </div>
         </div>
      );
    }
    // --- Component: ChronoSpectralHeatmap (ignores bp_) ---
    function ChronoSpectralHeatmap({ statYear, allData, todosData, habitLogs, categories, sysConfig, onDayClick, heatmapMode }) {
      const year = parseInt(statYear, 10);
      if (isNaN(year)) return null;
  
      const getHeatmapValue = useCallback((dateStr) => {
        const dayData = allData[dateStr] || {};
        let value = 0;
        let hasActivity = false;
  
        if (heatmapMode === 'points') {
          Object.values(dayData).forEach(h => {
            const addPts = (id, dur) => {
              if (id && !id.startsWith('bp_')) {
                hasActivity = true;
                const cat = categories.find(c => c.id === id);
                if (cat) value += (parseFloat(cat.pointsPerHour) || 0) * dur;
              }
            };
            if (h.split1) { addPts(h.q1, 0.25); addPts(h.q2, 0.25); }
            else { addPts(h.t1, 0.5); }
            if (h.split2) { addPts(h.q3, 0.25); addPts(h.q4, 0.25); }
            else { addPts(h.t2, 0.5); }
          });
          const dayTodos = todosData[dateStr] || [];
          if (dayTodos.length > 0) hasActivity = true;
          const dayHabits = (habitLogs[dateStr] || []).filter(h => !h.deleted);
          if (dayHabits.length > 0) hasActivity = true;
          return { value, hasActivity };
        } else {
          Object.values(dayData).forEach(h => {
            const processSeg = (id, dur) => {
              if (id === heatmapMode && !id.startsWith('bp_')) {
                hasActivity = true;
                value += dur;
              }
            };
            if (h.split1) {
              processSeg(h.q1, 0.25);
              processSeg(h.q2, 0.25);
            } else {
              processSeg(h.t1, 0.5);
            }
            if (h.split2) {
              processSeg(h.q3, 0.25);
              processSeg(h.q4, 0.25);
            } else {
              processSeg(h.t2, 0.5);
            }
          });
          return { value, hasActivity };
        }
      }, [heatmapMode, allData, todosData, habitLogs, categories]);
  
      const grid = useMemo(() => {
          const startDate = new Date(year, 0, 1);
          const endDate = new Date(year, 11, 31);
          const days = [];
    
          let startDayOfWeek = startDate.getDay();
          startDayOfWeek = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1;
          for (let i = 0; i < startDayOfWeek; i++) days.push(null);
          let d = new Date(startDate);
          while (d <= endDate) {
              const dateStr = formatDateString(d);
              days.push({
                  dateStr,
                  dateObj: new Date(d),
                  ...getHeatmapValue(dateStr)
              });
              d.setDate(d.getDate() + 1);
          }
          return days;
      }, [year, getHeatmapValue]);
  
      const modeSettings = sysConfig.perModeSettings?.[heatmapMode] || { worstPoint: null, bestPoint: null };
   
      const getHeatmapStyle = (val) => {
          const worst = modeSettings.worstPoint !== null ? parseFloat(modeSettings.worstPoint) : 0;
          const best = modeSettings.bestPoint !== null ? parseFloat(modeSettings.bestPoint) : 100;
    
          let percentage = (val - worst) / (best - worst);
          percentage = Math.max(0, Math.min(1, percentage));
    
          const hue = percentage * 140;
    
          return {
              backgroundColor: `hsl(${hue}, 85%, 45%)`,
              borderColor: `hsl(${hue}, 85%, 35%)`,
              boxShadow: percentage === 1 ? `0 0 10px hsl(${hue}, 85%, 45%, 0.8)` : 'none'
          };
      };
      return (
         <div className="bg-[#0b1120] p-4 md:p-6 rounded-2xl border border-white/10 w-full overflow-hidden flex flex-col print:border-none print:shadow-none print:p-0 print:bg-transparent">
            <div className="flex flex-col xl:flex-row xl:items-end justify-between gap-4 mb-4">
                <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3">
                   <h3 className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest">Chrono-Spectral Heatmap ({year}) — {heatmapMode === 'points' ? 'POINTS' : `${categories.find(c => c.id === heatmapMode)?.name || ''} HOURS`}</h3>
                </div>
                <div className="flex items-center gap-1.5 text-[8px] md:text-[10px] font-bold text-slate-500 uppercase flex-wrap">
                   <span>{modeSettings.worstPoint !== null ? modeSettings.worstPoint : 0} {heatmapMode === 'points' ? 'PTS' : 'HRS'}</span>
                   <div className="w-3 h-3 rounded-sm bg-white/5 border border-white/10"></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(0, 85%, 45%)', borderColor: 'hsl(0, 85%, 35%)' }}></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(35, 85%, 45%)', borderColor: 'hsl(35, 85%, 35%)' }}></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(70, 85%, 45%)', borderColor: 'hsl(70, 85%, 35%)' }}></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(105, 85%, 45%)', borderColor: 'hsl(105, 85%, 35%)' }}></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(140, 85%, 45%)', borderColor: 'hsl(140, 85%, 35%)', boxShadow: '0 0 6px hsl(140, 85%, 45%, 0.6)' }}></div>
                   <span>{modeSettings.bestPoint !== null ? modeSettings.bestPoint : 100} {heatmapMode === 'points' ? 'PTS' : 'HRS'}</span>
                </div>
            </div>
      
            <div className="overflow-x-auto custom-scrollbar pb-4 pt-10 px-4 -mx-4 print:pt-4 print:pb-0">
                <div className="min-w-max">
                    <div style={{ display: 'grid', gridTemplateRows: 'repeat(7, 1fr)', gridAutoFlow: 'column', gap: '4px' }}>
                        {grid.map((cell, idx) => {
                            if (!cell) return <div key={`empty-${idx}`} className="w-3 h-3 md:w-4 md:h-4"></div>;
                            return (
                                <div
                                    key={cell.dateStr}
                                    className={`w-3 h-3 md:w-4 md:h-4 rounded-sm border transition-all hover:scale-125 hover:z-10 relative group cursor-pointer ${!cell.hasActivity ? 'bg-white/5 border-white/10' : ''}`}
                                    style={cell.hasActivity ? getHeatmapStyle(cell.value) : {}}
                                    onClick={() => onDayClick && onDayClick(cell.dateStr)}
                                >
                                    <div className="opacity-0 group-hover:opacity-100 absolute bottom-full mb-1.5 left-1/2 -translate-x-1/2 bg-slate-900 border border-white/20 text-white text-[10px] py-1.5 px-2.5 rounded-lg shadow-[0_4px_15px_rgba(0,0,0,0.8)] pointer-events-none transition-opacity font-bold whitespace-nowrap z-[100] print:hidden">
                                        {cell.dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}: <span className="text-lime-400 drop-shadow-[0_0_5px_rgba(163,230,53,0.5)]">{cell.value > 0 ? '+' : ''}{Math.round(cell.value)} {heatmapMode === 'points' ? 'PTS' : 'HRS'}</span>
                                        <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-900"></div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>
         </div>
      );
    }
    // --- Component: StatCard ---
    function StatCard({ title, stats, categories, showGoals = false, multiplier = 1, showAverage = true }) {
      const { totals, completedTotals, totalTrackedHours, completedDaysCount, totalPoints } = stats;
      return (
        <div className="bg-white/5 p-4 md:p-6 rounded-2xl border border-white/10 flex flex-col h-full print:bg-transparent print:border-2 print:border-gray-800 print:shadow-none w-full">
          <div className="flex justify-between items-start mb-1 gap-2">
            <h3 className="font-bold text-base md:text-lg text-white uppercase tracking-wide drop-shadow-[0_0_5px_rgba(255,255,255,0.2)]">{title}</h3>
            <span className="bg-lime-500/20 text-lime-300 border border-lime-500/30 px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-widest whitespace-nowrap drop-shadow-[0_0_8px_rgba(163,230,53,0.5)]">{totalPoints > 0 ? '+' : ''}{totalPoints} PTS</span>
          </div>
    
          <div className="flex flex-col gap-1 md:gap-2 mb-4 md:mb-6">
            <span className="text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest">{totalTrackedHours} hours logged</span>
            {showAverage && (
              completedDaysCount > 0 ? (
                <span className="inline-block w-fit bg-green-500/20 text-green-300 px-2 py-1 rounded-md text-[9px] md:text-[10px] font-bold uppercase tracking-wider border border-green-500/50">
                  {completedDaysCount} Active Day(s) For Avg
                </span>
              ) : (
                <span className="inline-block w-fit bg-white/5 text-slate-400 px-2 py-1 rounded-md text-[9px] md:text-[10px] font-bold uppercase tracking-wider border border-white/10">
                  0 Active Days (Avg Disabled)
                </span>
              )
            )}
          </div>
    
          {totalTrackedHours === 0 ? (
            <div className="flex-1 flex items-center justify-center text-slate-500 font-bold uppercase border border-dashed border-slate-600 rounded-xl p-4 tracking-widest text-center text-xs md:text-sm print:border-gray-800 print:text-gray-500">
              No Data Found
            </div>
          ) : (
            <div className="space-y-3 md:space-y-4 mt-auto w-full">
              {categories.map(cat => {
                const hours = totals[cat.id] || 0;
                if (hours === 0) return null;
          
                const targetHours = (cat.target || 0) * multiplier;
                const isGoalMet = showGoals && targetHours > 0 && hours >= targetHours;
          
                let percentage = 0;
                if (showGoals && targetHours > 0) {
                  percentage = Math.min(100, (hours / targetHours) * 100);
                } else {
                  percentage = Math.round((hours / totalTrackedHours) * 100);
                }
                const completedHours = completedTotals[cat.id] || 0;
                const average = completedDaysCount > 0 ? (completedHours / completedDaysCount).toFixed(1) : '-';
                return (
                  <div key={cat.id} className="relative w-full">
                    <div className="flex justify-between items-end text-xs md:text-sm font-bold mb-1 md:mb-2 w-full gap-2">
                      <span className="text-slate-200 uppercase tracking-wide truncate pr-1" style={{textShadow: isGoalMet ? `0 0 10px ${cat.color}` : `0 0 5px ${cat.color}80`}} title={cat.name}>{cat.name}</span>
                      <div className="flex flex-col items-end shrink-0">
                        <span className="text-white whitespace-nowrap">
                          {hours}h
                          {showGoals && targetHours > 0
                            ? <span className="text-slate-400 text-[9px] md:text-[10px]"> / {targetHours}h Goal</span>
                            : <span className="text-slate-400 text-[9px] md:text-[10px]"> ({percentage}%)</span>
                          }
                        </span>
                        {showAverage && completedDaysCount > 0 && <span className="text-[9px] md:text-[10px] text-cyan-400 tracking-wide mt-0.5 whitespace-nowrap">Avg: {average}h/d</span>}
                      </div>
                    </div>
                    <div className={`w-full h-2 md:h-3 bg-[#0b1120] rounded-full overflow-hidden border ${isGoalMet ? 'border-transparent' : 'border-white/10'} print:border-gray-800 transition-all`} style={isGoalMet ? {boxShadow: `0 0 8px ${cat.color}`} : {}}>
                      <div className="h-full rounded-full transition-all duration-500" style={{ width: `${percentage}%`, backgroundColor: cat.color, boxShadow: `0 0 10px ${cat.color}` }} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
