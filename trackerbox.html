<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- FIXED: Made fully zoomable on ALL devices & modes (removed maximum-scale and user-scalable=no) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Trackerbox</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#05070e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Trackerbox">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <script>
    window.__trackerboxLoaderStartedAt = performance.now();
    window.__trackerboxInitialDisplayName = '';
    window.__trackerboxShouldKeepWarm = true;
    try {
      const raw = localStorage.getItem('trackerbox_settings_v1');
      const settings = raw ? JSON.parse(raw) : null;
      window.__trackerboxInitialDisplayName = settings?.userDisplayName?.trim() || '';
      window.__trackerboxShouldKeepWarm = settings?.keepAppWarm !== false;
    } catch (err) {}
    if ('serviceWorker' in navigator) {
      if (window.__trackerboxShouldKeepWarm) {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered successfully!', reg))
          .catch(err => console.error('Service Worker registration failed:', err));
      }
    }
  </script>
  <script defer src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script defer src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script defer src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    /* Instant Loading Screen */
    #loading-screen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      z-index: 9999;
      isolation: isolate;
      background:
        radial-gradient(circle at 18% 18%, rgba(103, 232, 249, 0.16), transparent 20%),
        radial-gradient(circle at 82% 24%, rgba(244, 114, 182, 0.14), transparent 22%),
        radial-gradient(circle at 50% 78%, rgba(56, 189, 248, 0.12), transparent 28%),
        linear-gradient(145deg, #030712 0%, #07111f 48%, #081325 100%);
      transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1), visibility 0.6s ease;
    }
    #loading-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 25% 30%, rgba(125, 211, 252, 0.24), transparent 0 24%),
        radial-gradient(circle at 72% 38%, rgba(251, 191, 36, 0.14), transparent 0 18%),
        radial-gradient(circle at 58% 72%, rgba(196, 181, 253, 0.18), transparent 0 22%);
      pointer-events: none;
      mix-blend-mode: screen;
      animation: loaderNebulaShift 14s ease-in-out infinite alternate;
    }
    #loading-screen::after {
      content: '';
      position: absolute;
      inset: -20%;
      pointer-events: none;
      opacity: 0.45;
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.06) 1px, transparent 1px);
      background-size: 92px 92px;
      mask-image: radial-gradient(circle at center, black 36%, transparent 78%);
      animation: loaderMeshDrift 18s linear infinite;
    }
    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loader-frame {
      position: relative;
      z-index: 1;
      width: min(420px, calc(100vw - 2rem));
      padding: 1.45rem 1.35rem 1.3rem;
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.78) 0%, rgba(8, 15, 29, 0.58) 100%);
      box-shadow:
        0 20px 60px rgba(2, 6, 23, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 0 0 1px rgba(34, 211, 238, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: grid;
      justify-items: center;
      gap: 1rem;
      text-align: center;
      overflow: hidden;
      transform: translateZ(0);
    }
    .loader-frame::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(130deg, rgba(255,255,255,0.08), transparent 38%, transparent 62%, rgba(34,211,238,0.08));
      opacity: 0.85;
      pointer-events: none;
      animation: loaderFrameGlow 7s ease-in-out infinite;
      animation-delay: -2.4s;
    }
    .loader-scene {
      position: relative;
      width: min(250px, 62vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 0 40px rgba(34, 211, 238, 0.18));
    }
    .loader-orbit {
      position: absolute;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      box-shadow: inset 0 0 30px rgba(148, 163, 184, 0.05);
    }
    .loader-orbit-a {
      inset: 8%;
      border-top-color: rgba(103, 232, 249, 0.95);
      border-right-color: rgba(244, 114, 182, 0.5);
      animation: loaderSpin 12s linear infinite;
      animation-delay: -4.1s;
    }
    .loader-orbit-b {
      inset: 19%;
      border-left-color: rgba(196, 181, 253, 0.7);
      border-bottom-color: rgba(56, 189, 248, 0.85);
      animation: loaderSpinReverse 8s linear infinite;
      animation-delay: -1.8s;
    }
    .loader-orbit-c {
      inset: 2%;
      border-color: rgba(255, 255, 255, 0.06);
      animation: loaderBreath 6.5s ease-in-out infinite;
      animation-delay: -2.6s;
    }
    .loader-float {
      position: absolute;
      border-radius: 999px;
      filter: blur(10px);
      opacity: 0.85;
      mix-blend-mode: screen;
    }
    .loader-float-a {
      width: 88px;
      height: 88px;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.45) 0%, rgba(34, 211, 238, 0) 70%);
      left: 10%;
      top: 22%;
      animation: loaderFloat 9s ease-in-out infinite;
      animation-delay: -4.4s;
    }
    .loader-float-b {
      width: 72px;
      height: 72px;
      background: radial-gradient(circle, rgba(244, 114, 182, 0.35) 0%, rgba(244, 114, 182, 0) 72%);
      right: 16%;
      bottom: 18%;
      animation: loaderFloat 7.5s ease-in-out infinite reverse;
      animation-delay: -2s;
    }
    .loader-core {
      position: relative;
      width: 36%;
      aspect-ratio: 1;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 34% 32%, rgba(255,255,255,0.95) 0%, rgba(219,234,254,0.78) 12%, rgba(34,211,238,0.45) 30%, rgba(34,211,238,0.1) 62%, rgba(34,211,238,0) 100%),
        linear-gradient(145deg, rgba(34,211,238,0.42), rgba(244,114,182,0.2));
      box-shadow:
        0 0 40px rgba(34, 211, 238, 0.28),
        inset 0 0 28px rgba(255,255,255,0.18);
      animation: loaderCoreFloat 5.8s ease-in-out infinite;
      animation-delay: -1.6s;
    }
    .loader-core::before {
      content: '';
      position: absolute;
      inset: -24%;
      border-radius: inherit;
      border: 1px solid rgba(103, 232, 249, 0.18);
      opacity: 0.8;
      animation: loaderHalo 3.6s ease-out infinite;
      animation-delay: -1.3s;
    }
    .loader-core::after {
      content: '';
      width: 34%;
      height: 34%;
      border-radius: inherit;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 0 20px rgba(255,255,255,0.7);
      animation: loaderPulseCore 2.4s ease-in-out infinite;
      animation-delay: -1s;
    }
    .loader-spark {
      --orbit-radius: 102px;
      position: absolute;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 12px;
      margin: -6px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(103,232,249,0.88) 100%);
      box-shadow: 0 0 18px rgba(125, 211, 252, 0.8);
      animation: loaderSparkOrbit 6.2s linear infinite;
    }
    .loader-spark-1 {
      --orbit-radius: 108px;
      animation-delay: -2.8s;
    }
    .loader-spark-2 {
      --orbit-radius: 78px;
      width: 10px;
      height: 10px;
      margin: -5px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(244,114,182,0.86) 100%);
      box-shadow: 0 0 16px rgba(244, 114, 182, 0.65);
      animation-duration: 4.4s;
      animation-direction: reverse;
      animation-delay: -1.1s;
    }
    .loader-spark-3 {
      --orbit-radius: 122px;
      width: 8px;
      height: 8px;
      margin: -4px;
      background: linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(251,191,36,0.85) 100%);
      box-shadow: 0 0 14px rgba(251, 191, 36, 0.6);
      animation-duration: 8.4s;
      animation-delay: -5.2s;
    }
    .loader-copy {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 0.55rem;
      justify-items: center;
      width: 100%;
    }
    .loader-kicker {
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(224, 242, 254, 0.92);
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .loader-logo {
      font-size: clamp(2.15rem, 6vw, 3.25rem);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f8fbff;
      text-shadow:
        0 0 32px rgba(103, 232, 249, 0.18),
        0 8px 32px rgba(2, 6, 23, 0.48);
    }
    .loader-status {
      font-size: 0.92rem;
      color: rgba(224, 242, 254, 0.92);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.95;
    }
    .loader-note {
      width: 100%;
      max-width: none;
      font-size: clamp(0.62rem, 2.4vw, 0.84rem);
      line-height: 1.55;
      color: rgba(191, 219, 254, 0.7);
      white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .loader-meter {
      width: min(270px, 92%);
      height: 12px;
      position: relative;
      overflow: hidden;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
        rgba(5, 10, 24, 0.9);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow:
        inset 0 0 18px rgba(2, 6, 23, 0.62),
        0 0 16px rgba(34, 211, 238, 0.1);
    }
    .loader-meter::before {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background:
        linear-gradient(90deg, rgba(34,211,238,0.08), rgba(244,114,182,0.07), rgba(251,191,36,0.08), rgba(52,211,153,0.08));
      opacity: 0.9;
    }
    .loader-meter::after {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.2), rgba(255,255,255,0));
      opacity: 0.45;
      pointer-events: none;
    }
    .loader-meter-track {
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(6, 18, 34, 0.96), rgba(9, 28, 48, 0.92), rgba(6, 18, 34, 0.96));
      box-shadow:
        inset 0 0 12px rgba(2, 6, 23, 0.6),
        inset 0 0 16px rgba(56, 189, 248, 0.08);
    }
    .loader-meter-loop {
      position: absolute;
      inset: 0;
      width: 220%;
      left: -60%;
      border-radius: inherit;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(56,189,248,0) 0 18px,
          rgba(56,189,248,0.12) 18px 28px,
          rgba(56,189,248,0.94) 28px 42px,
          rgba(224,242,254,0.98) 42px 46px,
          rgba(56,189,248,0.88) 46px 60px,
          rgba(56,189,248,0.14) 60px 72px,
          rgba(56,189,248,0) 72px 94px
        );
      opacity: 0.98;
      filter: saturate(1.18);
      will-change: transform;
      animation: loaderMeterLoop 0.58s linear infinite;
      animation-delay: -0.37s;
    }
    .loader-meter-loop::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: inherit;
      opacity: 0.72;
      filter: blur(6px);
      transform: scaleY(1.9);
      transform-origin: center;
    }
    .loader-meter-loop::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0));
      mix-blend-mode: screen;
      opacity: 0.42;
    }
    .loader-beat {
      display: inline-flex;
      align-items: flex-end;
      gap: 0.38rem;
      height: 18px;
    }
    .loader-beat span {
      width: 5px;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(125,211,252,0.95), rgba(244,114,182,0.7));
      transform-origin: center bottom;
      animation: loaderBeat 1.1s ease-in-out infinite;
    }
    .loader-beat span:nth-child(1) { animation-delay: -0.75s; }
    .loader-beat span:nth-child(2) { animation-delay: -0.5s; }
    .loader-beat span:nth-child(3) { animation-delay: -0.2s; }
    .loader-beat span:nth-child(4) { animation-delay: -0.62s; }
    .loader-beat span:nth-child(5) { animation-delay: -0.34s; }
    @keyframes loaderMeterLoop {
      0% { transform: translateX(0); }
      100% { transform: translateX(94px); }
    }
    @keyframes loaderFrameGlow {
      0%, 100% { opacity: 0.68; }
      50% { opacity: 1; }
    }
    @keyframes loaderSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes loaderSpinReverse {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes loaderBreath {
      0%, 100% { transform: scale(0.98); opacity: 0.7; }
      50% { transform: scale(1.02); opacity: 1; }
    }
    @keyframes loaderPulseCore {
      0%, 100% { transform: scale(0.88); opacity: 0.85; }
      50% { transform: scale(1.12); opacity: 1; }
    }
    @keyframes loaderHalo {
      0% { transform: scale(0.78); opacity: 0.72; }
      70%, 100% { transform: scale(1.22); opacity: 0; }
    }
    @keyframes loaderCoreFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-7px) scale(1.03); }
    }
    @keyframes loaderFloat {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(10px, -12px, 0) scale(1.06); }
    }
    @keyframes loaderSparkOrbit {
      0% { transform: rotate(0deg) translateY(calc(var(--orbit-radius) * -1)) scale(0.75); opacity: 0.72; }
      50% { transform: rotate(180deg) translateY(calc(var(--orbit-radius) * -1)) scale(1); opacity: 1; }
      100% { transform: rotate(360deg) translateY(calc(var(--orbit-radius) * -1)) scale(0.75); opacity: 0.72; }
    }
    @keyframes loaderBeat {
      0%, 100% { transform: scaleY(0.45); opacity: 0.55; }
      50% { transform: scaleY(1); opacity: 1; }
    }
    @keyframes loaderNebulaShift {
      0% { transform: scale(1) rotate(0deg); opacity: 0.72; }
      100% { transform: scale(1.08) rotate(8deg); opacity: 1; }
    }
    @keyframes loaderMeshDrift {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(92px, 92px, 0); }
    }
    @media (max-width: 640px) {
      .loader-frame {
        border-radius: 28px;
        padding: 1.3rem 1.05rem 1.15rem;
        gap: 0.9rem;
      }
      .loader-scene {
        width: min(220px, 72vw);
      }
      .loader-logo {
        font-size: clamp(1.85rem, 10vw, 2.55rem);
      }
      .loader-note {
        font-size: clamp(0.58rem, 2.8vw, 0.74rem);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      #loading-screen::before,
      #loading-screen::after,
      .loader-frame::before,
      .loader-orbit,
      .loader-core,
      .loader-core::before,
      .loader-core::after,
      .loader-float,
      .loader-spark,
      .loader-meter-loop,
      .loader-beat span {
        animation: none !important;
      }
      .loader-meter-loop {
        opacity: 0.78;
      }
    }

    /* Futuristic Base & Variables */
    :root {
      --bg-color: #05070e;
      --panel-bg: rgba(15, 23, 42, 0.5);
      --sticky-bg: #0b1120;
      --border-color: rgba(255, 255, 255, 0.08);
      --mouse-x: 50vw;
      --mouse-y: 50vh;
    }
    html {
      scroll-behavior: smooth;
    }
    body {
      background-color: var(--bg-color);
      color: #e2e8f0;
      overflow-x: hidden;
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *,
      *::before,
      *::after {
        animation: none !important;
        transition-duration: 0.01ms !important;
      }
    }
    .tb-interactive {
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }
    /* Interactive Alive Background Glow */
    .mouse-glow {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: -1;
      background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(124, 58, 237, 0.15) 0%, rgba(6, 182, 212, 0.05) 30%, rgba(0,0,0,0) 60%);
      transition: background 0.1s ease-out;
    }
    /* Smooth Glass Panels */
    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.28s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.25s ease, background-color 0.25s ease;
    }
    .section-shell {
      position: relative;
      overflow: hidden;
      animation: sectionReveal 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .section-shell::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(115deg, transparent 0%, rgba(255,255,255,0.035) 22%, transparent 48%);
      transform: translateX(-120%);
      animation: sheenPass 1.1s ease-out 1;
    }
    .top-chip,
    .app-shortcut,
    .menu-nav-card {
      animation: sectionReveal 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      will-change: transform, opacity;
    }
    .menu-drawer {
      animation: drawerIn 0.34s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    button,
    a,
    input,
    select,
    textarea {
      transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1), background-color 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease, opacity 0.22s ease, color 0.22s ease;
    }
    button:hover,
    .app-shortcut:hover,
    .top-chip:hover {
      transform: translateY(-1px);
    }
    button:active,
    .app-shortcut:active,
    .top-chip:active {
      transform: translateY(0) scale(0.98);
    }
    .neon-text { text-shadow: 0 0 15px currentColor; }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .alive-pulse { animation: heartbeat 3s ease-in-out infinite; }
    @keyframes modalEnter {
      0% { opacity: 0; transform: scale(0.95) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .animate-modal { animation: modalEnter 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes sectionReveal {
      0% { opacity: 0; transform: translateY(12px) scale(0.985); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes drawerIn {
      0% { opacity: 0; transform: translateX(-18px) scale(0.985); }
      100% { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes sheenPass {
      0% { transform: translateX(-120%); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateX(120%); opacity: 0; }
    }
    /* Rigid square cells */
    .square-cell-inner { width: 52px; height: 52px; }
    @media (min-width: 768px) { .square-cell-inner { width: 60px; height: 60px; } }
    /* Touch actions */
    .paintable-svg { touch-action: none; }
    .scrollable-container { touch-action: pan-x pan-y; }
    /* Cyberpunk Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    /* Clean Number Inputs for Timer */
    input[type="number"]::-webkit-inner-spin-button,

    .light-mode {

    .light-mode .glass-panel { background: var(--panel-bg); }

    .light-mode .text-slate-200,

      opacity: 0.25;
      box-shadow: 0 0 12px rgba(103, 232, 249, 0.3) !important;
    }
    /* Current Hour" Visual Anchor â€“ subtle pulsing neon glow */
    @keyframes pulseNeon {
      0%, 100% { box-shadow: 0 0 12px #22d3ee, 0 0 24px #22d3ee; }
      50% { box-shadow: 0 0 4px #22d3ee, 0 0 8px #22d3ee; }

    .current-hour-glow {
      animation: pulseNeon 1.8s ease-in-out infinite;
      border: 2.5px solid #22d3ee !important;
      z-index: 10;
    }
    /* Toast animation */
    @keyframes toastPop {
      0% { opacity: 0; transform: translateY(20px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }

      0% { box-shadow: 0 0 0 rgba(34,197,94,0); border-color: rgba(34,197,94,0.0); }

    let audioCtx = null;
    let lastSoundTime = 0;
    let isMutedGlobal = false;
    const playSound = (type) => {
      if (isMutedGlobal) return;
      try {
        if (!audioCtx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) audioCtx = new AudioContext();
          else return;
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const now = Date.now();
        if ((type === 'paint' || type === 'erase') && now - lastSoundTime < 40) return;
        if (type === 'paint' || type === 'erase') lastSoundTime = now;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        const t = audioCtx.currentTime;
        if (type === 'paint') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800 + Math.random() * 400, t);
          gainNode.gain.setValueAtTime(0.08, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
          osc.start(t);
          osc.stop(t + 0.15);
        } else if (type === 'erase') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(400, t);
          osc.frequency.exponentialRampToValueAtTime(150, t + 0.1);
          gainNode.gain.setValueAtTime(0.05, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
          osc.start(t);
          osc.stop(t + 0.1);
        } else if (type === 'click') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(600, t);
          gainNode.gain.setValueAtTime(0.05, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
          osc.start(t);
          osc.stop(t + 0.05);
        } else if (type === 'trash') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(100, t);
          osc.frequency.exponentialRampToValueAtTime(20, t + 0.3);
          gainNode.gain.setValueAtTime(0.1, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          osc.start(t);
          osc.stop(t + 0.3);
        } else if (type === 'success') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(400, t);
          osc.frequency.exponentialRampToValueAtTime(800, t + 0.2);
          gainNode.gain.setValueAtTime(0.1, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          osc.start(t);
          osc.stop(t + 0.3);
        } else if (type === 'peaceful') {
          const freqs = [523.25, 659.25, 783.99, 987.77];
          freqs.forEach((freq, i) => {
            const chordOsc = audioCtx.createOscillator();
            const chordGain = audioCtx.createGain();
            chordOsc.connect(chordGain);
            chordGain.connect(audioCtx.destination);
            chordOsc.type = 'sine';
            chordOsc.frequency.setValueAtTime(freq, t);
            chordGain.gain.setValueAtTime(0, t);
            chordGain.gain.linearRampToValueAtTime(0.05, t + 0.5 + (i * 0.1));
            chordGain.gain.exponentialRampToValueAtTime(0.001, t + 4);
            chordOsc.start(t);
            chordOsc.stop(t + 4);
          });

      for (let i = 0; i < 24; i++) {
        const h = dayData[i];
        if (h) {
          if (
            (h.t1 && !h.t1.startsWith('bp_')) ||
            (h.t2 && !h.t2.startsWith('bp_')) ||
            (h.q1 && !h.q1.startsWith('bp_')) ||
            (h.q2 && !h.q2.startsWith('bp_')) ||
            (h.q3 && !h.q3.startsWith('bp_')) ||
            (h.q4 && !h.q4.startsWith('bp_'))
          ) return true;
        }
      }
      return false;
    };
    const hasFullActivity = (dayData) => {
      if (!dayData) return false;
      for (let i = 0; i < 24; i++) {
        const h = dayData[i] || {};
        const half1Full = h.split1
          ? (h.q1 && !h.q1.startsWith('bp_') && h.q2 && !h.q2.startsWith('bp_'))
          : (h.t1 && !h.t1.startsWith('bp_'));

          : (h.t2 && !h.t2.startsWith('bp_'));
        if (!half1Full || !half2Full) return false;
      }
      return true;

      const renderInlineMarkdownHtml = (escapedText) => {
        let out = escapedText;
        // Links: [text](https://example.com)
        out = out.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (_m, text, url) => {
          const safeUrl = String(url || '').startsWith('http') ? url : '#';
          return `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer" style="color:#22d3ee;text-decoration:underline">${text}</a>`;
        });
        // Bold: **text**
        out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        return out;

      const markdownToSafeHtml = (md) => {
        const text = String(md || '');
        if (!text.trim()) return '';
        const lines = text.split(/\r?\n/);
        const blocks = [];
        let i = 0;
        while (i < lines.length) {
          const line = lines[i] || '';
          const isListItem = /^\s*[-*]\s+/.test(line);
          if (isListItem) {
            const items = [];
            while (i < lines.length && /^\s*[-*]\s+/.test(lines[i] || '')) {
              const itemRaw = lines[i].replace(/^\s*[-*]\s+/, '');
              items.push(`<li>${renderInlineMarkdownHtml(escapeHtml(itemRaw))}</li>`);
              i++;
            }
            blocks.push(`<ul style="margin:6px 0 6px 18px;padding:0">${items.join('')}</ul>`);
            continue;
          }
          if (!line.trim()) {
            blocks.push('<br/>');
            i++;
            continue;
          }
          blocks.push(renderInlineMarkdownHtml(escapeHtml(line)));
          i++;

        return blocks.join('<br/>');

        const url = URL.createObjectURL(svgBlob);
        try {
          const img = new Image();
          img.decoding = 'async';
          await new Promise((resolve, reject) => {
            img.onload = () => resolve(true);
            img.onerror = reject;
            img.src = url;
          });
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          if (!ctx) throw new Error('No canvas context');
          ctx.fillStyle = '#0b1120';
          ctx.fillRect(0, 0, width, height);
          ctx.drawImage(img, 0, 0, width, height);
          const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));

          a.href = URL.createObjectURL(blob);

        setShowSearchModal(false);
        setShowStarredModal(false);

      const activeTimerCategory = categories.find(c => c.id === timer.categoryId) || categories[0];

      const activeDayTodosRaw = todosData[activeJournalDate] || [];
      const activeDayHabitsRaw = (habitLogs[activeJournalDate] || []).filter(h => !h.deleted);
      const selectedTodoTemplate = todoTemplates.find(t => t.id === selectedTodoTemplateId) || null;

      // NEW: Green ticked habits/todos go to the very bottom automatically.
      const activeDayTodos = [...activeDayTodosRaw].sort((a, b) => {
        const statusA = a.status || (a.done ? 'green' : 'red');
        const statusB = b.status || (b.done ? 'green' : 'red');
        if (statusA === 'green' && statusB !== 'green') return 1;
        if (statusA !== 'green' && statusB === 'green') return -1;
        return 0; // maintain original relative order for others

      const activeDayHabits = [...activeDayHabitsRaw].sort((a, b) => {

      const activeTotalTasks = activeDayTodos.length + activeDayHabits.length;

      const canUniversalRedo = entityFuture.length > 0 || future.length > 0;
      const bottomBarActionChoices = [

        { id: 'journal', label: 'Journal' },

        { id: 'search', label: 'Search' },
        { id: 'review', label: 'Review' },
        { id: 'stars', label: 'Stars' },
        { id: 'settings', label: 'Settings' },
        { id: 'timer', label: 'Timer' }
      ];
      const normalizedBottomBarActionIds = (() => {
        const validIds = bottomBarActionChoices.map(choice => choice.id);
        const source = Array.isArray(settingsDraft.defaultBottomBarActions) ? settingsDraft.defaultBottomBarActions : [];
        const unique = [];
        source.forEach(id => {
          if (validIds.includes(id) && !unique.includes(id)) unique.push(id);
        });
        DEFAULT_SETTINGS.defaultBottomBarActions.forEach(id => {
          if (validIds.includes(id) && !unique.includes(id)) unique.push(id);
        });
        validIds.forEach(id => {
          if (!unique.includes(id)) unique.push(id);
        });
        return unique.slice(0, 4);
      })();
      const updateBottomBarActionSlot = (slotIndex, nextId) => {
        setSettingsDraft(prev => {
          const validIds = bottomBarActionChoices.map(choice => choice.id);
          if (!validIds.includes(nextId)) return prev;
          const current = Array.isArray(prev.defaultBottomBarActions) ? prev.defaultBottomBarActions : [];
          const normalized = [];
          current.forEach(id => {
            if (validIds.includes(id) && !normalized.includes(id)) normalized.push(id);
          });
          DEFAULT_SETTINGS.defaultBottomBarActions.forEach(id => {
            if (validIds.includes(id) && !normalized.includes(id)) normalized.push(id);
          });
          validIds.forEach(id => {
            if (!normalized.includes(id)) normalized.push(id);
          });
          const next = normalized.slice(0, 4);
          const swapIndex = next.indexOf(nextId);
          if (swapIndex !== -1) {
            [next[slotIndex], next[swapIndex]] = [next[swapIndex], next[slotIndex]];
          } else {
            next[slotIndex] = nextId;
          }
          return { ...prev, defaultBottomBarActions: next };
        });
      };
      const mobileBottomBarActions = {
        tracker: { label: 'Grid', icon: CalendarIcon, color: 'text-cyan-300', onClick: () => { openOnlySection('tracker'); scrollToElementWithStickyOffset('section-tracker'); } },

                 </div>
               </div>

                    </div>
                    <div className="bg-white/5 p-4 rounded-3xl border border-white/10">
                      <h3 className="font-black uppercase tracking-widest text-cyan-300 mb-3">8. Identity, Startup & Interface Control</h3>
                      <ul className="list-disc list-inside space-y-2 mt-3 text-slate-300">
                        <li><strong>First-Run Identity Prompt:</strong> On a fresh install, Trackerbox asks for your display name and uses it on the startup welcome pill. You can change it anytime in Settings.</li>
                        <li><strong>Startup Defaults:</strong> Settings stores your preferred focus mode, default selected color/tool, default collapsed epochs, pomodoro length, and break length.</li>
                        <li><strong>Keep App Warm:</strong> The settings panel shows service worker, shell cache, and persistent storage status so you can judge how "ready" the app is on your device.</li>
                        <li><strong>App Menu + Pinned Sections:</strong> The top-left menu can open one major area at a time, while pinned sections keep your favorite modules visible on the main home view.</li>
                        <li><strong>Mobile Bottom Bar Builder:</strong> On phones, you choose which four actions stay docked at the bottom for quick access.</li>
                        <li><strong>Theme + Audio Controls:</strong> Trackerbox includes multiple visual themes and a global mute system for silent environments.</li>
                      </ul>
                    </div>
                    <div className="bg-white/5 p-4 rounded-3xl border border-white/10">
                      <h3 className="font-black uppercase tracking-widest text-cyan-300 mb-3">9. Extended Modules & Memory Systems</h3>
                      <ul className="list-disc list-inside space-y-2 mt-3 text-slate-300">
                        <li><strong>Blueprint Manager:</strong> Save and reload structured day or week plans, including real fills and blueprint fills, so repeatable schedules can be restored fast.</li>
                        <li><strong>Starred Memory Layer:</strong> Journal notes, cell notes, and wallet transactions can be starred and reopened later from one unified Starred Hub.</li>
                        <li><strong>Frozen Day Registry:</strong> Cryo-Sleep dates are reviewable in their own modal so protected streak days stay transparent instead of disappearing into the heatmap.</li>
                        <li><strong>Streak + Level Panels:</strong> Separate views expose longest streaks, active streak history, habit streaks, current rank title, and XP progression logic.</li>
                        <li><strong>Wallet Expansion Modules:</strong> Beyond transactions, the finance system includes savings goals, debt ledgers, subscriptions, editable category budgets, and reusable wallet templates.</li>
                        <li><strong>Transaction Lifecycle Tools:</strong> Wallet entries support starring, editing, deleting, template creation from live entries, and one-tap subscription payment logging.</li>
                      </ul>
                    </div>
                    <div className="bg-white/5 p-4 rounded-3xl border border-white/10">
                      <h3 className="font-black uppercase tracking-widest text-cyan-300 mb-3">10. Analytics Configuration & Review Surfaces</h3>
                      <ul className="list-disc list-inside space-y-2 mt-3 text-slate-300">
                        <li><strong>Heatmap Tuning Controls:</strong> Analytics lets you choose the metric to visualize, define worst/best thresholds, and set the XP multiplier used for point conversion.</li>
                        <li><strong>Daily / Weekly / Monthly / Annual Scan Cards:</strong> The analytics core includes stat cards for multiple time horizons so you can inspect one date, one week, one month, or a full year.</li>
                        <li><strong>Bar Graph Engine:</strong> A separate graph module plots points, XP, or category hours over week/month ranges for cleaner trend reading.</li>
                        <li><strong>Weekly Review:</strong> The review screen summarizes completion rate, streak pulse, frozen days, spending, unfinished todos, and standout wins for a chosen week.</li>
                        <li><strong>Export Surfaces:</strong> Both the planning side and the wallet side can generate polished PDFs for archival or sharing.</li>
                      </ul>
                    </div>
                    <div className="bg-white/5 p-4 rounded-3xl border border-white/10">
                      <h3 className="font-black uppercase tracking-widest text-cyan-300 mb-3">11. System Keyboard Shortcuts</h3>
                      <p><strong>Trackerbox features a robust hotkey system allowing you to navigate and log without touching the mouse.</strong></p>
                      <p className="mt-3"><strong>Global Shortcuts</strong></p>
                      <ul className="list-disc list-inside space-y-2 mt-3 text-slate-300">
                        <li><strong>Shift + T :</strong> Open Quick Capture.</li>
                        <li><strong>Ctrl + K (or Cmd + K):</strong> Open Global Search.</li>
                        <li><strong>Escape :</strong> Close Global Search or any active modal.</li>
                        <li><strong>Spacebar :</strong> Universal closer. If a modal, settings menu, or Captain's log is open, Spacebar closes it.</li>
                      </ul>
                      <p className="mt-4"><strong>Grid Navigation & Painting</strong></p>
                      <ul className="list-disc list-inside space-y-2 mt-3 text-slate-300">
                        <li><strong>Arrow Keys (Up/Down/Left/Right):</strong> Move the active cell cursor around the temporal grid. Automatically expands collapsed Epochs as you move into them.</li>
                        <li><strong>Spacebar :</strong> When no modals are open, paints the currently highlighted grid segment with your active category color.</li>
                        <li><strong>1 through 8 :</strong> Instantly switch your active "paint" color to the corresponding category in your manifest.</li>
                        <li><strong>L :</strong> Equip the "Lock" (cursor). Prevents accidental grid painting.</li>
                        <li><strong>J :</strong> Opens today's Journal module directly (only works while the "Lock" is equipped).</li>
                        <li><strong>Ctrl + Z (or Cmd + Z):</strong> Undo the last grid paint action.</li>
                        <li><strong>Ctrl + Y (or Cmd + Shift + Z):</strong> Redo the last undone grid action.</li>
                      </ul>
                      <p className="mt-4"><strong>Journal Shortcuts</strong></p>
                      <ul className="list-disc list-inside space-y-2 mt-3 text-slate-300">
                        <li><strong>Ctrl + T (or Cmd + T):</strong> While typing in any Journal or Notes text box, instantly inserts the current local time in brackets (e.g., [08:42am]).</li>
                        <li><strong>Arrow Left / Arrow Right :</strong> While viewing the Captain's Log (and not actively typing), instantly jump to the previous or next day's log.</li>
                      </ul>
                    </div>
                  </div>
                 </div>
               </div>

                                        : r.kind === 'wallet'
                                          ? 'bg-emerald-500/20 text-emerald-300 border border-emerald-400/30'

                                                   <polygon points="0,100 100,100 100,0" fill={isMergedCell ? boxFill : t2Fill} onPointerDown={(e) => { e.preventDefault(); handlePointerDown(dateStr, hour, isMergedCell ? 'box' : 't2', e); }} onPointerEnter={() => handlePointerEnter(dateStr, hour, isMergedCell ? 'box' : 't2')} onContextMenu={(e) => { if (isDescriptionMode) { e.preventDefault(); const rect = e.currentTarget.getBoundingClientRect(); setContextMenu({ x: e.clientX, y: e.clientY, dateStr, hour, triangleId: isMergedCell ? 'box' : 't2' }); return; } handleSplitToggle(dateStr, hour, 'half2', e); }} onMouseEnter={(e) => { const noteText = isMergedCell ? (descriptions?.[dateStr]?.[hour]?.['box'] || '') : (descriptions?.[dateStr]?.[hour]?.['t2'] || ''); if (noteText.trim()) { const rect = e.currentTarget.getBoundingClientRect(); setTooltip({ x: rect.right + 8, y: rect.top + rect.height / 2 - 20, text: noteText.trim() }); } }} onMouseLeave={() => setTooltip(null)} onTouchStart={(e) => { if (isDescriptionMode) return; const noteText = isMergedCell ? (descriptions?.[dateStr]?.[hour]?.['box'] || '') : (descriptions?.[dateStr]?.[hour]?.['t2'] || ''); if (noteText.trim()) { const rect = e.currentTarget.getBoundingClientRect(); setTooltip({ x: rect.right + 8, y: rect.top + rect.height / 2 - 20, text: noteText.trim() }); setTimeout(() => setTooltip(null), 1800); } }} className="cursor-pointer transition-opacity hover:opacity-80" />
                                                )}

                                                  <polygon
                                                    points={{
                                                      box: '0,0 100,0 100,100 0,100',
                                                      t1: '0,100 0,0 100,0',
                                                      t2: '0,100 100,100 100,0',
                                                      q1: '0,0 100,0 50,50',
                                                      q2: '0,0 0,100 50,50',
                                                      q3: '100,100 100,0 50,50',
                                                      q4: '100,100 0,100 50,50'
                                                    }[keyboardCursor.triangleId] || '0,100 0,0 100,0'}

                                                    className="pointer-events-none"
                                                  />
                                                )}
                                              </svg>
                                              {/* Note icons always visible */}
                                              {hasUpperNote && <div className="absolute top-1 left-1 bg-amber-400 text-[#0b1120] text-[10px] w-4 h-4 flex items-center justify-center rounded-full shadow-[0_0_8px_rgba(251,191,36,0.8)] z-30 pointer-events-none font-black">i</div>}
                                              {hasLowerNote && <div className="absolute bottom-1 right-1 bg-amber-400 text-[#0b1120] text-[10px] w-4 h-4 flex items-center justify-center rounded-full shadow-[0_0_8px_rgba(251,191,36,0.8)] z-30 pointer-events-none font-black">i</div>}
                                            </div>
                                          </td>
                                        );
                                      })}
                                    </tr>
                                  ))
                                ) : (
                                  /* Collapsed thin row â€“ minimal line only (no repeated text) */
                                  <tr className="collapsed-row">
                                    <td className="sticky left-0 z-40 p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}></td>

                              className="bg-[#0b1120] border border-white/10 rounded-xl px-3 py-1.5 text-xs text-white outline-none focus:border-amber-400/50"
                            />

    // --- Component: WeeklyChart ---
    function WeeklyChart({ viewMode = 'week', weekDates = [], monthDates = [], allData, categories, onDayClick }) {
      const dates = viewMode === 'month' ? monthDates : weekDates;
      if (!dates || dates.length === 0) return null;
      const chartData = dates.map(dateStr => {
         const dayData = allData[dateStr] || {};
         const segments = [];
         let totalHours = 0;
         for (let i = 0; i < 24; i++) {
            const h = dayData[i] || {};
            if (h.split1) {
                segments.push({ id: h.q1, duration: 0.25 });
                segments.push({ id: h.q2, duration: 0.25 });
                if (h.q1 && !h.q1.startsWith('bp_')) totalHours += 0.25;
                if (h.q2 && !h.q2.startsWith('bp_')) totalHours += 0.25;
            } else {
                segments.push({ id: h.t1, duration: 0.5 });
                if (h.t1 && !h.t1.startsWith('bp_')) totalHours += 0.5;
            }
            if (h.split2) {
                segments.push({ id: h.q3, duration: 0.25 });
                segments.push({ id: h.q4, duration: 0.25 });
                if (h.q3 && !h.q3.startsWith('bp_')) totalHours += 0.25;
                if (h.q4 && !h.q4.startsWith('bp_')) totalHours += 0.25;
            } else {
                segments.push({ id: h.t2, duration: 0.5 });
                if (h.t2 && !h.t2.startsWith('bp_')) totalHours += 0.5;
            }
         }
         const dateObj = new Date(dateStr);
         const dayName = viewMode === 'month'
           ? `${String(dateObj.getDate()).padStart(2, '0')}`
           : dateObj.toLocaleDateString('en-US', { weekday: 'short' });
         return { dayName, segments, totalHours, dateStr };
      });
      return (
         <div className="mt-6 md:mt-8 bg-[#0b1120] p-4 md:p-6 rounded-2xl border border-white/10 w-full overflow-hidden print:border-none print:shadow-none print:p-0 print:bg-transparent">
            <h3 className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">{viewMode === 'month' ? 'Monthly Activity Timeline' : 'Weekly Activity Timeline'}</h3>
            <div className="overflow-x-auto custom-scrollbar pb-2 pt-4">
              <div className="min-w-max flex items-end justify-between gap-1 sm:gap-2 h-48 md:h-64">
                {chartData.map((data, i) => (
                     <div
                       key={i}
                       className="flex flex-col items-center flex-1 gap-2 group h-full cursor-pointer active:scale-95 transition-transform"
                       onClick={() => onDayClick && onDayClick(data.dateStr)}
                       title="Click to open Captain's Log"
                     >
                        <div className="w-full sm:w-10 md:w-12 max-w-[40px] relative flex flex-col h-full bg-white/5 rounded-md border border-white/10 overflow-hidden print:border-gray-800">
                           <div className="opacity-0 group-hover:opacity-100 absolute -top-7 md:-top-8 left-1/2 -translate-x-1/2 bg-black text-white text-[9px] md:text-[10px] py-1 px-1.5 md:px-2 rounded shadow-lg pointer-events-none transition-opacity font-bold whitespace-nowrap z-10 print:opacity-100 print:bg-transparent print:text-slate-300 print:shadow-none print:-top-5">
                              {data.totalHours}h
                           </div>
                           {data.segments.map((seg, idx) => {
                              const baseId = seg.id && seg.id.startsWith('bp_') ? seg.id.slice(3) : seg.id;
                              const cat = categories.find(c => c.id === baseId);
                              const bgColor = cat ? cat.color : 'transparent';
                              return <div key={idx} className="w-full" style={{ backgroundColor: bgColor, flexGrow: seg.duration }}></div>;
                           })}
                        </div>
                        <span className="text-[8px] md:text-[10px] font-bold text-slate-500 uppercase text-center mt-auto group-hover:text-purple-300 transition-colors">{data.dayName}</span>
                     </div>
                  ))}
              </div>
            </div>
         </div>
      );
    }
    // --- Component: ChronoSpectralHeatmap ---
    function ChronoSpectralHeatmap({ statYear, allData, todosData, habitLogs, categories, sysConfig, onDayClick, heatmapMode }) {
      const year = parseInt(statYear, 10);
      if (isNaN(year)) return null;
      const getHeatmapValue = useCallback((dateStr) => {
        const dayData = allData[dateStr] || {};
        const isFullyLoggedDay = hasFullActivity(dayData);
        if (!isFullyLoggedDay) {
          return { value: 0, hasActivity: false };
        }
        let value = 0;
        let hasActivity = false;
        if (heatmapMode === 'points') {
          Object.values(dayData).forEach(h => {
            const addPts = (id, dur) => {
              if (id && !id.startsWith('bp_')) {
                hasActivity = true;
                const cat = categories.find(c => c.id === id);
                if (cat) value += (parseFloat(cat.pointsPerHour) || 0) * dur;
              }
            };
            if (h.split1) { addPts(h.q1, 0.25); addPts(h.q2, 0.25); }
            else { addPts(h.t1, 0.5); }
            if (h.split2) { addPts(h.q3, 0.25); addPts(h.q4, 0.25); }
            else { addPts(h.t2, 0.5); }
          });
          return { value, hasActivity };
        } else {
          Object.values(dayData).forEach(h => {
            const processSeg = (id, dur) => {
              if (id === heatmapMode && !id.startsWith('bp_')) {
                hasActivity = true;
                value += dur;
              }
            };
            if (h.split1) {
              processSeg(h.q1, 0.25);
              processSeg(h.q2, 0.25);
            } else {
              processSeg(h.t1, 0.5);
            }
            if (h.split2) {
              processSeg(h.q3, 0.25);
              processSeg(h.q4, 0.25);
            } else {
              processSeg(h.t2, 0.5);
            }
          });
          return { value, hasActivity };
        }
      }, [heatmapMode, allData, todosData, habitLogs, categories]);
      const grid = useMemo(() => {
          const startDate = new Date(year, 0, 1);
          const endDate = new Date(year, 11, 31);
          const days = [];
          let startDayOfWeek = startDate.getDay();
          startDayOfWeek = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1;
          for (let i = 0; i < startDayOfWeek; i++) days.push(null);
          let d = new Date(startDate);
          while (d <= endDate) {
              const dateStr = formatDateString(d);
              days.push({
                  dateStr,
                  dateObj: new Date(d),
                  ...getHeatmapValue(dateStr)
              });
              d.setDate(d.getDate() + 1);
          }
          return days;
      }, [year, getHeatmapValue]);
      const modeSettings = sysConfig.perModeSettings?.[heatmapMode] || { worstPoint: null, bestPoint: null };
      const getHeatmapStyle = (val) => {
          const worst = modeSettings.worstPoint !== null ? parseFloat(modeSettings.worstPoint) : 0;
          const best = modeSettings.bestPoint !== null ? parseFloat(modeSettings.bestPoint) : 100;
          let percentage = (val - worst) / (best - worst);
          percentage = Math.max(0, Math.min(1, percentage));
          const hue = percentage * 140;
          return {
              backgroundColor: `hsl(${hue}, 85%, 45%)`,
              borderColor: `hsl(${hue}, 85%, 35%)`,
              boxShadow: percentage === 1 ? `0 0 10px hsl(${hue}, 85%, 45%, 0.8)` : 'none'
          };
      };
      return (
         <div className="bg-[#0b1120] p-4 md:p-6 rounded-2xl border border-white/10 w-full overflow-hidden flex flex-col print:border-none print:shadow-none print:p-0 print:bg-transparent">
            <div className="flex flex-col xl:flex-row xl:items-end justify-between gap-4 mb-4">
                <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3">
                   <h3 className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest">Chrono-Spectral Heatmap ({year}) â€” {heatmapMode === 'points' ? 'POINTS' : `${categories.find(c => c.id === heatmapMode)?.name || ''} HOURS`}</h3>
                </div>
                <div className="flex items-center gap-1.5 text-[8px] md:text-[10px] font-bold text-slate-500 uppercase flex-wrap">
                   <span>{modeSettings.worstPoint !== null ? modeSettings.worstPoint : 0} {heatmapMode === 'points' ? 'PTS' : 'HRS'}</span>
                   <div className="w-3 h-3 rounded-sm bg-white/5 border border-white/10"></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(0, 85%, 45%)', borderColor: 'hsl(0, 85%, 35%)' }}></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(35, 85%, 45%)', borderColor: 'hsl(35, 85%, 35%)' }}></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(70, 85%, 45%)', borderColor: 'hsl(70, 85%, 35%)' }}></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(105, 85%, 45%)', borderColor: 'hsl(105, 85%, 35%)' }}></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(140, 85%, 45%)', borderColor: 'hsl(140, 85%, 35%)', boxShadow: '0 0 6px hsl(140, 85%, 45%, 0.6)' }}></div>
                   <span>{modeSettings.bestPoint !== null ? modeSettings.bestPoint : 100} {heatmapMode === 'points' ? 'PTS' : 'HRS'}</span>
                </div>
            </div>
            <div className="overflow-x-auto custom-scrollbar pb-4 pt-10 px-4 -mx-4 print:pt-4 print:pb-0">
                <div className="min-w-max">
                    <div style={{ display: 'grid', gridTemplateRows: 'repeat(7, 1fr)', gridAutoFlow: 'column', gap: '4px' }}>
                        {grid.map((cell, idx) => {
                            if (!cell) return <div key={`empty-${idx}`} className="w-3 h-3 md:w-4 md:h-4"></div>;
                            return (
                                <div
                                    key={cell.dateStr}
                                    className={`w-3 h-3 md:w-4 md:h-4 rounded-sm border transition-all hover:scale-125 hover:z-10 relative group cursor-pointer ${!cell.hasActivity ? 'bg-white/5 border-white/10' : ''}`}
                                    style={cell.hasActivity ? getHeatmapStyle(cell.value) : {}}
                                    onClick={() => onDayClick && onDayClick(cell.dateStr)}
                                >
                                    <div className="opacity-0 group-hover:opacity-100 absolute bottom-full mb-1.5 left-1/2 -translate-x-1/2 bg-slate-900 border border-white/20 text-white text-[10px] py-1.5 px-2.5 rounded-lg shadow-[0_4px_15px_rgba(0,0,0,0.8)] pointer-events-none transition-opacity font-bold whitespace-nowrap z-[100] print:hidden">
                                        {cell.dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}: <span className="text-lime-400 drop-shadow-[0_0_5px_rgba(163,230,53,0.5)]">{cell.value > 0 ? '+' : ''}{Math.round(cell.value)} {heatmapMode === 'points' ? 'PTS' : 'HRS'}</span>
                                        <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-900"></div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>
         </div>
      );
    }
    // --- Component: StatCard ---
    function StatCard({ title, stats, categories, showGoals = false, multiplier = 1, showAverage = true }) {
      const { totals, completedTotals, totalTrackedHours, completedDaysCount, totalPoints } = stats;
      return (
        <div className="bg-white/5 p-4 md:p-6 rounded-2xl border border-white/10 flex flex-col h-full print:bg-transparent print:border-2 print:border-gray-800 print:shadow-none w-full">
          <div className="flex justify-between items-start mb-1 gap-2">
