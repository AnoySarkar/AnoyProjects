                         <li><strong>Ctrl+Y</strong> — Redo</li>
                         <li><strong>L</strong> — Lock mode</li>
                         <li><strong>1–6</strong> — Quick category select</li>
                         <li><strong>Day header click</strong> — Open Captain's Log</li>
                         <li><strong>Weekly timeline click</strong> — Open Captain's Log for that day</li>
                       </ul>
                     </div>
                   </div>
                 </div>
               </div>
            )}
            {/* --- CONFIRMATION MODAL --- */}
            {pendingReset && (
               <div className="fixed inset-0 z-[300] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                 <div className="glass-panel animate-modal border-red-500/50 shadow-[0_0_30px_rgba(239,68,68,0.3)] rounded-3xl p-8 max-w-sm w-full relative text-center">
                   <AlertTriangle size={48} className="text-red-500 mx-auto mb-4 drop-shadow-[0_0_10px_rgba(239,68,68,0.8)]" />
                   <h2 className="text-2xl font-black uppercase mb-2 text-white">Initiate Purge?</h2>
                   <p className="text-sm text-slate-300 mb-6">
                     Data will be permanently erased for: <br/>
                     <span className="text-red-400 font-black text-lg neon-text mt-2 block">
                       {pendingReset.type === 'day' && pendingReset.payload}
                       {pendingReset.type === 'week' && "Selected Week"}
                       {pendingReset.type === 'month' && `Month of ${pendingReset.payload}`}
                       {pendingReset.type === 'category' && `Category: ${pendingReset.payload.name}`}
                       {pendingReset.type === 'habit' && `Habit: ${pendingReset.payload.name}`}
                     </span>
                   </p>
                   <div className="flex gap-4">
                     <button onClick={() => { playSound('click'); setPendingReset(null); }} className="flex-1 bg-white/5 border border-white/10 text-white font-bold py-3 rounded-2xl uppercase tracking-wider hover:bg-white/10 transition-colors">Abort</button>
                     <button onClick={executeReset} className="flex-1 bg-red-600/80 border border-red-500 text-white font-bold py-3 rounded-2xl uppercase tracking-wider hover:bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)] transition-all">Confirm</button>
                   </div>
                 </div>
               </div>
            )}
            {/* Description Editing Modal */}
            {editingDescription && (
              <div className="fixed inset-0 z-[400] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4" onClick={() => setEditingDescription(null)}>
                <div className="glass-panel animate-modal w-full max-w-md rounded-3xl p-6 border-amber-400/50" onClick={e => e.stopPropagation()}>
                  <div className="flex justify-between items-center mb-4">
                    <h3 className="font-black text-amber-300 uppercase tracking-widest text-lg">Description • {formatHourLabel(editingDescription.hour)}</h3>
                    <button onClick={() => setEditingDescription(null)} className="text-slate-400 hover:text-white"><X size={22} /></button>
                  </div>
                  <textarea
                    className="w-full h-52 bg-[#0b1120] border border-amber-400/40 focus:border-amber-400 rounded-2xl p-5 text-slate-100 font-mono text-sm resize-none outline-none"
                    value={editingDescription.text}
                    onChange={e => setEditingDescription(prev => ({ ...prev, text: e.target.value }))}
                    placeholder="What happened here? What will you do?"
                  />
                  <div className="mt-6 flex gap-3">
                    <button 
                      onClick={() => saveDescription(editingDescription.dateStr, editingDescription.hour, editingDescription.triangleId, editingDescription.text)}
                      className="flex-1 bg-amber-400 hover:bg-amber-300 text-black font-black py-4 rounded-2xl tracking-widest uppercase text-sm"
                    >
                      SAVE NOTE
                    </button>
                    <button 
                      onClick={() => setEditingDescription(null)}
                      className="flex-1 bg-white/10 hover:bg-white/20 text-white font-bold py-4 rounded-2xl tracking-widest uppercase text-sm"
                    >
                      CANCEL
                    </button>
                  </div>
                </div>
              </div>
            )}
            {/* Context Menu for Description Mode */}
            {contextMenu && (
              <div 
                className="fixed z-[500] bg-[#0b1120] border border-amber-400/70 rounded-3xl shadow-2xl p-2 flex gap-1 backdrop-blur-md"
                style={{ left: `${contextMenu.x}px`, top: `${contextMenu.y}px` }}
                onClick={e => e.stopPropagation()}
              >
                <button 
                  onClick={() => {
                    const dayDescs = descriptions[contextMenu.dateStr] || {};
                    const hourDescs = dayDescs[contextMenu.hour] || {};
                    const text = hourDescs[contextMenu.triangleId] || '';
                    setDescClipboard(text);
                    playSound('click');
                    setContextMenu(null);
                  }}
                  className="flex items-center gap-2 px-5 py-3 hover:bg-amber-400/10 rounded-2xl text-amber-300 font-bold text-sm"
                >
                  <Copy size={18} /> Copy
                </button>
                <button 
                  onClick={() => {
                    if (descClipboard) {
                      setDescriptions(prev => {
                        const newD = { ...prev };
                        if (!newD[contextMenu.dateStr]) newD[contextMenu.dateStr] = {};
                        if (!newD[contextMenu.dateStr][contextMenu.hour]) newD[contextMenu.dateStr][contextMenu.hour] = {};
                        newD[contextMenu.dateStr][contextMenu.hour][contextMenu.triangleId] = descClipboard;
                        return newD;
                      });
                      playSound('success');
                    }
                    setContextMenu(null);
                  }}
                  className="flex items-center gap-2 px-5 py-3 hover:bg-amber-400/10 rounded-2xl text-amber-300 font-bold text-sm"
                >
                  <Clipboard size={18} /> Paste
                </button>
                <button 
                  onClick={() => {
                    setDescriptions(prev => {
                      const newD = { ...prev };
                      if (newD[contextMenu.dateStr]?.[contextMenu.hour]?.[contextMenu.triangleId] !== undefined) {
                        delete newD[contextMenu.dateStr][contextMenu.hour][contextMenu.triangleId];
                        if (Object.keys(newD[contextMenu.dateStr][contextMenu.hour]).length === 0) delete newD[contextMenu.dateStr][contextMenu.hour];
                        if (Object.keys(newD[contextMenu.dateStr]).length === 0) delete newD[contextMenu.dateStr];
                      }
                      return newD;
                    });
                    playSound('trash');
                    setContextMenu(null);
                  }}
                  className="flex items-center gap-2 px-5 py-3 hover:bg-red-400/10 rounded-2xl text-red-300 font-bold text-sm"
                >
                  <Trash2 size={18} /> Delete
                </button>
              </div>
            )}
            {/* Header */}
            <header className="glass-panel sticky top-0 z-50 border-b border-white/10 rounded-none shadow-none">
              <div className="max-w-[1400px] mx-auto px-4 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
          
                {/* Logo Section */}
                <div className="flex items-center gap-4 min-w-0">
                  <div className="relative flex items-center justify-center shrink-0 alive-pulse">
                    <svg viewBox="0 0 100 100" className="w-12 h-12 md:w-14 md:h-14 drop-shadow-[0_0_15px_rgba(34,211,238,0.5)]">
                      <defs>
                        <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                          <stop offset="0%" stopColor="#22d3ee" />
                          <stop offset="100%" stopColor="#a855f7" />
                        </linearGradient>
                      </defs>
                      <rect x="10" y="10" width="80" height="80" rx="24" fill="none" stroke="url(#boxGrad)" strokeWidth="10" />
                      <rect x="35" y="35" width="30" height="30" rx="10" fill="url(#boxGrad)" />
                    </svg>
                  </div>
                  <div className="flex flex-col min-w-0">
                    <h1 className="text-2xl sm:text-3xl md:text-4xl font-black tracking-tight uppercase text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 drop-shadow-[0_0_10px_rgba(34,211,238,0.3)] leading-none truncate whitespace-nowrap">
                      Trackerbox<sup className="text-lg font-black ml-1 text-cyan-400 drop-shadow-none">©</sup>
                    </h1>
                    <p className="text-[10px] md:text-xs text-cyan-400/80 font-bold tracking-widest uppercase mt-1 truncate">Designed And Created by Avijit Sarkar</p>
                  </div>
                </div>
                {/* Main Toolbar & Stats */}
                <div className="flex flex-wrap items-center justify-start md:justify-end gap-3 mt-2 md:mt-0">
            
                  {/* Gamification Display */}
                  <div className="flex items-center bg-[#0b1120] border border-white/10 rounded-2xl overflow-hidden shadow-[0_0_10px_rgba(0,0,0,0.5)] h-[44px]">
                    <div className="bg-gradient-to-r from-purple-500/20 to-transparent px-3 py-2 border-r border-white/10 flex items-center justify-center text-purple-400" title="Current Rank">
                      <Trophy size={18} />
                    </div>
                    <div className="flex flex-col px-3 min-w-[120px] justify-center h-full">
                      <div className="flex justify-between items-center gap-2 leading-none mb-1">
                        <span className="text-[10px] font-black uppercase text-purple-400 tracking-wider">Lvl {level} <span className="hidden sm:inline text-slate-300 ml-1 opacity-80">{rankTitle}</span></span>
                        <span className="text-[9px] font-bold text-slate-400 whitespace-nowrap">{totalXP} / {nextLevelXP} XP</span>
                      </div>
                      <div className="w-full h-1 bg-black/60 rounded-full overflow-hidden">
                         <div className="h-full bg-gradient-to-r from-purple-500 to-cyan-400" style={{ width: `${Math.max(0, Math.min(100, ((totalXP - currentLevelBaseXP) / (nextLevelXP - currentLevelBaseXP)) * 100))}%`}}></div>
                      </div>
                    </div>
                  </div>
                  <div className="flex items-center gap-2 bg-lime-500/10 border border-lime-500/50 px-3 py-2 rounded-xl shadow-[0_0_10px_rgba(163,230,53,0.2)] h-[44px]" title="Total Lifetime Points">
                    <Sparkles size={18} className="text-lime-400 drop-shadow-[0_0_8px_rgba(163,230,53,0.8)]" />
                    <span className="font-black uppercase tracking-wider text-lime-300 text-xs md:text-sm">
                      {Math.round(totalLifetimePoints)} <span className="hidden sm:inline">PTS</span>
                    </span>
                  </div>
                  <div className="flex items-center gap-2 bg-orange-500/10 border border-orange-500/50 px-3 py-2 md:px-4 rounded-xl shadow-[0_0_10px_rgba(249,115,22,0.2)] h-[44px]" title="Consecutive Full 24Hr Days Logged">
                    <Flame size={20} className={currentStreak > 0 ? "text-orange-400 drop-shadow-[0_0_8px_rgba(249,115,22,0.8)]" : "text-slate-500"} />
                    <span className={`font-black uppercase tracking-wider text-xs md:text-sm ${currentStreak > 0 ? "text-orange-300" : "text-slate-400"}`}>
                      {currentStreak} <span className="hidden sm:inline">Streak</span>
                    </span>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => { playSound('click'); setShowTimer(!showTimer); }} className={`w-[44px] h-[44px] flex items-center justify-center rounded-xl border transition-all ${showTimer ? 'border-cyan-500/50 text-cyan-300 bg-cyan-500/10 shadow-[0_0_10px_rgba(34,211,238,0.2)]' : 'border-white/10 text-slate-400 hover:bg-white/5'}`} title="Toggle Focus Chronos">
                      <Clock size={20} />
                    </button>
                    <button onClick={() => { playSound('click'); setShowHelp(true); }} className="w-[44px] h-[44px] flex items-center justify-center rounded-xl border border-white/10 text-slate-400 hover:bg-white/5 transition-all" title="System Protocol">
                      <Info size={20} />
                    </button>
                  </div>
                </div>
              </div>
            </header>
            <main className="max-w-[1400px] w-full mx-auto px-4 py-8 flex-1 min-w-0">
        
              {/* ---------------- SECTION 1: TEMPORAL LOG & TRACKER ---------------- */}
              <section className="glass-panel rounded-3xl w-full overflow-hidden mb-6">
                {/* Accordion Header */}
                <button onClick={() => toggleSection('tracker')} className="w-full p-4 md:p-6 flex justify-between items-center bg-white/5 hover:bg-white/10 transition-colors">
                    <div className="flex items-center gap-3 flex-shrink-0">
                        <CalendarIcon size={24} className="text-purple-400 drop-shadow-[0_0_8px_rgba(192,132,252,0.5)]" />
                        <h2 className="text-lg md:text-xl font-black uppercase tracking-wider text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]">Temporal Log & Grid</h2>
                        <span className="hidden sm:flex ml-4 bg-lime-500/20 text-lime-300 border border-lime-500/30 px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-widest">{todayPoints > 0 ? '+' : ''}{todayPoints} PTS TODAY</span>
                    </div>
                    {/* Month & Week selector */}
                    <div className="flex items-center gap-3">
                      <input
                        type="month"
                        value={selectedMonthStr}
                        onChange={(e) => { playSound('click'); setSelectedMonthStr(e.target.value); setSelectedWeekIndex(0); }}
                        onClick={(e) => e.stopPropagation()}
                        className="bg-[#0b1120] text-slate-200 rounded-lg border border-purple-500/30 px-3 py-1.5 font-bold focus:outline-none focus:border-purple-400 focus:shadow-[0_0_10px_rgba(192,132,252,0.3)] cursor-pointer transition-all text-sm"
                      />
                      <select
                        value={selectedWeekIndex}
                        onChange={(e) => { playSound('click'); setSelectedWeekIndex(Number(e.target.value)); }}
                        onClick={(e) => e.stopPropagation()}
                        className="bg-[#0b1120] text-slate-200 rounded-lg border border-purple-500/30 px-3 py-1.5 font-bold text-sm outline-none focus:border-purple-400 focus:shadow-[0_0_10px_rgba(192,132,252,0.3)] cursor-pointer transition-all"
                      >
                        {availableWeeks.map((week, idx) => (<option key={week.id} value={idx}>{week.label}</option>))}
                      </select>
                    </div>
                    <ChevronDown size={24} className={`text-slate-400 transform transition-transform ${sectionsOpen.tracker ? 'rotate-180' : ''}`} />
                </button>
                {/* Accordion Body */}
                {sectionsOpen.tracker && (
                  <div className="flex flex-col border-t border-white/10 p-4 md:p-6">
                    {/* THE TRACKER GRID */}
                    <div className="overflow-x-auto custom-scrollbar scrollable-container relative flex-1 pb-4 pt-20">
                      <div className="min-w-max h-full flex flex-col">
                        <table className="w-full border-collapse">
                          <thead>
                            <tr>
                              <th className="w-[45px] md:w-[60px] sticky left-0 z-40 p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}></th>
                              <th className="w-[50px] md:w-[65px] sticky left-[45px] md:left-[60px] z-30 p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}></th>
                        
                              {currentWeekDates.map((dateStr) => {
                                const isToday = dateStr === todayStr;
                                const d = new Date(dateStr);
                                const hasJournal = journalData[dateStr] && journalData[dateStr].trim().length > 0;
                          
                                const dayTodos = todosData[dateStr] || [];
                                const dayHabits = (habitLogs[dateStr] || []).filter(h => !h.deleted);
                          
                                const totalTasks = dayTodos.length + dayHabits.length;
                                const completedTasks = dayTodos.filter(t => t.status === 'green' || t.done).length + dayHabits.filter(h => h.status === 'green').length;
                                const completionRate = totalTasks > 0 ? completedTasks / totalTasks : 0;
                          
                                const hasUncompletedTodos = dayTodos.length > dayTodos.filter(t => t.status === 'green' || t.done).length;
                                const hasUncompletedHabits = dayHabits.length > dayHabits.filter(h => h.status === 'green').length;
                                let headerBg = isToday ? 'bg-cyan-500/20' : 'bg-white/5';
                                let headerBorder = isToday ? 'border-cyan-400' : 'border-white/10 hover:border-purple-400/50';
                                let headerShadow = isToday ? 'shadow-[0_0_15px_rgba(34,211,238,0.2)]' : '';
                                if (totalTasks > 0) {
                                  if (completionRate >= 0.9) {
                                      headerBg = 'bg-green-600/30 hover:bg-green-600/40';
                                      headerBorder = 'border-green-500';
                                      headerShadow = 'shadow-[0_0_20px_rgba(22,163,74,0.6)]';
                                  } else if (completionRate >= 0.7) {
                                      headerBg = 'bg-emerald-500/20 hover:bg-emerald-500/30';
                                      headerBorder = 'border-emerald-400';
                                      headerShadow = 'shadow-[0_0_15px_rgba(52,211,153,0.4)]';
                                  } else if (completionRate >= 0.5) {
                                      headerBg = 'bg-yellow-500/20 hover:bg-yellow-500/30';
                                      headerBorder = 'border-yellow-400';
                                      headerShadow = 'shadow-[0_0_15px_rgba(250,204,21,0.4)]';
                                  } else if (completionRate < 0.3) {
                                      headerBg = 'bg-red-500/20 hover:bg-red-500/30';
                                      headerBorder = 'border-red-400';
                                      headerShadow = 'shadow-[0_0_15px_rgba(248,113,113,0.4)]';
                                  }
                                }
                                return (
                                  <th key={dateStr} className="p-1 md:p-2 text-center relative z-20 align-bottom border-none group/th h-[80px]">
                                    <div onClick={() => { playSound('click'); setActiveJournalDate(dateStr); }} className={`cursor-pointer flex flex-col items-center justify-center py-2 px-1 md:p-3 rounded-2xl border ${headerBg} ${headerBorder} ${headerShadow} mx-auto w-[52px] md:w-[60px] h-[60px] md:h-[65px] transition-all relative`}>
                                      <span className={`text-[10px] font-black uppercase tracking-wider ${isToday ? 'text-cyan-300' : 'text-slate-400 group-hover/th:text-purple-300'}`}>
                                        {d.toLocaleDateString('en-US', { weekday: 'short' })}
                                      </span>
                                      <span className={`text-xl md:text-2xl font-black leading-none mt-1 ${isToday ? 'text-cyan-100 neon-text' : 'text-slate-200 group-hover/th:text-white'}`}>
                                        {d.getDate()}
                                      </span>
                                
                                      <div className="absolute -top-1 -right-1 flex gap-1">
                                        {hasUncompletedHabits && <div className="w-3 h-3 bg-emerald-400 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.8)] animate-pulse" title="Pending Routines"></div>}
                                        {hasUncompletedTodos && <div className="w-3 h-3 bg-cyan-400 rounded-full shadow-[0_0_8px_rgba(34,211,238,0.8)] animate-pulse" title="Pending Objectives"></div>}
                                        {hasJournal && <div className="w-3 h-3 bg-purple-400 rounded-full shadow-[0_0_8px_rgba(192,132,252,0.8)] animate-pulse" title="Journal Entry"></div>}
                                      </div>
                                    </div>
                                    <div className="absolute bottom-[100%] pb-2 left-1/2 -translate-x-1/2 flex gap-1.5 opacity-0 invisible group-hover/th:opacity-100 group-hover/th:visible transition-all z-[200] drop-shadow-[0_0_8px_rgba(0,0,0,0.8)]">
                                      <div className="flex bg-[#0b1120]/95 backdrop-blur-md p-1.5 rounded-xl border border-white/20 gap-1.5 shadow-[0_8px_16px_rgba(0,0,0,0.5)]">
                                        <button onClick={(e) => { e.stopPropagation(); handleMagicFill(dateStr); }} className="p-1.5 bg-yellow-500/20 text-yellow-400 rounded-lg hover:bg-yellow-500/40 hover:text-yellow-200 border border-yellow-500/30 transition-all" title="Magic Fill (Sleep)">
                                          <Zap size={14}/>
                                        </button>
                                        <button onClick={(e) => { e.stopPropagation(); handleCopyDay(dateStr); }} className="p-1.5 bg-blue-500/20 text-blue-400 rounded-lg hover:bg-blue-500/40 hover:text-blue-200 border border-blue-500/30 transition-all" title="Copy Day">
                                          <Copy size={14}/>
                                        </button>
                                        {dayClipboard && (
                                          <button onClick={(e) => { e.stopPropagation(); handlePasteDay(dateStr); }} className="p-1.5 bg-purple-500/20 text-purple-400 rounded-lg hover:bg-purple-500/40 hover:text-purple-200 border border-purple-500/30 transition-all alive-pulse" title="Paste Day">
                                            <Clipboard size={14}/>
                                          </button>
                                        )}
                                        <button onClick={(e) => { e.stopPropagation(); playSound('click'); setPendingReset({type: 'day', payload: dateStr}); }} className="p-1.5 bg-red-500/20 text-red-400 rounded-lg hover:bg-red-500/40 hover:text-red-200 border border-red-500/30 transition-all" title="Erase Day">
                                          <Trash2 size={14} />
                                        </button>
                                      </div>
                                    </div>
                                  </th>
                                );
                              })}
                            </tr>
                          </thead>
                          <tbody>
                            {SECTIONS.map((section) => (
                              <Fragment key={section.id}>
                                <tr>
                                  <td className="sticky left-0 z-40 p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}></td>
                                  <td className="sticky left-[45px] md:left-[60px] z-30 p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}></td>
                                  <td colSpan={currentWeekDates.length} className="pt-4 pb-2 text-center relative z-10 border-none">
                                    <div className="inline-flex items-center gap-2 md:gap-3 bg-white/10 backdrop-blur-sm px-4 md:px-6 py-2 rounded-full border border-white/20 font-bold text-slate-300 tracking-widest uppercase text-[10px] md:text-xs shadow-[0_4px_15px_rgba(0,0,0,0.5)]">
                                      <section.icon size={14} className="text-slate-200" />
                                      {section.label}
                                    </div>
                                  </td>
                                </tr>
                                {section.hours.map((hour, idx) => (
                                  <tr key={hour} className="group">
                                    {idx === 0 && (
                                      <td rowSpan={6} className="align-middle sticky left-0 z-40 w-[45px] md:w-[60px] p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}>
                                        <div className="flex flex-col gap-1.5 md:gap-2 items-center justify-center bg-white/5 backdrop-blur-md py-3 px-1 rounded-[20px] border border-white/10 mx-auto w-[38px] md:w-[50px] shadow-[0_4px_15px_rgba(0,0,0,0.3)]">
                                          <button onClick={handleUndo} disabled={past.length === 0} className={`p-1 md:p-1.5 rounded-xl border transition-all hover:scale-110 ${past.length > 0 ? 'border-white/20 text-slate-200 hover:bg-white/10' : 'border-white/5 text-slate-600 opacity-50 cursor-not-allowed'}`} title="Undo (Ctrl+Z)"><Undo size={14} /></button>
                                          <button onClick={handleRedo} disabled={future.length === 0} className={`p-1 md:p-1.5 rounded-xl border transition-all hover:scale-110 ${future.length > 0 ? 'border-white/20 text-slate-200 hover:bg-white/10' : 'border-white/5 text-slate-600 opacity-50 cursor-not-allowed'}`} title="Redo (Ctrl+Y)"><Redo size={14} /></button>
                                          <div className="w-full h-px bg-white/10 my-1"></div>
                                          {/* BP Toggle */}
                                          <button
                                            onClick={() => { playSound('click'); setIsBlueprintMode(prev => !prev); }}
                                            className={`p-3 rounded-xl border transition-all hover:scale-110 flex items-center justify-center w-full text-sm font-black tracking-widest ${isBlueprintMode ? 'border-sky-400 bg-sky-500/20 text-sky-300 shadow-[0_0_10px_rgba(14,165,233,0.4)]' : 'border-white/10 bg-transparent text-slate-400 hover:bg-white/10'}`}
                                            title={isBlueprintMode ? "Blueprint Mode ON — hatched future planning" : "Toggle Blueprint Mode"}
                                          >
                                            BP
                                          </button>
                                          {/* NEW: Description Mode Toggle */}
                                          <button
                                            onClick={() => { playSound('click'); setIsDescriptionMode(prev => !prev); }}
                                            className={`p-3 rounded-xl border transition-all hover:scale-110 flex items-center justify-center w-full text-sm font-black tracking-widest ${isDescriptionMode ? 'border-amber-400 bg-amber-500/20 text-amber-300 shadow-[0_0_10px_rgba(245,158,11,0.4)]' : 'border-white/10 bg-transparent text-slate-400 hover:bg-white/10'}`}
                                            title={isDescriptionMode ? "Description Mode ON — click triangles for notes" : "Toggle Description Mode"}
                                          >
                                            DESC
                                          </button>
                                          <div className="w-full h-px bg-white/10 my-1"></div>
                                          <button onClick={() => handleColorSelect('lock')} className={`p-1 md:p-1.5 rounded-xl border transition-all hover:scale-110 ${selectedColorId === 'lock' ? 'border-red-500 bg-red-500/20 text-red-300 shadow-[0_0_10px_rgba(239,68,68,0.3)]' : 'border-white/10 bg-transparent text-slate-400 hover:bg-white/10'}`} title="Lock">
                                            <Lock size={14} />
                                          </button>
                                          <div className="w-full h-px bg-white/10 my-1"></div>
                                          {categories.map(cat => (
                                            <button key={cat.id} onClick={() => handleColorSelect(cat.id)} className={`w-4 h-4 md:w-6 md:h-6 rounded-md md:rounded-lg border border-white/20 transition-all hover:scale-110 ${selectedColorId === cat.id ? 'scale-110' : ''}`} style={{ backgroundColor: cat.color, boxShadow: selectedColorId === cat.id ? `0 0 12px ${cat.color}` : `0 0 4px ${cat.color}80` }} title={cat.name} />
                                          ))}
                                        </div>
                                      </td>
                                    )}
                                    <td className="text-right pr-1 md:pr-2 align-middle sticky left-[45px] md:left-[60px] z-30 w-[50px] md:w-[65px] p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}>
                                      <span className="text-[9px] md:text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap bg-white/5 px-1 md:px-1.5 py-1.5 rounded-lg md:rounded-xl border border-transparent group-hover:border-white/20 transition-colors inline-block">
                                        {formatHourLabel(hour)}
                                      </span>
                                    </td>
                                    {currentWeekDates.map(dateStr => {
                                      const dayData = allData[dateStr] || {};
                                      const cellData = dayData[hour] || { t1: null, t2: null, split1: false, split2: false };
                                
                                      const isSplit1 = cellData.split1;
                                      const isSplit2 = cellData.split2;
                                
                                      // Compute fills (solid or blueprint pattern URL)
                                      const t1Fill = getSegmentFill(cellData.t1);
                                      const t2Fill = getSegmentFill(cellData.t2);
                                      const q1Fill = getSegmentFill(cellData.q1);
                                      const q2Fill = getSegmentFill(cellData.q2);
                                      const q3Fill = getSegmentFill(cellData.q3);
                                      const q4Fill = getSegmentFill(cellData.q4);
                                
                                      const activeColorId = cellData.q1 || cellData.q2 || cellData.t1 || cellData.q3 || cellData.q4 || cellData.t2;
                                      const baseActiveId = activeColorId && activeColorId.startsWith('bp_') ? activeColorId.slice(3) : activeColorId;
                                      const glowColorHex = baseActiveId ? categories.find(c => c.id === baseActiveId)?.color : 'transparent';
                                      const cellStyle = activeColorId ? { boxShadow: `0 0 15px ${glowColorHex}20, inset 0 0 10px ${glowColorHex}10` } : {};
                                      return (
                                        <td key={`${dateStr}-${hour}`} className="align-middle p-1 md:p-1.5 border-none">
                                          <div className="square-cell-inner mx-auto relative rounded-xl md:rounded-2xl overflow-hidden bg-[#0b1120]/50 border border-white/10 transition-transform duration-100 hover:scale-105 z-10 hover:z-20 backdrop-blur-sm" style={cellStyle}>
                                            <svg viewBox="0 0 100 100" preserveAspectRatio="none" className={`w-full h-full block ${selectedColorId !== 'lock' && !isDescriptionMode ? 'paintable-svg' : ''}`}>
                                              {/* Blueprint patterns for ALL categories (glowing semi-transparent hatched net) */}
                                              <defs>
                                                {categories.map(cat => (
                                                  <pattern
                                                    key={`bp-${cat.id}`}
                                                    id={`blueprint-${cat.id}`}
                                                    width="10"
                                                    height="10"
                                                    patternUnits="userSpaceOnUse"
                                                  >
                                                    <rect width="10" height="10" fill={cat.color} fillOpacity="0.12" />
                                                    <line x1="0" y1="0" x2="10" y2="10" stroke={cat.color} strokeWidth="1.5" strokeOpacity="0.75" />
                                                    <line x1="10" y1="0" x2="0" y2="10" stroke={cat.color} strokeWidth="1.5" strokeOpacity="0.75" />
                                                  </pattern>
                                                ))}
                                              </defs>
                                              {isSplit1 ? (
                                                 <>
                                                   <polygon 
                                                     points="0,0 100,0 50,50" 
                                                     fill={q1Fill}
                                                     onPointerDown={(e) => { e.preventDefault(); handlePointerDown(dateStr, hour, 'q1', e); }}
                                                     onPointerEnter={() => handlePointerEnter(dateStr, hour, 'q1')}
                                                     onContextMenu={(e) => {
                                                       if (isDescriptionMode) {
                                                         e.preventDefault();
                                                         const rect = e.currentTarget.getBoundingClientRect();
                                                         setContextMenu({ x: e.clientX, y: e.clientY, dateStr, hour, triangleId: 'q1' });
                                                         return;
                                                       }
                                                       handleSplitToggle(dateStr, hour, 'half1', e);
                                                     }}
                                                     className="cursor-pointer transition-opacity hover:opacity-80" />
                                                   <polygon 
                                                     points="0,0 0,100 50,50" 
                                                     fill={q2Fill}
                                                     onPointerDown={(e) => { e.preventDefault(); handlePointerDown(dateStr, hour, 'q2', e); }}
                                                     onPointerEnter={() => handlePointerEnter(dateStr, hour, 'q2')}
                                                     onContextMenu={(e) => {
                                                       if (isDescriptionMode) {
                                                         e.preventDefault();
                                                         const rect = e.currentTarget.getBoundingClientRect();
                                                         setContextMenu({ x: e.clientX, y: e.clientY, dateStr, hour, triangleId: 'q2' });
                                                         return;
                                                       }
                                                       handleSplitToggle(dateStr, hour, 'half1', e);
                                                     }}
                                                     className="cursor-pointer transition-opacity hover:opacity-80" />
                                                   <line x1="0" y1="0" x2="50" y2="50" stroke="var(--sticky-bg)" strokeWidth="4" className="pointer-events-none" />
                                                 </>
                                              ) : (
                                                 <polygon 
                                                   points="0,100 0,0 100,0" 
                                                   fill={t1Fill}
                                                   onPointerDown={(e) => { e.preventDefault(); handlePointerDown(dateStr, hour, 't1', e); }}
                                                   onPointerEnter={() => handlePointerEnter(dateStr, hour, 't1')}
                                                   onContextMenu={(e) => {
                                                     if (isDescriptionMode) {
                                                       e.preventDefault();
                                                       const rect = e.currentTarget.getBoundingClientRect();
                                                       setContextMenu({ x: e.clientX, y: e.clientY, dateStr, hour, triangleId: 't1' });
                                                       return;
                                                     }
                                                     handleSplitToggle(dateStr, hour, 'half1', e);
                                                   }}
                                                   className="cursor-pointer transition-opacity hover:opacity-80" />
                                              )}
                                              {isSplit2 ? (
                                                 <>
                                                   <polygon 
                                                     points="100,100 100,0 50,50" 
                                                     fill={q3Fill}
                                                     onPointerDown={(e) => { e.preventDefault(); handlePointerDown(dateStr, hour, 'q3', e); }}
                                                     onPointerEnter={() => handlePointerEnter(dateStr, hour, 'q3')}
                                                     onContextMenu={(e) => {
                                                       if (isDescriptionMode) {
                                                         e.preventDefault();
                                                         const rect = e.currentTarget.getBoundingClientRect();
                                                         setContextMenu({ x: e.clientX, y: e.clientY, dateStr, hour, triangleId: 'q3' });
                                                         return;
                                                       }
                                                       handleSplitToggle(dateStr, hour, 'half2', e);
                                                     }}
                                                     className="cursor-pointer transition-opacity hover:opacity-80" />
                                                   <polygon 
                                                     points="100,100 0,100 50,50" 
                                                     fill={q4Fill}
                                                     onPointerDown={(e) => { e.preventDefault(); handlePointerDown(dateStr, hour, 'q4', e); }}
                                                     onPointerEnter={() => handlePointerEnter(dateStr, hour, 'q4')}
                                                     onContextMenu={(e) => {
                                                       if (isDescriptionMode) {
                                                         e.preventDefault();
                                                         const rect = e.currentTarget.getBoundingClientRect();
                                                         setContextMenu({ x: e.clientX, y: e.clientY, dateStr, hour, triangleId: 'q4' });
                                                         return;
                                                       }
                                                       handleSplitToggle(dateStr, hour, 'half2', e);
                                                     }}
                                                     className="cursor-pointer transition-opacity hover:opacity-80" />
                                                   <line x1="100" y1="100" x2="50" y2="50" stroke="var(--sticky-bg)" strokeWidth="4" className="pointer-events-none" />
                                                 </>
                                              ) : (
                                                 <polygon 
                                                   points="0,100 100,100 100,0" 
                                                   fill={t2Fill}
                                                   onPointerDown={(e) => { e.preventDefault(); handlePointerDown(dateStr, hour, 't2', e); }}
                                                   onPointerEnter={() => handlePointerEnter(dateStr, hour, 't2')}
                                                   onContextMenu={(e) => {
                                                     if (isDescriptionMode) {
                                                       e.preventDefault();
                                                       const rect = e.currentTarget.getBoundingClientRect();
                                                       setContextMenu({ x: e.clientX, y: e.clientY, dateStr, hour, triangleId: 't2' });
                                                       return;
                                                     }
                                                     handleSplitToggle(dateStr, hour, 'half2', e);
                                                   }}
                                                   className="cursor-pointer transition-opacity hover:opacity-80" />
                                              )}
                                              <line x1="0" y1="100" x2="100" y2="0" stroke="var(--sticky-bg)" strokeWidth="6" className="pointer-events-none" />
                                            </svg>
                                          </div>
                                        </td>
                                      );
                                    })}
                                  </tr>
                                ))}
                              </Fragment>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}
              </section>
              {/* ---------------- SECTION 2: ANALYTICS CORE ---------------- */}
              <section className="glass-panel rounded-3xl w-full overflow-hidden mb-6">
                <button onClick={() => toggleSection('analytics')} className="w-full p-4 md:p-6 flex justify-between items-center bg-white/5 hover:bg-white/10 transition-colors">
                    <div className="flex items-center gap-3">
                        <Activity size={24} className="text-purple-400 drop-shadow-[0_0_8px_rgba(168,85,247,0.5)]" />
                        <h2 className="text-lg md:text-xl font-black uppercase tracking-wider text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]">Analytics Core</h2>
                    </div>
                    <ChevronDown size={24} className={`text-slate-400 transform transition-transform ${sectionsOpen.analytics ? 'rotate-180' : ''}`} />
                </button>
                {sectionsOpen.analytics && (
                  <div className="flex flex-col border-t border-white/10 p-4 md:p-6">
                
                    <div className="mb-8 bg-white/5 border border-white/10 rounded-3xl p-6">
                      <h3 className="font-bold text-pink-400 uppercase tracking-widest text-xs mb-5 border-b border-pink-500/30 pb-3">HEATMAP VISUALIZATION CONTROLS</h3>
                      <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div>
                          <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Visualize</label>
                          <select
                            value={sysConfig.heatmapMode}
                            onChange={(e) => { playSound('click');
                              setSysConfig(prev => {
                                const updated = { ...prev, heatmapMode: e.target.value };
                                localStorage.setItem(LOCAL_SYS_CONFIG_KEY, JSON.stringify(updated));
                                return updated;
                              });
                            }}
                            className="w-full bg-[#0b1120] border border-purple-400/30 focus:border-purple-400 text-slate-200 font-bold rounded-2xl px-4 py-3 outline-none text-base"
                          >
                            <option value="points">Points (Overall Productivity)</option>
                            {categories.map(cat => (
                              <option key={cat.id} value={cat.id}>{cat.name} Hours</option>
                            ))}
                          </select>
                        </div>
                    
                        {(() => {
                          const currentMode = sysConfig.heatmapMode;
                          const modeSettings = sysConfig.perModeSettings?.[currentMode] || {
                            worstPoint: null,
                            bestPoint: null,
                            xpPerPoint: currentMode === 'points' ? 1 : null
                          };
                          return (
                            <>
                              <div>
                                <label className="block text-[10px] font-bold text-red-400 uppercase tracking-widest mb-2">
                                  {currentMode === 'points'
                                    ? 'Worst Point Limit (Deep Red)'
                                    : `Worst ${categories.find(c => c.id === currentMode)?.name || ''} Hours`}
                                </label>
                                <input
                                  type="number"
                                  step="0.1"
                                  value={modeSettings.worstPoint !== null ? modeSettings.worstPoint : ''}
                                  onChange={e => {
                                    playSound('click');
                                    const val = e.target.value === '' ? null : parseFloat(e.target.value);
                                    updateModeSetting(currentMode, 'worstPoint', val);
                                  }}
                                  className="w-full bg-[#0b1120] border border-red-500/50 focus:border-red-400 text-slate-200 font-bold rounded-2xl px-4 py-3 outline-none text-base"
                                />
                              </div>
                          
                              <div>
                                <label className="block text-[10px] font-bold text-emerald-400 uppercase tracking-widest mb-2">
                                  {currentMode === 'points'
                                    ? 'Best Point Limit (Deep Green)'
                                    : `Best ${categories.find(c => c.id === currentMode)?.name || ''} Hours`}
                                </label>
                                <input
                                  type="number"
                                  step="0.1"
                                  value={modeSettings.bestPoint !== null ? modeSettings.bestPoint : ''}
                                  onChange={e => {
                                    playSound('click');
                                    const val = e.target.value === '' ? null : parseFloat(e.target.value);
                                    updateModeSetting(currentMode, 'bestPoint', val);
                                  }}
                                  className="w-full bg-[#0b1120] border border-emerald-500/50 focus:border-emerald-400 text-slate-200 font-bold rounded-2xl px-4 py-3 outline-none text-base"
                                />
                              </div>
                          
                              <div>
                                <label className="block text-[10px] font-bold text-lime-400 uppercase tracking-widest mb-2">XP Per Point Earned</label>
                                <input
                                  type="number"
                                  step="0.1"
                                  value={modeSettings.xpPerPoint !== null ? modeSettings.xpPerPoint : ''}
                                  onChange={e => {
                                    playSound('click');
                                    const val = e.target.value === '' ? null : parseFloat(e.target.value);
                                    updateModeSetting(currentMode, 'xpPerPoint', val);
                                  }}
                                  className="w-full bg-[#0b1120] border border-lime-500/50 focus:border-lime-400 text-slate-200 font-bold rounded-2xl px-4 py-3 outline-none text-base"
                                />
                              </div>
                            </>
                          );
                        })()}
                      </div>
                    </div>
                
                    <ChronoSpectralHeatmap
                      statYear={statYear}
                      allData={allData}
                      todosData={todosData}
                      habitLogs={habitLogs}
                      categories={categories}
                      sysConfig={sysConfig}
                      heatmapMode={sysConfig.heatmapMode}
                      onDayClick={setActiveJournalDate}
                    />
                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 md:gap-6 mt-6 md:mt-8">
                      <div className="flex flex-col h-full gap-3 md:gap-4">
                        <div className="bg-white/5 rounded-2xl border border-white/10 p-3 flex flex-col">
                          <span className="text-[10px] md:text-xs font-black uppercase text-slate-400 tracking-wider">Daily Scan</span>
                          <input type="date" value={statDate} onChange={e => { playSound('click'); setStatDate(e.target.value); }} className="w-full bg-transparent border-none outline-none font-bold text-slate-200 mt-1 cursor-pointer" />
                        </div>
                        <StatCard title="Selected Day" stats={statsDay} categories={categories} showGoals={true} multiplier={1} showAverage={false} />
                      </div>
                      <div className="flex flex-col h-full gap-3 md:gap-4">
                        <div className="bg-white/5 rounded-2xl border border-white/10 p-3 flex flex-col">
                          <span className="text-[10px] md:text-xs font-black uppercase text-slate-400 tracking-wider">Weekly Scan</span>
                          <div className="flex flex-col xl:flex-row items-stretch xl:items-center gap-2 mt-1 w-full">
                            <input type="month" value={statWeekMonth} onChange={e => { playSound('click'); setStatWeekMonth(e.target.value); setStatWeekIndex(0); }} className="w-full xl:w-1/2 bg-[#0b1120] rounded-md border border-white/20 px-2 py-1 outline-none font-bold text-slate-200 text-xs cursor-pointer" />
                            <select value={statWeekIndex} onChange={e => { playSound('click'); setStatWeekIndex(Number(e.target.value)); }} className="w-full xl:w-1/2 bg-[#0b1120] rounded-md border border-white/20 px-2 py-1 font-bold text-slate-200 text-xs outline-none cursor-pointer min-w-0">
                              {statAvailableWeeks.map((week, idx) => (<option key={week.id} value={idx}>{week.label}</option>))}
                            </select>
                          </div>
                        </div>
                        <StatCard title="Selected Week" stats={statsWeek} categories={categories} showGoals={true} multiplier={7} showAverage={true} />
                      </div>
                      <div className="flex flex-col h-full gap-3 md:gap-4">
                        <div className="bg-white/5 rounded-2xl border border-white/10 p-3 flex flex-col">
                          <span className="text-[10px] md:text-xs font-black uppercase text-slate-400 tracking-wider">Monthly Scan</span>
                          <input type="month" value={statMonth} onChange={e => { playSound('click'); setStatMonth(e.target.value); }} className="w-full bg-transparent border-none outline-none font-bold text-slate-200 mt-1 cursor-pointer" />
                        </div>
                        <StatCard title="Selected Month" stats={statsMonth} categories={categories} showGoals={true} multiplier={30} showAverage={true} />
                      </div>
                      <div className="flex flex-col h-full gap-3 md:gap-4">
                        <div className="bg-white/5 rounded-2xl border border-white/10 p-3 flex flex-col">
                          <span className="text-[10px] md:text-xs font-black uppercase text-slate-400 tracking-wider">Annual Scan</span>
                          <input type="number" value={statYear} onChange={e => { playSound('click'); setStatYear(e.target.value); }} min="2000" max="2100" className="w-full bg-transparent border-none outline-none font-bold text-slate-200 mt-1 cursor-pointer" />
                        </div>
                        <StatCard title="Selected Year" stats={statsYear} categories={categories} showGoals={true} multiplier={365} showAverage={true} />
                      </div>
                    </div>
              
                    {/* WeeklyChart now receives onDayClick so dates open Captain's Log */}
                    <WeeklyChart
                      weekDates={statAvailableWeeks[statWeekIndex]?.dates || []}
                      allData={allData}
                      categories={categories}
                      onDayClick={setActiveJournalDate}
                    />
                  </div>
                )}
              </section>
              {/* ---------------- NEW SECTION: MODERN GRAPH EXPLORER ---------------- */}
              <section className="glass-panel rounded-3xl w-full overflow-hidden mb-6">
                <button onClick={() => toggleSection('graph')} className="w-full p-4 md:p-6 flex justify-between items-center bg-white/5 hover:bg-white/10 transition-colors">
                    <div className="flex items-center gap-3">
                        <Activity size={24} className="text-amber-400 drop-shadow-[0_0_8px_rgba(245,158,11,0.5)]" />
                        <h2 className="text-lg md:text-xl font-black uppercase tracking-wider text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]">Modern Graph Explorer</h2>
                    </div>
                    <ChevronDown size={24} className={`text-slate-400 transform transition-transform ${sectionsOpen.graph ? 'rotate-180' : ''}`} />
                </button>
                {sectionsOpen.graph && (
                  <div className="flex flex-col border-t border-white/10 p-4 md:p-6">
                    <div className="flex flex-wrap items-end gap-6 mb-8">
                      {/* Metric selector */}
                      <div className="flex-1 min-w-[220px]">
                        <label className="block text-xs font-black text-amber-300 uppercase tracking-widest mb-2">What to graph</label>
                        <select 
                          value={graphSelection} 
                          onChange={e => { playSound('click'); setGraphSelection(e.target.value); }}
                          className="w-full bg-[#0b1120] border border-amber-400/40 focus:border-amber-400 rounded-3xl px-5 py-4 text-slate-200 font-bold text-base outline-none"
                        >
                          <option value="points">Daily Points</option>
                          <option value="xp">Daily XP Earned</option>
                          {categories.map(cat => (
                            <option key={cat.id} value={cat.id}>{cat.name} Hours</option>
                          ))}
                        </select>
                      </div>
                      {/* Period toggle */}
                      <div>
                        <label className="block text-xs font-black text-amber-300 uppercase tracking-widest mb-2">Time period</label>
                        <div className="flex border border-white/10 rounded-3xl bg-[#0b1120] overflow-hidden">
                          <button 
                            onClick={() => { playSound('click'); setGraphPeriod('week'); }}
                            className={`px-8 py-4 font-black tracking-widest text-sm ${graphPeriod === 'week' ? 'bg-amber-400 text-black' : 'text-slate-400 hover:text-slate-200'}`}
                          >
                            WEEK
                          </button>
                          <button 
                            onClick={() => { playSound('click'); setGraphPeriod('month'); }}
                            className={`px-8 py-4 font-black tracking-widest text-sm ${graphPeriod === 'month' ? 'bg-amber-400 text-black' : 'text-slate-400 hover:text-slate-200'}`}
                          >
                            MONTH
                          </button>
                        </div>
                      </div>
                      {/* Week / Month selector */}
                      {graphPeriod === 'week' ? (
                        <div className="flex-1 min-w-[220px]">
                          <label className="block text-xs font-black text-amber-300 uppercase tracking-widest mb-2">Select Week</label>
                          <select 
                            value={graphWeekIndex} 
                            onChange={e => { playSound('click'); setGraphWeekIndex(Number(e.target.value)); }}
                            className="w-full bg-[#0b1120] border border-amber-400/40 focus:border-amber-400 rounded-3xl px-5 py-4 text-slate-200 font-bold text-base outline-none"
                          >
                            {graphAvailableWeeks.map((week, idx) => (
                              <option key={idx} value={idx}>{week.label}</option>
                            ))}
                          </select>
                        </div>
                      ) : (
                        <div className="flex-1 min-w-[220px]">
                          <label className="block text-xs font-black text-amber-300 uppercase tracking-widest mb-2">Select Month</label>
                          <input 
                            type="month" 
                            value={graphWeekMonth} 
                            onChange={e => { playSound('click'); setGraphWeekMonth(e.target.value); }}
                            className="w-full bg-[#0b1120] border border-amber-400/40 focus:border-amber-400 rounded-3xl px-5 py-4 text-slate-200 font-bold text-base outline-none"
                          />
                        </div>
                      )}
                    </div>
                    {/* BAR CHART */}
                    <div className="bg-[#0b1120] rounded-3xl p-6 border border-white/10 overflow-hidden">
                      <div className="flex justify-between items-baseline mb-6">
                        <h3 className="text-sm font-black text-amber-300 uppercase tracking-[1px]">
                          {graphSelection === 'points' ? 'POINTS' : graphSelection === 'xp' ? 'XP EARNED' : `${categories.find(c => c.id === graphSelection)?.name || ''} HOURS`}
                        </h3>
                        <span className="text-xs text-slate-400 font-medium">Y = {graphSelection === 'points' ? 'POINTS' : graphSelection === 'xp' ? 'XP' : 'HOURS'} • X = TIME</span>
                      </div>
                      <div className="flex items-end h-80 gap-1 md:gap-3 overflow-x-auto pb-4 custom-scrollbar">
                        {graphBars.map((bar, i) => {
                          const maxVal = Math.max(...graphBars.map(b => b.value), 1);
                          const barHeight = Math.max(8, Math.round((bar.value / maxVal) * 100));
                          return (
                            <div key={i} className="flex-1 flex flex-col items-center min-w-[42px] group">
                              <div className="relative flex-1 w-full flex flex-col-reverse">
                                <div 
                                  className="w-full rounded-t-3xl transition-all group-hover:scale-y-105"
                                  style={{
                                    height: `${barHeight}%`,
                                    backgroundColor: bar.color,
                                    boxShadow: `0 0 20px ${bar.color}30`
                                  }}
                                ></div>
                              </div>
                              <div className="mt-3 text-center">
                                <div className="text-xs font-black text-white bg-black/70 px-2 py-px rounded">{bar.value}</div>
                                <div className="text-[10px] text-slate-400 mt-1 font-medium tracking-widest">{bar.label}</div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}
