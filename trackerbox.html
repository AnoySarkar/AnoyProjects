                      <h2 className="text-2xl md:text-3xl font-black uppercase tracking-wider text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]">Analytics Core</h2>
                    </div>
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
                    <div className="flex flex-col h-full gap-4">
                      <div className="bg-white/5 rounded-2xl border border-white/10 p-3 flex flex-col">
                        <span className="text-[10px] md:text-xs font-black uppercase text-slate-400 tracking-wider">Daily Scan</span>
                        <input type="date" value={statDate} onChange={e => { playSound('click'); setStatDate(e.target.value); }} className="bg-transparent border-none outline-none font-bold text-slate-200 mt-1 cursor-pointer" />
                      </div>
                      <StatCard title="Selected Day" stats={statsDay} categories={categories} showGoals={true} multiplier={1} />
                    </div>

                    <div className="flex flex-col h-full gap-4">
                      <div className="bg-white/5 rounded-2xl border border-white/10 p-3 flex flex-col">
                        <span className="text-[10px] md:text-xs font-black uppercase text-slate-400 tracking-wider">Weekly Scan</span>
                        <div className="flex flex-col xl:flex-row items-stretch xl:items-center gap-2 mt-1">
                          <input type="month" value={statWeekMonth} onChange={e => { playSound('click'); setStatWeekMonth(e.target.value); setStatWeekIndex(0); }} className="w-full xl:w-1/2 bg-[#0b1120] rounded-md border border-white/20 px-2 py-1 outline-none font-bold text-slate-200 text-xs cursor-pointer" />
                          <select value={statWeekIndex} onChange={e => { playSound('click'); setStatWeekIndex(Number(e.target.value)); }} className="w-full xl:w-1/2 bg-[#0b1120] rounded-md border border-white/20 px-2 py-1 font-bold text-slate-200 text-xs outline-none cursor-pointer">
                            {statAvailableWeeks.map((week, idx) => (<option key={week.id} value={idx}>{week.label}</option>))}
                          </select>
                        </div>
                      </div>
                      <StatCard title="Selected Week" stats={statsWeek} categories={categories} showGoals={true} multiplier={7} />
                    </div>

                    <div className="flex flex-col h-full gap-4">
                      <div className="bg-white/5 rounded-2xl border border-white/10 p-3 flex flex-col">
                        <span className="text-[10px] md:text-xs font-black uppercase text-slate-400 tracking-wider">Monthly Scan</span>
                        <input type="month" value={statMonth} onChange={e => { playSound('click'); setStatMonth(e.target.value); }} className="bg-transparent border-none outline-none font-bold text-slate-200 mt-1 cursor-pointer" />
                      </div>
                      <StatCard title="Selected Month" stats={statsMonth} categories={categories} showGoals={true} multiplier={30} />
                    </div>

                    <div className="flex flex-col h-full gap-4">
                      <div className="bg-white/5 rounded-2xl border border-white/10 p-3 flex flex-col">
                        <span className="text-[10px] md:text-xs font-black uppercase text-slate-400 tracking-wider">Annual Scan</span>
                        <input type="number" value={statYear} onChange={e => { playSound('click'); setStatYear(e.target.value); }} min="2000" max="2100" className="bg-transparent border-none outline-none font-bold text-slate-200 mt-1 cursor-pointer" />
                      </div>
                      <StatCard title="Selected Year" stats={statsYear} categories={categories} showGoals={true} multiplier={365} />
                    </div>
                  </div>
                </section>

                {/* Category & Routine Management Section */}
                <section className="glass-panel p-6 md:p-8 rounded-3xl border-cyan-900/50 shadow-[0_0_20px_rgba(34,211,238,0.05)]">
                  <div className="flex items-center gap-4 mb-8 pt-2">
                    <div className="bg-cyan-500/20 p-3 rounded-2xl border border-cyan-500/50 shadow-[0_0_15px_rgba(34,211,238,0.3)]">
                      <Settings2 size={28} className="text-cyan-400" />
                    </div>
                    <div>
                      <h2 className="text-2xl md:text-3xl font-black uppercase tracking-wider text-white leading-none drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]">System Modules</h2>
                      <span className="text-xs font-bold text-cyan-500 uppercase tracking-widest neon-text">Customize Categories & Goals</span>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 mb-12">
                    {categories.map((cat, idx) => (
                      <div key={cat.id} className="bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center gap-3 transition-all hover:border-cyan-500/30 relative">
                        <span className="absolute -top-2 -left-2 bg-black border border-white/20 text-[9px] font-bold text-slate-400 w-5 h-5 rounded-full flex items-center justify-center">
                          {idx + 1}
                        </span>
                        <div className="relative w-8 h-8 rounded-xl overflow-hidden shrink-0 border border-white/20 shadow-[0_0_10px_rgba(255,255,255,0.1)] cursor-pointer">
                          <input type="color" value={cat.color} onChange={e => updateCategory(cat.id, 'color', e.target.value)} className="absolute -top-4 -left-4 w-16 h-16 cursor-pointer border-0 p-0" />
                        </div>
                        <input type="text" value={cat.name} onChange={e => updateCategory(cat.id, 'name', e.target.value)} className="flex-1 bg-transparent text-slate-200 font-bold border-b border-transparent focus:border-cyan-400 outline-none transition-all py-1 min-w-0" placeholder="Name" />
                        <div className="flex flex-col items-center w-16 shrink-0 border-l border-white/10 pl-2">
                          <span className="text-[8px] uppercase tracking-widest text-slate-400">Goal(hr)</span>
                          <input type="number" min="0" max="24" value={cat.target || 0} onChange={e => updateCategory(cat.id, 'target', Number(e.target.value))} className="w-full bg-transparent text-center text-cyan-300 font-black outline-none border-b border-transparent focus:border-cyan-400" />
                        </div>
                        <button onClick={() => removeCategory(cat.id, cat.name)} className="text-red-400/50 hover:text-red-400 p-1 transition-colors shrink-0" title="Delete Category"><Trash2 size={16}/></button>
                      </div>
                    ))}
                    <button onClick={addCategory} className="bg-white/5 border border-dashed border-white/20 rounded-2xl p-4 flex items-center justify-center gap-2 text-slate-400 hover:text-white hover:border-cyan-400/50 hover:shadow-[0_0_15px_rgba(34,211,238,0.2)] transition-all font-bold uppercase tracking-wider h-[74px]">
                       <Plus size={20} /> Add Category
                    </button>
                  </div>

                  {/* Routine Engine Settings */}
                  <div className="flex items-center gap-4 mb-8 border-t border-cyan-500/30 pt-8">
                    <div className="bg-emerald-500/20 p-3 rounded-2xl border border-emerald-500/50 shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                      <CalendarIcon size={28} className="text-emerald-400" />
                    </div>
                    <div>
                      <h2 className="text-2xl md:text-3xl font-black uppercase tracking-wider text-white leading-none drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]">Habit Tracker</h2>
                      <span className="text-xs font-bold text-emerald-500 uppercase tracking-widest neon-text">Automated Habit Management</span>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                    {habitsConfig.map(habit => (
                      <div key={habit.id} className="bg-white/5 border border-white/10 rounded-2xl p-4 flex flex-col gap-3 transition-all hover:border-emerald-500/30">
                        <div className="flex items-center gap-3">
                          <input type="text" value={habit.name} onChange={e => updateHabitConfig(habit.id, 'name', e.target.value)} className="flex-1 bg-transparent text-slate-200 font-bold border-b border-transparent focus:border-emerald-400 outline-none transition-all py-1 min-w-0" placeholder="Habit Name" />
                          <button onClick={() => removeHabitConfig(habit.id)} className="text-red-400/50 hover:text-red-400 p-1 transition-colors shrink-0" title="Delete Habit Config"><Trash2 size={16}/></button>
                        </div>
                        <div className="flex justify-between mt-2 gap-1">
                           {[{v:1,l:'M'},{v:2,l:'T'},{v:3,l:'W'},{v:4,l:'T'},{v:5,l:'F'},{v:6,l:'S'},{v:0,l:'S'}].map(d => (
                             <button key={d.v} onClick={() => toggleHabitDay(habit.id, d.v)} className={`w-7 h-7 md:w-8 md:h-8 rounded-full text-[10px] md:text-xs font-bold flex items-center justify-center border transition-all shrink-0 ${habit.days.includes(d.v) ? 'bg-emerald-500/30 border-emerald-400 text-emerald-300 shadow-[0_0_8px_rgba(16,185,129,0.4)]' : 'bg-transparent border-white/10 text-slate-500 hover:border-white/30'}`}>
                               {d.l}
                             </button>
                           ))}
                        </div>
                      </div>
                    ))}
                    <button onClick={addHabitConfig} className="bg-white/5 border border-dashed border-white/20 rounded-2xl p-4 flex items-center justify-center gap-2 text-slate-400 hover:text-white hover:border-emerald-400/50 hover:shadow-[0_0_15px_rgba(16,185,129,0.2)] transition-all font-bold uppercase tracking-wider min-h-[100px]">
                       <Plus size={20} /> Add Habit
                    </button>
                  </div>
                </section>

                {/* Data & Storage Core */}
                <section className="glass-panel p-6 md:p-8 rounded-3xl border-slate-700/50 shadow-[0_0_20px_rgba(255,255,255,0.02)] relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 via-purple-500 to-red-500 opacity-50"></div>
                  
                  <div className="flex items-center gap-4 mb-8 pt-2">
                    <div className="bg-slate-500/20 p-3 rounded-2xl border border-slate-500/50 shadow-[0_0_15px_rgba(255,255,255,0.1)]">
                      <Database size={28} className="text-slate-300" />
                    </div>
                    <div>
                      <h2 className="text-2xl md:text-3xl font-black uppercase tracking-wider text-white leading-none drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]">Data & Storage Core</h2>
                      <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Backup & Erase Architecture</span>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 xl:grid-cols-4 gap-6">
                    <div className="xl:col-span-1 bg-blue-900/10 border border-blue-500/20 rounded-2xl p-4 flex flex-col gap-4">
                      <h3 className="font-bold uppercase text-blue-400 border-b border-blue-500/20 pb-2">System Files</h3>
                      <p className="text-xs text-slate-400 flex-1">Save your database to a file, or restore from backup securely.</p>
                      <div className="flex flex-col gap-2 mt-auto">
                        <button onClick={handleExportData} className="w-full bg-blue-600/20 text-blue-300 hover:bg-blue-600/40 hover:text-blue-100 font-bold uppercase tracking-wider py-2 rounded-xl border border-blue-500/50 transition-all flex items-center justify-center gap-2">
                          <Download size={16}/> Export JSON
                        </button>
                        <button onClick={() => { playSound('click'); fileInputRef.current.click(); }} className="w-full bg-purple-600/20 text-purple-300 hover:bg-purple-600/40 hover:text-purple-100 font-bold uppercase tracking-wider py-2 rounded-xl border border-purple-500/50 transition-all flex items-center justify-center gap-2">
                          <UploadCloud size={16}/> Restore JSON
                        </button>
                        <input type="file" accept=".json" ref={fileInputRef} onChange={handleImportData} className="hidden" />
                      </div>
                    </div>

                    <div className="xl:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-6">
                      <div className="bg-red-900/10 border border-red-500/20 rounded-2xl p-4 flex flex-col gap-4">
                        <h3 className="font-bold uppercase text-red-400 border-b border-red-500/20 pb-2">Erase Day</h3>
                        <input type="date" value={resetDay} onChange={e => setResetDay(e.target.value)} className="bg-[#0b1120] border border-red-500/30 text-slate-200 rounded-xl px-3 py-2 font-bold outline-none w-full" />
                        <button onClick={() => { playSound('click'); setPendingReset({type: 'day', payload: resetDay}); }} className="mt-auto bg-red-600/20 text-red-300 hover:bg-red-600/40 hover:text-red-100 font-bold uppercase tracking-wider py-2 rounded-xl border border-red-500/50 transition-all">Format Day</button>
                      </div>
                      <div className="bg-red-900/10 border border-red-500/20 rounded-2xl p-4 flex flex-col gap-4">
                        <h3 className="font-bold uppercase text-red-400 border-b border-red-500/20 pb-2">Erase Week</h3>
                        <div className="flex flex-col gap-2">
                          <input type="month" value={resetWeekMonth} onChange={e => {setResetWeekMonth(e.target.value); setResetWeekIdx(0);}} className="bg-[#0b1120] border border-red-500/30 text-slate-200 rounded-xl px-3 py-2 font-bold outline-none w-full text-sm" />
                          <select value={resetWeekIdx} onChange={e => setResetWeekIdx(Number(e.target.value))} className="bg-[#0b1120] border border-red-500/30 text-slate-200 rounded-xl px-3 py-2 font-bold outline-none w-full text-xs">
                            {resetAvailableWeeks.map((w, i) => <option key={w.id} value={i}>{w.label}</option>)}
                          </select>
                        </div>
                        <button onClick={() => { playSound('click'); setPendingReset({type: 'week', payload: resetAvailableWeeks[resetWeekIdx]?.dates}); }} className="mt-auto bg-red-600/20 text-red-300 hover:bg-red-600/40 hover:text-red-100 font-bold uppercase tracking-wider py-2 rounded-xl border border-red-500/50 transition-all">Format Week</button>
                      </div>
                      <div className="bg-red-900/10 border border-red-500/20 rounded-2xl p-4 flex flex-col gap-4">
                        <h3 className="font-bold uppercase text-red-400 border-b border-red-500/20 pb-2">Erase Month</h3>
                        <input type="month" value={resetMonthStr} onChange={e => setResetMonthStr(e.target.value)} className="bg-[#0b1120] border border-red-500/30 text-slate-200 rounded-xl px-3 py-2 font-bold outline-none w-full" />
                        <button onClick={() => { playSound('click'); setPendingReset({type: 'month', payload: resetMonthStr}); }} className="mt-auto bg-red-600/80 text-white hover:bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.4)] font-black uppercase tracking-wider py-2 rounded-xl border border-red-400 transition-all">Nuke System</button>
                      </div>
                    </div>
                  </div>
                </section>
              </div>

            </main>
          </div>

          {/* --- HIDDEN PRINT VIEW --- */}
          <div className="hidden print:block bg-white p-4">
            <div className="flex items-center gap-4 mb-8 border-b-4 border-gray-900 pb-4">
              <h1 className="text-4xl font-black tracking-tight uppercase text-gray-900">Trackerbox Report</h1>
              <div className="ml-auto text-2xl font-black text-gray-500 bg-gray-100 px-6 py-2 rounded-2xl border-4 border-gray-900">
                {new Date(printMonthStr + '-01').toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}
              </div>
            </div>

            <div className="mb-12 border-4 border-gray-900 p-6 rounded-3xl bg-gray-50">
              <h2 className="text-2xl font-black uppercase text-gray-900 mb-6 flex items-center gap-3"><PieChart size={28}/> Monthly Analysis</h2>
              <div className="w-full max-w-xl mx-auto"><StatCard title="Monthly Breakdown" stats={printMonthStats} categories={categories} /></div>
            </div>

            {printWeeks.map((week, idx) => (
              <div key={week.id} className="mb-12 print-break-inside-avoid print-page-break">
                <h3 className="text-xl font-black text-gray-700 bg-gray-100 inline-block px-4 py-2 rounded-t-2xl border-4 border-b-0 border-gray-900">Week {idx + 1}: {week.label}</h3>
                <table className="w-full border-separate" style={{ borderSpacing: '8px' }}>
                  <thead>
                    <tr>
                      <th className="w-16"></th>
                      {week.dates.map(dateStr => (
                        <th key={dateStr} className="p-2 text-center text-sm font-black uppercase bg-gray-100 border-4 border-gray-900 rounded-xl">
                          {new Date(dateStr).toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' })}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {SECTIONS.map((section) => (
                      <Fragment key={section.id}>
                        <tr>
                          <td colSpan={8} className="py-2 text-center text-xs font-black tracking-wider uppercase">
                             <span className="bg-gray-200 px-4 py-1 rounded-full border-2 border-gray-900">{section.label}</span>
                          </td>
                        </tr>
                        {section.hours.map(hour => (
                          <tr key={hour}>
                            <td className="p-1 text-center text-[10px] font-bold text-gray-600 whitespace-nowrap">
                              {formatHourLabel(hour)}
                            </td>
                            {week.dates.map(dateStr => {
                              const dayData = allData[dateStr] || {};
                              const cellData = dayData[hour] || { t1: null, t2: null };
                              const t1Color = cellData.t1 ? categories.find(c => c.id === cellData.t1)?.color : '#ffffff';
                              const t2Color = cellData.t2 ? categories.find(c => c.id === cellData.t2)?.color : '#ffffff';

                              return (
                                <td key={`${dateStr}-${hour}`} className="p-0 relative h-10 align-middle min-w-[50px]">
                                  <div className="absolute inset-0 rounded-lg border-2 border-gray-900 overflow-hidden bg-white">
                                    <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full block">
                                      <polygon points="0,100 0,0 100,0" fill={t1Color} />
                                      <polygon points="0,100 100,100 100,0" fill={t2Color} />
                                      <line x1="0" y1="100" x2="100" y2="0" stroke="#111827" strokeWidth="2" />
                                    </svg>
                                  </div>
                                </td>
                              );
                            })}
                          </tr>
                        ))}
                      </Fragment>
                    ))}
                  </tbody>
                </table>
              </div>
            ))}
          </div>
        </Fragment>
      );
    }

    // --- Component: StatCard ---
    function StatCard({ title, stats, categories, showGoals = false, multiplier = 1 }) {
      const { totals, completedTotals, totalTrackedHours, completedDaysCount } = stats;
      
      return (
        <div className="bg-white/5 p-6 rounded-2xl border border-white/10 flex flex-col h-full print:bg-white print:border-2 print:border-gray-900 print:shadow-none">
          <h3 className="font-bold text-lg text-white print:text-gray-900 uppercase tracking-wide mb-1 drop-shadow-[0_0_5px_rgba(255,255,255,0.2)] print:drop-shadow-none">{title}</h3>
          
          <div className="flex flex-col gap-2 mb-6">
            <span className="text-[10px] md:text-xs font-black text-slate-400 print:text-gray-500 uppercase tracking-widest">{totalTrackedHours} hours logged</span>
            {completedDaysCount > 0 ? (
              <span className="inline-block w-fit bg-green-500/20 text-green-300 print:bg-green-100 print:text-green-700 px-2 py-1 rounded-md text-[9px] md:text-[10px] font-bold uppercase tracking-wider border border-green-500/50 print:border-2 print:border-green-800">
                {completedDaysCount} Active Day(s) For Avg
              </span>
            ) : (
              <span className="inline-block w-fit bg-white/5 text-slate-400 print:bg-gray-100 print:text-gray-500 px-2 py-1 rounded-md text-[9px] md:text-[10px] font-bold uppercase tracking-wider border border-white/10 print:border-2 print:border-gray-300">
                0 Active Days (Avg Disabled)
              </span>
            )}
          </div>
          
          {totalTrackedHours === 0 ? (
            <div className="flex-1 flex items-center justify-center text-slate-500 print:text-gray-400 font-bold uppercase border border-dashed border-slate-600 print:border-4 print:border-gray-200 rounded-xl p-4 tracking-widest text-center">
              No Data Found
            </div>
          ) : (
            <div className="space-y-4 mt-auto">
              {categories.map(cat => {
                const hours = totals[cat.id] || 0;
                if (hours === 0) return null;
                
                const targetHours = (cat.target || 0) * multiplier;
                const isGoalMet = showGoals && targetHours > 0 && hours >= targetHours;
                
                let percentage = 0;
                if (showGoals && targetHours > 0) {
                  percentage = Math.min(100, (hours / targetHours) * 100);
                } else {
                  percentage = Math.round((hours / totalTrackedHours) * 100);
                }

                const completedHours = completedTotals[cat.id] || 0;
                const average = completedDaysCount > 0 ? (completedHours / completedDaysCount).toFixed(1) : '-';

                return (
                  <div key={cat.id} className="relative">
                    <div className="flex justify-between items-end text-xs md:text-sm font-bold mb-1 md:mb-2">
                      <span className="text-slate-200 print:text-gray-800 uppercase tracking-wide truncate pr-2" style={{textShadow: isGoalMet ? `0 0 10px ${cat.color}` : `0 0 5px ${cat.color}80`}}>{cat.name}</span>
                      <div className="flex flex-col items-end">
                        <span className="text-white print:text-gray-900">
                          {hours}h 
                          {showGoals && targetHours > 0 
                            ? <span className="text-slate-400 print:text-gray-500 text-[10px]"> / {targetHours}h Goal</span>
                            : <span className="text-slate-400 print:text-gray-500 text-[10px]"> ({percentage}%)</span>
                          }
                        </span>
                        {completedDaysCount > 0 && <span className="text-[10px] text-cyan-400 print:text-blue-600 tracking-wide mt-0.5">Avg: {average}h/d</span>}
                      </div>
                    </div>
                    <div className={`w-full h-2 md:h-3 bg-[#0b1120] print:bg-gray-100 rounded-full overflow-hidden border ${isGoalMet ? 'border-transparent' : 'border-white/10'} print:border-2 print:border-gray-900 print:h-4 transition-all`} style={isGoalMet ? {boxShadow: `0 0 8px ${cat.color}`} : {}}>
                      <div className="h-full rounded-full print:border-none print:!bg-opacity-100 transition-all duration-500" style={{ width: `${percentage}%`, backgroundColor: cat.color, boxShadow: `0 0 10px ${cat.color}`, WebkitPrintColorAdjust: 'exact', printColorAdjust: 'exact' }} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
