                {/* Accordion Header with selectors moved beside title */}
                <button onClick={() => toggleSection('tracker')} className="w-full p-4 md:p-6 flex justify-between items-center bg-white/5 hover:bg-white/10 transition-colors">
                    <div className="flex items-center gap-3 flex-shrink-0">
                        <CalendarIcon size={24} className="text-purple-400 drop-shadow-[0_0_8px_rgba(192,132,252,0.5)]" />
                        <h2 className="text-lg md:text-xl font-black uppercase tracking-wider text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]">Temporal Log & Grid</h2>
                        <span className="hidden sm:flex ml-4 bg-lime-500/20 text-lime-300 border border-lime-500/30 px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-widest">{todayPoints > 0 ? '+' : ''}{todayPoints} PTS TODAY</span>
                    </div>
                    {/* Month & Week selector moved here */}
                    <div className="flex items-center gap-3">
                      <input 
                        type="month" 
                        value={selectedMonthStr} 
                        onChange={(e) => { playSound('click'); setSelectedMonthStr(e.target.value); setSelectedWeekIndex(0); }} 
                        className="bg-[#0b1120] text-slate-200 rounded-lg border border-purple-500/30 px-3 py-1.5 font-bold focus:outline-none focus:border-purple-400 focus:shadow-[0_0_10px_rgba(192,132,252,0.3)] cursor-pointer transition-all text-sm"
                      />
                      <select 
                        value={selectedWeekIndex} 
                        onChange={(e) => { playSound('click'); setSelectedWeekIndex(Number(e.target.value)); }} 
                        className="bg-[#0b1120] text-slate-200 rounded-lg border border-purple-500/30 px-3 py-1.5 font-bold text-sm outline-none focus:border-purple-400 focus:shadow-[0_0_10px_rgba(192,132,252,0.3)] cursor-pointer transition-all"
                      >
                        {availableWeeks.map((week, idx) => (<option key={week.id} value={idx}>{week.label}</option>))}
                      </select>
                    </div>
                    <ChevronDown size={24} className={`text-slate-400 transform transition-transform ${sectionsOpen.tracker ? 'rotate-180' : ''}`} />
                </button>
                {/* Accordion Body - grid brought up (no empty navigation space) */}
                {sectionsOpen.tracker && (
                  <div className="flex flex-col border-t border-white/10 p-4 md:p-6">
                    {/* THE TRACKER GRID */}
                    <div className="overflow-x-auto custom-scrollbar scrollable-container relative flex-1 pb-4 pt-20">
                      <div className="min-w-max h-full flex flex-col">
                        <table className="w-full border-collapse">
                          <thead>
                            <tr>
                              <th className="w-[45px] md:w-[60px] sticky left-0 z-40 p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}></th>
                              <th className="w-[50px] md:w-[65px] sticky left-[45px] md:left-[60px] z-30 p-0 border-none sticky-bg-override" style={{backgroundColor: 'var(--sticky-bg)'}}></th>
                             
                              {currentWeekDates.map((dateStr) => {
                                const isToday = dateStr === todayStr;
                                const d = new Date(dateStr);
                                const hasJournal = journalData[dateStr] && journalData[dateStr].trim().length > 0;
                               
                                const dayTodos = todosData[dateStr] || [];
                                const dayHabits = (habitLogs[dateStr] || []).filter(h => !h.deleted);
                               
                                const totalTasks = dayTodos.length + dayHabits.length;
                                const completedTasks = dayTodos.filter(t => t.status === 'green' || t.done).length + dayHabits.filter(h => h.status === 'green').length;
                                const completionRate = totalTasks > 0 ? completedTasks / totalTasks : 0;
                               
                                const hasUncompletedTodos = dayTodos.length > dayTodos.filter(t => t.status === 'green' || t.done).length;
                                const hasUncompletedHabits = dayHabits.length > dayHabits.filter(h => h.status === 'green').length;
                                let headerBg = isToday ? 'bg-cyan-500/20' : 'bg-white/5';
                                let headerBorder = isToday ? 'border-cyan-400' : 'border-white/10 hover:border-purple-400/50';
                                let headerShadow = isToday ? 'shadow-[0_0_15px_rgba(34,211,238,0.2)]' : '';
                                if (totalTasks > 0) {
                                  if (completionRate >= 0.9) {
                                      headerBg = 'bg-green-600/30 hover:bg-green-600/40';
                                      headerBorder = 'border-green-500';
                                      headerShadow = 'shadow-[0_0_20px_rgba(22,163,74,0.6)]';
                                  } else if (completionRate >= 0.7) {
                                      headerBg = 'bg-emerald-500/20 hover:bg-emerald-500/30';
                                      headerBorder = 'border-emerald-400';
                                      headerShadow = 'shadow-[0_0_15px_rgba(52,211,153,0.4)]';
                                  } else if (completionRate >= 0.5) {
                                      headerBg = 'bg-yellow-500/20 hover:bg-yellow-500/30';
                                      headerBorder = 'border-yellow-400';
                                      headerShadow = 'shadow-[0_0_15px_rgba(250,204,21,0.4)]';
                                  } else if (completionRate < 0.3) {
                                      headerBg = 'bg-red-500/20 hover:bg-red-500/30';
                                      headerBorder = 'border-red-400';
                                      headerShadow = 'shadow-[0_0_15px_rgba(248,113,113,0.4)]';
                                  }
                                }
                                return (
                                  <th key={dateStr} className="p-1 md:p-2 text-center relative z-20 align-bottom border-none group/th h-[80px]">
                                    {/* Static Date Header - Clickable for Journal */}
                                    <div onClick={() => { playSound('click'); setActiveJournalDate(dateStr); }} className={`cursor-pointer flex flex-col items-center justify-center py-2 px-1 md:p-3 rounded-2xl border ${headerBg} ${headerBorder} ${headerShadow} mx-auto w-[52px] md:w-[60px] h-[60px] md:h-[65px] transition-all relative`}>
                                      <span className={`text-[10px] font-black uppercase tracking-wider ${isToday ? 'text-cyan-300' : 'text-slate-400 group-hover/th:text-purple-300'}`}>
                                        {d.toLocaleDateString('en-US', { weekday: 'short' })}
                                      </span>
                                      <span className={`text-xl md:text-2xl font-black leading-none mt-1 ${isToday ? 'text-cyan-100 neon-text' : 'text-slate-200 group-hover/th:text-white'}`}>
                                        {d.getDate()}
                                      </span>
                                     
                                      {/* Journal/Todo/Habit Indicators */}
                                      <div className="absolute -top-1 -right-1 flex gap-1">
                                        {hasUncompletedHabits && <div className="w-3 h-3 bg-emerald-400 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.8)] animate-pulse" title="Pending Routines"></div>}
                                        {hasUncompletedTodos && <div className="w-3 h-3 bg-cyan-400 rounded-full shadow-[0_0_8px_rgba(34,211,238,0.8)] animate-pulse" title="Pending Objectives"></div>}
                                        {hasJournal && <div className="w-3 h-3 bg-purple-400 rounded-full shadow-[0_0_8px_rgba(192,132,252,0.8)] animate-pulse" title="Journal Entry"></div>}
                                      </div>
                                    </div>
                                    {/* Tooltip Menu - higher z-index to prevent cropping */}
                                    <div className="absolute bottom-[100%] pb-2 left-1/2 -translate-x-1/2 flex gap-1.5 opacity-0 invisible group-hover/th:opacity-100 group-hover/th:visible transition-all z-[200] drop-shadow-[0_0_8px_rgba(0,0,0,0.8)]">
                                      <div className="flex bg-[#0b1120]/95 backdrop-blur-md p-1.5 rounded-xl border border-white/20 gap-1.5 shadow-[0_8px_16px_rgba(0,0,0,0.5)]">
                                        <button onClick={(e) => { e.stopPropagation(); handleMagicFill(dateStr); }} className="p-1.5 bg-yellow-500/20 text-yellow-400 rounded-lg hover:bg-yellow-500/40 hover:text-yellow-200 border border-yellow-500/30 transition-all" title="Magic Fill (Sleep)">
                                          <Zap size={14}/>
                                        </button>
                                        <button onClick={(e) => { e.stopPropagation(); handleCopyDay(dateStr); }} className="p-1.5 bg-blue-500/20 text-blue-400 rounded-lg hover:bg-blue-500/40 hover:text-blue-200 border border-blue-500/30 transition-all" title="Copy Day">
                                          <Copy size={14}/>
                                        </button>
                                        {dayClipboard && (
                                          <button onClick={(e) => { e.stopPropagation(); handlePasteDay(dateStr); }} className="p-1.5 bg-purple-500/20 text-purple-400 rounded-lg hover:bg-purple-500/40 hover:text-purple-200 border border-purple-500/30 transition-all alive-pulse" title="Paste Day">
                                            <Clipboard size={14}/>
                                          </button>
                                        )}
                                        <button onClick={(e) => { e.stopPropagation(); playSound('click'); setPendingReset({type: 'day', payload: dateStr}); }} className="p-1.5 bg-red-500/20 text-red-400 rounded-lg hover:bg-red-500/40 hover:text-red-200 border border-red-500/30 transition-all" title="Erase Day">
                                          <Trash2 size={14} />
                                        </button>
                                      </div>
                                    </div>
                                  </th>
                                );
                              })}
                            </tr>
                          </thead>

                                      const isSplit1 = cellData.split1;
                                      const isSplit2 = cellData.split2;
                                      const t1Color = cellData.t1 ? categories.find(c => c.id === cellData.t1)?.color : 'rgba(255,255,255,0.02)';
                                      const t2Color = cellData.t2 ? categories.find(c => c.id === cellData.t2)?.color : 'rgba(255,255,255,0.02)';
                                      const q1Color = cellData.q1 ? categories.find(c => c.id === cellData.q1)?.color : 'rgba(255,255,255,0.02)';
                                      const q2Color = cellData.q2 ? categories.find(c => c.id === cellData.q2)?.color : 'rgba(255,255,255,0.02)';
                                      const q3Color = cellData.q3 ? categories.find(c => c.id === cellData.q3)?.color : 'rgba(255,255,255,0.02)';
                                      const q4Color = cellData.q4 ? categories.find(c => c.id === cellData.q4)?.color : 'rgba(255,255,255,0.02)';
                                     
                                      const activeColorId = cellData.q1 || cellData.q2 || cellData.t1 || cellData.q3 || cellData.q4 || cellData.t2;
                                      const glowColorHex = activeColorId ? categories.find(c => c.id === activeColorId)?.color : 'transparent';
                                      const cellStyle = activeColorId ? { boxShadow: `0 0 15px ${glowColorHex}20, inset 0 0 10px ${glowColorHex}10` } : {};

                                            <svg viewBox="0 0 100 100" preserveAspectRatio="none" className={`w-full h-full block ${selectedColorId !== 'lock' ? 'paintable-svg' : ''}`}>

                                                   <polygon points="0,0 100,0 50,50" fill={q1Color}
                                                      onPointerDown={(e) => { e.preventDefault(); handlePointerDown(dateStr, hour, 'q1', e); }}

                                                      onContextMenu={(e) => handleSplitToggle(dateStr, hour, 'half1', e)}
                                                      className="cursor-pointer transition-opacity hover:opacity-80" />
                                                   <polygon points="0,0 0,100 50,50" fill={q2Color}
                                                      onPointerDown={(e) => { e.preventDefault(); handlePointerDown(dateStr, hour, 'q2', e); }}

                                                      onContextMenu={(e) => handleSplitToggle(dateStr, hour, 'half1', e)}

                                                   <line x1="0" y1="0" x2="50" y2="50" stroke="var(--sticky-bg)" strokeWidth="4" className="pointer-events-none" />

                                                    onContextMenu={(e) => handleSplitToggle(dateStr, hour, 'half1', e)}

                                              {isSplit2 ? (

                                                      onPointerEnter={() => handlePointerEnter(dateStr, hour, 'q3')}
                                                      onContextMenu={(e) => handleSplitToggle(dateStr, hour, 'half2', e)}

                                                   <polygon points="100,100 0,100 50,50" fill={q4Color}
                                                      onPointerDown={(e) => { e.preventDefault(); handlePointerDown(dateStr, hour, 'q4', e); }}
                                                      onPointerEnter={() => handlePointerEnter(dateStr, hour, 'q4')}
                                                      onContextMenu={(e) => handleSplitToggle(dateStr, hour, 'half2', e)}
                                                      className="cursor-pointer transition-opacity hover:opacity-80" />
                                                   <line x1="100" y1="100" x2="50" y2="50" stroke="var(--sticky-bg)" strokeWidth="4" className="pointer-events-none" />

                                              ) : (
                                                 <polygon points="0,100 100,100 100,0" fill={t2Color}

                                                    onContextMenu={(e) => handleSplitToggle(dateStr, hour, 'half2', e)}
                                                    className="cursor-pointer transition-opacity hover:opacity-80" />

                                              <line x1="0" y1="100" x2="100" y2="0" stroke="var(--sticky-bg)" strokeWidth="6" className="pointer-events-none" />
                                            </svg>
                                          </div>
                                        </td>
                                      );
                                    })}
                                  </tr>
                                ))}
                              </Fragment>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>

              {/* ---------------- SECTION 2: ANALYTICS CORE ---------------- */}
              <section className="glass-panel rounded-3xl w-full overflow-hidden mb-6">

                        <div className="bg-white/5 rounded-2xl border border-white/10 p-3 flex flex-col">
                          <span className="text-[10px] md:text-xs font-black uppercase text-slate-400 tracking-wider">Daily Scan</span>
                          <input type="date" value={statDate} onChange={e => { playSound('click'); setStatDate(e.target.value); }} className="w-full bg-transparent border-none outline-none font-bold text-slate-200 mt-1 cursor-pointer" />
                        </div>
                        <StatCard title="Selected Day" stats={statsDay} categories={categories} showGoals={true} multiplier={1} showAverage={false} />
                      </div>
                      <div className="flex flex-col h-full gap-3 md:gap-4">
                        <div className="bg-white/5 rounded-2xl border border-white/10 p-3 flex flex-col">

                        <StatCard title="Selected Week" stats={statsWeek} categories={categories} showGoals={true} multiplier={7} showAverage={true} />
                      </div>
                      <div className="flex flex-col h-full gap-3 md:gap-4">

                          <input type="month" value={statMonth} onChange={e => { playSound('click'); setStatMonth(e.target.value); }} className="w-full bg-transparent border-none outline-none font-bold text-slate-200 mt-1 cursor-pointer" />
                        </div>
                        <StatCard title="Selected Month" stats={statsMonth} categories={categories} showGoals={true} multiplier={30} showAverage={true} />

                      <div className="flex flex-col h-full gap-3 md:gap-4">
                        <div className="bg-white/5 rounded-2xl border border-white/10 p-3 flex flex-col">

                          <input type="number" value={statYear} onChange={e => { playSound('click'); setStatYear(e.target.value); }} min="2000" max="2100" className="w-full bg-transparent border-none outline-none font-bold text-slate-200 mt-1 cursor-pointer" />
                        </div>
                        <StatCard title="Selected Year" stats={statsYear} categories={categories} showGoals={true} multiplier={365} showAverage={true} />
                      </div>
                    </div>
                   
                    <WeeklyChart weekDates={statAvailableWeeks[statWeekIndex]?.dates || []} allData={allData} categories={categories} />
                  </div>
                )}

              {/* ---------------- SECTION 3: SYSTEM MODULES ---------------- */}

                    </div>

                          <div className="relative w-6 h-6 md:w-8 md:h-8 rounded-lg md:rounded-xl overflow-hidden shrink-0 border border-white/20 shadow-[0_0_10px_rgba(255,255,255,0.1)] cursor-pointer">

                          <div className="flex flex-col items-center w-12 shrink-0 border-l border-white/10 pl-2">

                          <button onClick={() => removeCategory(cat.id, cat.name)} className="text-red-400/50 hover:text-red-400 p-1 transition-colors shrink-0" title="Delete Category"><Trash2 size={16}/></button>
                        </div>

                      <button onClick={addCategory} className="bg-white/5 border border-dashed border-white/20 rounded-2xl p-4 flex items-center justify-center gap-2 text-slate-400 hover:text-white hover:border-cyan-400/50 hover:shadow-[0_0_15px_rgba(34,211,238,0.2)] transition-all font-bold uppercase tracking-wider h-[64px] md:h-[74px]">
                         <Plus size={20} /> Add Category
                      </button>

                       <div className="bg-white/5 border border-red-500/30 rounded-2xl p-4 flex flex-col gap-2">
                          <label className="text-[10px] md:text-xs font-bold text-red-400 uppercase tracking-widest">Worst Point Limit (Deep Red)</label>
                          <input type="number" step="1" value={sysConfig.worstPoint !== undefined ? sysConfig.worstPoint : ''} onChange={e => updateSysConfig('worstPoint', e.target.value === '' ? '' : parseFloat(e.target.value))} className="w-full bg-[#0b1120] text-slate-200 rounded-lg border border-red-500/50 px-3 py-2 font-bold outline-none focus:border-red-400" />

                       </div>
                       <div className="bg-white/5 border border-lime-500/30 rounded-2xl p-4 flex flex-col gap-2">
                          <label className="text-[10px] md:text-xs font-bold text-lime-400 uppercase tracking-widest">XP Per Point Earned</label>
                          <input type="number" step="0.1" value={sysConfig.xpPerPoint !== undefined ? sysConfig.xpPerPoint : ''} onChange={e => updateSysConfig('xpPerPoint', e.target.value === '' ? '' : parseFloat(e.target.value))} className="w-full bg-[#0b1120] text-slate-200 rounded-lg border border-lime-500/50 px-3 py-2 font-bold outline-none focus:border-lime-400" />
                       </div>
                    </div>
                    {/* Routine Engine Settings */}
                    <div className="flex items-center gap-3 md:gap-4 mb-6 md:mb-8 border-t border-cyan-500/30 pt-6 md:pt-8">

                        <CalendarIcon size={28} className="text-emerald-400 hidden md:block" />
                      </div>
                      <div>
                        <h2 className="text-xl md:text-3xl font-black uppercase tracking-wider text-white leading-none drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]">Habit Tracker</h2>

                            <input type="text" value={habit.name} onChange={e => updateHabitConfig(habit.id, 'name', e.target.value)} className="flex-1 w-full bg-transparent text-slate-200 font-bold text-sm md:text-base border-b border-transparent focus:border-emerald-400 outline-none transition-all py-1 min-w-0" placeholder="Habit Name" />

                            <button onClick={() => removeHabitConfig(habit.id, habit.name)} className="text-red-400/50 hover:text-red-400 p-1 transition-colors shrink-0" title="Delete Habit Config"><Trash2 size={16}/></button>
                          </div>

              <section className="glass-panel rounded-3xl w-full overflow-hidden mb-6 relative">
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 via-purple-500 to-red-500 opacity-50"></div>
                <button onClick={() => toggleSection('storage')} className="w-full p-4 md:p-6 flex justify-between items-center bg-white/5 hover:bg-white/10 transition-colors">
                    <div className="flex items-center gap-3">
                        <Database size={24} className="text-slate-300 drop-shadow-[0_0_8px_rgba(255,255,255,0.5)]" />
                        <h2 className="text-lg md:text-xl font-black uppercase tracking-wider text-white drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]">Data & Storage Core</h2>
                    </div>
                    <ChevronDown size={24} className={`text-slate-400 transform transition-transform ${sectionsOpen.storage ? 'rotate-180' : ''}`} />
                </button>
                {sectionsOpen.storage && (
                  <div className="flex flex-col border-t border-white/10 p-4 md:p-6">
                    <div className="grid grid-cols-1 xl:grid-cols-4 gap-4 md:gap-6">
                      <div className="xl:col-span-1 bg-blue-900/10 border border-blue-500/20 rounded-2xl p-4 flex flex-col gap-4 w-full">
                        <h3 className="font-bold uppercase text-blue-400 border-b border-blue-500/20 pb-2">System Files</h3>
                        <p className="text-xs text-slate-400 flex-1">Save your database to a local file, or restore from backup securely. Keep your JSON safe.</p>
                        <div className="flex flex-col gap-2 mt-auto">
                          <button onClick={handleExportData} className="w-full bg-blue-600/20 text-blue-300 hover:bg-blue-600/40 hover:text-blue-100 font-bold uppercase tracking-wider py-2 rounded-xl border border-blue-500/50 transition-all flex items-center justify-center gap-2">
                            <Download size={16}/> Download Data
                          </button>
                          <button onClick={() => { playSound('click'); fileInputRef.current.click(); }} className="w-full bg-purple-600/20 text-purple-300 hover:bg-purple-600/40 hover:text-purple-100 font-bold uppercase tracking-wider py-2 rounded-xl border border-purple-500/50 transition-all flex items-center justify-center gap-2">
                            <UploadCloud size={16}/> Upload Data
                          </button>
                          <input type="file" accept=".json" ref={fileInputRef} onChange={handleImportData} className="hidden" />
                        </div>
                      </div>
                      <div className="xl:col-span-3 grid grid-cols-1 sm:grid-cols-3 gap-4 md:gap-6 w-full">
                        <div className="bg-red-900/10 border border-red-500/20 rounded-2xl p-4 flex flex-col gap-4">
                          <h3 className="font-bold uppercase text-red-400 border-b border-red-500/20 pb-2">Erase Day</h3>
                          <input type="date" value={resetDay} onChange={e => setResetDay(e.target.value)} className="w-full bg-[#0b1120] border border-red-500/30 text-slate-200 rounded-xl px-3 py-2 font-bold outline-none" />
                          <button onClick={() => { playSound('click'); setPendingReset({type: 'day', payload: resetDay}); }} className="mt-auto bg-red-600/20 text-red-300 hover:bg-red-600/40 hover:text-red-100 font-bold uppercase tracking-wider py-2 rounded-xl border border-red-500/50 transition-all w-full">Format Day</button>
                        </div>
                        <div className="bg-red-900/10 border border-red-500/20 rounded-2xl p-4 flex flex-col gap-4">
                          <h3 className="font-bold uppercase text-red-400 border-b border-red-500/20 pb-2">Erase Week</h3>
                          <div className="flex flex-col gap-2 w-full">
                            <input type="month" value={resetWeekMonth} onChange={e => {setResetWeekMonth(e.target.value); setResetWeekIdx(0);}} className="w-full bg-[#0b1120] border border-red-500/30 text-slate-200 rounded-xl px-3 py-2 font-bold outline-none text-sm" />
                            <select value={resetWeekIdx} onChange={e => setResetWeekIdx(Number(e.target.value))} className="w-full bg-[#0b1120] border border-red-500/30 text-slate-200 rounded-xl px-3 py-2 font-bold outline-none text-xs min-w-0">
                              {resetAvailableWeeks.map((w, i) => <option key={w.id} value={i}>{w.label}</option>)}
                            </select>
                          </div>
                          <button onClick={() => { playSound('click'); setPendingReset({type: 'week', payload: resetAvailableWeeks[resetWeekIdx]?.dates}); }} className="mt-auto bg-red-600/20 text-red-300 hover:bg-red-600/40 hover:text-red-100 font-bold uppercase tracking-wider py-2 rounded-xl border border-red-500/50 transition-all w-full">Format Week</button>
                        </div>
                        <div className="bg-red-900/10 border border-red-500/20 rounded-2xl p-4 flex flex-col gap-4">
                          <h3 className="font-bold uppercase text-red-400 border-b border-red-500/20 pb-2">Erase Month</h3>
                          <input type="month" value={resetMonthStr} onChange={e => setResetMonthStr(e.target.value)} className="w-full bg-[#0b1120] border border-red-500/30 text-slate-200 rounded-xl px-3 py-2 font-bold outline-none" />
                          <button onClick={() => { playSound('click'); setPendingReset({type: 'month', payload: resetMonthStr}); }} className="mt-auto bg-red-600/80 text-white hover:bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.4)] font-black uppercase tracking-wider py-2 rounded-xl border border-red-400 transition-all w-full">Nuke System</button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </section>
            </main>
          </div>
        </Fragment>
      );
    }
    // --- Component: WeeklyChart ---
    function WeeklyChart({ weekDates, allData, categories }) {
      if (!weekDates || weekDates.length === 0) return null;
      const chartData = weekDates.map(dateStr => {
         const dayData = allData[dateStr] || {};
         const segments = [];
         let totalHours = 0;
         for (let i = 0; i < 24; i++) {
            const h = dayData[i] || {};
           
            if (h.split1) {
                segments.push({ id: h.q1, duration: 0.25 });
                segments.push({ id: h.q2, duration: 0.25 });
                if (h.q1) totalHours += 0.25;
                if (h.q2) totalHours += 0.25;
            } else {
                segments.push({ id: h.t1, duration: 0.5 });
                if (h.t1) totalHours += 0.5;
            }
            if (h.split2) {
                segments.push({ id: h.q3, duration: 0.25 });
                segments.push({ id: h.q4, duration: 0.25 });
                if (h.q3) totalHours += 0.25;
                if (h.q4) totalHours += 0.25;
            } else {
                segments.push({ id: h.t2, duration: 0.5 });
                if (h.t2) totalHours += 0.5;
            }
         }
         const dateObj = new Date(dateStr);
         const dayName = dateObj.toLocaleDateString('en-US', { weekday: 'short' });
         return { dayName, segments, totalHours, dateStr };
      });
      return (
         <div className="mt-6 md:mt-8 bg-[#0b1120] p-4 md:p-6 rounded-2xl border border-white/10 w-full overflow-hidden print:border-none print:shadow-none print:p-0 print:bg-transparent">
            <h3 className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">Weekly Activity Timeline</h3>
            <div className="flex items-end justify-between gap-1 sm:gap-2 h-48 md:h-64 pt-4">
               {chartData.map((data, i) => (
                     <div key={i} className="flex flex-col items-center flex-1 gap-2 group h-full">
                        <div className="w-full sm:w-10 md:w-12 max-w-[40px] relative flex flex-col h-full bg-white/5 rounded-md border border-white/10 overflow-hidden print:border-gray-800">
                           <div className="opacity-0 group-hover:opacity-100 absolute -top-7 md:-top-8 left-1/2 -translate-x-1/2 bg-black text-white text-[9px] md:text-[10px] py-1 px-1.5 md:px-2 rounded shadow-lg pointer-events-none transition-opacity font-bold whitespace-nowrap z-10 print:opacity-100 print:bg-transparent print:text-slate-300 print:shadow-none print:-top-5">
                              {data.totalHours}h
                           </div>
                           {data.segments.map((seg, idx) => {
                              const cat = categories.find(c => c.id === seg.id);
                              const bgColor = cat ? cat.color : 'transparent';
                              return <div key={idx} className="w-full" style={{ backgroundColor: bgColor, flexGrow: seg.duration }}></div>
                           })}
                        </div>
                        <span className="text-[8px] md:text-[10px] font-bold text-slate-500 uppercase text-center mt-auto">{data.dayName}</span>
                     </div>
                  )
               )}
            </div>
         </div>
      );
    }
    // --- Component: ChronoSpectralHeatmap (click any day to open full day modal with points + category analysis) ---
    function ChronoSpectralHeatmap({ statYear, allData, todosData, habitLogs, categories, sysConfig, onDayClick }) {
      const year = parseInt(statYear, 10);
      if (isNaN(year)) return null;
      const getPointsScore = useCallback((dateStr) => {
         const dayData = allData[dateStr] || {};
         let totalPoints = 0;
         let hasAnyActivity = false;
        
         Object.values(dayData).forEach(h => {
             const addPts = (id, dur) => {
                 if (id) {
                     hasAnyActivity = true;
                     const cat = categories.find(c => c.id === id);
                     if (cat) totalPoints += (parseFloat(cat.pointsPerHour) || 0) * dur;
                 }
             };
            
             if (h.split1) { addPts(h.q1, 0.25); addPts(h.q2, 0.25); }
             else { addPts(h.t1, 0.5); }
            
             if (h.split2) { addPts(h.q3, 0.25); addPts(h.q4, 0.25); }
             else { addPts(h.t2, 0.5); }
         });
         const dayTodos = todosData[dateStr] || [];
         if (dayTodos.length > 0) hasAnyActivity = true;
        
         const dayHabits = (habitLogs[dateStr] || []).filter(h => !h.deleted);
         if (dayHabits.length > 0) hasAnyActivity = true;
         return { points: totalPoints, hasActivity: hasAnyActivity };
      }, [allData, todosData, habitLogs, categories]);
      const grid = useMemo(() => {
          const startDate = new Date(year, 0, 1);
          const endDate = new Date(year, 11, 31);
          const days = [];
         
          let startDayOfWeek = startDate.getDay();
          startDayOfWeek = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1; // Align to Monday (0) - Sunday (6)
          for (let i = 0; i < startDayOfWeek; i++) days.push(null); // Pad the first week
          let d = new Date(startDate);
          while (d <= endDate) {
              const dateStr = formatDateString(d);
              days.push({
                  dateStr,
                  dateObj: new Date(d),
                  ...getPointsScore(dateStr)
              });
              d.setDate(d.getDate() + 1);
          }
          return days;
      }, [year, getPointsScore]);
      const getHeatmapStyle = (points) => {
          const worst = parseFloat(sysConfig.worstPoint) || 0;
          const best = parseFloat(sysConfig.bestPoint) || 100;
         
          let percentage = (points - worst) / (best - worst);
          percentage = Math.max(0, Math.min(1, percentage)); // Clamp between 0 and 1
         
          const hue = percentage * 140; // 0 is Deep Red, 140 is Deep Green
         
          return {
              backgroundColor: `hsl(${hue}, 85%, 45%)`,
              borderColor: `hsl(${hue}, 85%, 35%)`,
              boxShadow: percentage === 1 ? `0 0 10px hsl(${hue}, 85%, 45%, 0.8)` : 'none'
          };
      };
      return (
         <div className="bg-[#0b1120] p-4 md:p-6 rounded-2xl border border-white/10 w-full overflow-hidden flex flex-col print:border-none print:shadow-none print:p-0 print:bg-transparent">
            <div className="flex flex-col xl:flex-row xl:items-end justify-between gap-4 mb-4">
                <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3">
                   <h3 className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest">Chrono-Spectral Heatmap ({year})</h3>
                </div>
                <div className="flex items-center gap-1.5 text-[8px] md:text-[10px] font-bold text-slate-500 uppercase flex-wrap">
                   <span>{sysConfig.worstPoint !== '' ? sysConfig.worstPoint : 0} PTS</span>
                   <div className="w-3 h-3 rounded-sm bg-white/5 border border-white/10"></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(0, 85%, 45%)', borderColor: 'hsl(0, 85%, 35%)' }}></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(35, 85%, 45%)', borderColor: 'hsl(35, 85%, 35%)' }}></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(70, 85%, 45%)', borderColor: 'hsl(70, 85%, 35%)' }}></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(105, 85%, 45%)', borderColor: 'hsl(105, 85%, 35%)' }}></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(140, 85%, 45%)', borderColor: 'hsl(140, 85%, 35%)', boxShadow: '0 0 6px hsl(140, 85%, 45%, 0.6)' }}></div>
                   <span>{sysConfig.bestPoint !== '' ? sysConfig.bestPoint : 100} PTS</span>
                </div>
            </div>
           
            <div className="overflow-x-auto custom-scrollbar pb-4 pt-10 px-4 -mx-4 print:pt-4 print:pb-0">
                <div className="min-w-max">
                    <div style={{ display: 'grid', gridTemplateRows: 'repeat(7, 1fr)', gridAutoFlow: 'column', gap: '4px' }}>
                        {grid.map((cell, idx) => {
                            if (!cell) return <div key={`empty-${idx}`} className="w-3 h-3 md:w-4 md:h-4"></div>;
                            return (
                                <div
                                    key={cell.dateStr}
                                    className={`w-3 h-3 md:w-4 md:h-4 rounded-sm border transition-all hover:scale-125 hover:z-10 relative group cursor-pointer ${!cell.hasActivity ? 'bg-white/5 border-white/10' : ''}`}
                                    style={cell.hasActivity ? getHeatmapStyle(cell.points) : {}}
                                    onClick={() => onDayClick && onDayClick(cell.dateStr)}
                                >
                                    <div className="opacity-0 group-hover:opacity-100 absolute bottom-full mb-1.5 left-1/2 -translate-x-1/2 bg-slate-900 border border-white/20 text-white text-[10px] py-1.5 px-2.5 rounded-lg shadow-[0_4px_15px_rgba(0,0,0,0.8)] pointer-events-none transition-opacity font-bold whitespace-nowrap z-[100] print:hidden">
                                        {cell.dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}: <span className="text-lime-400 drop-shadow-[0_0_5px_rgba(163,230,53,0.5)]">{cell.points > 0 ? '+' : ''}{cell.points} PTS</span>
                                        <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-900"></div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>
         </div>
      );
    }
    // --- Component: StatCard ---
    function StatCard({ title, stats, categories, showGoals = false, multiplier = 1, showAverage = true }) {
      const { totals, completedTotals, totalTrackedHours, completedDaysCount, totalPoints } = stats;
     
      return (
        <div className="bg-white/5 p-4 md:p-6 rounded-2xl border border-white/10 flex flex-col h-full print:bg-transparent print:border-2 print:border-gray-800 print:shadow-none w-full">
          <div className="flex justify-between items-start mb-1 gap-2">
            <h3 className="font-bold text-base md:text-lg text-white uppercase tracking-wide drop-shadow-[0_0_5px_rgba(255,255,255,0.2)]">{title}</h3>
            <span className="bg-lime-500/20 text-lime-300 border border-lime-500/30 px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-widest whitespace-nowrap drop-shadow-[0_0_8px_rgba(163,230,53,0.5)]">{totalPoints > 0 ? '+' : ''}{totalPoints} PTS</span>
          </div>
         
          <div className="flex flex-col gap-1 md:gap-2 mb-4 md:mb-6">
            <span className="text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest">{totalTrackedHours} hours logged</span>
            {showAverage && (
              completedDaysCount > 0 ? (
                <span className="inline-block w-fit bg-green-500/20 text-green-300 px-2 py-1 rounded-md text-[9px] md:text-[10px] font-bold uppercase tracking-wider border border-green-500/50">
                  {completedDaysCount} Active Day(s) For Avg
                </span>
              ) : (
                <span className="inline-block w-fit bg-white/5 text-slate-400 px-2 py-1 rounded-md text-[9px] md:text-[10px] font-bold uppercase tracking-wider border border-white/10">
                  0 Active Days (Avg Disabled)
                </span>
              )
            )}
          </div>
         
          {totalTrackedHours === 0 ? (
            <div className="flex-1 flex items-center justify-center text-slate-500 font-bold uppercase border border-dashed border-slate-600 rounded-xl p-4 tracking-widest text-center text-xs md:text-sm print:border-gray-800 print:text-gray-500">
              No Data Found
            </div>
          ) : (
            <div className="space-y-3 md:space-y-4 mt-auto w-full">
              {categories.map(cat => {
                const hours = totals[cat.id] || 0;
                if (hours === 0) return null;
               
                const targetHours = (cat.target || 0) * multiplier;
                const isGoalMet = showGoals && targetHours > 0 && hours >= targetHours;
               
                let percentage = 0;
                if (showGoals && targetHours > 0) {
                  percentage = Math.min(100, (hours / targetHours) * 100);
                } else {
                  percentage = Math.round((hours / totalTrackedHours) * 100);
                }
                const completedHours = completedTotals[cat.id] || 0;
                const average = completedDaysCount > 0 ? (completedHours / completedDaysCount).toFixed(1) : '-';
                return (
                  <div key={cat.id} className="relative w-full">
                    <div className="flex justify-between items-end text-xs md:text-sm font-bold mb-1 md:mb-2 w-full gap-2">
                      <span className="text-slate-200 uppercase tracking-wide truncate pr-1" style={{textShadow: isGoalMet ? `0 0 10px ${cat.color}` : `0 0 5px ${cat.color}80`}} title={cat.name}>{cat.name}</span>
                      <div className="flex flex-col items-end shrink-0">
                        <span className="text-white whitespace-nowrap">
                          {hours}h
                          {showGoals && targetHours > 0
                            ? <span className="text-slate-400 text-[9px] md:text-[10px]"> / {targetHours}h Goal</span>
                            : <span className="text-slate-400 text-[9px] md:text-[10px]"> ({percentage}%)</span>
                          }
                        </span>
                        {showAverage && completedDaysCount > 0 && <span className="text-[9px] md:text-[10px] text-cyan-400 tracking-wide mt-0.5 whitespace-nowrap">Avg: {average}h/d</span>}
                      </div>
                    </div>
                    <div className={`w-full h-2 md:h-3 bg-[#0b1120] rounded-full overflow-hidden border ${isGoalMet ? 'border-transparent' : 'border-white/10'} print:border-gray-800 transition-all`} style={isGoalMet ? {boxShadow: `0 0 8px ${cat.color}`} : {}}>
                      <div className="h-full rounded-full transition-all duration-500" style={{ width: `${percentage}%`, backgroundColor: cat.color, boxShadow: `0 0 10px ${cat.color}` }} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
