  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered successfully!', reg))

      });

  <style>
    /* Futuristic Base & Variables */
    :root {
      --bg-color: #05070e;
      --panel-bg: rgba(15, 23, 42, 0.5);
      --sticky-bg: #0b1120;
      --border-color: rgba(255, 255, 255, 0.08);
      --mouse-x: 50vw;
      --mouse-y: 50vh;
    }
    html {
      scroll-behavior: smooth;
    }
    body {
      background-color: var(--bg-color);
      color: #e2e8f0;
      overflow-x: hidden;
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
    }
    .tb-interactive {
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }
    /* Interactive Alive Background Glow */
    .mouse-glow {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: -1;
      background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(124, 58, 237, 0.15) 0%, rgba(6, 182, 212, 0.05) 30%, rgba(0,0,0,0) 60%);
      transition: background 0.1s ease-out;
    }
    /* Smooth Glass Panels */
    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    .neon-text { text-shadow: 0 0 15px currentColor; }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .alive-pulse { animation: heartbeat 3s ease-in-out infinite; }
    @keyframes modalEnter {
      0% { opacity: 0; transform: scale(0.95) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .animate-modal { animation: modalEnter 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    /* Rigid square cells */
    .square-cell-inner { width: 52px; height: 52px; }
    @media (min-width: 768px) { .square-cell-inner { width: 60px; height: 60px; } }
    /* Touch actions */
    .paintable-svg { touch-action: none; }
    .scrollable-container { touch-action: pan-x pan-y; }
    /* Cyberpunk Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    /* Clean Number Inputs for Timer */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }
    /* Light mode overrides */
    .light-mode {
      --bg-color: #f4f6fb;
      --panel-bg: rgba(248, 250, 252, 0.96);
      --sticky-bg: #e8edf5;
      --border-color: rgba(71, 85, 105, 0.16);
    }
    .light-mode body { color: #1f2937; }
    .light-mode .glass-panel { background: var(--panel-bg); }
    /* Force dark text in both light themes */
    .light-mode .text-white,
    .light-mode .text-slate-100,
    .light-mode .text-slate-200,
    .light-mode .text-slate-300 {
      color: #1f2937 !important;
    }
    .light-mode .text-slate-400 {
      color: #6b7280 !important;
    }
    .light-mode .neon-text {
      text-shadow: none !important;
    }
    /* Collapsed epoch thin row */
    .collapsed-row td { height: 34px; }
    /* Cryo-Sleep muted ice styling */
    .cryo-day {
      background: linear-gradient(135deg, #67e8f9 0%, #22d3ee 100%) !important;
      opacity: 0.25;
      box-shadow: 0 0 12px rgba(103, 232, 249, 0.3) !important;
    }
    /* Current Hour" Visual Anchor – subtle pulsing neon glow */
    @keyframes pulseNeon {
      0%, 100% { box-shadow: 0 0 12px #22d3ee, 0 0 24px #22d3ee; }
      50% { box-shadow: 0 0 4px #22d3ee, 0 0 8px #22d3ee; }
    }
    .current-hour-glow {
      animation: pulseNeon 1.8s ease-in-out infinite;
      border: 2.5px solid #22d3ee !important;
      z-index: 10;
    }
    /* Toast animation */
    @keyframes toastPop {
      0% { opacity: 0; transform: translateY(20px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    /* Journal save pulse (psychological assurance) */
    @keyframes journalSavePulse {
      0% { box-shadow: 0 0 0 rgba(34,197,94,0); border-color: rgba(34,197,94,0.0); }
      40% { box-shadow: 0 0 18px rgba(34,197,94,0.35), 0 0 40px rgba(34,197,94,0.16); border-color: rgba(34,197,94,0.55); }
      100% { box-shadow: 0 0 0 rgba(34,197,94,0); border-color: rgba(34,197,94,0.0); }
    }
    .journal-save-pulse {
      animation: journalSavePulse 500ms ease-out 0s 4;
    }
    /* Markdown prose styles */
    .prose {
      font-size: 0.875rem;
      line-height: 1.5;
    }
    .prose strong { font-weight: 700; }
    .prose em { font-style: italic; }
    .prose ul { list-style: disc; padding-left: 1.5rem; margin: 0.75rem 0; }
    .prose li { margin: 0.25rem 0; }
    .prose a { color: #a855f7; text-decoration: underline; }
  </style>
</head>

    const { useState, useEffect, useLayoutEffect, useMemo, useCallback, Fragment, useRef } = React;
    // --- Audio Engine ---
    let audioCtx = null;
    let lastSoundTime = 0;
    let isMutedGlobal = false;
    const playSound = (type) => {
      if (isMutedGlobal) return;
      try {
        if (!audioCtx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) audioCtx = new AudioContext();
          else return;
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const now = Date.now();
        if ((type === 'paint' || type === 'erase') && now - lastSoundTime < 40) return;
        if (type === 'paint' || type === 'erase') lastSoundTime = now;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        const t = audioCtx.currentTime;
        if (type === 'paint') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800 + Math.random() * 400, t);
          gainNode.gain.setValueAtTime(0.08, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
          osc.start(t);
          osc.stop(t + 0.15);
        } else if (type === 'erase') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(400, t);
          osc.frequency.exponentialRampToValueAtTime(150, t + 0.1);
          gainNode.gain.setValueAtTime(0.05, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
          osc.start(t);
          osc.stop(t + 0.1);
        } else if (type === 'click') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(600, t);
          gainNode.gain.setValueAtTime(0.05, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
          osc.start(t);
          osc.stop(t + 0.05);
        } else if (type === 'trash') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(100, t);
          osc.frequency.exponentialRampToValueAtTime(20, t + 0.3);
          gainNode.gain.setValueAtTime(0.1, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          osc.start(t);
          osc.stop(t + 0.3);
        } else if (type === 'success') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(400, t);
          osc.frequency.exponentialRampToValueAtTime(800, t + 0.2);
          gainNode.gain.setValueAtTime(0.1, t);
          gainNode.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          osc.start(t);
          osc.stop(t + 0.3);
        } else if (type === 'peaceful') {
          const freqs = [523.25, 659.25, 783.99, 987.77];
          freqs.forEach((freq, i) => {
            const chordOsc = audioCtx.createOscillator();
            const chordGain = audioCtx.createGain();
            chordOsc.connect(chordGain);
            chordGain.connect(audioCtx.destination);
            chordOsc.type = 'sine';
            chordOsc.frequency.setValueAtTime(freq, t);
            chordGain.gain.setValueAtTime(0, t);
            chordGain.gain.linearRampToValueAtTime(0.05, t + 0.5 + (i * 0.1));
            chordGain.gain.exponentialRampToValueAtTime(0.001, t + 4);
            chordOsc.start(t);
            chordOsc.stop(t + 4);
          });
        }
      } catch (e) { console.warn("Audio not supported"); }
    };

            const items = [];
            while (i < lines.length && /^\s*[-*]\s+/.test(lines[i] || '')) {

          // Ensure there are always N lines visible below the cursor line.
          const caretIndex = el.selectionStart ?? 0;
          const before = el.value.slice(0, caretIndex);
          const caretLine = before.split('\n').length - 1;

          const innerHeight = clampedHeight - paddingTop - paddingBottom;
          const visibleLines = Math.max(1, Math.floor(innerHeight / lineHeight));
          const topLine = Math.floor((el.scrollTop || 0) / lineHeight);
          const bottomVisibleLine = topLine + visibleLines - 1;

          const neededBottomLine = caretLine + JOURNAL_MIN_LINES_BELOW_CURSOR;
          if (neededBottomLine > bottomVisibleLine) {
            const newTopLine = neededBottomLine - (visibleLines - 1);
            el.scrollTop = Math.max(0, newTopLine * lineHeight);
          }
        } catch (e) {
          // Don't hard-fail journaling if the resize heuristic breaks.
        }
      };

      // --- NEW: Quick-insert timestamp into the focused journal textarea ---
      const formatLocalTimeBracket = () => {
        const d = new Date();
        let h = d.getHours();
        const ampm = h >= 12 ? 'pm' : 'am';
        h = h % 12;
        if (h === 0) h = 12;
        const mm = String(d.getMinutes()).padStart(2, '0');
        return `[${String(h).padStart(2, '0')}:${mm}${ampm}] `;

      const insertTimestampIntoTextarea = (dateStr, el) => {

        const currentText = String(journalData?.[dateStr] || '');
        const selStart = el.selectionStart ?? currentText.length;
        const selEnd = el.selectionEnd ?? selStart;
        const marker = formatLocalTimeBracket();
        const nextValue = currentText.slice(0, selStart) + marker + currentText.slice(selEnd);
        const nextCursor = selStart + marker.length;

        handleJournalSave(dateStr, nextValue);
        setTimeout(() => {
          try {

        if (active && elCap && active === elCap) {

      const getNextJournalNumberAtCursorFor = (dateStr, textareaRef) => {
        if (!dateStr) return 1;

        const currentText = String(journalData?.[dateStr] || '');
        const selStart = el?.selectionStart ?? currentText.length;
        const before = currentText.slice(0, selStart);
        const re = /(^|\n)\s*(\d+)\.\s+/g;
        let m;
        let lastNum = null;
        while ((m = re.exec(before)) !== null) lastNum = parseInt(m[2], 10);
        const nextNum = Number.isFinite(lastNum) ? (lastNum + 1) : 1;
        return nextNum;
      };

      const getNextJournalNumberAtCursor = () => getNextJournalNumberAtCursorFor(activeJournalDate, journalTextareaRef);

      // NEW: Parse flexible times and auto-insert into the correct triangle notes.
      // Supported inputs (examples): `6am`, `6:30am`, `6.40pm`, `7.50pm`, `22.3 (note)`
      const parseFlexibleTimeTokenToMinutes = (token) => {
        if (!token) return null;
        const cleaned = String(token).trim().toLowerCase();
        if (!cleaned) return null;

        // Split: numeric time part + optional am/pm
        const m = cleaned.match(/^(\d{1,2}(?:[:.]\d{1,2})?)(?:\s*(a\.?m\.?|p\.?m\.?|am|pm))?$/i);
        if (!m) return null;
        const numericPart = m[1];
        const suffix = m[2]; // am/pm or undefined

        let hour = 0;
        let minute = 0;
        const mm = numericPart.match(/^(\d{1,2})(?:[:.](\d{1,2}))?$/);
        if (!mm) return null;
        hour = parseInt(mm[1], 10);
        const minutePart = mm[2];
        if (minutePart === undefined) {
          minute = 0;
        } else {
          // If user typed `22.3` interpret as 22:30.
          minute = minutePart.length === 1 ? parseInt(minutePart, 10) * 10 : parseInt(minutePart, 10);
        }
        if (!Number.isFinite(hour) || !Number.isFinite(minute)) return null;
        minute = Math.max(0, Math.min(59, minute));

        if (suffix) {
          const s = suffix.replace(/\s+/g, '').replace(/\./g, '');
          const isPM = /^pm$/i.test(s);
          const isAM = /^am$/i.test(s);
          if (isPM) {
            if (hour < 12) hour += 12;
          } else if (isAM) {
            if (hour === 12) hour = 0;
          }
        }

        // No suffix means 24-hour input.
        if (suffix) {
          if (hour < 0 || hour > 23) return null;
        } else {
          if (hour < 0 || hour > 23) return null;
        }

        return hour * 60 + minute;
      };

      const getTriangleForMinutes = (dateStr, totalMinutes) => {
        const hour = Math.floor(totalMinutes / 60);
        const minInHour = totalMinutes % 60;
        const cellData = allDataRef.current?.[dateStr]?.[hour] || { split1: false, split2: false };
        const split1 = !!cellData.split1;
        const split2 = !!cellData.split2;

        if (minInHour < 30) {
          // Upper half: 00-30
          if (split1) {
            // q1: 00-15, q2: 15-30
            return { hour, triangleId: minInHour < 15 ? 'q1' : 'q2' };
          }
          return { hour, triangleId: 't1' };
        }

        // Lower half: 30-60
        if (split2) {
          // q3: 30-45, q4: 45-60
          const lower = minInHour - 30;
          return { hour, triangleId: lower < 15 ? 'q3' : 'q4' };
        }
        return { hour, triangleId: 't2' };
      };

      const getMinutesForTriangleId = (hour, triangleId) => {
        // Map each triangle to its start minute offset in the hour.
        const offsetMap = { t1: 0, q1: 0, q2: 15, t2: 30, q3: 30, q4: 45 };
        const offset = offsetMap[triangleId] ?? 0;
        return (hour * 60) + offset;
      };

      const formatTimeLabelFromMinutes = (minutes) => {
        if (!Number.isFinite(minutes)) return '';
        let m = Math.floor(minutes) % 1440;
        if (m < 0) m += 1440;
        const h24 = Math.floor(m / 60);
        const mm = m % 60;
        const ampm = h24 < 12 ? 'AM' : 'PM';
        let h12 = h24 % 12;
        if (h12 === 0) h12 = 12;
        return `${h12}:${String(mm).padStart(2, '0')} ${ampm}`;

      const appendTriangleNoteIfMissing = (dateStr, hour, triangleId, noteText) => {
        const noteTrim = String(noteText || '').trim();
        if (!noteTrim) return null;

        const normalizeNoteLine = (line) => String(line || '').trim().replace(/^\s*\d+\)\s*/g, '');

        // Use current closure `descriptions` for synchronous "did we insert?" detection,
        // but still re-check inside the updater for idempotency.
        const existingNow = String(descriptions?.[dateStr]?.[hour]?.[triangleId] || '');
        const existingLinesNow = existingNow

          .map(l => l.trim())
          .filter(Boolean);
        const existingNormalizedNow = new Set(existingLinesNow.map(normalizeNoteLine).filter(Boolean));
        if (existingNormalizedNow.has(noteTrim)) return null;

        setDescriptions(prev => {
          const newD = { ...prev };
          if (!newD[dateStr]) newD[dateStr] = {};
          if (!newD[dateStr][hour]) newD[dateStr][hour] = {};

          const existing = String(newD[dateStr][hour][triangleId] || '');
          const existingLines = existing
            .split('\n')
            .map(l => l.trim())
            .filter(Boolean);

          const existingNormalized = new Set(existingLines.map(normalizeNoteLine).filter(Boolean));
          if (existingNormalized.has(noteTrim)) {
            return prev; // already present -> idempotent
          }

          // Auto-serial numbering for every note line in a triangle.
          let maxNum = 0;
          existingLines.forEach((l) => {
            const m = String(l).match(/^\s*(\d+)\)\s+/);
            if (m) maxNum = Math.max(maxNum, parseInt(m[1], 10) || 0);
          });
          const nextNum = maxNum + 1;
          const numbered = `${nextNum}) ${noteTrim}`;

          const next = existing.trim() ? `${existing.trim()}\n${numbered}` : numbered;
          newD[dateStr][hour][triangleId] = next;
          return newD;
        });

        return { dateStr, hour, triangleId };

      const autoInsertTriangleNotesFromJournal = (dateStr, journalText) => {
        if (!dateStr || !journalText) return;

        // Also supports bracketed timestamps like `[07:42am] (note)`.
        // Examples: `7am (did)`, `7.50pm (did)`, `6:30 am (did)`, `22.3 (did)`, `[07:42am] (did)`
        const timeParenRe = /(?:\[\s*)?\b(\d{1,2}(?:[:.]\d{1,2})?)\s*(a\.?m\.?|p\.?m\.?|am|pm)?(?:\s*\])?\s*\(([^)]*)\)/gi;

        const matches = [];
        let m;
        while ((m = timeParenRe.exec(t)) !== null) {
          const timeToken = `${m[1]}${m[2] ? m[2] : ''}`;
          const noteText = m[3];
          matches.push({ timeToken, noteText });

        if (matches.length === 0) return;

        // Insert in order; highlight the last one we actually changed.
        let lastInserted = null;
        const insertedNotes = [];
        matches.forEach(({ timeToken, noteText }) => {
          const totalMinutes = parseFlexibleTimeTokenToMinutes(timeToken);
          if (totalMinutes === null || totalMinutes === undefined) return;
          const tri = getTriangleForMinutes(dateStr, totalMinutes);
          if (!tri || !tri.triangleId) return;
          const inserted = appendTriangleNoteIfMissing(dateStr, tri.hour, tri.triangleId, noteText);
          if (inserted) {
            insertedNotes.push(inserted);
            lastInserted = inserted;
          }
        });

        if (insertedNotes.length > 0) {

          const uniqueHours = Array.from(new Set(insertedNotes.map(x => x.hour)));
          uniqueHours.forEach(h => expandSectionForHour(h));
          if (lastInserted) setKeyboardCursor(lastInserted);

          // Notification: confirm note updates for the specific times.
          const uniqueTimes = new Set();
          insertedNotes.forEach(({ hour, triangleId }) => {
            const minutes = getMinutesForTriangleId(hour, triangleId);
            const timeLabel = formatTimeLabelFromMinutes(minutes);
            const key = `${hour}:${triangleId}`;
            if (uniqueTimes.has(key)) return;
            uniqueTimes.add(key);
            showToast(`📝 Notes updated for ${timeLabel} (${getDisplayDate(dateStr)})`, 'success');
          });
        }
      };
      const handleAddTodo = (dateStr, text) => {

            }

      const handleToggleHabit = (dateStr, id) => {

      // --- Blueprint helper: compute final value to store when painting ---

                               const valStr = e.target.value;
                               setTimer(p => ({
                                 ...p,
                                 initialMinutes: valStr === '' ? '' : parseInt(valStr),
                                 minutes: valStr === '' ? 0 : parseInt(valStr),
                                 seconds: 0
                               }));
                             }}

                          const totalMin = timer.mode === 'break' ? (Number(timer.breakDuration) || 5) : (Number(timer.initialMinutes) || 25);
                          const totalSeconds = totalMin * 60;
                          const remainSeconds = (Number(timer.minutes) || 0) * 60 + (Number(timer.seconds) || 0);
                          const pct = totalSeconds > 0 ? Math.max(0, Math.min(100, Math.round(((totalSeconds - remainSeconds) / totalSeconds) * 100))) : 0;
                          return (
                            <div
                              className={`h-full transition-all duration-300 ${timer.mode === 'break' ? 'bg-emerald-400' : 'bg-cyan-400'}`}

                          );
                        })()}

                            const s = total % 60;
                            if (prev.mode === 'break') {
                              return { ...prev, breakDuration: (Number(prev.breakDuration) || 5) + 2, minutes: m, seconds: s };
                            }
                            return { ...prev, initialMinutes: (Number(prev.initialMinutes) || 25) + 2, minutes: m, seconds: s };
                          });

                          className="mt-auto tb-interactive bg-emerald-600/20 text-emerald-300 hover:bg-emerald-600/40 hover:text-emerald-100 font-bold uppercase tracking-wider py-2 rounded-xl border border-emerald-500/50 flex items-center justify-center gap-2"
                        >

                      <div className="xl:col-span-2 grid grid-cols-1 sm:grid-cols-3 gap-4 md:gap-6 w-full">
                        <div className="bg-red-900/10 border border-red-500/20 rounded-2xl p-4 flex flex-col gap-4">

                          <button onClick={() => { playSound('click'); setPendingReset({type: 'month', payload: resetMonthStr}); }} className="mt-auto bg-red-600/80 text-white hover:bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.4)] font-black uppercase tracking-wider py-2 rounded-xl border border-red-400 transition-all w-full">Nuke System</button>
                        </div>
                        <div className="bg-red-900/10 border border-red-500/20 rounded-2xl p-4 flex flex-col gap-4 col-span-1 sm:col-span-3 xl:col-span-1">

                    <div className="mt-8 pt-6 border-t border-white/10">
                      <h3 className="font-bold text-violet-400 uppercase tracking-widest text-xs mb-4">Theme Options (12 total)</h3>
                      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">

                          { id: 'got', label: 'Game of Thrones', color: 'from-amber-300 to-slate-300' },

                        ].map(theme => (

                              ? 'border-violet-400 bg-violet-500/10 text-white shadow-[0_0_15px_rgba(167,139,250,0.4)]'
                              : 'border-white/10 bg-white/5 hover:bg-white/10 hover:border-violet-300/30'}`}

    }
    // --- Component: WeeklyChart ---
    function WeeklyChart({ weekDates, allData, categories, onDayClick }) {
      if (!weekDates || weekDates.length === 0) return null;
      const chartData = weekDates.map(dateStr => {
         const dayData = allData[dateStr] || {};
         const segments = [];
         let totalHours = 0;
         for (let i = 0; i < 24; i++) {
            const h = dayData[i] || {};
            if (h.split1) {
                segments.push({ id: h.q1, duration: 0.25 });
                segments.push({ id: h.q2, duration: 0.25 });
                if (h.q1 && !h.q1.startsWith('bp_')) totalHours += 0.25;
                if (h.q2 && !h.q2.startsWith('bp_')) totalHours += 0.25;
            } else {
                segments.push({ id: h.t1, duration: 0.5 });
                if (h.t1 && !h.t1.startsWith('bp_')) totalHours += 0.5;
            }
            if (h.split2) {
                segments.push({ id: h.q3, duration: 0.25 });
                segments.push({ id: h.q4, duration: 0.25 });
                if (h.q3 && !h.q3.startsWith('bp_')) totalHours += 0.25;
                if (h.q4 && !h.q4.startsWith('bp_')) totalHours += 0.25;
            } else {
                segments.push({ id: h.t2, duration: 0.5 });
                if (h.t2 && !h.t2.startsWith('bp_')) totalHours += 0.5;
            }
         }
         const dateObj = new Date(dateStr);
         const dayName = dateObj.toLocaleDateString('en-US', { weekday: 'short' });
         return { dayName, segments, totalHours, dateStr };
      });
      return (
         <div className="mt-6 md:mt-8 bg-[#0b1120] p-4 md:p-6 rounded-2xl border border-white/10 w-full overflow-hidden print:border-none print:shadow-none print:p-0 print:bg-transparent">
            <h3 className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">Weekly Activity Timeline</h3>
            <div className="flex items-end justify-between gap-1 sm:gap-2 h-48 md:h-64 pt-4">
               {chartData.map((data, i) => (
                     <div
                       key={i}
                       className="flex flex-col items-center flex-1 gap-2 group h-full cursor-pointer active:scale-95 transition-transform"
                       onClick={() => onDayClick && onDayClick(data.dateStr)}
                       title="Click to open Captain's Log"
                     >
                        <div className="w-full sm:w-10 md:w-12 max-w-[40px] relative flex flex-col h-full bg-white/5 rounded-md border border-white/10 overflow-hidden print:border-gray-800">
                           <div className="opacity-0 group-hover:opacity-100 absolute -top-7 md:-top-8 left-1/2 -translate-x-1/2 bg-black text-white text-[9px] md:text-[10px] py-1 px-1.5 md:px-2 rounded shadow-lg pointer-events-none transition-opacity font-bold whitespace-nowrap z-10 print:opacity-100 print:bg-transparent print:text-slate-300 print:shadow-none print:-top-5">
                              {data.totalHours}h
                           </div>
                           {data.segments.map((seg, idx) => {
                              const baseId = seg.id && seg.id.startsWith('bp_') ? seg.id.slice(3) : seg.id;
                              const cat = categories.find(c => c.id === baseId);
                              const bgColor = cat ? cat.color : 'transparent';
                              return <div key={idx} className="w-full" style={{ backgroundColor: bgColor, flexGrow: seg.duration }}></div>
                           })}
                        </div>
                        <span className="text-[8px] md:text-[10px] font-bold text-slate-500 uppercase text-center mt-auto group-hover:text-purple-300 transition-colors">{data.dayName}</span>
                     </div>
                  )
               )}
            </div>
         </div>
      );
    }
    // --- Component: ChronoSpectralHeatmap ---
    function ChronoSpectralHeatmap({ statYear, allData, todosData, habitLogs, categories, sysConfig, onDayClick, heatmapMode }) {
      const year = parseInt(statYear, 10);
      if (isNaN(year)) return null;
      const getHeatmapValue = useCallback((dateStr) => {
        const dayData = allData[dateStr] || {};
        const todayStr = formatDateString(new Date());
        const isPastDay = dateStr < todayStr;
        const isFullyLoggedDay = hasFullActivity(dayData);
        if (!isPastDay || !isFullyLoggedDay) {
          return { value: 0, hasActivity: false };
        }
        let value = 0;
        let hasActivity = false;
        if (heatmapMode === 'points') {
          Object.values(dayData).forEach(h => {
            const addPts = (id, dur) => {
              if (id && !id.startsWith('bp_')) {
                hasActivity = true;
                const cat = categories.find(c => c.id === id);
                if (cat) value += (parseFloat(cat.pointsPerHour) || 0) * dur;
              }
            };
            if (h.split1) { addPts(h.q1, 0.25); addPts(h.q2, 0.25); }
            else { addPts(h.t1, 0.5); }
            if (h.split2) { addPts(h.q3, 0.25); addPts(h.q4, 0.25); }
            else { addPts(h.t2, 0.5); }
          });
          return { value, hasActivity };
        } else {
          Object.values(dayData).forEach(h => {
            const processSeg = (id, dur) => {
              if (id === heatmapMode && !id.startsWith('bp_')) {
                hasActivity = true;
                value += dur;
              }
            };
            if (h.split1) {
              processSeg(h.q1, 0.25);
              processSeg(h.q2, 0.25);
            } else {
              processSeg(h.t1, 0.5);
            }
            if (h.split2) {
              processSeg(h.q3, 0.25);
              processSeg(h.q4, 0.25);
            } else {
              processSeg(h.t2, 0.5);
            }
          });
          return { value, hasActivity };
        }
      }, [heatmapMode, allData, todosData, habitLogs, categories]);
      const grid = useMemo(() => {
          const startDate = new Date(year, 0, 1);
          const endDate = new Date(year, 11, 31);
          const days = [];
          let startDayOfWeek = startDate.getDay();
          startDayOfWeek = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1;
          for (let i = 0; i < startDayOfWeek; i++) days.push(null);
          let d = new Date(startDate);
          while (d <= endDate) {
              const dateStr = formatDateString(d);
              days.push({
                  dateStr,
                  dateObj: new Date(d),
                  ...getHeatmapValue(dateStr)
              });
              d.setDate(d.getDate() + 1);
          }
          return days;
      }, [year, getHeatmapValue]);
      const modeSettings = sysConfig.perModeSettings?.[heatmapMode] || { worstPoint: null, bestPoint: null };
      const getHeatmapStyle = (val) => {
          const worst = modeSettings.worstPoint !== null ? parseFloat(modeSettings.worstPoint) : 0;
          const best = modeSettings.bestPoint !== null ? parseFloat(modeSettings.bestPoint) : 100;
          let percentage = (val - worst) / (best - worst);
          percentage = Math.max(0, Math.min(1, percentage));
          const hue = percentage * 140;
          return {
              backgroundColor: `hsl(${hue}, 85%, 45%)`,
              borderColor: `hsl(${hue}, 85%, 35%)`,
              boxShadow: percentage === 1 ? `0 0 10px hsl(${hue}, 85%, 45%, 0.8)` : 'none'
          };
      };
      return (
         <div className="bg-[#0b1120] p-4 md:p-6 rounded-2xl border border-white/10 w-full overflow-hidden flex flex-col print:border-none print:shadow-none print:p-0 print:bg-transparent">
            <div className="flex flex-col xl:flex-row xl:items-end justify-between gap-4 mb-4">
                <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3">
                   <h3 className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest">Chrono-Spectral Heatmap ({year}) — {heatmapMode === 'points' ? 'POINTS' : `${categories.find(c => c.id === heatmapMode)?.name || ''} HOURS`}</h3>
                </div>
                <div className="flex items-center gap-1.5 text-[8px] md:text-[10px] font-bold text-slate-500 uppercase flex-wrap">
                   <span>{modeSettings.worstPoint !== null ? modeSettings.worstPoint : 0} {heatmapMode === 'points' ? 'PTS' : 'HRS'}</span>
                   <div className="w-3 h-3 rounded-sm bg-white/5 border border-white/10"></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(0, 85%, 45%)', borderColor: 'hsl(0, 85%, 35%)' }}></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(35, 85%, 45%)', borderColor: 'hsl(35, 85%, 35%)' }}></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(70, 85%, 45%)', borderColor: 'hsl(70, 85%, 35%)' }}></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(105, 85%, 45%)', borderColor: 'hsl(105, 85%, 35%)' }}></div>
                   <div className="w-3 h-3 rounded-sm border" style={{ backgroundColor: 'hsl(140, 85%, 45%)', borderColor: 'hsl(140, 85%, 35%)', boxShadow: '0 0 6px hsl(140, 85%, 45%, 0.6)' }}></div>
                   <span>{modeSettings.bestPoint !== null ? modeSettings.bestPoint : 100} {heatmapMode === 'points' ? 'PTS' : 'HRS'}</span>
                </div>
            </div>
            <div className="overflow-x-auto custom-scrollbar pb-4 pt-10 px-4 -mx-4 print:pt-4 print:pb-0">
                <div className="min-w-max">
                    <div style={{ display: 'grid', gridTemplateRows: 'repeat(7, 1fr)', gridAutoFlow: 'column', gap: '4px' }}>
                        {grid.map((cell, idx) => {
                            if (!cell) return <div key={`empty-${idx}`} className="w-3 h-3 md:w-4 md:h-4"></div>;
                            return (
                                <div
                                    key={cell.dateStr}
                                    className={`w-3 h-3 md:w-4 md:h-4 rounded-sm border transition-all hover:scale-125 hover:z-10 relative group cursor-pointer ${!cell.hasActivity ? 'bg-white/5 border-white/10' : ''}`}
                                    style={cell.hasActivity ? getHeatmapStyle(cell.value) : {}}
                                    onClick={() => onDayClick && onDayClick(cell.dateStr)}
                                >
                                    <div className="opacity-0 group-hover:opacity-100 absolute bottom-full mb-1.5 left-1/2 -translate-x-1/2 bg-slate-900 border border-white/20 text-white text-[10px] py-1.5 px-2.5 rounded-lg shadow-[0_4px_15px_rgba(0,0,0,0.8)] pointer-events-none transition-opacity font-bold whitespace-nowrap z-[100] print:hidden">
                                        {cell.dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}: <span className="text-lime-400 drop-shadow-[0_0_5px_rgba(163,230,53,0.5)]">{cell.value > 0 ? '+' : ''}{Math.round(cell.value)} {heatmapMode === 'points' ? 'PTS' : 'HRS'}</span>
                                        <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-900"></div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>
         </div>
      );
    }
    // --- Component: StatCard ---
    function StatCard({ title, stats, categories, showGoals = false, multiplier = 1, showAverage = true }) {
      const { totals, completedTotals, totalTrackedHours, completedDaysCount, totalPoints } = stats;
      return (
        <div className="bg-white/5 p-4 md:p-6 rounded-2xl border border-white/10 flex flex-col h-full print:bg-transparent print:border-2 print:border-gray-800 print:shadow-none w-full">
          <div className="flex justify-between items-start mb-1 gap-2">
            <h3 className="font-bold text-base md:text-lg text-white uppercase tracking-wide drop-shadow-[0_0_5px_rgba(255,255,255,0.2)]">{title}</h3>
            <span className="bg-lime-500/20 text-lime-300 border border-lime-500/30 px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-widest whitespace-nowrap drop-shadow-[0_0_8px_rgba(163,230,53,0.5)]">{totalPoints > 0 ? '+' : ''}{totalPoints} PTS</span>
          </div>
          <div className="flex flex-col gap-1 md:gap-2 mb-4 md:mb-6">
            <span className="text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest">{totalTrackedHours} hours logged</span>
            {showAverage && (
              completedDaysCount > 0 ? (
                <span className="inline-block w-fit bg-green-500/20 text-green-300 px-2 py-1 rounded-md text-[9px] md:text-[10px] font-bold uppercase tracking-wider border border-green-500/50">
                  {completedDaysCount} Active Day(s) For Avg
                </span>
              ) : (
                <span className="inline-block w-fit bg-white/5 text-slate-400 px-2 py-1 rounded-md text-[9px] md:text-[10px] font-bold uppercase tracking-wider border border-white/10">
                  0 Active Days (Avg Disabled)
                </span>
              )
            )}
          </div>
          {totalTrackedHours === 0 ? (
            <div className="flex-1 flex items-center justify-center text-slate-500 font-bold uppercase border border-dashed border-slate-600 rounded-xl p-4 tracking-widest text-center text-xs md:text-sm print:border-gray-800 print:text-gray-500">
              No Data Found
            </div>
          ) : (
            <div className="space-y-3 md:space-y-4 mt-auto w-full">
              {categories.map(cat => {
                const hours = totals[cat.id] || 0;
                if (hours === 0) return null;
                const targetHours = (cat.target || 0) * multiplier;
                const isGoalMet = showGoals && targetHours > 0 && hours >= targetHours;
                let percentage = 0;
                if (showGoals && targetHours > 0) {
                  percentage = Math.min(100, (hours / targetHours) * 100);
                } else {
                  percentage = Math.round((hours / totalTrackedHours) * 100);
                }
                const completedHours = completedTotals[cat.id] || 0;
                const average = completedDaysCount > 0 ? (completedHours / completedDaysCount).toFixed(1) : '-';
                return (
                  <div key={cat.id} className="relative w-full">
                    <div className="flex justify-between items-end text-xs md:text-sm font-bold mb-1 md:mb-2 w-full gap-2">
                      <span className="text-slate-200 uppercase tracking-wide truncate pr-1" style={{textShadow: isGoalMet ? `0 0 10px ${cat.color}` : `0 0 5px ${cat.color}80`}} title={cat.name}>{cat.name}</span>
                      <div className="flex flex-col items-end shrink-0">
                        <span className="text-white whitespace-nowrap">
                          {hours}h
                          {showGoals && targetHours > 0
                            ? <span className="text-slate-400 text-[9px] md:text-[10px]"> / {targetHours}h Goal</span>
                            : <span className="text-slate-400 text-[9px] md:text-[10px]"> ({percentage}%)</span>
                          }
                        </span>
                        {showAverage && completedDaysCount > 0 && <span className="text-[9px] md:text-[10px] text-cyan-400 tracking-wide mt-0.5 whitespace-nowrap">Avg: {average}h/d</span>}
                      </div>
                    </div>
                    <div className={`w-full h-2 md:h-3 bg-[#0b1120] rounded-full overflow-hidden border ${isGoalMet ? 'border-transparent' : 'border-white/10'} print:border-gray-800 transition-all`} style={isGoalMet ? {boxShadow: `0 0 8px ${cat.color}`} : {}}>
                      <div className="h-full rounded-full transition-all duration-500" style={{ width: `${percentage}%`, backgroundColor: cat.color, boxShadow: `0 0 10px ${cat.color}` }} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
